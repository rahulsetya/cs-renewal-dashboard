const GP_T = {Q1:{floor:null,full:100,accel:null},Q2:{floor:55,full:62,accel:68},Q3:{floor:58,full:67,accel:73},Q4:{floor:62,full:72,accel:78}};
const SP_T = {Q1:{floor:null,full:100,accel:null},Q2:{floor:45,full:55,accel:65},Q3:{floor:50,full:62,accel:70},Q4:{floor:55,full:68,accel:75}};

// Activity floor thresholds — ramping (new program, no tracking history)
const ACT_FLOOR = {Q1:null,Q2:50,Q3:65,Q4:75};

// ── PAYOUT ENGINE ──────────────────────────────────
// Retention: below floor=0%, floor→full linear 0→100%, full→accel linear 100→125%, cap 125%
function retPayout(retPct,q,isSP){
  const t=isSP?SP_T[q]:GP_T[q];
  if(!t||!t.floor)return{pct:100,tier:"CLOSED"};
  if(retPct<t.floor)return{pct:0,tier:"Below floor"};
  if(retPct>=t.accel)return{pct:125,tier:"Capped 125%"};
  if(retPct>=t.full){const extra=((retPct-t.full)/(t.accel-t.full))*25;return{pct:Math.min(100+extra,125),tier:"Accelerator"};}
  const p=((retPct-t.floor)/(t.full-t.floor))*100;
  return{pct:Math.max(0,Math.min(p,100)),tier:p>=50?"Progressing":"Below full"};
}
// Activity: below floor = GATE (zeroes both components), above floor = linear 0→100%
function actPayout(cadPct,q){
  const floor=ACT_FLOOR[q];
  if(!floor)return{pct:100,tier:"CLOSED",gate:false};
  if(cadPct<floor)return{pct:0,tier:"Below gate",gate:true};
  const p=((cadPct-floor)/(100-floor))*100;
  return{pct:Math.min(p,100),tier:p>=100?"Full":"Scaling",gate:false};
}
// Combined: activity gates everything
function totalPayout(cadPct,retPct,q,isSP){
  const act=actPayout(cadPct,q);const ret=retPayout(retPct,q,isSP);
  if(act.gate)return{actPct:0,retPct:0,totalPct:0,gated:true,actTier:"GATED",retTier:"GATED"};
  return{actPct:act.pct,retPct:ret.pct,totalPct:(act.pct*.5+ret.pct*.5),gated:false,actTier:act.tier,retTier:ret.tier};
}

  'Pod 2': ['Courtney Krieg','Juwan Pryce'],
  'Pod 3': ['Alex Cherecwich','Joe Romanoff'],
  'Pod 4': ['Sunny Unger']
};
function _gpCsmPod(csm){
  if(!csm)return null;
  for(const p in _GP_POD_CSMS){if(_GP_POD_CSMS[p].indexOf(csm)>=0)return p;}
  return null;
}
function _gpIsOffPod(a){
  if(!a)return false;
  const p=_gpCsmPod(a.csRep);
  if(!p)return false;
  if(!a.ae)return false;
  return !_GP_POD_REPS[p](a.ae);
}
function _gpOwnerSel(){
  const v=selGPOwner;
  if(!v||v==='ALL')return{mode:'ALL',items:[]};
  const items=Array.isArray(v)?v.slice():[v];
  if(!items.length)return{mode:'ALL',items:[]};
  return{mode:'PICK',items};
}
function _gpItemMatches(item,a){
  if(typeof item==='string'&&item.indexOf('POD:')===0){
    const pod=item.slice(4);
    if(pod.endsWith(':OFF')){
      const basePod=pod.slice(0,-4);
      return a&&_gpCsmPod(a.csRep)===basePod&&_gpIsOffPod(a);
    }
    if(pod==='Scale USA'||pod==='Scale Asia'||pod==='Scale Europe')
      return a&&a.pool==='Scale'&&_gpScaleSubPod(a)===pod;
    return a&&a.pod===pod;
  }
  // Compare against the aliased CSM so picking "Support iConnections" pulls in
  // all the Scale support staff (Phoebe/Jovin/Bryan/…) along with rows whose
  // csRep is literally "Support iConnections".
  return a&&_gpAliasCsm(a.csRep)===item;
}
// How CSM picks combine with Pod picks. Within each group it's always OR
// (picking Lucy + Christina = "either Lucy or Christina"). Across groups:
//   OR  → Pod 2 ∨ Juwan = all Pod 2 accts plus all Juwan accts
//   AND → Pod 2 ∧ Juwan = only Juwan's accts that are in Pod 2
// Off-pod tokens (POD:<pod>:OFF) count as Pod-group items too.
let _gpComboMode='OR';
let _aaComboMode='OR';
function _gpSplitItemsByGroup(items){
  const csm=[],pod=[];
  items.forEach(it=>{
    if(typeof it==='string'&&it.indexOf('POD:')===0)pod.push(it);
    else csm.push(it);
  });
  return{csm,pod};
}
function _gpCombine(items,a,mode){
  if(mode==='AND'){
    const g=_gpSplitItemsByGroup(items);
    const csmOk=!g.csm.length||g.csm.some(it=>_gpItemMatches(it,a));
    const podOk=!g.pod.length||g.pod.some(it=>_gpItemMatches(it,a));
    return csmOk&&podOk;
  }
  return items.some(it=>_gpItemMatches(it,a));
}
function _gpMatchesOwnerFilter(a){
  const sel=_gpOwnerSel();
  if(sel.mode==='ALL')return true;
  return _gpCombine(sel.items,a,_gpComboMode);
}
function _gpIsOwnerPickActive(v){
  const sel=_gpOwnerSel();
  return sel.mode==='PICK'&&sel.items.indexOf(v)>=0;
}

function _exportCadenceXLSX(){
  const cd=typeof CADENCE_DATA!=='undefined'?CADENCE_DATA:null;
  if(!cd||!cd.cols||!cd.cols.length){alert('No cadence data loaded.');return;}
  // SheetJS is loaded in the parent document (the iframe itself doesn't
  // include it). Grab it via parent; fall back to window in case this ever
  // runs outside the iframe shell.
  const XLSX=(window.parent&&window.parent.XLSX)||window.XLSX;
  if(!XLSX){alert('Excel library not loaded yet. Try again in a moment.');return;}
  const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const curMo=MO[new Date().getMonth()];
  // Find the cadence column matching the current month. Columns may be
  // abbreviated ('Apr') or full ('April') depending on sheet, so fuzzy-match.
  const colMatch=cd.cols.find(c=>{
    const s=String(c||'').trim().toLowerCase();
    return s===curMo.toLowerCase()||s.startsWith(curMo.toLowerCase())||curMo.toLowerCase().startsWith(s.slice(0,3));
  });
  if(!colMatch){alert('No column for '+curMo+' in engagement tracker. Columns: '+cd.cols.join(', '));return;}
  const now=new Date();
  const ts=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  const roster=(typeof CSM!=='undefined'&&CSM.length)?CSM:Object.keys(cd.csm).map(n=>({n}));

  // Sheet 1: Summary (one row per CSM)
  const summaryRows=[['CSM','Pool','Total Book','Calls This Month','Pct of Book','Accounts Called']];
  roster.forEach(c=>{
    const d=cd.csm[c.n];if(!d)return;
    const tot=d.total||0;
    const mo=d.months[colMatch]||{yes:0,accts:[]};
    const pctNum=tot?mo.yes/tot:0;
    const acctNames=(mo.accts||[]).map(a=>a.acct).filter(Boolean).sort((a,b)=>a.localeCompare(b));
    summaryRows.push([c.n,c.seg||(c.t==='SP'?'SP':''),tot,mo.yes,pctNum,acctNames.join('; ')]);
  });

  // Sheet 2: Detail (one row per call)
  const detailRows=[['CSM','Account','Sub End','Risk','Notes']];
  roster.forEach(c=>{
    const d=cd.csm[c.n];if(!d)return;
    const mo=d.months[colMatch]||{accts:[]};
    (mo.accts||[]).forEach(a=>{
      const seLabel=a.se?(a.se instanceof Date?a.se.toLocaleDateString('en-US'):String(a.se)):'';
      detailRows.push([c.n,a.acct||'',seLabel,a.rsk||'',(a.notes||'').replace(/\s+/g,' ').slice(0,500)]);
    });
  });

  // Sheet 3: Header / metadata
  const metaRows=[
    ['CS Renewal — Cadence Export'],
    ['Month',colMatch+' '+now.getFullYear()],
    ['Generated',now.toLocaleString()],
    ['Source','Engagement Tracker · Cadence Tab'],
    []
  ];

  const wb=XLSX.utils.book_new();
  const wsSummary=XLSX.utils.aoa_to_sheet(summaryRows);
  // Format the Pct column (col E, index 4) as percentage
  const rng=XLSX.utils.decode_range(wsSummary['!ref']);
  for(let r=1;r<=rng.e.r;r++){
    const cellRef=XLSX.utils.encode_cell({c:4,r});
    if(wsSummary[cellRef]){wsSummary[cellRef].t='n';wsSummary[cellRef].z='0%';}
  }
  wsSummary['!cols']=[{wch:24},{wch:12},{wch:12},{wch:18},{wch:12},{wch:80}];
  const wsDetail=XLSX.utils.aoa_to_sheet(detailRows);
  wsDetail['!cols']=[{wch:24},{wch:36},{wch:14},{wch:8},{wch:80}];
  const wsMeta=XLSX.utils.aoa_to_sheet(metaRows);
  wsMeta['!cols']=[{wch:16},{wch:40}];
  XLSX.utils.book_append_sheet(wb,wsSummary,'Summary');
  XLSX.utils.book_append_sheet(wb,wsDetail,'Detail');
  XLSX.utils.book_append_sheet(wb,wsMeta,'About');
  XLSX.writeFile(wb,'cadence-'+colMatch.toLowerCase()+'-'+ts+'.xlsx');
}

// ── CADENCE AUDIT ──────────────────────────────────────────────────────────
// Hidden, password-gated tool that reconciles a HubSpot meeting export
// against the self-reported call cadence in the engagement tracker. Match
// key is **Platform ID × Month only** — CSM/owner names are never used as
// a join key, since the cadence tracker may be filled out by a different
// person than the activity owner in HubSpot.
let _cadAuditPwOK=false,_cadAuditData=null,_cadAuditPwTried=false;
const _CAD_AUDIT_KEY='cs_cadaudit_v1';
// ── TEAM-PUBLISHED AUDIT DATA ───────────────────────────────────────────────
// This const is rewritten each weekly publish so every dashboard user sees
// the same verification state without having to import the xlsx themselves.
// Local imports (in this browser) override it so the publisher can preview
// before pushing. Format identical to _cadAuditData. Keep the BAKE markers
// intact — the publish script regex-replaces between them.
/*BAKE_BEGIN*/const BAKED_AUDIT_DATA=null;/*BAKE_END*/
let _cadAuditSource=null; // 'local' | 'published' | 'baked' | null
try{const _raw=localStorage.getItem(_CAD_AUDIT_KEY);if(_raw){_cadAuditData=JSON.parse(_raw);_cadAuditSource='local';}}catch(e){}
if(!_cadAuditData&&BAKED_AUDIT_DATA){_cadAuditData=BAKED_AUDIT_DATA;_cadAuditSource='baked';}
// Fetch team-published audit.json. Local localStorage import always wins
// (publisher preview), so we only override _cadAuditData when nothing local
// exists. Cache-busted so an update is visible immediately on refresh.
(async function _loadPublishedAudit(){
  if(_cadAuditSource==='local')return;
  try{
    const r=await fetch('audit.json?t='+Date.now(),{cache:'no-store'});
    if(!r.ok)return;
    const data=await r.json();
    if(data&&data.bucket){
      _cadAuditData=data;_cadAuditSource='published';
      // Pick up team-published overrides — but never clobber local edits.
      // If the publisher has overrides queued in this browser, they win
      // (they're the source of truth and will publish next).
      if(data.overrides&&typeof _cadOverrides!=='undefined'&&Object.keys(_cadOverrides).length===0){
        _cadOverrides=data.overrides;
      }
      // Re-render whatever's currently active so checkmarks appear.
      if(typeof aTab!=='undefined'&&typeof rT==='function')rT(aTab);
    }
  }catch(e){/* no published file yet — fine */}
})();
// Bucket-key migration. v1 keyed by "pid|Mon" (no year) — that means a
// stale 2025 import would falsely "verify" 2026 cadence cells. v2 keys by
// "pid|YYYY-Mon" so the year must match exactly. If we detect an old-format
// import, rewrite it in place using the year captured at parse time.
(function _migrateAuditBucket(){
  if(!_cadAuditData||!_cadAuditData.bucket)return;
  const keys=Object.keys(_cadAuditData.bucket);
  if(!keys.length)return;
  // Already migrated?  Look for any "YYYY-Mon" suffix.
  const yearedKey=/\|\d{4}-[A-Za-z]{3}$/;
  if(yearedKey.test(keys[0]))return;
  const yr=_cadAuditData.year||new Date().getFullYear();
  const next={};
  keys.forEach(k=>{
    const i=k.lastIndexOf('|');if(i<0){next[k]=_cadAuditData.bucket[k];return;}
    const pid=k.slice(0,i),mo=k.slice(i+1);
    next[pid+'|'+yr+'-'+mo]=_cadAuditData.bucket[k];
  });
  _cadAuditData.bucket=next;
  try{localStorage.setItem(_CAD_AUDIT_KEY,JSON.stringify(_cadAuditData));}catch(e){}
})();
// Look up "(pid, month)" against the audit bucket using the current calendar
// year. This is the ONLY place that decides what "verified" means — if the
// year prefix doesn't match we explicitly return null so the UI shows ✓!
// (unconfirmed) instead of a false positive.
function _hsBucket(pid,mo){
  if(!_cadAuditData||!_cadAuditData.bucket)return null;
  const p=String(pid||'').trim();if(!p)return null;
  const yr=new Date().getFullYear();
  return _cadAuditData.bucket[p+'|'+yr+'-'+mo]||null;
}
// ── REVIEW OVERRIDES ──────────────────────────────────────────────────────
// Lets the publisher mark unverified (red ✓) calls as actually-verified
// (e.g. meeting happened on Zoom and wasn't logged in HubSpot) or attach a
// note explaining the discrepancy. Overrides are keyed by (pid, YYYY-Mon)
// matching the bucket key. Stored locally and shipped with audit.json so
// the team sees the resolved state.
//   shape: _cadOverrides[key] = {status:'verified'|'noted', note:'…', ts:ISO}
const _CAD_OVR_KEY='cs_cadovr_v1';
let _cadOverrides={};
try{const _r=localStorage.getItem(_CAD_OVR_KEY);if(_r)_cadOverrides=JSON.parse(_r);}catch(e){}
function _ovrKey(pid,mo){return String(pid||'').trim()+'|'+new Date().getFullYear()+'-'+mo;}
function _getOvr(pid,mo){const p=String(pid||'').trim();if(!p)return null;return _cadOverrides[_ovrKey(p,mo)]||null;}
function _saveOverrides(){try{localStorage.setItem(_CAD_OVR_KEY,JSON.stringify(_cadOverrides));}catch(e){}}
function _cadOvrMarkVerified(pid,mo,acct){
  if(!String(pid||'').trim()){alert('Cannot override — this account has no Platform ID, so we have no key to track the override against.');return;}
  const ex=_getOvr(pid,mo);
  const note=prompt('Mark "'+acct+'" as VERIFIED for '+mo+'.\n\nOptional note (e.g. "Meeting was on Zoom, not in HubSpot"):',(ex&&ex.note)||'');
  if(note===null)return;
  _cadOverrides[_ovrKey(pid,mo)]={status:'verified',note:note.trim(),ts:new Date().toISOString()};
  _saveOverrides();
  if(typeof aTab!=='undefined'&&typeof rT==='function')rT(aTab);
}
function _cadOvrAddNote(pid,mo,acct){
  if(!String(pid||'').trim()){alert('Cannot add note — this account has no Platform ID.');return;}
  const ex=_getOvr(pid,mo);
  const note=prompt('Note for "'+acct+'" — '+mo+':\n(Saves context. Row stays in Unconfirmed/Missed until you click ✓ Verify.)',(ex&&ex.note)||'');
  if(note===null)return;
  if(!note.trim()&&!ex)return;
  _cadOverrides[_ovrKey(pid,mo)]={status:(ex&&ex.status)||'noted',note:note.trim(),ts:new Date().toISOString()};
  _saveOverrides();
  if(typeof aTab!=='undefined'&&typeof rT==='function')rT(aTab);
}
function _cadOvrClear(pid,mo){
  if(!confirm('Clear the override / note for this entry?'))return;
  delete _cadOverrides[_ovrKey(pid,mo)];
  _saveOverrides();
  if(typeof aTab!=='undefined'&&typeof rT==='function')rT(aTab);
}
// Review & Resolve sort + filter state. Sort defaults to Account A→Z.
// Filter dropdowns above the table narrow by status and/or CSM ('' = all).
// Both kept in module scope, no localStorage — resets on reload (fine for a
// review tool; you don't usually want yesterday's filter sticking around).
let _cadDiscSort={col:'acct',dir:'asc'};
// status is an array (multi-select) so the audit can show e.g. unconfirmed
// + missed-logging together. Empty array = "All statuses" (no filter). csm
// stays single-select since it's a long list of names.
let _cadDiscFilt={status:[],csm:''};
function _cadDiscSetFilt(k,v){_cadDiscFilt[k]=v||'';if(typeof aTab!=='undefined'&&typeof rT==='function')rT(aTab);}
// Toggle one status in/out of the multi-select. Re-renders so the chip
// active state and the table both update.
function _cadDiscToggleStatus(s){
  const cur=Array.isArray(_cadDiscFilt.status)?_cadDiscFilt.status:[];
  const i=cur.indexOf(s);
  if(i>=0)cur.splice(i,1);else cur.push(s);

}
function _cadDiscClearFilt(){_cadDiscFilt={status:[],csm:''};if(typeof aTab!=='undefined'&&typeof rT==='function')rT(aTab);}
// Click handler for the CSM-row discrepancy chips ("❌3" / "⚠2"). Expands
// (or collapses) an inline panel directly underneath the clicked CSM row
// showing the offending accounts for that status. We deliberately don't
// scroll-to or open the Review & Resolve table at the bottom of the
// cadence tab — that table is gated behind _cadExportUnlocked (manager
// mode), so CSMs can't reach it. The inline panel works for every viewer.
//
// Re-clicking the same chip closes the panel. Clicking the OTHER chip on
// the same CSM swaps the panel content (status='unverified' ↔ 'forgot')
// without closing/reopening. Stored state lives on the panel element via
// data-status so we can tell the two cases apart.
function _cadJumpToReview(csmName,statusKey){
  try{
    if(!_cadAuditData)return;
    const audit=_cadAuditCompute();
    if(!audit)return;
    const rid='cad_'+csmName.replace(/\W/g,'_');
    const tr=document.getElementById(rid+'_chip');
    const body=document.getElementById(rid+'_chip_body');
    if(!tr||!body){console.warn('[_cadJumpToReview] panel not found for',csmName);return;}
    const isOpen=tr.style.display!=='none';
    const curStatus=tr.getAttribute('data-status')||'';
    if(isOpen&&curStatus===statusKey){tr.style.display='none';tr.removeAttribute('data-status');return;}
    // Build mini table of this CSM's rows for the requested status. Filter
    // by effectiveStatus, not raw status — a ✓ Verify override flips
    // effectiveStatus to 'verified' so the row drops out, while a 💬 Note
    // alone leaves effectiveStatus unchanged so the row stays here with its
    // note visible until the CSM explicitly verifies.
    const rows=audit.rows.filter(r=>r.csm===csmName&&r.effectiveStatus===statusKey);
    const isUnv=statusKey==='unverified';
    const color=isUnv?'var(--red)':'var(--amber)';
    const icon=isUnv?'❌':'⚠';
    const titleTxt=isUnv?'Unconfirmed':'Missed Logging';
    const explainer=isUnv
      ?'Tracker marked Y but no matching meeting in HubSpot.'
      :'HubSpot has a meeting but the tracker is blank.';
    const dateColLabel=isUnv?'Tracker':'HubSpot date';
    const _esc=s=>String(s||'').replace(/[<>&"']/g,c=>({'<':'\x26lt;','>':'\x26gt;','&':'\x26amp;','"':'\x26quot;',"'":'\x26#39;'}[c]));
    const _fmtDate=iso=>{
      if(!iso||iso.length<10)return'';
      const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return(MO[parseInt(iso.slice(5,7),10)-1]||'')+' '+parseInt(iso.slice(8,10),10);
    };
    // Missed Logging only — show who ran the meeting in HubSpot (often a
    // teammate, not the CSM). For Unconfirmed there is no HS meeting, so the
    // column is omitted to keep the panel narrow.
    const showAssignee=!isUnv;
    const _fmtAssignee=r=>{
      const list=Array.isArray(r.assignees)?r.assignees.filter(Boolean):[];
      const last=String(r.lastAssignee||'').trim();
      if(!last&&!list.length)return'<span style="color:var(--dim)">—</span>';
      // If the same person ran every meeting, just show the name.
      if(list.length<=1)return _esc(last||list[0]||'');
      // Multiple owners: lead with the most-recent and tooltip the rest.
      const others=list.filter(x=>x&&x!==last);
      const tip=('All owners this month: '+list.join(', ')).replace(/"/g,'&quot;');
      return _esc(last||list[0])+`<span style="margin-left:5px;color:var(--dim);font-size:10px;font-weight:500" title="${tip}">+${others.length}</span>`;
    };
    const tableHTML=rows.length?`<table style="border-collapse:collapse;width:100%;font-size:11px">
      <thead><tr style="border-bottom:1px solid var(--border)">
        <th style="text-align:left;padding:5px 8px;color:var(--dim);font-weight:600">Account</th>
        <th style="text-align:left;padding:5px 8px;color:var(--dim);font-weight:600;width:90px">Month</th>
        <th style="text-align:left;padding:5px 8px;color:var(--dim);font-weight:600;width:120px">${dateColLabel}</th>
        ${showAssignee?'<th style="text-align:left;padding:5px 8px;color:var(--dim);font-weight:600;width:140px">Assigned to</th>':''}
        <th style="text-align:left;padding:5px 8px;color:var(--dim);font-weight:600">Note</th>
      </tr></thead>
      <tbody>${rows.map(r=>`<tr style="border-top:1px solid rgba(255,255,255,.04)">
        <td style="padding:5px 8px;color:var(--text);font-weight:500">${_esc(r.acct)}</td>
        <td style="padding:5px 8px;color:var(--dim);font-family:var(--mono);font-size:10px">${_esc(r.month)}</td>
        <td style="padding:5px 8px;color:var(--dim);font-family:var(--mono);font-size:10px">${isUnv?(r.tracker==='Y'?'Y':_esc(r.tracker)):_fmtDate(r.lastDate)}</td>
        ${showAssignee?`<td style="padding:5px 8px;color:var(--text);font-size:10px">${_fmtAssignee(r)}</td>`:''}
        <td style="padding:5px 8px;color:var(--muted);font-size:10px;font-style:italic">${r.override&&r.override.note?_esc(r.override.note):''}</td>
      </tr>`).join('')}</tbody>
    </table>`:`<div style="padding:8px 4px;font-size:11px;color:var(--dim)">No accounts to show.</div>`;
    body.innerHTML=`<div style="padding:10px 16px;background:rgba(0,0,0,.18);border-left:3px solid ${color}">
      <div style="font-size:11px;font-weight:700;color:${color};margin-bottom:2px">${icon} ${titleTxt} — ${csmName} (${rows.length})</div>
      <div style="font-size:10px;color:var(--dim);margin-bottom:8px">${explainer}</div>
      ${tableHTML}
    </div>`;
    tr.style.display='';
    tr.setAttribute('data-status',statusKey);
  }catch(e){console.error('[_cadJumpToReview] threw:',e);}
}
function _cadDiscSetSort(col){

// Publish: download the current audit data as JSON. The publisher hands this
// file directly to GitHub via the publisher's stored PAT — once committed,
// every dashboard user sees the same verification state.
const _PUB_REPO='rahulsetya/cs-renewal-dashboard';
const _PUB_FILE='audit.json';
const _PUB_TOK_KEY='cs_pubtok';
function _pubGetToken(){try{const v=localStorage.getItem(_PUB_TOK_KEY);return v?atob(v):null;}catch(e){return null;}}
function _pubSetToken(t){try{if(t)localStorage.setItem(_PUB_TOK_KEY,btoa(t));else localStorage.removeItem(_PUB_TOK_KEY);}catch(e){}}
async function _pubGetSha(token){
  const r=await fetch('https://api.github.com/repos/'+_PUB_REPO+'/contents/'+_PUB_FILE,{
    headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github+json'},cache:'no-store'
  });
  if(r.status===404)return null;
  if(!r.ok){const t=await r.text();throw new Error('Read failed: '+r.status+' '+t.slice(0,200));}
  const j=await r.json();return j.sha;
}
async function _pubCommit(token,jsonContent,sha){
  // base64-encode UTF-8 safely (handles unicode in account names)
  const b64=btoa(unescape(encodeURIComponent(jsonContent)));
  const body={message:'Update audit.json — '+new Date().toISOString().slice(0,10),content:b64,branch:'main'};
  if(sha)body.sha=sha;
  const r=await fetch('https://api.github.com/repos/'+_PUB_REPO+'/contents/'+_PUB_FILE,{
    method:'PUT',
    headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github+json','Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  if(!r.ok){const t=await r.text();throw new Error('Publish failed: '+r.status+' '+t.slice(0,200));}
  return r.json();
}
async function _cadPublishToTeam(){
  if(!_cadAuditData||!_cadAuditData.bucket){alert('No audit data to publish — import a HubSpot file first.');return;}
  let token=_pubGetToken();
  if(!token){
    const msg='Paste your GitHub publish token (starts with github_pat_…)\n\nOne-time setup. Stored in this browser only — never shared, never committed.\n\nIf you don\'t have one yet:\n  GitHub → Settings → Developer settings → Personal access tokens → Fine-grained → Generate new\n  Repo: rahulsetya/cs-renewal-dashboard · Permissions: Contents R+W';
    token=prompt(msg);
    if(!token||!token.trim())return;
    token=token.trim();
    _pubSetToken(token);
  }
  const payload={
    importedAt:_cadAuditData.importedAt||new Date().toISOString(),
    fileName:_cadAuditData.fileName||'',
    sheetName:_cadAuditData.sheetName||'',
    rowsParsed:_cadAuditData.rowsParsed||0,
    bucket:_cadAuditData.bucket,
    year:_cadAuditData.year||new Date().getFullYear(),
    overrides:(typeof _cadOverrides!=='undefined'?_cadOverrides:{}),
    publishedAt:new Date().toISOString()
  };
  const json=JSON.stringify(payload,null,0);
  try{
    const sha=await _pubGetSha(token);
    await _pubCommit(token,json,sha);
    alert('✓ Published to team.\n\nLive for everyone in ~60 seconds (GitHub Pages redeploy). Teammates just need to refresh.');
  }catch(e){
    const m=String(e.message||e);
    if(m.includes(' 401')||m.includes(' 403')){
      _pubSetToken(null);
      alert('Token rejected — cleared.\n\nClick Publish again to re-enter it. Common causes:\n  • Token expired (regenerate on GitHub)\n  • Token doesn\'t have Contents:Write\n  • Token isn\'t scoped to this repo');
    }else{
      alert('Publish failed: '+m);
    }
  }
}
// Optional: clear stored token (in case publisher wants to rotate).
function _cadClearPublishToken(){

// The audit scopes to a single month at a time. Defaults to the live current
// month and auto-tracks across day boundaries until the user manually picks
// one with the month chips.
let _cadAuditMo=null,_cadAuditMoPinned=false;
function _setCadAuditMo(mo){_cadAuditMo=mo;_cadAuditMoPinned=true;if(aTab==='cadence')rT('cadence');}
// Manual override for the "active month" used by the gap-to-50% badge,
// export label, and header copy. Defaults to null = auto-track real-world
// month via _nowMo(). Set via the "View as month" dropdown so a CSM audit
// can still see April flags after the calendar rolls over.
let _cadCurMoOverride=null;
function _setCadCurMo(mo){_cadCurMoOverride=mo||null;if(aTab==='cadence')rT('cadence');}
function _liveCadAuditMo(){
  // If user hasn't pinned, follow live month; else respect their pick.
  // Falls back to first cadence column if live month isn't tracked.
  // The cadence "View as" override (_cadCurMoOverride) takes precedence over
  // _nowMo() so a user pinning April there also gets the ❌/⚠ chips for April.
  const cd=typeof CADENCE_DATA!=='undefined'?CADENCE_DATA:null;
  const cols=(cd&&cd.cols)||[];
  if(!_cadAuditMoPinned){
    const live=_cadCurMoOverride||_nowMo();
    _cadAuditMo=cols.includes(live)?live:(cols[cols.length-1]||live);
  }else if(!cols.includes(_cadAuditMo)){
    _cadAuditMo=cols[cols.length-1]||_nowMo();
  }
  return _cadAuditMo;
}

function _cadAuditPromptImport(){

function _cadAuditClear(){
  if(!confirm('Clear imported HubSpot audit data?'))return;
  _cadAuditData=null;
  try{localStorage.removeItem(_CAD_AUDIT_KEY);}catch(e){}
  if(aTab==='cadence')rT('cadence');

function _cadAuditParseFile(file){
  const XLSX=(window.parent&&window.parent.XLSX)||window.XLSX;
  if(!XLSX){alert('Excel library not loaded yet. Try again in a moment.');return;}
  const fr=new FileReader();
  fr.onload=ev=>{
    try{
      const data=new Uint8Array(ev.target.result);
      const wb=XLSX.read(data,{type:'array'});
      if(!wb.SheetNames||!wb.SheetNames.length){alert('Workbook has no sheets.');return;}
      // HubSpot reports often have a Summary sheet first and the line-item
      // detail (one row per activity) on a later sheet. Scan ALL sheets and
      // pick the first one that has both a Platform-ID column and a Date
      // column in its header. Strict match first; loose fallback if needed.
      const wantPid=['platform companyid','platform company id','platform id','company platform id','hubspot id','hubspot record id','company id','record id'];
      const wantDate=['activity date','last activity date','activity assigned date','meeting date','date','close date'];
      // Optional column — if present we capture who ran each meeting so the
      // cadence cell can show the assignee inline (most useful for the Scale
      // Team where multiple people share the book). Falls back gracefully
      // when absent — older HubSpot exports without this column still parse.
      const wantAssignee=['activity assigned to','assigned to','activity owner','meeting owner','hubspot owner','owner'];
      const tried=[];
      let rows=null,hdrRow=-1,pidIdx=-1,dateIdx=-1,assigneeIdx=-1,pickedSheet=null;
      const _scan=(sheetRows,strict)=>{
        for(let r=0;r<Math.min(8,sheetRows.length);r++){
          const row=(sheetRows[r]||[]).map(v=>String(v||'').trim().toLowerCase());
          const p=strict
            ?row.findIndex(c=>wantPid.includes(c))
            :row.findIndex(c=>c.includes('platform')&&c.includes('id'));
          const d=strict
            ?row.findIndex(c=>wantDate.some(w=>c===w||c.startsWith(w)))
            :row.findIndex(c=>c.includes('date'));
          if(p>=0&&d>=0)return{r,p,d};
        }
        return null;
      };
      // Pass 1 — strict, every sheet
      for(const sn of wb.SheetNames){
        const sheetRows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:''});
        tried.push({sn,headers:(sheetRows[0]||[]).slice(0,8).join(' | ')});
        const hit=_scan(sheetRows,true);
        if(hit){rows=sheetRows;hdrRow=hit.r;pidIdx=hit.p;dateIdx=hit.d;pickedSheet=sn;break;}
      }
      // Pass 2 — loose, every sheet
      if(hdrRow<0){
        for(const sn of wb.SheetNames){
          const sheetRows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:''});
          const hit=_scan(sheetRows,false);
          if(hit){rows=sheetRows;hdrRow=hit.r;pidIdx=hit.p;dateIdx=hit.d;pickedSheet=sn;break;}
        }
      }
      if(hdrRow<0){
        const list=tried.map(t=>'• ['+t.sn+'] '+t.headers).join('\n');
        alert('Could not find Platform ID + Activity Date columns in any sheet.\n\nSheets scanned:\n'+list);
        return;
      }
      // Optional: locate the "Activity assigned to" column on the picked
      // sheet's header row. Strict-match first, then loose contains-match.
      const _hdrLC=(rows[hdrRow]||[]).map(v=>String(v||'').trim().toLowerCase());
      assigneeIdx=_hdrLC.findIndex(c=>wantAssignee.includes(c));
      if(assigneeIdx<0)assigneeIdx=_hdrLC.findIndex(c=>c.includes('assigned')||(c.includes('activity')&&c.includes('owner')));
      const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const bucket={};let parsed=0,year=null;
      const _parseDate=v=>{
        if(v==null||v==='')return null;
        if(typeof v==='number'&&v>1000){
          // Excel serial → JS date (UTC-safe)
          const d=new Date((v-25569)*86400*1000);
          return isNaN(d)?null:d;
        }
        const s=String(v).trim();
        // Try YYYY-MM-DD first
        const m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
        if(m)return new Date(parseInt(m[1]),parseInt(m[2])-1,parseInt(m[3]));
        // Try MM/DD/YYYY or M/D/YYYY
        const m2=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
        if(m2){let y=parseInt(m2[3]);if(y<100)y+=2000;return new Date(y,parseInt(m2[1])-1,parseInt(m2[2]));}
        const d=new Date(s);return isNaN(d)?null:d;
      };
      // Deduplicate at minute granularity: HubSpot exports one row per
      // attendee, so a single meeting with 3 contacts from the same firm
      // shows up as 3 rows with identical Platform ID and identical
      // start time. Treat (pid + YYYY-MM-DDTHH:MM) as the meeting identity.
      const seenMtg=new Set();
      let dupesSkipped=0;
      for(let r=hdrRow+1;r<rows.length;r++){
        const row=rows[r]||[];
        const pid=String(row[pidIdx]||'').trim();
        if(!pid)continue;
        const dt=_parseDate(row[dateIdx]);
        if(!dt)continue;
        const mtgKey=pid+'|'+dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0')+'T'+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');
        if(seenMtg.has(mtgKey)){dupesSkipped++;continue;}
        seenMtg.add(mtgKey);
        const mo=MO[dt.getMonth()];
        const yr=dt.getFullYear();
        if(year===null)year=yr;
        const key=pid+'|'+yr+'-'+mo;
        if(!bucket[key])bucket[key]={count:0,lastDate:null,lastIso:'',earliestDate:null,earliestIso:'',lastAssignee:'',assignees:[]};
        bucket[key].count++;
        // Capture assignee. The lastAssignee field always tracks the assignee
        // of the most recent meeting (the same one whose date we display);
        // assignees[] is a deduped list of everyone who ran a meeting that
        // month, used for the tooltip when more than one person logged calls.
        const assignee=assigneeIdx>=0?String(row[assigneeIdx]||'').trim():'';
        if(assignee&&!bucket[key].assignees.includes(assignee))bucket[key].assignees.push(assignee);
        const _isoDt=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
        if(!bucket[key].lastDate||dt>bucket[key].lastDate){
          bucket[key].lastDate=dt;
          bucket[key].lastIso=_isoDt;
          bucket[key].lastAssignee=assignee;
        }
        // Track earliest meeting in the bucket too. The audit's "Missed
        // Logging" check uses this to suppress flags for buckets where every
        // meeting is still in the future — you can't have forgotten to log
        // a meeting that hasn't happened yet. If a bucket has both past and
        // future meetings, earliestIso is the past one and the flag stands.
        if(!bucket[key].earliestDate||dt<bucket[key].earliestDate){
          bucket[key].earliestDate=dt;
          bucket[key].earliestIso=_isoDt;
        }
        parsed++;
      }
      // Strip non-serializable Date objects before saving
      const bucketSave={};
      Object.keys(bucket).forEach(k=>{bucketSave[k]={count:bucket[k].count,lastIso:bucket[k].lastIso,earliestIso:bucket[k].earliestIso||bucket[k].lastIso||'',lastAssignee:bucket[k].lastAssignee||'',assignees:bucket[k].assignees||[]};});
      _cadAuditData={
        importedAt:new Date().toISOString(),
        fileName:file.name,
        sheetName:pickedSheet||'',
        rowsParsed:parsed,
        bucket:bucketSave,
        year:year||new Date().getFullYear()
      };
      try{localStorage.setItem(_CAD_AUDIT_KEY,JSON.stringify(_cadAuditData));}catch(e){}
      _cadAuditSource='local';
      alert('Imported '+parsed+' unique meetings from sheet "'+pickedSheet+'" of '+file.name+'.\n'+(dupesSkipped>0?'Collapsed '+dupesSkipped+' duplicate row'+(dupesSkipped>1?'s':'')+' (same company + same start time = same meeting).\n':'')+'Unique account-months: '+Object.keys(bucketSave).length);
      if(aTab==='cadence')rT('cadence');
    }catch(err){alert('Failed to parse file: '+(err.message||err));}
  };
  fr.onerror=()=>alert('Failed to read file.');
  fr.readAsArrayBuffer(file);
}

// Walk every (account, month) pair from the cadence data and tag a status:
//   verified   — tracker says Y, HubSpot has ≥1 meeting   ✅
//   unverified — tracker says Y, HubSpot has 0 meetings   ❌
//   forgot     — tracker says blank/N, HubSpot has ≥1     ⚠
//   none       — both empty (silently dropped)
function _cadAuditCompute(){
  if(!_cadAuditData||!_cadAuditData.bucket)return null;
  const cd=typeof CADENCE_DATA!=='undefined'?CADENCE_DATA:null;
  if(!cd||!cd.cols)return null;
  // Scope audit to a single month chosen on the audit panel (defaults to
  // the live current month). Use month chips on the panel to switch.
  const scopeMo=_liveCadAuditMo();
  const scopeCols=cd.cols.includes(scopeMo)?[scopeMo]:[];
  const bucket=_cadAuditData.bucket;
  const perCSM={};
  const rows=[];
  Object.keys(cd.csm).forEach(csmName=>{
    const d=cd.csm[csmName];
    perCSM[csmName]={markedY:0,verified:0,unverified:0,forgot:0,noPid:0};
    (d.allAccts||[]).forEach(a=>{
      scopeCols.forEach(mo=>{
        const v=String((a.calls&&a.calls[mo])||'').trim().toLowerCase();
        const marked=v.startsWith('y');
        const pid=String(a.platformId||'').trim();
        // Year-strict: _hsBucket uses current calendar year, so a stale prior-
        // year import will not falsely confirm this year's cadence.
        const b=pid?_hsBucket(pid,mo):null;
        const cnt=b?b.count:0;
        if(marked&&!pid){perCSM[csmName].noPid++;return;}
        let status=null;
        if(marked&&cnt>0)status='verified';
        else if(marked&&cnt===0)status='unverified';
        else if(!marked&&cnt>0){
          // Don't flag "Missed Logging" if every meeting in this bucket is
          // still upcoming — CSM can't have forgotten to log a call that
          // hasn't happened yet. Old imports without earliestIso fall back
          // to lastIso (best-effort: works for single-meeting buckets,
          // re-import to get the precise check for multi-meeting months).
          const earliestIso=b.earliestIso||b.lastIso||'';
          const today=new Date();
          const todayIso=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
          if(earliestIso&&earliestIso>todayIso){
            // All meetings in this bucket are future-dated — silently drop.
            return;
          }
          status='forgot';
        }
        // Apply manual override: a 'verified' override flips the row to
        // verified for the Review-table label and removes it from the
        // ❌/⚠ chip counts and the Unconfirmed/Missed inline panel.
        // A 'noted' override (💬 Note without ✓ Verify) leaves effective
        // status unchanged — the row keeps showing as Unconfirmed/Missed
        // with the note attached, so it doesn't silently disappear just
        // because someone wrote a comment. Only an explicit ✓ Verify
        // resolves it.
        const ovr=_getOvr(pid,mo);
        let effectiveStatus=status;
        if(ovr&&ovr.status==='verified'&&(status==='unverified'||status==='forgot'))effectiveStatus='verified';
        if(marked)perCSM[csmName].markedY++;
        if(effectiveStatus==='verified')perCSM[csmName].verified++;
        if(effectiveStatus==='unverified')perCSM[csmName].unverified++;
        if(effectiveStatus==='forgot')perCSM[csmName].forgot++;
        if(status){
          rows.push({
            csm:csmName,acct:a.acct,pid,month:mo,
            tracker:marked?'Y':(v||''),
            hsCount:cnt,
            lastDate:b?b.lastIso:'',
            // HubSpot activity owner of the most-recent meeting in the bucket,
            // plus a deduped list of every owner that logged in the bucket.
            // Surfaced in the Missed Logging panel so the CSM knows who ran
            // the meeting (often a different teammate) before chasing it down.
            lastAssignee:b?(b.lastAssignee||''):'',
            assignees:b?(b.assignees||[]):[],
            status,
            effectiveStatus,
            override:ovr||null
          });
        }
      });
    });
  });
  return{perCSM,rows};
}

function _exportCadenceAuditXLSX(){
  const XLSX=(window.parent&&window.parent.XLSX)||window.XLSX;
  if(!XLSX){alert('Excel library not loaded yet.');return;}
  const audit=_cadAuditCompute();
  if(!audit){alert('No audit data — import a HubSpot file first.');return;}
  const now=new Date();
  const ts=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  // Sheet 1: Per-CSM Scorecard
  const sumRows=[['CSM','Self-Reported Calls (tracker Y)','Confirmed (matched HubSpot)','Unconfirmed (Y, no HS meeting)','Missed Logging (HS meeting, tracker blank)','Tracker Accuracy','Cannot Match (no Platform ID)']];
  Object.keys(audit.perCSM).sort().forEach(c=>{
    const s=audit.perCSM[c];
    const rate=s.markedY?s.verified/s.markedY:0;
    sumRows.push([c,s.markedY,s.verified,s.unverified,s.forgot,rate,s.noPid]);
  });
  const wsSum=XLSX.utils.aoa_to_sheet(sumRows);
  const sumRng=XLSX.utils.decode_range(wsSum['!ref']);
  for(let r=1;r<=sumRng.e.r;r++){
    const cellRef=XLSX.utils.encode_cell({c:5,r});
    if(wsSum[cellRef]){wsSum[cellRef].t='n';wsSum[cellRef].z='0%';}
  }
  wsSum['!cols']=[{wch:24},{wch:24},{wch:24},{wch:24},{wch:36},{wch:16},{wch:24}];
  // Sheet 2: Discrepancies
  // Status column reflects effectiveStatus (raw audit result + any manual
  // ✓ Verify override). A row that was Unconfirmed/Missed but the publisher
  // manually verified now exports as "Confirmed" with the override note in
  // the Note column. The original raw audit result is kept in "Audit Status"
  // so you can still see where the override came from.
  const detRows=[['CSM','Account','Platform ID','Month','Tracker Says','HubSpot Meetings (count)','Most Recent Meeting','Status','Audit Status','Note']];
  const STATUS_LABEL={verified:'Confirmed',unverified:'Unconfirmed',forgot:'Missed Logging'};
  audit.rows.sort((a,b)=>{
    const order={unverified:0,forgot:1,verified:2};
    const ea=a.effectiveStatus||a.status,eb=b.effectiveStatus||b.status;
    const da=order[ea]??9,db=order[eb]??9;
    if(da!==db)return da-db;
    return (a.csm||'').localeCompare(b.csm||'')||(a.acct||'').localeCompare(b.acct||'');
  }).forEach(r=>{
    const eff=r.effectiveStatus||r.status;
    const noteCell=r.override?(r.override.note||'(manually verified)'):'';
    // Audit Status only filled in when override flipped the row, so reviewers
    // can spot which Confirmeds came from a manual verify vs HubSpot match.
    const auditCell=(r.override&&r.override.status==='verified'&&r.status!=='verified')?(STATUS_LABEL[r.status]||r.status):'';
    detRows.push([r.csm,r.acct,r.pid||'(none)',r.month,r.tracker,r.hsCount,r.lastDate,STATUS_LABEL[eff]||eff,auditCell,noteCell]);
  });
  const wsDet=XLSX.utils.aoa_to_sheet(detRows);
  wsDet['!cols']=[{wch:24},{wch:36},{wch:18},{wch:8},{wch:14},{wch:24},{wch:20},{wch:18},{wch:18},{wch:48}];
  // Sheet 3: About
  const meta=[
    ['CS Renewal — Cadence Audit'],
    ['Generated',now.toLocaleString()],
    ['Source File',(_cadAuditData&&_cadAuditData.fileName)||''],
    ['Source Sheet',(_cadAuditData&&_cadAuditData.sheetName)||''],
    ['Imported At',(_cadAuditData&&_cadAuditData.importedAt)||''],
    ['HubSpot Rows Parsed',(_cadAuditData&&_cadAuditData.rowsParsed)||0],
    ['Match Key','Platform ID × Month (CSM/owner names not used)'],
    ['Scope','Month '+_liveCadAuditMo()+' '+((_cadAuditData&&_cadAuditData.year)||new Date().getFullYear())],
    [],
    ['Status legend'],
    ['Confirmed','Tracker marked Y AND HubSpot has ≥1 meeting that month — call verified (or manually verified by reviewer)'],
    ['Unconfirmed','Tracker marked Y BUT no HubSpot meeting found — possible over-report or unlogged meeting'],
    ['Missed Logging','HubSpot has ≥1 meeting BUT tracker is blank/N — CSM forgot to mark it'],
    ['Cannot Match','Tracker marked Y but the account has no Platform ID — excluded from match'],
    [],
    ['Manual overrides'],
    ['Status','Effective status after applying any reviewer ✓ Verify on the Cadence audit panel'],
    ['Audit Status','Original raw audit result — only populated when a manual verify flipped the row to Confirmed'],
    ['Note','Reviewer-supplied note attached via ✓ Verify or 💬 Note (e.g. "Meeting was on Zoom, not in HubSpot")'],
  ];
  const wsMeta=XLSX.utils.aoa_to_sheet(meta);
  wsMeta['!cols']=[{wch:22},{wch:60}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,wsSum,'Scorecard');
  XLSX.utils.book_append_sheet(wb,wsDet,'Discrepancies');
  XLSX.utils.book_append_sheet(wb,wsMeta,'About');
  XLSX.writeFile(wb,'cadence-audit-'+_liveCadAuditMo().toLowerCase()+'-'+ts+'.xlsx');
}

function rOverview(){
  const el=document.getElementById('tab-overview');
  const spRet=SP.logos>0?(SP.won/SP.logos)*100:0;
  // YTD Actuals (GP + SP, ALL accounts) — company-wide renewal book:
  //   • Source: parent-shell-injected _YTD_OVERVIEW computed from D (post _mergeSPsIntoD)
  //   • No owner filter — every row in D counts (not just CS-owned)
  //   • Won set: {7. Signed, 9. Invoice Sent, 10. Paid} — includes Signed
  //   • Includes SPs (Emilie's book)
  // Multiple cohort views so each metric measures the right thing:
  //   • NRR (Renewed only)   = Σ rev26(won) / Σ rev25(won)
  //   • GRR (Closed cohort)  = Σ rev25(won) / Σ rev25(won+churned)
  //   • Logo Retention (Annual) = won / total CS-owned book
  //   • Logo Retention (To-Date) = won / (won+churned)
  // Fallback: if _YTD_OVERVIEW is missing (cache-only loads where GP_RAW_ROWS
  // didn't trigger the parent injection), iterate ACCTS with the older 9+10 set.
  let _aLW=0,_aLC=0,_aLDe=0,_aLOpen=0,_aRW=0,_aRC=0,_aRDe=0,_aROpen=0,_a26W=0,_aSkip=0;
  let _aGpL=0,_aSpL=0; // sub-counts for the band header
  // Hold references to the GP and SP buckets so the per-tile breakdown line
  // below can compute segment-specific KPIs (NRR/GRR/Logo Retention per book).
  let _aGP=null,_aSP=null;
  if(typeof _YTD_OVERVIEW!=='undefined'&&_YTD_OVERVIEW&&_YTD_OVERVIEW.gp&&_YTD_OVERVIEW.sp){
    const g=_YTD_OVERVIEW.gp,s=_YTD_OVERVIEW.sp;
    _aGP=g; _aSP=s;
    _aLW=g.wL+s.wL; _aLC=g.cL+s.cL; _aLDe=g.deL+s.deL; _aLOpen=g.oL+s.oL;
    _aRW=g.wR+s.wR; _aRC=g.cR+s.cR; _aRDe=g.deR+s.deR; _aROpen=g.oR+s.oR;
    _a26W=g.wR26+s.wR26;
    _aGpL=g.tL; _aSpL=s.tL;
  }else{
    const _aWS=['9. Invoice Sent','10. Paid'],_aCS=['11. Churned'],_aDS=['4a. Attempting again Q2'];
    (ACCTS||[]).forEach(function(a){
      if(a.stage==='Not in renewal master'){_aSkip++;return;}
      const isW=_aWS.includes(a.stage),isC=_aCS.includes(a.stage),isDe=_aDS.includes(a.stage);
      if(isW){_aLW++;_aRW+=a.rev||0;_a26W+=a.rev26||0;}
      else if(isC){_aLC++;_aRC+=a.rev||0;}
      else if(isDe){_aLDe++;_aRDe+=a.rev||0;}
      else{_aLOpen++;_aROpen+=a.rev||0;}
    });
  }
  const _aTotLogos=_aLW+_aLC+_aLDe+_aLOpen;
  const _aTotRev=_aRW+_aRC+_aRDe+_aROpen;
  const _aClosedLogos=_aLW+_aLC; // final decisions only — declined-early excluded (still re-engageable)
  const _aClosedRev=_aRW+_aRC;
  const _aNRR_R=_aRW>0?(_a26W/_aRW*100):0;                      // NRR among renewed (expansion factor)
  const _aGRR_C=_aClosedRev>0?(_aRW/_aClosedRev*100):0;         // GRR among final decisions
  const _aLogo_Y=_aTotLogos>0?(_aLW/_aTotLogos*100):0;          // Logo retention vs full annual book
  const _aLogo_C=_aClosedLogos>0?(_aLW/_aClosedLogos*100):0;    // Logo retention among final decisions
  // Realized NRR — 2026 won revenue ÷ FULL closed-cohort 2025 base (won + churned + declined-early).
  // Unlike NRR (Renewed) which only counts won accounts, this captures everything that has hit
  // its renewal moment so far in the year — answers "what % of the 2025 revenue we expected to
  // act on this year did we actually keep + grow?". Open accounts excluded (still pending).
  const _aRealBase=_aRW+_aRC+_aRDe;
  const _aRealNRR=_aRealBase>0?(_a26W/_aRealBase*100):0;
  const _aColNRR=_aNRR_R>=100?'var(--green)':_aNRR_R>=90?'var(--amber)':'var(--red)';
  const _aColGRR=_aGRR_C>=80?'var(--green)':_aGRR_C>=60?'var(--amber)':'var(--red)';
  const _aColRN=_aRealNRR>=100?'var(--green)':_aRealNRR>=80?'var(--amber)':'var(--red)';
  const _aColLY ='var(--accent)';                               // pace metric — neutral blue; year not over
  const _aColLC=_aLogo_C>=70?'var(--green)':_aLogo_C>=50.05?'var(--amber)':'var(--red)';
  // ── Per-segment KPI splits (GP-only and SP-only versions of each tile) ─
  // Computed only when _YTD_OVERVIEW gave us the gp/sp buckets. Empty strings
  // when buckets are missing (fallback path) — the tiles render unchanged.

  const _spNRR_R=(_aSP&&_aSP.wR>0)?(_aSP.wR26/_aSP.wR*100):0;
  const _gpRealBase=_aGP?(_aGP.wR+_aGP.cR+_aGP.deR):0;
  const _spRealBase=_aSP?(_aSP.wR+_aSP.cR+_aSP.deR):0;
  const _gpRealNRR=_gpRealBase>0?(_aGP.wR26/_gpRealBase*100):0;
  const _spRealNRR=_spRealBase>0?(_aSP.wR26/_spRealBase*100):0;
  const _gpClosedRev=_aGP?(_aGP.wR+_aGP.cR):0;
  const _spClosedRev=_aSP?(_aSP.wR+_aSP.cR):0;
  const _gpGRR=_gpClosedRev>0?(_aGP.wR/_gpClosedRev*100):0;
  const _spGRR=_spClosedRev>0?(_aSP.wR/_spClosedRev*100):0;
  const _gpLogoY=(_aGP&&_aGP.tL>0)?(_aGP.wL/_aGP.tL*100):0;
  const _spLogoY=(_aSP&&_aSP.tL>0)?(_aSP.wL/_aSP.tL*100):0;
  const _gpClosedL=_aGP?(_aGP.wL+_aGP.cL):0;
  const _spClosedL=_aSP?(_aSP.wL+_aSP.cL):0;
  const _gpLogoC=_gpClosedL>0?(_aGP.wL/_gpClosedL*100):0;
  const _spLogoC=_spClosedL>0?(_aSP.wL/_spClosedL*100):0;
  el.innerHTML=`
    <div class="cards">
      <div class="stat" style="position:relative">
        <div class="bar" style="background:linear-gradient(90deg,var(--accent),transparent)"></div>
        <div class="label">Total Logos</div>
        <div class="val">${tL.toLocaleString()}</div>
        <div class="sub">${gL} GPs + ${SP.logos} SPs</div>
        ${(()=>{const m=(window.parent&&window.parent._acctMismatches)||window._acctMismatches||{};const e2r=m.engNotInRenewal||[];const r2e=m.renewalNotInEng||[];const r2eD=m.renewalNotInEngDetail||r2e.map(n=>({name:n,platformId:''}));const e2rD=m.engNotInRenewalDetail||e2r.map(n=>({name:n,platformId:''}));if(!e2r.length&&!r2e.length)return'';const pidCsv=r2eD.map(x=>x.platformId).filter(Boolean).join('\n');const ePidCsv=e2rD.map(x=>x.platformId).filter(Boolean).join('\n');const mkPanel=(detail,pc,color)=>{return`${pc?`<div style="padding:4px 8px 6px 8px;display:flex;gap:6px;align-items:center"><button onclick="event.stopPropagation();navigator.clipboard.writeText(this.getAttribute('data-pids'));this.textContent='✓ Copied Platform IDs';setTimeout(()=>{this.textContent='📋 Copy Platform IDs';},1500)" data-pids="${pc.replace(/"/g,'&quot;')}" style="font-size:10px;padding:3px 8px;background:${color};color:#0a0e1a;border:none;border-radius:4px;cursor:pointer;font-weight:600">📋 Copy Platform IDs</button><span style="font-size:9px;color:var(--dim)">${detail.filter(x=>x.platformId).length}/${detail.length} have IDs</span></div>`:''}<div style="display:grid;grid-template-columns:1fr auto;gap:2px 10px;padding:2px 8px"><div style="font-size:9px;color:var(--dim);font-weight:600;text-transform:uppercase">Account</div><div style="font-size:9px;color:var(--dim);font-weight:600;text-transform:uppercase;text-align:right">Platform ID</div>${detail.map(x=>`<div style="font-size:10px;color:var(--dim);padding:1px 0">${x.name}</div><div style="font-size:10px;color:${x.platformId?'var(--text)':'var(--red)'};padding:1px 0;font-family:var(--mono);text-align:right">${x.platformId||'—'}</div>`).join('')}</div>`;};return`<div style="margin-top:8px;border-top:1px solid rgba(255,255,255,.08);padding-top:8px;display:flex;flex-direction:column;gap:4px">

      </div>
      ${sc("Revenue at Risk",fmt(tR),"$39.8M tracked of ~$41.2M","var(--amber)")}
      ${sc("Renewed YTD",tW+" logos",fmt(gRW+SP.rw)+" revenue · "+pct(tW/tL*100)+" logo retention","var(--green)",_segLine(`${gW} (${fmt(gRW)})`,`${SP.won} (${fmt(SP.rw)})`))}
      ${sc("Confirmed Churn",tLo+" logos",fmt(gRL+SP.rl)+" revenue · "+pct(tLo/tL*100)+" churn rate","var(--red)",_segLine(`${gLo} (${fmt(gRL)})`,`${SP.lost} (${fmt(SP.rl)})`))}
    </div>
    <div style="display:flex;align-items:baseline;justify-content:space-between;margin:14px 2px 6px 2px;flex-wrap:wrap;gap:8px">
      <div style="font-size:11px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.6px">YTD Actuals · GP + SP · All Accounts</div>

    </div>
    <div class="cards">
      <div class="stat" title="NRR among accounts that renewed only.&#10;Σ rev26(won) ÷ Σ rev(won)&#10;>100% means renewals are net-expanding (price/seat increases outweigh contractions).&#10;Excludes churned and declined accounts entirely.">

// Custom HTML legend with real checkboxes (toggles dataset visibility instead of strikethrough)
function _renderChkLegend(chartId,legendId){
  const ch=charts[chartId],el=document.getElementById(legendId);
  if(!ch||!el)return;
  el.innerHTML=ch.data.datasets.map((ds,i)=>{
    const vis=ch.isDatasetVisible(i);
    const dashed=Array.isArray(ds.borderDash)&&ds.borderDash.length?'border-top-style:dashed;':'';
    return `<label class="${vis?'':'off'}" data-i="${i}"><input type="checkbox" ${vis?'checked':''}><span class="sw" style="border-top-color:${ds.borderColor};${dashed}"></span>${ds.label}</label>`;
  }).join('');
  el.querySelectorAll('label').forEach(lb=>{
    lb.addEventListener('click',e=>{
      // let the checkbox toggle itself; we act on resulting state
      if(e.target.tagName!=='INPUT')e.preventDefault();
      const i=+lb.dataset.i;
      const cb=lb.querySelector('input');
      if(e.target.tagName!=='INPUT')cb.checked=!cb.checked;
      ch.setDatasetVisibility(i,cb.checked);
      lb.classList.toggle('off',!cb.checked);
      ch.update();
    });
  });
}

// ── ACCOUNT SUB-TABLE (sortable + filterable) ────────
// Scope: filter and sort live at QUARTER scope (one state shared across the
// Enterprise / Strategic / Scale drilldowns) so a filter applied on one pool
// repaints all three. Menu-open state stays per-rid because each pool row
// has its own trigger button and only one popover is visible at a time.
let _acctSort={},_acctFilt={},_acctFiltMenuOpen={};

// _acctFilt[q] is an array of selected stage tokens (legacy callers may still
// assign a string; this helper normalises). Tokens can be group shortcuts
// (_won/_ch/_dc/_op) or literal stage strings — a row matches if ANY selected
// token matches.
function _acctFiltArr(q){
  const raw=_acctFilt[q];
  return Array.isArray(raw)?raw:(raw?[raw]:[]);
}
function _filtAcctTog(rid,q,pool,val){
  const arr=[..._acctFiltArr(q)];
  const i=arr.indexOf(val);
  if(i>=0)arr.splice(i,1);else arr.push(val);
  _acctFilt[q]=arr;
  _acctFiltMenuOpen[rid]=true; // keep popover open between toggles
  _rAcctTablesForQ(q);
}
function _filtAcctClr(rid,q,pool){
  _acctFilt[q]=[];
  _acctFiltMenuOpen[rid]=true;
  _rAcctTablesForQ(q);
}
function _filtAcctMenuTog(rid,q,pool){
  const isOpen=!!_acctFiltMenuOpen[rid];
  // Only one popover open at a time — close everyone else first.
  Object.keys(_acctFiltMenuOpen).forEach(k=>{_acctFiltMenuOpen[k]=false;});
  _acctFiltMenuOpen[rid]=!isOpen;
  _rAcctTablesForQ(q);
}
// Single document-level outside-click listener. Closes any open stage popover
// on a click anywhere that didn't stopPropagation (the menu and its inputs do).
if(!window._acctFiltOutsideListener){
  window._acctFiltOutsideListener=true;
  document.addEventListener('click',function(){
    let any=false;
    Object.keys(_acctFiltMenuOpen).forEach(k=>{if(_acctFiltMenuOpen[k]){_acctFiltMenuOpen[k]=false;any=true;}});
    if(any)document.querySelectorAll('[id$="_filtmenu"]').forEach(el=>{el.style.display='none';});
  });
}

// Top-level stage filter that lives above the Revenue Context table. One
// control per quarter — drives _acctFilt[q], so opening it applies the same
// filter to all three pool drilldowns. Uses the same _filtAcctTog handler as

function _gpFiltCtlHTML(q){
  const rid='gpfilt_'+q;
  const filtArr=_acctFiltArr(q);
  const WS=['9. Invoice Sent','10. Paid'],CS=['11. Churned'],DS=['4a. Attempting again Q2'];
  // Stage list = every distinct stage in the quarter's RM cohort, after the
  // owner / month chips have been applied. Matches the chain used by the
  // pool drilldowns so the dropdown options stay in sync.
  // Sort by leading stage number (1., 2., …, 4., 4a., 5., …, 9., 10., 11.)
  // — plain string sort puts "10." before "2." which scrambled the dropdown.
  const _stageSort=(a,b)=>{
    const ma=String(a||'').match(/^(\d+)([a-z]*)/i)||[];
    const mb=String(b||'').match(/^(\d+)([a-z]*)/i)||[];
    const na=+ma[1]||999,nb=+mb[1]||999;
    if(na!==nb)return na-nb;
    return (ma[2]||'').localeCompare(mb[2]||'')||String(a).localeCompare(String(b));
  };
  const allStages=[...new Set((ACCTS||[]).filter(a=>a.qRM===q&&a.inRen&&_gpMatchesOwnerFilter(a)&&(!selGPMonth.length||selGPMonth.includes((a.seRM||'').substring(5,7)))).map(a=>a.stage).filter(Boolean))].sort(_stageSort);
  const filtActive=filtArr.length?`color:var(--accent);border-color:var(--accent)`:`color:var(--text)`;

    if(f==='_dc')return'Declined Early';

    return f.replace(/^\d+\.\s*/,'');

  const _isChk=v=>filtArr.includes(v)?' checked':'';
  const _esc=s=>String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;');
  const _itemS='display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:12px;color:var(--text);font-weight:400;white-space:nowrap;user-select:none';

  // of this dropdown. Removed by user request — group filtering is still
  // reachable by clicking the Won/Lost/Declined cells in the pool tables, which
  // set _acctFilt[q] to ['_won']/['_ch']/['_dc']. The decode logic below
  // (_filtLabel + the badge/row filter checks) stays intact for that path.
  const _stItems=allStages.map(s=>`<label style="${_itemS}" onclick="event.stopPropagation()"><input type="checkbox"${_isChk(s)} onclick="event.stopPropagation();_filtAcctTog('${rid}','${q}','','${_esc(s)}')" style="cursor:pointer;margin:0">${s.replace(/^\d+\.\s*/,'')}</label>`).join('');
  const _menuDisp=_acctFiltMenuOpen[rid]?'block':'none';
  // External clear button — visible only when a filter is active so the user

// Block track-click jumps on the scenario slider — only allow thumb-drag.
// Prevents the native HTML5 range behavior of jumping to wherever you click.
function _sceMD(e,max){
  const sl=e.target;
  const r=sl.getBoundingClientRect();
  const m=Math.max(1,+max);
  const v=+sl.value;
  const thumbX=r.left+(v/m)*r.width;
  const tol=14; // ~half of thumb width (20px) + small buffer
  if(Math.abs(e.clientX-thumbX)>tol){
    e.preventDefault();
  }else{
    sl.focus();
  }
}
function updateScenario(q,val,tOpen,tWon,tLogos){
  const totalOpen=tOpen!==undefined?+tOpen:0;
  const totalWon=tWon!==undefined?+tWon:0;
  const totalLogos=tLogos!==undefined?+tLogos:1;
  const count=+val;
  const projected=totalWon+count;
  const retP=totalLogos>0?(projected/totalLogos)*100:0;
  const lbl=document.getElementById('scenario-label-'+q);
  if(lbl)lbl.innerHTML=count+' account'+(count!==1?'s':'')+' closed → <strong style="color:var(--accent)">'+pct(retP)+'</strong>';
  const sl=document.getElementById('scenario-'+q);
  const fillPct=totalOpen>0?(count/totalOpen*100):0;
  if(sl)sl.style.background='linear-gradient(to right,var(--accent) '+fillPct+'%,#1e293b '+fillPct+'%)';
}

// ── SP RETENTION ────────────────────────────────────
function rSP(){
  const el=document.getElementById('tab-sp_grr');const q=_liveSelQ();
  const tgt=SP_T[q]?.full||55;
  const QML={Q1:[['01','Jan'],['02','Feb'],['03','Mar']],Q2:[['04','Apr'],['05','May'],['06','Jun']],Q3:[['07','Jul'],['08','Aug'],['09','Sep']],Q4:[['10','Oct'],['11','Nov'],['12','Dec']]};

  // SPs are segmented by Sales Owner (the SP equivalent of GP's Enterprise/
  // Strategic/Scale pools). When live SP_ACCTS is loaded we re-aggregate from
  // it so the owner filter + month filter both work; otherwise we degrade to
  // the static SP_Q quarterly totals.
  const hasLive=Array.isArray(SP_ACCTS)&&SP_ACCTS.length>0;
  const qAcctsAll=hasLive?SP_ACCTS.filter(a=>a.q===q):[];
  const ownerListAll=hasLive?[...new Set(SP_ACCTS.map(a=>a.owner).filter(Boolean))]:[];
  const ownerListQ=[...new Set(qAcctsAll.map(a=>a.owner).filter(Boolean))].sort((a,b)=>{
    const ca=qAcctsAll.filter(x=>x.owner===a).reduce((s,x)=>s+(x.rev||0),0);
    const cb=qAcctsAll.filter(x=>x.owner===b).reduce((s,x)=>s+(x.rev||0),0);
    return cb-ca;
  });
  // Drop any selected owners that no longer exist (data refresh edge case)
  if(Array.isArray(selSPOwner)){
    const valid=new Set(ownerListAll);
    const filtered=selSPOwner.filter(it=>valid.has(it));
    if(filtered.length!==selSPOwner.length)selSPOwner=filtered.length?filtered:'ALL';
  }
  const ownerFiltered=qAcctsAll.filter(_spMatchesOwnerFilter);
  const filtAccts=selSPMonth?ownerFiltered.filter(a=>(a.se||'').substring(5,7)===selSPMonth):ownerFiltered;

  // Per-owner aggregate from filtered accounts. When no live data, pivot off
  // the legacy SP_Q quarterly total under a synthetic 'All SPs' bucket so the
  // tab still renders something useful (single Total card, no breakdown).
  const _ownerActive=selSPOwner!=='ALL';
  const needsReagg=hasLive&&(_ownerActive||selSPMonth);
  const spqByOwner=(()=>{
    if(!hasLive){
      const tot=SP_Q[q]||{logos:0,won:0,lost:0,declined:0,open:0,rev:0,rw:0,rl:0,rd:0};
      return{__total:{...tot}};
    }
    if(needsReagg){
      const r={};
      filtAccts.forEach(a=>{
        const o=a.owner||'Unknown';
        if(!r[o])r[o]={logos:0,won:0,lost:0,declined:0,open:0,rev:0,rw:0,rl:0,rd:0};
        r[o].logos++;r[o].rev+=a.rev||0;
        if(a.status==='won'){r[o].won++;r[o].rw+=a.rev||0;}
        else if(a.status==='churned'){r[o].lost++;r[o].rl+=a.rev||0;}
        else r[o].open++;
      });
      return r;

    return SP_OQ[q]||{};
  })();

  const ownersInQ=Object.keys(spqByOwner).filter(o=>o!=='__total'&&(spqByOwner[o].logos||0)>0);
  // Sort owners by revenue desc so the biggest book shows first.
  ownersInQ.sort((a,b)=>(spqByOwner[b].rev||0)-(spqByOwner[a].rev||0));

  // Total across all owners in the visible slice
  const totalAgg=(()=>{
    if(!hasLive)return spqByOwner.__total;
    const t={logos:0,won:0,lost:0,declined:0,open:0,rev:0,rw:0,rl:0,rd:0};
    ownersInQ.forEach(o=>{const d=spqByOwner[o];for(const k in t)t[k]+=(d[k]||0);});

  const fullN=tFull?Math.ceil(totalLogos*tFull/100):0;
  const accelN=tAccel?Math.ceil(totalLogos*tAccel/100):0;
  const gapFloor=Math.max(0,floorN-totalWon);
  const gapFull=Math.max(0,fullN-totalWon);
  const gapAccel=Math.max(0,accelN-totalWon);

  // Active filter label for headers — mirrors _gpOwnerLbl.
  const _spOwnerLbl=(()=>{
    const sel=_spOwnerSel();
    if(sel.mode==='ALL')return'';
    if(sel.items.length===1)return ' · '+sel.items[0];
    return ' · '+sel.items.length+' selected';
  })();

  // Per-owner color ramp — keeps Service Provider rose anchor for Total then
  // cycles through accent colors so the chart bars and pool dots stay distinct.
  const _spOwnerColors=['#f43f5e','#fb923c','#f59e0b','#10b981','#06b6d4','#3b82f6','#8b5cf6','#ec4899','#84cc16','#14b8a6'];
  const _spClr=(o,i)=>_spOwnerColors[i%_spOwnerColors.length];

  // Custom pool card for SPs — same shape as poolCard() but uses owner color

  const _spPoolCard=(label,d,target,gifted,clr)=>{
    const ret=d.logos>0?(d.won/d.logos)*100:0;

    const at=gifted||ret>=target;
    const tot=d.logos||1;
    const segs=[{l:"Won",v:d.won,c:"var(--green)"},{l:"Open",v:d.open,c:"var(--amber)"},{l:"Churned",v:d.lost,c:"var(--red)"}];
    return`<div class="pool-card">
      <div class="pool-hdr"><div><span class="pool-dot" style="background:${clr}"></span><span style="font-size:14px;font-weight:600">${label}</span></div><span style="font-size:11px;color:var(--dim)">${d.logos} logos</span></div>

leHTML(rid,q,o,'')}</div></td></tr>`;}).join('')}

// SP scenario slider — same shape as updateScenario but uses --rose accent.
function updateSPScenario(q,val,tOpen,tWon,tLogos){
  const totalOpen=tOpen!==undefined?+tOpen:0;
  const totalWon=tWon!==undefined?+tWon:0;
  const totalLogos=tLogos!==undefined?+tLogos:1;
  const count=+val;
  const projected=totalWon+count;
  const retP=totalLogos>0?(projected/totalLogos)*100:0;
  const lbl=document.getElementById('sp-scenario-label-'+q);
  if(lbl)lbl.innerHTML=count+' account'+(count!==1?'s':'')+' closed → <strong style="color:var(--rose)">'+pct(retP)+'</strong>';
  const sl=document.getElementById('sp-scenario-'+q);
  const fillPct=totalOpen>0?(count/totalOpen*100):0;
  if(sl)sl.style.background='linear-gradient(to right,var(--rose) '+fillPct+'%,#1e293b '+fillPct+'%)';
}

// ── CADENCE ─────────────────────────────────────────
const _QM_LC={Q1:['jan','feb','mar'],Q2:['apr','may','jun'],Q3:['jul','aug','sep'],Q4:['oct','nov','dec']};
let _cadFilt={},_cadSort={};
function _cadVisibleCols(){
  const cd=CADENCE_DATA;if(!cd||!cd.cols)return[];
  const qm=_QM_LC[selCadQ]||[];
  return cd.cols.filter(c=>qm.some(m=>c.toLowerCase().includes(m)));
}
function _cadBodyHTML(rid,csmName){
  const cd=CADENCE_DATA;
  if(!cd||!cd.csm||!cd.csm[csmName])return'<div style="padding:10px 16px;color:var(--dim);font-size:12px">No engagement data for this CSM.</div>';
  const month=_cadFilt.hasOwnProperty(rid)?_cadFilt[rid]:null;
  const cData=cd.csm[csmName];
  const visCols=_cadVisibleCols();
  let accts=month?(cData.months[month]?.accts||[]):[...(cData.allAccts||[])];
  const sort=_cadSort[rid]||{col:'se',dir:1};
  const isYCall=(a,c)=>String((a.calls&&a.calls[c])||'').trim().toLowerCase().startsWith('y');
  // HubSpot lookup — returns null when no audit data is loaded so the cell
  // falls back to the original ✓/— rendering. When loaded, returns the
  // meeting count for that (account, month) so we can flag verified /
  // unconfirmed / missed-logging cases inline.
  const auditLoaded=!!(_cadAuditData&&_cadAuditData.bucket);
  // Strict match: Platform ID must be non-empty AND the audit bucket must
  // have an entry for (pid, currentYear-month). _hsBucket enforces the year
  // so verification can only fire when the time frame is an exact match.
  const _hsCount=(a,c)=>{
    if(!auditLoaded)return null;
    const pid=String(a.platformId||'').trim();
    if(!pid)return null;
    const b=_hsBucket(pid,c);
    return b?b.count:0;
  };
  // Returns the bucket entry {count, lastIso} so the cell can render the
  // last-meeting day inline. Same year-strict semantics as _hsCount.
  const _hsInfo=(a,c)=>{
    if(!auditLoaded)return null;
    const pid=String(a.platformId||'').trim();
    if(!pid)return null;
    return _hsBucket(pid,c);
  };
  // "2026-04-15" → "Apr 15" (compact human-readable).
  const _fmtMtgDate=iso=>{
    if(!iso||iso.length<10)return'';
    const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const m=parseInt(iso.slice(5,7),10),d=parseInt(iso.slice(8,10),10);
    return(MO[m-1]||'')+' '+d;
  };
  const _flagKeys=['addCredits','miaBooth','outdated','gvPromo'];
  accts=[...accts].sort((a,b)=>{
    if(sort.col==='se')return sort.dir*((a.se||'').localeCompare(b.se||''));
    if(sort.col==='acct')return sort.dir*((a.acct||'').localeCompare(b.acct||''));
    if(_flagKeys.includes(sort.col)){const av=a[sort.col]?1:0,bv=b[sort.col]?1:0;return sort.dir*(bv-av);}
    if(visCols.includes(sort.col)){const av=isYCall(a,sort.col)?1:0,bv=isYCall(b,sort.col)?1:0;return sort.dir*(bv-av);}
    return 0;
  });
  const sa=col=>{const s=_cadSort[rid];return s&&s.col===col?(s.dir===1?'↑':'↓'):'<span style="opacity:.3">↕</span>';};
  const label=month?`${month} — accounts with call`:'All accounts in engagement tracker';
  const colSpan=visCols.length+7;
  // Inline legend — only visible when audit data is loaded so unaudited
  // mode keeps its original look.
  const legend=auditLoaded?`<div style="font-size:10px;color:var(--dim);padding:0 16px 6px;line-height:1.5"><strong style="color:var(--text)">Verification:</strong> <span style="color:var(--green);font-weight:700">✓</span> verified in HubSpot · <span style="color:var(--red);font-weight:700">✓</span> not verified in HubSpot · <span style="color:var(--dim)">—</span> no call logged · <em style="opacity:.7">date next to ✓ = last meeting · ×N = number of meetings</em></div>`:'';
  const _yesCell=v=>v?'<span style="color:var(--green);font-weight:700">✓</span>':'<span style="color:var(--dim)">—</span>';
  return`<div style="padding:0"><div style="font-size:11px;color:var(--dim);padding:6px 16px 4px">${label} · <strong style="color:var(--text)">${accts.length}</strong></div>
    ${legend}
    <div style="overflow-x:auto"><table style="width:100%;font-size:11px;border-collapse:collapse">
      <thead><tr style="background:rgba(255,255,255,.04)">
        <th style="text-align:left;padding:5px 16px;color:var(--dim);cursor:pointer;white-space:nowrap" onclick="_cadSortFn('${rid}','${csmName.replace(/'/g,"\\'")}','acct')">Account ${sa('acct')}</th>
        <th style="text-align:center;padding:5px 8px;color:var(--dim);cursor:pointer;white-space:nowrap" onclick="_cadSortFn('${rid}','${csmName.replace(/'/g,"\\'")}','addCredits')">Add 15 Credits ${sa('addCredits')}</th>
        <th style="text-align:center;padding:5px 8px;color:var(--dim);cursor:pointer;white-space:nowrap" onclick="_cadSortFn('${rid}','${csmName.replace(/'/g,"\\'")}','miaBooth')">MIA Booth Selection ${sa('miaBooth')}</th>
        <th style="text-align:center;padding:5px 8px;color:var(--dim);cursor:pointer;white-space:nowrap" onclick="_cadSortFn('${rid}','${csmName.replace(/'/g,"\\'")}','outdated')">Outdated Fund Perf ${sa('outdated')}</th>
        <th style="text-align:center;padding:5px 8px;color:var(--dim);cursor:pointer;white-space:nowrap" onclick="_cadSortFn('${rid}','${csmName.replace(/'/g,"\\'")}','gvPromo')">GV Promo ${sa('gvPromo')}</th>
        ${visCols.map(c=>`<th style="text-align:left;padding:5px 8px;color:var(--dim);cursor:pointer;white-space:nowrap" onclick="_cadSortFn('${rid}','${csmName.replace(/'/g,"\\'")}','${c}')">${c} ${sa(c)}</th>`).join('')}
        <th style="text-align:left;padding:5px 8px;color:var(--dim);cursor:pointer;white-space:nowrap" onclick="_cadSortFn('${rid}','${csmName.replace(/'/g,"\\'")}','se')">Sub End ${sa('se')}</th>
        <th style="text-align:center;padding:5px 8px;color:var(--dim)">Risk</th>
      </tr></thead>
      <tbody>${accts.map((a,idx)=>{
        const noteId='cdn_'+rid+'_'+idx;
        const hasNote=a.notes&&a.notes.trim();
        const acctLabel=a.acct||a;
        // Account cell: clickable when a note exists. Adds a small bullet
        // indicator + dim "▸ note" hint so it's discoverable.
        const acctCell=hasNote
          ?`<td style="padding:4px 16px"><span style="cursor:pointer;color:var(--accent);font-weight:600" title="Click to toggle note" onclick="(function(){var n=document.getElementById('${noteId}');n.style.display=n.style.display===''?'none':''})()">${acctLabel} <span style="color:var(--dim);font-size:9px;font-weight:400;opacity:.7">▸ note</span></span></td>`
          :`<td style="padding:4px 16px;color:var(--text)">${acctLabel}</td>`;
        return`<tr style="border-top:1px solid rgba(255,255,255,.05)">
          ${acctCell}
          <td style="text-align:center;padding:4px 8px">${_yesCell(a.addCredits)}</td>
          <td style="text-align:center;padding:4px 8px">${_yesCell(a.miaBooth)}</td>
          <td style="text-align:center;padding:4px 8px">${_yesCell(a.outdated)}</td>
          <td style="text-align:center;padding:4px 8px">${_yesCell(a.gvPromo)}</td>
          ${visCols.map(c=>{
            const isY=isYCall(a,c);
            // Five-state cell render:
            //  • tracker Y + HubSpot meeting (PID + month + year all match) → green ✓ + day of last mtg [+ count badge if >1]
            //  • tracker Y + no HubSpot match (no PID / no meeting)         → red ✓
            //  • tracker Y + audit not loaded                                → green ✓ (legacy)
            //  • tracker blank                                               → — dim
            let cellHTML='<span style="color:var(--dim)">—</span>',title='';
            if(isY){
              if(!auditLoaded){
                cellHTML='<strong style="color:var(--green)">✓</strong>';
                title='Tracker says Y';
              } else {
                const info=_hsInfo(a,c);
                const _pid=String(a.platformId||'').trim();
                const ovr=_getOvr(_pid,c);
                if(info&&info.count>0){

    </div>`;
    })()}`;}

// Shared date formatter — accepts either an Excel serial number (e.g. 44927)
// or an ISO "YYYY-MM-DD" string and returns a readable "Mon D, YYYY". Used
// for Contract End and Next TP columns where raw sheet cells sometimes flow
// through as numeric serials.
function _aaFmtDate(v){
  if(v==null||v==='')return'';
  const s=String(v).trim();
  const n=parseFloat(s);
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if(!isNaN(n)&&n>1000&&/^[\d.]+$/.test(s)){
    const d=new Date((n-25569)*86400*1000);
    if(!isNaN(d))return mo[d.getUTCMonth()]+' '+d.getUTCDate()+', '+d.getUTCFullYear();
  }
  const m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m)return mo[parseInt(m[2])-1]+' '+parseInt(m[3])+', '+m[1];
  return s;
}
function _aaToggleNote(n){_aaState.openNote=(_aaState.openNote===n)?'':n;rAllAccts();}
const _aaMonths=['Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function _aaGetVal(r,k){
  if(k.indexOf('call_')===0){const m=k.substring(5);return (r.calls&&r.calls[m])||'';}
  // Q column sort: combine year + quarter so Q1 26 < Q4 26 < Q1 27. Falls back
  // to plain quarter when no contract end date is available.
  if(k==='q'){
    if(!r.q||r.q==='none')return'';
    const m=String(r.se||r.rawEnd||'').match(/^(\d{4})-/);
    return m?(m[1]+'-'+r.q):r.q;
  }
  return r[k];
}

// Owner dropdown helpers — own state separate from GP Retention's selGPOwner

function _aaOwnerSel(){
  const v=_aaState.owner;
  if(!v||v==='ALL')return{mode:'ALL',items:[]};

  // and POD:<pod>:OFF for off-pod drilldown. Combine across CSM/Pod groups

  return _gpCombine(sel.items,a,_aaComboMode);
}

function rAllAccts(){
  const el=document.getElementById('tab-all_accounts');
  if(!el)return;
  const all=(ACCTS||[]).filter(a=>a.inEng);  // limit to engagement-tracker rows; orphan renewal-master rows lack the fields

  // Gather filter options
  // Same Scale-team alias rollup as rGP — Phoebe/Jovin/Bryan/etc. fold into
  // "Support iConnections" via _gpAliasCsm, and we drop it from the CSM list
  // because the Scale pod (and its USA/Asia/Europe sub-pods) covers the same
  // accounts.
  const csmList=[...new Set(all.map(a=>_gpAliasCsm(a.csRep)).filter(Boolean))].sort().filter(c=>c!=='Support iConnections');
  const segs=[...new Set(all.map(a=>a.seg).filter(Boolean))].sort();
  // Pod list — engagement-tracker pods, sorted Pod 1, Pod 2, …, then alphabetic
  const podSet={};all.forEach(a=>{if(a.pod)podSet[a.pod]=(podSet[a.pod]||0)+1;});
  const podList=Object.keys(podSet).sort((a,b)=>{
    const na=a.match(/^pod\s*(\d+)$/i),nb=b.match(/^pod\s*(\d+)$/i);
    if(na&&nb)return +na[1]-+nb[1];
    if(na)return -1;if(nb)return 1;
    return a.localeCompare(b);

  if(Array.isArray(_aaState.owner)){

    if(isNum)return dir*((+av||0)-(+bv||0));

    return dir*String(av).localeCompare(String(bv));

  const callCell=v=>{const s=String(v||'').trim().toLowerCase();if(s.startsWith('y'))return'<span style="color:var(--green);font-weight:700">✓</span>';if(s.startsWith('n'))return'<span style="color:var(--red)">✗</span>';return s?`<span style="color:var(--dim);font-size:10px">${s.substring(0,3)}</span>`:'';};
