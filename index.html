<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const CLIENT_ID  = 'dc704d15-4dc6-47d7-bc4b-143455acfd4d';
const TENANT     = 'iconnections675.onmicrosoft.com';
const FILE_OWNER  = 'cgoggil_iconnections_io';
const FILE_ID     = 'cb56a10b-e016-4453-9df6-159035bd5c8c';
const SHEET       = 'master tracker';
const SP_SHEET    = 'GA 26 SPs';
const HEADER_ROW  = 14; // 0-based index; row 15 in Excel
// CS Engagement Tracker April 2026.xlsx (All_ClientSuccess site)
const ENG_FILE_ID = 'f8e92e42-426b-4970-aa5d-7a5f8681a2e5';
const ENG_OWNER   = 'tfischer_iconnections_io';
const ENG_SHARE_URL = 'https://iconnections675.sharepoint.com/:x:/r/sites/All_ClientSuccess/_layouts/15/Doc.aspx?sourcedoc=%7BF8E92E42-426B-4970-AA5D-7A5F8681A2E5%7D&file=CS%20Engagement%20Tracker%20April%202026.xlsx&action=default&mobileredirect=true';
// "Master List 8th attempt" — Joe Romanoff's personal OneDrive workbook with
// per-account flags (Add 15 Credits / MIA Booth Selection / Outdated Fund
// Perf / GV Promo). Joined to engagement-tracker rows by Platform Company ID
// in column B. Separate file from the Renewal Master so it gets its own
// drive/item resolution + shareId-based fetch.
const MASTER_LIST_SHARE_URL = 'https://iconnections675-my.sharepoint.com/:x:/g/personal/jromanoff_iconnections_io/IQAHc0wwpyJCToFR00YsI03rAV6-M3rtUGNV_w2Bl8j0V1g';
const MASTER_LIST_SHEET = 'Master List';
const ENG_SHEET   = 'Combined Master';
// Persist resolved engagement drive IDs across page loads
let _engDriveId=null,_engItemId=null;
(function(){try{const s=JSON.parse(localStorage.getItem(ENG_DRIVE_KEY)||'{}');_engDriveId=s.d||null;_engItemId=s.i||null;}catch(e){}}());
// Master List drive resolution — same pattern as engagement tracker. Persists
// across sessions so we don't pay the /shares/<id>/driveItem lookup every load.
let _mlDriveId=null,_mlItemId=null;
const ML_DRIVE_KEY='cs_ml_drive_v1';
(function(){try{const s=JSON.parse(localStorage.getItem(ML_DRIVE_KEY)||'{}');_mlDriveId=s.d||null;_mlItemId=s.i||null;}catch(e){}}());
// Parsed Master List rows + lookup map keyed by Platform Company ID. Both are
// repopulated on every refresh; the lookup is what _buildLiveGoalsData and
// _buildCadenceData consult to attach flags to each account row.
let MASTER_LIST_RAW=[],MASTER_LIST_BY_PID={};
// Per-CSM sheet tab names on CS Engagement Tracker April 2026.xlsx → canonical
// owner names. Source-of-truth for the dashboard is the "Combined Master" tab
// (see ENG_SHEET above) which already consolidates every CSM's accounts, so
// this mapping is reference-only — kept in sync with the actual tab labels
// shown in Excel. If future code fetches per-CSM tabs directly, it can loop
// over these keys.
const ENG_SHEETS  = {
  'Alex C':'Alex Cherecwich',
  'Andreas':'Andreas Santikos',
  'Christina C':'Christina Chumak',
  'Courtney K':'Courtney Krieg',
  'Helen':'Helen Ramsay',
  'Joe R':'Joe Romanoff',
  'Juwan':'Juwan Pryce',
  'Kristan H':'Kristan Hester',
  'Lucy G':'Lucy Garber',
  'Sunny':'Sunny Unger',
  'Scale':'Support iConnections'
};
const SCOPES     = 'Files.Read Files.Read.All Files.ReadWrite.All offline_access';
const SNAPSHOT_SITE = 'iconnections675.sharepoint.com:/sites/All_ClientSuccess:';
const SNAPSHOT_PATH = 'Documents/cs_snapshot.json';
const REDIRECT   = 'https://rahulsetya.github.io/cs-renewal-dashboard/';
const VALID_OWNERS=new Set(['Support iConnections','Lucy Garber','Joe Romanoff','Christina Chumak','Courtney Krieg','Helen Ramsay','Alex Cherecwich','Andreas Santikos','Juwan Pryce','Kristan Hester','Sunny Unger','Emilie Welch']);
// Aliased owners: account rows keep their real name (so the Accounts tab
// still shows the actual CSM), but they roll up under "Support iConnections"
// in the top-right filter dropdown and pass isValidCSOwner. Keep this in
// sync with _CSM_DISPLAY in the goals iframe — same Scale-pod humans.
const RENEWAL_OWNER_ALIAS={
  'phoebe willoughby':'Support iConnections',
  'jovin lee':'Support iConnections',
  'bryan perez':'Support iConnections',
  'olivia juliano':'Support iConnections',
  'mario giron':'Support iConnections',
  'luis pedro veliz del valle':'Support iConnections',
  'connor burke':'Support iConnections',
};
// True when `accountOwner` should match the `filterOwner` selection — direct or via alias.
function ownerMatches(accountOwner,filterOwner){
  if(accountOwner===filterOwner)return true;
  const t=RENEWAL_OWNER_ALIAS[(accountOwner||'').toLowerCase()];
  return t===filterOwner;
}
// True when `ro` counts as a CS owner (directly valid, or aliased to a valid one).
function isValidCSOwner(ro){
  if(VALID_OWNERS.has(ro))return true;
  const t=RENEWAL_OWNER_ALIAS[(ro||'').toLowerCase()];
  return !!(t&&VALID_OWNERS.has(t));
}

// ── Scale sub-pod attribution by Sales Rep ──────────────────────────────────
// "Scale" pod splits into three regional sub-pods, decided by d.ae:
//   Scale Asia    → Sales Rep is Edwin
//   Scale Europe  → Sales Rep is David X
//   Scale USA     → everyone else on Scale
// Edit the predicates if rep names change.
const SCALE_ASIA_REP   = ae => String(ae||'').trim().toLowerCase().startsWith('edwin');
const SCALE_EUROPE_REP = ae => {
  // Accept the full "David X…" form OR the "DX" shorthand. Anchor "dx" with
  // either an exact match or a trailing space so we don't accidentally
  // catch unrelated names that happen to start with the letters "dx".
  const a = String(ae||'').trim().toLowerCase();
  return a==='dx' || a.startsWith('dx ') || a.startsWith('david x');
};
function _scaleSubPod(row){
  if(!row||row.pod!=='Scale')return null;
  if(SCALE_EUROPE_REP(row.ae))return 'Scale Europe';
  if(SCALE_ASIA_REP(row.ae))return 'Scale Asia';
  return 'Scale USA';
}

// ── Pod composition (CSM ↔ Sales Rep) ───────────────────────────────────────
// Authoritative pod definitions. An account is "off-pod" when its CSM is on a
// pod, but its Sales Rep is not in that pod's rep list. Scale is intentionally
// excluded — it has its own regional sub-pod logic above and accepts any rep.
// Edit predicates / arrays here when membership changes.
const POD_REPS = {
  'Pod 1': ae => /^juliet\b/i.test(String(ae||'').trim()),
  'Pod 2': ae => /^(earl|sebastian)\b/i.test(String(ae||'').trim()),
  'Pod 3': ae => {const a=String(ae||'').trim().toLowerCase();return a.startsWith('david johnson')||a.startsWith('jake delaney');},
  'Pod 4': ae => /^(james|marc)\b/i.test(String(ae||'').trim())
};
const POD_CSMS = {
  'Pod 1': ['Lucy Garber','Christina Chumak'],
  'Pod 2': ['Courtney Krieg','Juwan Pryce'],
  'Pod 3': ['Alex Cherecwich','Joe Romanoff'],
  'Pod 4': ['Sunny Unger']
};
function _csmPod(ro){
  if(!ro)return null;
  for(const p in POD_CSMS){if(POD_CSMS[p].indexOf(ro)>=0)return p;}
  return null;
}
// Off-pod = CSM on a tracked pod (Pods 1–4) AND Sales Rep is NOT in that pod's rep list.
// Accepts pipeline rows (.ro/.ae) and iframe accounts (.csRep/.ae).
function _isOffPod(d){
  if(!d)return false;
  const csm=d.ro||d.csRep||'';
  const ae=d.ae||'';
  const p=_csmPod(csm);
  if(!p)return false;          // not on a tracked pod (e.g. Scale, or unknown CSM)
  if(!ae)return false;         // no rep assigned → don't flag
  return !POD_REPS[p](ae);
}

// ── Owner / pod selection (multi-select) ────────────────────────────────────
// S.owner can be:
//   'ALL_OWNERS' → every row, including non-CS owners
//   'ALL' / null → all CS owners (default)
//   string       → legacy single pick (treated as 1-item array)
//   array        → multi-pick; each item is an owner name OR 'POD:<pod>'
// Virtual sub-pods 'POD:Scale USA' / 'POD:Scale Asia' / 'POD:Scale Europe'
// expand against d.ae via _scaleSubPod.
function _ownerSel(){
  const v=S.owner;
  if(v==='ALL_OWNERS')return{mode:'ALL_OWNERS',items:[]};
  if(!v||v==='ALL')return{mode:'ALL',items:[]};
  const items=Array.isArray(v)?v.slice():[v];
  if(!items.length)return{mode:'ALL',items:[]};
  return{mode:'PICK',items};
}
function _itemMatches(item,row){
  if(typeof item==='string'&&item.indexOf('POD:')===0){
    const pod=item.slice(4);
    // Off-pod drill: "POD:Pod N:OFF" → CSM in Pod N AND row is off-pod.
    if(pod.endsWith(':OFF')){
      const basePod=pod.slice(0,-4);
      return row&&_csmPod(row.ro)===basePod&&_isOffPod(row);
    }
    if(pod==='Scale USA'||pod==='Scale Asia'||pod==='Scale Europe')
      return row&&row.pod==='Scale'&&_scaleSubPod(row)===pod;
    return row&&row.pod===pod;
  }
  return row&&ownerMatches(row.ro,item);
}
// AND/OR combine across the CS Owners and Pods groups in the dropdown.
// Within a group items still OR together; the toggle controls how the two
// groups combine. Default OR matches the previous flat-OR behavior.
let _comboMode='OR';
function _splitItemsByGroup(items){
  const csm=[],pod=[];
  items.forEach(it=>{
    if(typeof it==='string'&&it.indexOf('POD:')===0)pod.push(it);
    else csm.push(it);
  });
  return{csm,pod};
}
function _combine(items,row,mode){
  if(mode==='AND'){
    const g=_splitItemsByGroup(items);
    const csmOk=!g.csm.length||g.csm.some(it=>_itemMatches(it,row));
    const podOk=!g.pod.length||g.pod.some(it=>_itemMatches(it,row));
    return csmOk&&podOk;
  }
  return items.some(s=>_itemMatches(s,row));
}
// Pipeline-row filter: 'ALL' restricts to CS owners, 'ALL_OWNERS' opens it up.
function _matchesOwnerFilter(d){
  const sel=_ownerSel();
  if(sel.mode==='ALL_OWNERS')return true;
  if(sel.mode==='ALL')return isValidCSOwner(d.ro);
  return _combine(sel.items,d,_comboMode);
}
// ENG_RAW filter: ENG is already CS-scoped upstream so 'ALL' is pass-through.
function _matchesOwnerFilterEng(r){
  const sel=_ownerSel();
  if(sel.mode!=='PICK')return true;
  return _combine(sel.items,r,_comboMode);
}
function _isOwnerPickActive(v){
  const sel=_ownerSel();
  return sel.mode==='PICK'&&sel.items.indexOf(v)>=0;
}
function _isSoleOwnerPick(v){
  const sel=_ownerSel();
  return sel.mode==='PICK'&&sel.items.length===1&&sel.items[0]===v;
}

// ── Iframe state preservation ─────────────────────────────────────────────────
// Any time the parent re-renders while an overlay is open, overlay.innerHTML
// gets rewritten and the iframe is destroyed/recreated, wiping the user's
// active tab + scroll. These helpers snapshot and re-apply that internal
// state so theme toggles and refreshes feel non-destructive.
function _captureIframeState(){
  const out={gTab:null,gScroll:0,fS:null,fScroll:0,bodyScroll:0};
  const _gFr=document.getElementById('_goals_iframe');
  const _fFr=document.getElementById('_forecast_iframe');
  try{if(_gFr&&_gFr.contentWindow){out.gTab=_gFr.contentWindow.aTab||null;out.gScroll=_gFr.contentWindow.scrollY||0;}}catch(e){}
  try{if(_fFr&&_fFr.contentWindow&&_fFr.contentWindow.S){out.fS=Object.assign({},_fFr.contentWindow.S);out.fScroll=_fFr.contentWindow.scrollY||0;}}catch(e){}
  out.bodyScroll=window.scrollY||document.documentElement.scrollTop||0;
  return out;
}
function _restoreIframeState(st){
  if(!st)return;
  if(st.bodyScroll)requestAnimationFrame(()=>window.scrollTo(0,st.bodyScroll));
  // Goals: poll for sw()/aTab to come back online, then re-select saved tab + scroll
  if(st.gTab||st.gScroll){
    let n=0;const t=setInterval(()=>{
      n++;
      const fr=document.getElementById('_goals_iframe');
      const w=fr&&fr.contentWindow;
      if(w&&typeof w.sw==='function'&&w.aTab!==undefined){
        try{
          if(st.gTab&&st.gTab!==w.aTab&&w.document.getElementById('tab-'+st.gTab)){w.sw(st.gTab);}
          if(st.gScroll)w.scrollTo(0,st.gScroll);
        }catch(e){}
        clearInterval(t);
      }else if(n>60){clearInterval(t);} // ~3s timeout
    },50);
  }
  // Forecast: poll for S + render(), restore S + re-render + scroll
  if(st.fS||st.fScroll){
    let n=0;const t=setInterval(()=>{
      n++;
      const fr=document.getElementById('_forecast_iframe');
      const w=fr&&fr.contentWindow;
      if(w&&w.S&&typeof w.render==='function'){
        try{
          if(st.fS)Object.assign(w.S,st.fS);
          w.render();
          if(st.fScroll)w.scrollTo(0,st.fScroll);
        }catch(e){}
        clearInterval(t);
      }else if(n>60){clearInterval(t);}
    },50);
  }
}
// Theme toggle preserves "where you were": every flip rewrites the overlay
// and re-injects the iframe via doc.write, so we capture state first and
// re-apply it after the render lands.
function ssTheme(){
  const _st=_captureIframeState();
  LIGHT=!LIGHT;
  localStorage.setItem('cs_theme',LIGHT?'light':'dark');
  applyBodyClass();
  render();
  _restoreIframeState(_st);
}

// ── OAUTH2 PKCE ───────────────────────────────────────────────────────────────
function b64url(buf){return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
async function genVerifier(){const a=new Uint8Array(32);crypto.getRandomValues(a);return b64url(a);}
async function genChallenge(v){return b64url(await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v)));}
async function startLogin(){
  sessionStorage.clear();
  const v=await genVerifier(), c=await genChallenge(v);
  sessionStorage.setItem('pkce_v',v);
  const p=new URLSearchParams({client_id:CLIENT_ID,response_type:'code',redirect_uri:REDIRECT,scope:SCOPES,code_challenge:c,code_challenge_method:'S256',response_mode:'fragment',prompt:'select_account'});
  location.href=`https://login.microsoftonline.com/${TENANT}/oauth2/v2.0/authorize?${p}`;
}
async function exchangeCode(code){
  const body=new URLSearchParams({client_id:CLIENT_ID,grant_type:'authorization_code',code,redirect_uri:REDIRECT,code_verifier:sessionStorage.getItem('pkce_v'),scope:SCOPES});
  const r=await fetch(`https://login.microsoftonline.com/${TENANT}/oauth2/v2.0/token`,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
  const j=await r.json();
  if(j.error)throw new Error(j.error_description||j.error);
  return j;
}
function saveTokens(t){
  sessionStorage.setItem('at',t.access_token);
  if(t.refresh_token)sessionStorage.setItem('rt',t.refresh_token);
  sessionStorage.setItem('exp',Date.now()+((t.expires_in||3600)*1000));
}
async function getToken(){
  const exp=parseInt(sessionStorage.getItem('exp')||'0'), at=sessionStorage.getItem('at');
  if(at&&Date.now()<exp-60000)return at;
  const rt=sessionStorage.getItem('rt');
  if(rt){
    try{
      const body=new URLSearchParams({client_id:CLIENT_ID,grant_type:'refresh_token',refresh_token:rt,scope:SCOPES});
      const r=await fetch(`https://login.microsoftonline.com/${TENANT}/oauth2/v2.0/token`,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
      const j=await r.json();
      if(!j.error){saveTokens(j);return j.access_token;}
    }catch(e){}
  }
  throw new Error('login_required');
}

// Normalise a header string: trim, collapse internal spaces, lower-case
function normKey(s){return String(s||'').trim().replace(/\s+/g,' ').toLowerCase();}

// Build column maps from a headers array (call after reading header row)
function buildColMaps(headers){
  COL={};COL_LC={};
  headers.forEach((h,i)=>{
    COL[h]=i;            // exact (already trimmed upstream)
    COL_LC[normKey(h)]=i; // normalised
  });
}

// Lookup column index by name — tries exact, then normalised
function colIdx(name){
  let i=COL[name];
  if(i!==undefined)return i;
  i=COL[name.trim()];
  if(i!==undefined)return i;
  return COL_LC[normKey(name)];
}

// Get a cell value from a row by column name
function getCell(row,name){const i=colIdx(name);return i!==undefined?row[i]:undefined;}

// ── SHEETJS PATH ──────────────────────────────────────────────────────────────
// When true, reads workbooks by downloading the raw .xlsx file via Graph's
// /content endpoint and parsing it in the browser with SheetJS. This sidesteps
// Graph's Excel Online rendering engine entirely — no more 504s caused by
// active edits, volatile formulas, or large workbooks.
// When false (or when XLSX is unavailable due to CDN block/network), falls
// back to the legacy usedRange endpoint. Flip to false to revert behavior.
const USE_SHEETJS = (typeof XLSX!=='undefined');
// In-session workbook cache: one /content download per workbook, many sheets
// extracted from it. Cleared at the start of each dashboard refresh.
const _wbCache={};
function _clearWbCache(){Object.keys(_wbCache).forEach(k=>delete _wbCache[k]);}
async function _fetchWorkbookContent(token,driveId,itemId){
  const key=driveId+'/'+itemId;
  if(_wbCache[key])return _wbCache[key];
  const url=`https://graph.microsoft.com/v1.0/drives/${driveId}/items/${itemId}/content`;
  // cache:'no-store' ensures every refresh truly hits Graph for the latest
  // saved version of the file — never serves a cached byte range.
  const r=await fetch(url,{headers:{Authorization:`Bearer ${token}`},cache:'no-store'});
  if(!r.ok){
    const txt=await r.text().catch(()=>'');
    throw new Error(`/content ${r.status} — ${txt.slice(0,200)}`);
  }
  const buf=await r.arrayBuffer();
  const wb=XLSX.read(buf,{type:'array',cellDates:false,cellFormula:false,cellHTML:false,cellStyles:false});
  _wbCache[key]=wb;
  return wb;
}
// Extract a worksheet as {values: [[row], [row], ...]} matching Graph's
// usedRange(valuesOnly=true) response shape so downstream processors are unchanged.
function _sheetToValues(wb,sheetName){
  let ws=wb.Sheets[sheetName];
  if(!ws){
    const k=(wb.SheetNames||[]).find(n=>n.toLowerCase()===String(sheetName).toLowerCase());
    if(k)ws=wb.Sheets[k];
  }
  if(!ws)throw new Error(`sheet "${sheetName}" not found; available: ${(wb.SheetNames||[]).join(', ')}`);
  const values=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:''});
  return{values};
}

async function fetchWithTimeout(url,opts,ms=60000){
  const ctrl=new AbortController();const tid=setTimeout(()=>ctrl.abort(),ms);
  try{return await fetch(url,{...opts,signal:ctrl.signal});}
  finally{clearTimeout(tid);}
}
async function getSharePointDriveId(token, ownerUpn){
  if(_driveIdCache[ownerUpn])return _driveIdCache[ownerUpn];
  if(_driveIdPending[ownerUpn])return _driveIdPending[ownerUpn];
  _driveIdPending[ownerUpn]=(async()=>{
    const siteRes=await fetchWithTimeout(`https://graph.microsoft.com/v1.0/sites/iconnections675-my.sharepoint.com:/personal/${ownerUpn}`,{headers:{Authorization:`Bearer ${token}`}});
    if(!siteRes.ok){const j=await siteRes.json().catch(()=>({}));throw new Error(`Site lookup for ${ownerUpn}: ${siteRes.status} — ${j.error?.message||'unknown'}`);}
    const site=await siteRes.json();
    const drivesRes=await fetchWithTimeout(`https://graph.microsoft.com/v1.0/sites/${site.id}/drives`,{headers:{Authorization:`Bearer ${token}`}});
    if(!drivesRes.ok){const j=await drivesRes.json().catch(()=>({}));throw new Error(`Drives for ${ownerUpn}: ${drivesRes.status} — ${j.error?.message||'unknown'}`);}
    const drives=await drivesRes.json();
    if(!drives.value||!drives.value.length)throw new Error(`No drives found for ${ownerUpn}`);
    const id=drives.value[0].id;
    _driveIdCache[ownerUpn]=id;
    _saveDriveIds();
    delete _driveIdPending[ownerUpn];
    return id;
  })();
  return _driveIdPending[ownerUpn];
}

async function fetchWithRetry(url,opts,retries=3,delay=3000){
  for(let i=0;i<=retries;i++){
    try{
      const r=await fetch(url,opts);
      if(r.status===504||r.status===503){
        if(i<retries){await new Promise(res=>setTimeout(res,delay*(i+1)));continue;}
      }
      return r;
    }catch(e){if(i===retries)throw e;await new Promise(res=>setTimeout(res,delay*(i+1)));}
  }
}

async function fetchSheet(token){
  const enc=encodeURIComponent(SHEET), errors=[], hdrs={Authorization:`Bearer ${token}`};

  // ── SheetJS path (bypasses Graph Excel engine) ───────────────────────────
  if(USE_SHEETJS){
    try{
      const driveId=await getSharePointDriveId(token, FILE_OWNER);
      const wb=await _fetchWorkbookContent(token, driveId, FILE_ID);
      return _sheetToValues(wb, SHEET);
    }catch(e){errors.push(`site drive (content): ${e.message}`);}
    try{
      const r=await fetch('https://graph.microsoft.com/v1.0/me/drive/sharedWithMe',{headers:hdrs});
      const j=await r.json();
      if(j.value&&j.value.length){
        const f=j.value.find(f=>f.id===FILE_ID||(f.remoteItem&&f.remoteItem.id===FILE_ID))||
                 j.value.find(f=>(f.name||'').toLowerCase().includes('2026 renewal master'));
        if(f){
          const ri=f.remoteItem||f;
          const driveId=ri.parentReference?.driveId;
          const itemId=ri.id;
          if(driveId&&itemId){
            const wb=await _fetchWorkbookContent(token, driveId, itemId);
            return _sheetToValues(wb, SHEET);
          }
        }
      }
    }catch(e){errors.push(`sharedWithMe (content): ${e.message}`);}
    throw new Error(errors.join('<br>'));
  }

  // ── Legacy Graph usedRange path (kept for revert via USE_SHEETJS=false) ──
  // Try usedRange first (complete data); if payload too large (400) fall back to fixed range
  async function tryRange(baseUrl){
    const r=await fetchWithRetry(baseUrl+`/workbook/worksheets/${enc}/usedRange(valuesOnly=true)`,{headers:hdrs});
    if(r.ok)return r.json();
    if(r.status===400){
      // Payload exceeded — fetch a fixed column window that covers all needed columns
      const r2=await fetchWithRetry(baseUrl+`/workbook/worksheets/${enc}/range(address='A1:EZ1500')?$select=values`,{headers:hdrs});
      if(r2.ok)return r2.json();
      const j2=await r2.json().catch(()=>({}));
      throw new Error(`${r.status} (fallback also failed: ${j2.error?.message||r2.status})`);
    }
    const j=await r.json().catch(()=>({}));
    throw new Error(`${r.status} — ${j.error?.message||'unknown'}`);
  }

  // Attempt 1: owner's SharePoint personal site drive (primary method)
  try{
    const driveId=await getSharePointDriveId(token, FILE_OWNER);
    const base=`https://graph.microsoft.com/v1.0/drives/${driveId}/items/${FILE_ID}`;
    return await tryRange(base);
  }catch(e){errors.push(`site drive workbook: ${e.message}`);}

  // Attempt 2: sharedWithMe search
  try{
    const r=await fetch('https://graph.microsoft.com/v1.0/me/drive/sharedWithMe',{headers:{Authorization:`Bearer ${token}`}});
    const j=await r.json();
    if(j.value&&j.value.length){
      const f=j.value.find(f=>f.id===FILE_ID||(f.remoteItem&&f.remoteItem.id===FILE_ID))||
               j.value.find(f=>(f.name||'').toLowerCase().includes('2026 renewal master'));
      if(f){
        const ri=f.remoteItem||f;
        const driveId=ri.parentReference?.driveId;
        const itemId=ri.id;
        if(driveId&&itemId){
          const base=`https://graph.microsoft.com/v1.0/drives/${driveId}/items/${itemId}`;
          return await tryRange(base);
        }
      }
    }
  }catch(e){errors.push(`sharedWithMe: ${e.message}`);}

  throw new Error(errors.join('<br>'));
}

function processSPData(raw){
  if(!raw||!raw.values||raw.values.length<2)return[];
  const totalRaw=raw.values.length;
  // Auto-detect header row — score each of the first 20 rows on how many
  // header-like keywords it contains AND how many non-empty cells it has.
  // Single matches (e.g. a banner row with "account & communication ownership")
  // no longer win — we need a row that looks like a real column-header row.
  const HDR_KWS=[/\baccount\b/i,/\bcompany\b/i,/\bstage\b/i,/\bowner\b/i,/sales\s*rep/i,/\brev\b|revenue/i,/\bdate\b/i,/\bsub\b/i,/renewal/i,/contract/i,/invoice/i,/\bstatus\b/i,/classification/i];
  const scoreRow=row=>{
    const cells=(row||[]).map(c=>String(c||'').trim());
    const nonEmpty=cells.filter(c=>c!=='').length;
    let kwHits=0;const seen=new Set();
    cells.forEach(c=>{HDR_KWS.forEach((re,idx)=>{if(!seen.has(idx)&&re.test(c)){seen.add(idx);kwHits++;}});});
    return {nonEmpty,kwHits};
  };
  let hIdx=0,bestScore=-1,scanLog=[];
  const scanUpTo=Math.min(20,raw.values.length);
  for(let r=0;r<scanUpTo;r++){
    const {nonEmpty,kwHits}=scoreRow(raw.values[r]);
    scanLog.push('r'+r+':kw='+kwHits+',ne='+nonEmpty);
    // Must have at least 3 distinct header keywords AND at least 5 non-empty cells
    if(kwHits>=3&&nonEmpty>=5){
      const score=kwHits*100+nonEmpty;
      if(score>bestScore){bestScore=score;hIdx=r;}
    }
  }
  dlog('[SP] header-row scan: '+scanLog.join(' | ')+' → picked hIdx='+hIdx+(bestScore<0?' (no row scored ≥3 keywords; defaulting to row 0)':' (best score='+bestScore+')'));
  const hdrs=raw.values[hIdx].map(h=>String(h||'').trim().toLowerCase());
  const ci=k=>{const i=hdrs.findIndex(h=>h.includes(k));return i>=0?i:null;};
  // pick(): return the first header-index that matches any of the keywords, in
  // priority order. Uses >=0 check instead of ||-chain so a valid index of 0
  // isn't treated as falsy (classic bug — cAcct would silently fall through).
  const pick=(...keys)=>{for(const k of keys){const i=hdrs.findIndex(h=>h.includes(k));if(i>=0)return i;}return -1;};
  // More-specific keys first so "Account Name" wins over "Account ID" (both
  // of which match plain 'account'). Final fallback: assume col A.
  let cAcct=pick('account name','company name','renewal name','company','account','name');
  if(cAcct<0)cAcct=0;
  // Stage is pinned to column M (index 12) per the GA 26 SPs sheet layout.
  // Header-keyword fallback handles any future column reshuffle.
  const cStage=hdrs.length>12?12:ci('stage');
  // 2025 revenue pinned to column AR (index 43). 2026 revenue pinned to AQ (42).
  // Offer Price (SP-only display column) pinned to O (14). All three have
  // header-keyword fallbacks in case the sheet layout shifts.
  const cR25=hdrs.length>43?43:pick('2025 revenue','2025','revenue','total');
  const cR26=hdrs.length>42?42:pick('2026 revenue','2026');
  const cOffer=hdrs.length>14?14:pick('offer price','offer');
  const cOwner=ci('sales rep')!=null?ci('sales rep'):ci('sales owner')!=null?ci('sales owner'):ci('account owner')!=null?ci('account owner'):ci('owner');
  // "Exclude for attainment" pinned to column E (index 4). Rows are DROPPED
  // only when this cell is YES/Y/TRUE/1. Blank or "No" keeps the row.
  const cExcl=hdrs.length>4?4:(()=>{const i=hdrs.findIndex(h=>h.includes('exclude'));return i>=0?i:null;})();
  // AE (Sales Rep) pinned to column I (index 8). Falls back to header match.
  const cAE=hdrs.length>8?8:pick('sales rep','account executive','ae','rep');
  // iConnections Notes pinned to column K (index 10). Falls back to header match.
  const cNotes=hdrs.length>10?10:pick('iconnections notes','notes','comment');
  // Try many aliases for the renewal/sub-end date column — GA 26 SPs may use
  // any of "Final Sub End Date", "Contract End", "Sub End", "Renewal Date", etc.
  const cSub=ci('final sub end')||ci('sub end')||ci('subscription end')||ci('end date')||ci('renewal date')||ci('contract end')||ci('term end')||ci('expiration')||ci('expiry')||ci('next renewal')||ci('renewal');
  // Flat-string logging so console shows it without needing to expand arrays/objects
  dlog('[SP] total raw rows='+totalRaw+' headerIdx='+hIdx+' → '+(totalRaw-hIdx-1)+' data rows below header');
  dlog('[SP] headers:\n  '+hdrs.map((h,i)=>i+':'+h).join(' | '));
  dlog('[SP] detected columns: cAcct='+cAcct+' (header="'+(hdrs[cAcct]||'(none)')+'") cStage='+cStage+' cR25='+cR25+' cR26='+cR26+' cOffer='+cOffer+' cOwner='+cOwner+' cSub='+cSub+' cExcl='+cExcl+' cAE='+cAE+' cNotes='+cNotes+' exclHeader="'+(cExcl!=null?hdrs[cExcl]:'(none matched)')+'" subHeader="'+(cSub!=null?hdrs[cSub]:'(none matched)')+'"');
  const data=[];
  let skippedEmpty=0,skippedEmptyExamples=[],skippedExcluded=0,skippedExcludedExamples=[];
  for(let i=hIdx+1;i<raw.values.length;i++){
    const row=raw.values[i];
    const acct=String(row[cAcct]||'').trim();
    if(!acct){
      // Check if the row has ANY data — if so, it's being dropped wrongly
      const hasAny=(row||[]).some(c=>String(c||'').trim()!=='');
      if(hasAny&&skippedEmptyExamples.length<5){
        skippedEmptyExamples.push('row'+i+':['+(row||[]).slice(0,8).map(c=>String(c||'').trim().slice(0,15)).join('|')+']');
      }
      skippedEmpty++;continue;
    }
    // Exclude-for-attainment filter — drop rows where this cell is YES/Y/TRUE/1.
    // Blank or anything else keeps the row.
    if(cExcl!=null){
      const exclRaw=String(row[cExcl]||'').trim();
      const excl=exclRaw.toUpperCase();
      if(excl==='YES'||excl==='Y'||excl==='TRUE'||excl==='1'){
        if(skippedExcludedExamples.length<5)skippedExcludedExamples.push(acct+'→"'+exclRaw+'"');
        skippedExcluded++;continue;
      }
    }
    const stage=String(cStage!=null?row[cStage]||'':'Open').trim()||'Open';
    const r25=parseNum(cR25!=null&&cR25>=0?row[cR25]:'');
    const r26=parseNum(cR26!=null&&cR26>=0?row[cR26]:'');
    const offer=parseNum(cOffer!=null&&cOffer>=0?row[cOffer]:'');
    const owner=String(cOwner!=null?row[cOwner]||'':'').trim()||'Unknown';
    const sub=cSub!=null?excelDateToJS(row[cSub]||''):'';
    const ae=String(cAE!=null&&cAE>=0?row[cAE]||'':'').trim();
    const notes=String(cNotes!=null&&cNotes>=0?row[cNotes]||'':'').trim();
    // `r` stays as the legacy single-revenue field for backwards compat with
    // anything still reading it (Forecast/Goals use r25 indirectly via r now)
    data.push({n:acct,s:stage,r:r25||r26||offer,r25,r26,offer,o:owner,sub,ae,notes});
  }
  // Diagnostic: show date-parse success rate + skip reasons
  const sample=data.slice(0,5).map(r=>({n:r.n,sub:r.sub}));
  const withDate=data.filter(r=>r.sub&&r.sub.length>0).length;
  dlog('[SP] parsed '+data.length+' rows, skipped '+skippedEmpty+' empty-acct, '+skippedExcluded+' Exclude-for-attainment=YES. '+withDate+' have sub date.');
  if(skippedExcludedExamples.length)dlog('[SP] sample Exclude-for-attainment-filtered out:\n  '+skippedExcludedExamples.join('\n  '));
  if(skippedEmptyExamples.length)dlog('[SP] examples of skipped-but-not-empty rows:\n  '+skippedEmptyExamples.join('\n  '));
  // Distinct stage values (column M) — surfaces so the Pipeline stage mapper
  // can be widened if a new free-text stage string appears on the sheet
  const _stageTally={};data.forEach(r=>{const s=r.s||'(blank)';_stageTally[s]=(_stageTally[s]||0)+1;});
  dlog('[SP] distinct stage values (col M):',_stageTally);
  dlog('[SP] sample parsed:',sample);
  return data;
}

// ── SP → Renewal Pipeline bridge ──────────────────────────────────────────────
// Convert SP_RAW rows (from GA 26 SPs tab) into D-shape rows owned by "Emilie
// Welch" so SPs surface in the top-right owner dropdown and the 2025 REVENUE
// (BASE) KPI rolls them in. Stage strings on the SP sheet are free-text; we
// classify by keyword to line up with the Renewal Pipeline's fixed stage list.
function _mergeSPsIntoD(){
  // Strip any previously-injected SP rows so refresh replaces rather than duplicates
  D=D.filter(d=>!d.__sp);
  if(!SP_RAW||!SP_RAW.length)return;
  // SP column M uses the same canonical stage strings as the renewal master:
  //   "1. Uncontacted" … "7. Signed" / "8. Closed Lost (Not Renewing)" /
  //   "9. Invoice Sent" / "10. Paid". Reuse resolveStage() so SPs follow the
  //   exact same normalization as GP rows — notably "8. Closed Lost" maps to
  //   "4a. Attempting again Q2" (pipeline's re-engageable bucket).
  let unmatched=0;
  const spRows=SP_RAW.map(r=>{
    const stage=resolveStage(r.s)||'1. Uncontacted';
    if(!resolveStage(r.s))unmatched++;
    const se=r.sub||'';
    const dy=daysDiff(se);
    // Revenue mapping for SPs — STRICT column pinning, no cross-fallbacks:
    //   r25 ← col AR (2025 revenue) ONLY. Blank AR → 0 (don't substitute 2026/offer).
    //   o   ← col AQ (2026 revenue) ONLY. Blank AQ → 0 (don't substitute 2025/offer).
    //   spOffer ← col O (SP-only "Offer Price") — surfaced in its own column.
    // Earlier fallback chain (r25||r26||offer) was inflating the 2025 KPI with
    // values from other columns when AR was blank — user validated against raw
    // col AR and caught the mismatch.
    const r25v=r.r25||0;
    const r26v=r.r26||0;
    const offerv=r.offer||0;
    const row={
      c:r.n,s:stage,ro:'Emilie Welch',csRep:'Emilie Welch',or:'N/A',
      o:r26v,r25:r25v,r24:0,se,dy,em:se?se.substring(0,7):'',
      mt:0,rsk:0,out:0,gm:0,gms:0,ap:0,ex:0,snt:0,
      clr:'',icn:r.notes||'',ae:r.ae||'',pod:'',pid:'',sg:[],ct:'SP',wow:'same',
      spOffer:offerv,__sp:true
    };
    row.sg=computeSignals(row);
    return row;
  });
  D=D.concat(spRows);
  dlog(`[SP→D] merged ${spRows.length} SP rows under owner "Emilie Welch"${unmatched?' ('+unmatched+' stage strings did not resolve → defaulted to 1. Uncontacted)':''}`);
}

// Parse the Master List sheet into {pid, addCredits, miaBooth, outdated, gvPromo}
// rows. Columns are pinned to their requested positions:
//   B (idx 1) → Platform Company ID (join key)
//   D (idx 3) → Add 15 Credits
//   E (idx 4) → MIA Booth Selection
//   F (idx 5) → Outdated Fund Perf
//   G (idx 6) → GV Promo
// Cells are normalized to 1 (Yes / Y / TRUE / 1 / ✓) or 0 (anything else).
// Header row is detected by scanning the first 5 rows for "Platform" or "ID"
// in column B; falls back to row 0 when no match.
function processMasterList(range){
  if(!range||!range.values||!range.values.length)return{rows:[],byPid:{}};
  const rows=range.values;
  let hIdx=0;
  for(let r=0;r<Math.min(5,rows.length);r++){
    const v=String(rows[r][1]||'').toLowerCase();
    if(v.includes('platform')||v.includes('id')||v==='b'){hIdx=r;break;}
  }
  const isYes=v=>{
    if(v==null)return 0;
    const s=String(v).trim().toLowerCase();
    if(!s)return 0;
    return(s==='yes'||s==='y'||s==='true'||s==='1'||s==='✓'||s==='x')?1:0;
  };
  const out=[],byPid={};
  for(let i=hIdx+1;i<rows.length;i++){
    const r=rows[i];if(!r)continue;
    const pid=String(r[1]||'').trim();
    if(!pid)continue;
    const rec={pid,addCredits:isYes(r[3]),miaBooth:isYes(r[4]),outdated:isYes(r[5]),gvPromo:isYes(r[6])};
    out.push(rec);byPid[pid]=rec;
  }
  dlog(`[ML] parsed ${out.length} master-list rows (header at idx ${hIdx})`);
  return{rows:out,byPid};
}

// Normalize abbreviated CSM names from MASTER sheet column AI → full names used in VALID_OWNERS
// CSM short-name → canonical VALID_OWNERS name. Covers every variant that
// appears as a tab label on the engagement tracker (Alex C, Andreas,
// Christina C, Courtney K, Helen, Joe R, Juwan, Kristan H, Lucy G, Sunny,
// Scale) plus defensive first-name-only aliases in case someone types
// "Andreas" or "Sunny" in the Target CSM column of Combined Master.
// Without these, rows would silently drop out of filtered Goals/Pipeline
// views because normCsm() would return the raw short name, which doesn't
// match VALID_OWNERS.
const CSM_NAME_MAP={
  // Tab labels with initial suffix
  'alex c':'Alex Cherecwich','courtney k':'Courtney Krieg','lucy g':'Lucy Garber',
  'juwan p':'Juwan Pryce','helen r':'Helen Ramsay','andreas s':'Andreas Santikos',
  'joe r':'Joe Romanoff','christina c':'Christina Chumak','scale':'Support iConnections',
  'kristan h':'Kristan Hester','sunny u':'Sunny Unger','emilie w':'Emilie Welch',
  // First-name-only variants (some ET tabs have no initial)
  'andreas':'Andreas Santikos','helen':'Helen Ramsay','juwan':'Juwan Pryce',
  'sunny':'Sunny Unger','kristan':'Kristan Hester','christina':'Christina Chumak',
  'emilie':'Emilie Welch','alex':'Alex Cherecwich','courtney':'Courtney Krieg',
  'lucy':'Lucy Garber','joe':'Joe Romanoff'
};
function normCsm(v){const k=String(v||'').trim();return CSM_NAME_MAP[k.toLowerCase()]||k;}

async function fetchAllEngagement(token){
  const engMap={};
  const tmpRaw=[];
  const yesNo=v=>String(v||'').toLowerCase().startsWith('y')?1:0;
  const MONTH_ABBR=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  try{
    const data=await fetchEngSheet(token,ENG_SHEET);
    if(!data||!data.values||data.values.length<2){
      console.warn(`${ENG_SHEET} sheet empty or missing`);
    } else {
      // Auto-detect header row: find first row that contains 'Account' (the
      // new sheet labels the column 'Account' rather than 'Account Name').
      let headerRowIdx=0;
      for(let r=0;r<Math.min(10,data.values.length);r++){
        if(data.values[r].some(c=>{const s=String(c||'').trim().toLowerCase();return s==='account'||s==='account name';})){headerRowIdx=r;break;}
      }
      const engHeaders=data.values[headerRowIdx].map(h=>String(h||'').trim());
      dlog(`=== ${ENG_SHEET.toUpperCase()} SHEET HEADERS (row ${headerRowIdx}, total rows=${data.values.length}) ===`);
      dlog(engHeaders.map((h,i)=>`${i}:${h}`).join(' | '));
      const eColMap={};engHeaders.forEach((h,i)=>{if(!(normKey(h) in eColMap))eColMap[normKey(h)]=i;});
      const ec=(row,name)=>{const i=eColMap[normKey(name)];return i!==undefined?row[i]:'';};
      const ecIdx=name=>{const i=eColMap[normKey(name)];return i!==undefined?i:null;};
      // Monthly call columns — find by month-abbreviation header (Mar, Apr, …, Dec).
      const mCallCols=[];
      MONTH_ABBR.forEach(m=>{
        const idx=engHeaders.findIndex(h=>h.trim().toLowerCase()===m.toLowerCase());
        if(idx>=0)mCallCols.push({ci:idx,hdr:m});
      });
      dlog('Monthly call cols:',mCallCols.map(c=>c.ci+':'+c.hdr).join(' | ')||'(none found)');

      // Resolve key columns up front so we can report if any are missing.
      const cAcct  =ecIdx('Account')    ?? ecIdx('Account Name');
      const cSales =ecIdx('Sales Rep');
      const cSeg   =ecIdx('Segment');
      const cRev25 =ecIdx('2025 Revenue')|| ecIdx('2025 Rev') || ecIdx('2025');
      const cRev26 =ecIdx('2026 Revenue')|| ecIdx('2026 Rev') || ecIdx('2026');
      const cEnd   =ecIdx('Contract End')|| ecIdx('Contract End Date');
      const cRisk  =ecIdx('Risk?')       || ecIdx('Risk? (Y/N)')|| ecIdx('Risk');
      const cNotes =ecIdx('Risk Notes')  || ecIdx('Notes');
      const cCsm   =ecIdx('Target CSM')  || ecIdx('CSM');
      const cPod   =ecIdx('Pod');
      const cGm    =ecIdx('GM Completed?') || ecIdx('GM Completed? (Y/N)') || ecIdx('GM Completed');
      const cNextTP=ecIdx('Next TP Date')  || ecIdx('Next TP');
      const cExp   =ecIdx('Expansion?')    || ecIdx('Expansion');
      // Platform ID — authoritative match key across Renewal Master and ET.
      const cPid   =ecIdx('Platform ID')|| ecIdx('Platform Id')|| ecIdx('Platform Company ID')|| ecIdx('Platform Company Id')|| ecIdx('HubSpot ID')|| ecIdx('HubSpot Record ID')|| ecIdx('Company ID')|| ecIdx('Record ID');

      dlog('[eng] resolved columns:\n  '+[
        'Account='+cAcct,'Platform ID='+cPid,'Sales Rep='+cSales,'Segment='+cSeg,'2025 Rev='+cRev25,'2026 Rev='+cRev26,
        'Contract End='+cEnd,'Risk?='+cRisk,'Risk Notes='+cNotes,'Target CSM='+cCsm,'Pod='+cPod,
        'GM Completed?='+cGm,'Next TP Date='+cNextTP,'Expansion?='+cExp
      ].join(' | '));

      const missingKeys=[];
      [['Account',cAcct],['Target CSM',cCsm],['Segment',cSeg],['Contract End',cEnd]]
        .forEach(([n,v])=>{if(v==null)missingKeys.push(n);});
      if(missingKeys.length)console.warn('[eng] MISSING required columns:',missingKeys.join(', '));

      for(let i=headerRowIdx+1;i<data.values.length;i++){
        const row=data.values[i];
        const acct=cAcct!=null?String(row[cAcct]||'').trim():'';
        if(!acct)continue;
        const ro    =cCsm  !=null?normCsm(row[cCsm])         :'';
        const ae    =cSales!=null?String(row[cSales]||'').trim():'';
        const seg   =cSeg  !=null?String(row[cSeg]||'').trim():'';
        const rawEnd=cEnd  !=null?String(row[cEnd]||'').trim():'';
        const rev   =cRev25!=null?parseNum(row[cRev25])       :0;
        const rev26 =cRev26!=null?parseNum(row[cRev26])       :0;
        const rec={
          acct,ro,ae,seg,endMonth:parseEngEndMonth(rawEnd),rawEnd,rev,rev26,
          platformId: cPid !=null?String(row[cPid]||'').trim():'',
          pod:     cPod   !=null?String(row[cPod]||'').trim():'',
          gm:      cGm    !=null?yesNo(row[cGm])              :0,
          nextTP:  cNextTP!=null?String(row[cNextTP]||'').trim():'',
          expn:    cExp   !=null?yesNo(row[cExp])             :0,
          rsk:     cRisk  !=null?yesNo(row[cRisk])            :0,
          notes:   cNotes !=null?String(row[cNotes]||'').trim():'',
          // Legacy fields — columns removed from new ET schema; kept on the
          // record so downstream UI (Engagement Funnel, GP detail table, filters)
          // still binds without needing a refactor. All values are 0/empty.
          txnDone: 0, out: 0, gms: 0, ap: 0, mt: 0,
        };
        engMap[acct]=rec;
        tmpRaw.push(rec);
        // Attach monthly call data
        const calls={};mCallCols.forEach(c=>{calls[c.hdr]=String(row[c.ci]||'').trim();});
        rec.calls=calls;
      }

      // ── Inconsistency report ──────────────────────────────────────────────
      const missingCSM=tmpRaw.filter(r=>!r.ro);
      const unknownCSM=[...new Set(tmpRaw.map(r=>r.ro).filter(r=>r&&!VALID_OWNERS.has(r)))];
      if(missingCSM.length)
        console.warn(`⚠ ${ENG_SHEET}: ${missingCSM.length} rows have no Target CSM:`,missingCSM.map(r=>r.acct));
      if(unknownCSM.length)
        console.warn(`⚠ ${ENG_SHEET}: CSM values not in VALID_OWNERS (check spelling):`,unknownCSM);
      if(!missingCSM.length&&!unknownCSM.length)
        dlog(`✓ ${ENG_SHEET}: all CSM values matched VALID_OWNERS`);
    }
  }catch(e){console.warn(`Failed to fetch ${ENG_SHEET} engagement sheet:`,e);}

  ENG_RAW=tmpRaw;
  const engTotal=Object.keys(engMap).length;
  dlog(`=== ENGAGEMENT LOADED: ${engTotal} accounts ===`);
  if(engTotal===0)console.warn(`Engagement data is empty — ${ENG_SHEET} sheet fetch may have failed`);
  return engMap;
}

// Fetch the "Top 10s" tab from the engagement tracker. Auto-detects the header
// row (first row that contains 'Account' or 'Account Name'), then resolves key
// columns by name. Notes column defaults to header 'Notes' but also falls back
// to column-I positional index (index 8) because the user specified the notes
// live there. Returns an array of {acct, csm, seg, rev, rev26, endRaw, endISO,
// endMonth, notes, risk} records. Blank-account rows are skipped.
async function fetchTop10s(token){
  try{
    const data=await fetchEngSheet(token,'Top 10s');
    if(!data||!data.values||data.values.length<2){console.warn('Top 10s sheet empty or missing');return[];}
    let headerRowIdx=0;
    for(let r=0;r<Math.min(10,data.values.length);r++){
      if(data.values[r].some(c=>{const s=String(c||'').trim().toLowerCase();return s==='account'||s==='account name';})){headerRowIdx=r;break;}
    }
    const hdrs=data.values[headerRowIdx].map(h=>String(h||'').trim());
    dlog(`=== TOP 10S SHEET HEADERS (row ${headerRowIdx}, total rows=${data.values.length}) ===`);
    dlog(hdrs.map((h,i)=>`${i}:${h}`).join(' | '));
    const cmap={};hdrs.forEach((h,i)=>{if(!(normKey(h) in cmap))cmap[normKey(h)]=i;});
    const idx=name=>{const i=cmap[normKey(name)];return i!==undefined?i:null;};
    const cAcct = idx('Account')      ?? idx('Account Name');
    const cCsm  = idx('Target CSM')   ?? idx('CSM')        ?? idx('Owner');
    const cSales= idx('Sales Rep')    ?? idx('AE');
    const cSeg  = idx('Segment')      ?? idx('Pool');
    const cRev25= idx('2025 Revenue') ?? idx('2025 Rev')   ?? idx('2025');
    const cRev26= idx('2026 Revenue') ?? idx('2026 Rev')   ?? idx('2026');
    const cEnd  = idx('Contract End') ?? idx('Contract End Date') ?? idx('Sub End') ?? idx('Sub End Date') ?? idx('Subscription End Date') ?? idx('Renewal Date');
    const cRisk = idx('Risk?')        ?? idx('Risk');
    // Notes: prefer header match, else fall back to positional column I (index 8)
    let cNotes  = idx('Risk Notes')   ?? idx('Notes')      ?? idx('Note');
    if(cNotes==null&&hdrs.length>8)cNotes=8;
    const rows=[];
    for(let i=headerRowIdx+1;i<data.values.length;i++){
      const r=data.values[i];if(!r)continue;
      const acct=cAcct!=null?String(r[cAcct]||'').trim():'';
      if(!acct)continue;
      const endRaw=cEnd!=null?String(r[cEnd]||'').trim():'';
      // Normalize sub-end to ISO yyyy-mm-dd for filtering.
      let endISO='';
      if(endRaw){
        const n=parseFloat(endRaw);
        if(!isNaN(n)&&n>1000&&/^[\d.]+$/.test(endRaw)){
          const d=new Date((n-25569)*86400*1000);
          if(!isNaN(d))endISO=d.toISOString().slice(0,10);
        } else {
          const m=endRaw.match(/^(\d{4})-(\d{2})-(\d{2})/);
          if(m)endISO=m[0];
          else{const d=new Date(endRaw);if(!isNaN(d))endISO=d.toISOString().slice(0,10);}
        }
      }
      rows.push({
        acct,
        csm:   cCsm  !=null?normCsm(r[cCsm]):'',
        ae:    cSales!=null?String(r[cSales]||'').trim():'',
        seg:   cSeg  !=null?String(r[cSeg]||'').trim():'',
        rev25: cRev25!=null?parseNum(r[cRev25]):0,
        rev26: cRev26!=null?parseNum(r[cRev26]):0,
        endRaw,endISO,
        endMonth: endISO?parseInt(endISO.slice(5,7),10):null,
        risk:  cRisk !=null?(String(r[cRisk]||'').toLowerCase().startsWith('y')?1:0):0,
        notes: cNotes!=null?String(r[cNotes]||'').trim():''
      });
    }
    dlog(`=== TOP 10S LOADED: ${rows.length} accounts ===`);
    return rows;
  }catch(e){console.warn('Top 10s fetch failed:',e);return[];}
}

let _snapSiteId=null;
async function _getSnapSiteId(token){
  if(_snapSiteId)return _snapSiteId;
  const r=await fetch(`https://graph.microsoft.com/v1.0/sites/${SNAPSHOT_SITE}`,{headers:{Authorization:`Bearer ${token}`}});
  if(!r.ok)return null;
  _snapSiteId=(await r.json()).id;
  return _snapSiteId;
}
async function _spSnapUrl(token){const sid=await _getSnapSiteId(token);return sid?`https://graph.microsoft.com/v1.0/sites/${sid}/drive/root:/${SNAPSHOT_PATH}:/content`:null;}
async function readSnapshotFile(token){
  try{
    const url=await _spSnapUrl(token);if(!url)return{manual:null,history:[]};
    const r=await fetch(url,{headers:{Authorization:`Bearer ${token}`}});
    if(!r.ok)return{manual:null,history:[]};
    const txt=await r.text();
    if(!txt||txt.trim()===''||txt.trim()==='{}')return{manual:null,history:[]};
    const p=JSON.parse(txt);
    // Old format: {ts, data} at root — migrate
    if(p.ts&&p.data&&!p.manual&&!p.history){
      const lbl=new Date(p.ts).toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});
      return{manual:{ts:p.ts,data:p.data,kpis:{}},history:[{ts:p.ts,label:lbl,data:p.data,kpis:{}}]};
    }
    return{manual:p.manual||null,history:p.history||[]};
  }catch(e){return{manual:null,history:[]};}
}
async function writeSnapshotFile(token,spFile){
  const url=await _spSnapUrl(token);
  if(!url)throw new Error('Could not resolve SharePoint site for snapshot');
  const r=await fetch(url,{method:'PUT',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify(spFile)});
  if(!r.ok){const j=await r.json().catch(()=>({}));throw new Error(`SP write failed ${r.status}: ${j.error?.message||'unknown'}`);}
}
function _snapLabel(ts){return new Date(ts).toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});}
async function saveSnapshot(){

async function loadSnapshotFromSP(token){
  try{
    const sp=await readSnapshotFile(token);
    SNAP_HISTORY=sp.history||[];
    if(sp.manual&&sp.manual.ts&&sp.manual.data){
      PREV=sp.manual.data;PREV_TS=sp.manual.ts;
      dlog('✓ Snapshot loaded from SharePoint:',_snapLabel(PREV_TS));
    }else{
      // Migrate from localStorage
      try{
        const local=localStorage.getItem(SNAPSHOT_KEY);
        if(local){
          const ls=JSON.parse(local);
          if(ls.ts&&ls.data){
            PREV=ls.data;PREV_TS=ls.ts;
            const entry={ts:ls.ts,label:_snapLabel(ls.ts),data:ls.data,kpis:{}};
            SNAP_HISTORY=[entry];
            await writeSnapshotFile(token,{manual:entry,history:[entry]});
            dlog('✓ Migrated local snapshot to SharePoint');
          }
        }
      }catch(me){console.warn('Migration failed:',me);}
    }
  }catch(e){console.warn('Could not load SP snapshot:',e);}
}

function fm(n){if(n<0)return'-'+fm(-n);return n>=1e6?'$'+(n/1e6).toFixed(2)+'M':n>=1000?'$'+(n/1000).toFixed(0)+'K':'$'+Math.round(n);}
function gf(){let d=D.filter(_matchesOwnerFilter);if(S.hidePaid)d=d.filter(d=>d.s!=='10. Paid');if(S.hideChurned)d=d.filter(d=>d.s!=='11. Churned');if(S.hideSPs)d=d.filter(d=>!d.__sp);if(S.subMonths&&S.subMonths.length){const now=new Date();const prefixes=S.subMonths.map(off=>{const m=new Date(now.getFullYear(),now.getMonth()+off,1);return`${m.getFullYear()}-${String(m.getMonth()+1).padStart(2,'0')}-`;});d=d.filter(d=>d.se&&prefixes.some(p=>d.se.startsWith(p)));}return d;}
function pct(a,b){return b>0?Math.round(a/b*100):0;}
function parseNum(v){return parseFloat(String(v||0).replace(/[$,]/g,''))||0;}
function parseEngEndMonth(v){
  if(!v)return'';
  // Excel serial date
  const n=parseFloat(v);
  if(!isNaN(n)&&n>1000){const d=new Date((n-25569)*86400*1000);return d.toISOString().substring(0,7);}
  // Already YYYY-MM or YYYY-MM-DD
  if(/^\d{4}-\d{2}/.test(v))return v.substring(0,7);
  // "Mar 2026", "March 2026", "Mar-26" etc.
  const mo={'jan':'01','feb':'02','mar':'03','apr':'04','may':'05','jun':'06','jul':'07','aug':'08','sep':'09','oct':'10','nov':'11','dec':'12'};
  const m=v.toLowerCase().match(/([a-z]{3})[a-z]*[\s\-\/]+(\d{2,4})/);
  if(m){const yr=m[2].length===2?'20'+m[2]:m[2];return`${yr}-${mo[m[1]]||''}`.replace(/-$/,'');}
  return v;
}
function excelDateToJS(v){
  if(!v)return'';
  const n=parseFloat(v);
  if(isNaN(n)||n<1000)return String(v).trim();
  return new Date((n-25569)*86400*1000).toISOString().split('T')[0];
}
function daysDiff(v){if(!v)return 0;const d=new Date(v);return isNaN(d)?0:Math.round((d-new Date())/864e5);}

// ── STAGE NORMALISATION ───────────────────────────────────────────────────────
// Build lookup: normalised text → canonical stage string
const STAGE_NORM_MAP=new Map();
ST.forEach(s=>{
  STAGE_NORM_MAP.set(normKey(s),s);
  // Also map without numeric prefix ("contacted no interest" → "2. Contacted No Interest")
  const noPrefix=s.replace(/^\d+\.\s*/,'');
  STAGE_NORM_MAP.set(normKey(noPrefix),s);
  // Map by prefix number alone ("2" → ...)
  const m=s.match(/^(\d+)\./);
  if(m)STAGE_NORM_MAP.set(m[1],s);
});
// Legacy stage aliases (old spreadsheet values → new dashboard names)
STAGE_NORM_MAP.set(normKey('8. Closed Lost (Not Renewing)'),'4a. Attempting again Q2');
STAGE_NORM_MAP.set(normKey('Closed Lost (Not Renewing)'),'4a. Attempting again Q2');
STAGE_NORM_MAP.set(normKey('Closed Lost'),'4a. Attempting again Q2');

function resolveStage(rawStage){
  if(!rawStage)return null;
  const raw=String(rawStage).trim();
  // Exact match first
  if(ST.includes(raw))return raw;
  // Normalised match
  const norm=normKey(raw);
  if(STAGE_NORM_MAP.has(norm))return STAGE_NORM_MAP.get(norm);
  // Partial: does the raw value contain a stage label?
  for(const [k,v] of STAGE_NORM_MAP){
    if(norm.includes(k)||k.includes(norm))return v;
  }
  return null;
}

// The Excel column uses an en dash (U+2013) or em dash (U+2014) — try both
const OFFER_COLS=[
  'Offer Price \u2013 Total Contract Value',  // en dash
  'Offer Price \u2014 Total Contract Value',  // em dash
  'Offer Price - Total Contract Value',        // plain hyphen fallback
  'Offer Price\u2013Total Contract Value',     // no spaces around dash
  'Offer Price\u2014Total Contract Value',
  'Offer Price',                               // bare name
];

function computeSignals(row){
  const sg=[],{dy,r25,o,s,mt,rsk}=row;
  // Suppress all at-risk signals for accounts whose renewal outcome is
  // already decided. Without this guard, a Won deal with mt=0 (meetings
  // weren't logged before signing) trips "No Meetings" / "High Rev No
  // Engagement" and inflates the At Risk count with closed business.
  // 8. Closed Lost (Not Renewing) normalizes to 4a. Attempting again Q2
  // upstream (line 1287), so it stays flaggable as an active win-back.
  if(['7. Signed','9. Invoice Sent','10. Paid','11. Churned'].includes(s))return sg;
  if(s==='1. Uncontacted'&&dy>0&&dy<=90)sg.push('ue');
  if((s==='3. Contacted Follow-up Needed'||s==='4. Contacted Attempting Again')&&o===0)sg.push('en');
  if(mt===0&&s!=='1. Uncontacted')sg.push('co');
  if(s==='5. Proposal Made'&&o===0)sg.push('pp');
  if(s==='6. Signature Requested'&&dy>=0&&dy<=60)sg.push('se');
  if(mt===0)sg.push('nm');
  if(rsk)sg.push('rf');
  if(r25>=50000&&mt===0)sg.push('hr');
  if(s==='4a. Attempting again Q2')sg.push('wb');
  return[...new Set(sg)];
}
function getWow(d){
  const ps=PREV[d.c];
  if(!ps)return'new';
  const pi=ST.indexOf(ps),ci=ST.indexOf(d.s);
  if(pi<0||ci<0)return'same';
  if(d.s==='11. Churned'&&ps!=='11. Churned')return'lost';
  const _wonStages=['9. Invoice Sent','10. Paid'];
  if(_wonStages.includes(d.s)&&!_wonStages.includes(ps))return'won';
  if(ci>pi)return'up';if(ci<pi)return'down';return'same';
}

// Shared normalization for account-name matching between Renewal Master and Engagement Tracker.
// Handles: case, whitespace, smart quotes, &/and, punctuation, legal-entity suffixes.
function _normAcctKey(s){
  if(s==null)return'';
  let k=String(s).toLowerCase().trim();
  if(!k)return'';
  k=k.replace(/[\u2018\u2019\u201c\u201d\u00b4]/g,"'");
  k=k.replace(/\s*&\s*/g,' and ');
  k=k.replace(/[.,'"`()\[\]]/g,'');
  k=k.replace(/[-\/_]+/g,' ');
  k=k.replace(/\s+/g,' ').trim();
  const SUF=/\s+(llc|l l c|inc|incorporated|corp|corporation|lp|l p|llp|ltd|limited|co|company|gmbh|s a|sa|nv|ag|pte|plc|holdings?)$/;
  for(let p=0;p<3;p++){const nk=k.replace(SUF,'').trim();if(nk===k)break;k=nk;}
  return k;
}
function processData(range, engMap){
  if(!engMap)engMap={};
  if(!range)return D; // eng-only update — return existing D unchanged
  const rows=range.values;
  if(!rows||!rows.length)throw new Error('Sheet appears empty');
  // Build auxiliary ENG lookups: by Platform ID and by normalized account name.
  // Exact-name match via engMap[company] already works; these handle the rest.
  const _engByPid={},_engByNorm={};
  for(const k in engMap){const r=engMap[k];if(!r)continue;if(r.platformId)_engByPid[r.platformId]=r;const nk=_normAcctKey(r.acct||k);if(nk&&!_engByNorm[nk])_engByNorm[nk]=r;}

  // Auto-detect header row: scan first 30 rows for one containing 'Renewal Owner'
  let detectedHeaderRow=HEADER_ROW;
  for(let r=0;r<Math.min(30,rows.length);r++){
    if(rows[r].some(c=>String(c||'').trim()==='Renewal Owner')){detectedHeaderRow=r;break;}
  }
  if(rows.length<=detectedHeaderRow)throw new Error('Sheet appears empty or headers not found');

  const rawHeaders=rows[detectedHeaderRow].map(h=>String(h||'').trim());
  buildColMaps(rawHeaders);
  // Find both Notes/Closed Lost Reason columns (CE and CF) — colIdx only returns first match
  const clrIdxAll=rawHeaders.reduce((a,h,i)=>h==='Notes / Closed Lost Reason'?[...a,i]:a,[]);

  // Debug output to help diagnose column issues
  dlog('=== PIPELINE FILE HEADERS ===');
  dlog(rawHeaders.join(' | '));
  dlog('Stage col idx:', colIdx('Stage'));
  dlog('Renewal Owner col idx:', colIdx('Renewal Owner'));
  dlog('Contact col idx:', colIdx('Contact'));
  const offerHit=OFFER_COLS.find(c=>colIdx(c)!==undefined);
  dlog('Offer price col matched:', offerHit, '@ idx', offerHit?colIdx(offerHit):'–');

  const data=[];
  let stageUnmatched=[];

  for(let i=detectedHeaderRow+1;i<rows.length;i++){
    const v=rows[i];
    let company=String(getCell(v,'Contact')||'').trim();
    if(!company){
      // Fallback: try 'Company Name' column
      company=String(getCell(v,'Company Name')||getCell(v,'Account Name')||'').trim();
    }
    if(!company){
      // Log rows that have a valid owner but blank company — helps diagnose missing accounts
      const ownerPeek=String(getCell(v,'Renewal Owner')||getCell(v,'Renewal Owner ')||'').trim();
      if(ownerPeek)console.warn(`Row ${i+1} skipped — blank Contact. Owner: "${ownerPeek}" | Row sample:`, v.slice(0,8));
      continue;
    }

    // Stage — normalised match
    const rawStage=String(getCell(v,'Stage')||'').trim();
    const stage=resolveStage(rawStage)||'1. Uncontacted';
    if(rawStage&&!resolveStage(rawStage)){
      stageUnmatched.push(`"${rawStage}" (row ${i+1})`);
    }

    // Renewal Owner — column headers are trimmed, so plain 'Renewal Owner' works
    const rawOwner=String(
      getCell(v,'Renewal Owner') ||
      getCell(v,'Renewal Owner ') ||  // trailing-space variant just in case
      ''
    ).trim();
    // Keep the raw owner name on the row — aliasing happens at filter time (ownerMatches)
    // so the Accounts tab still displays "Phoebe Willoughby" / "Jovin Lee" while the
    // top-right "Support iConnections" dropdown pulls their accounts in.
    const ro=rawOwner||'Support iConnections';
    // Keep all accounts — non-CS owners are surfaced via the "All Owners" filter option

    const r25=parseNum(getCell(v,'2025 Total Revenue'));
    const r24=parseNum(getCell(v,'2024 Total Revenue'));

    // Offer Price — try all candidate column names
    let offerRaw=undefined;
    for(const col of OFFER_COLS){offerRaw=getCell(v,col);if(offerRaw!==undefined&&offerRaw!=='')break;}
    const offer=parseNum(offerRaw);

    const subEnd=excelDateToJS(getCell(v,'Final Sub End Date')||'');
    const dy=daysDiff(subEnd);

    const or_=String(getCell(v,'ONSITE REP (iConn + Benchies)')||getCell(v,'Onsite Rep')||'N/A');
    // Resolve the matching Engagement Tracker row via three strategies — exact name,
    // then Platform ID, then normalized name — so pod/engagement data attaches to all
    // Renewal Master rows that correspond to ET rows, not just exact-name matches.
    const _rmPid=String(getCell(v,'Platform ID')||getCell(v,'Platform Id')||getCell(v,'HubSpot ID')||getCell(v,'HubSpot Record ID')||getCell(v,'Company ID')||getCell(v,'Record ID')||'').trim();
    let eng=engMap[company];
    if(!eng&&_rmPid&&_engByPid[_rmPid])eng=_engByPid[_rmPid];
    if(!eng){const nk=_normAcctKey(company);if(nk&&_engByNorm[nk])eng=_engByNorm[nk];}
    if(!eng)eng={};
    const mt=eng.mt!==undefined?eng.mt:parseNum(getCell(v,'Confirmed Miami Meetings'));
    const rsk=eng.rsk!==undefined?eng.rsk:(parseNum(getCell(v,'Emerging Manager Risk (AUM <250M & 1 GA Event in 2025)'))>0?1:0);
    const out=eng.out||0;
    const gm=eng.gm||0;
    const gms=eng.gms||0;
    const ap=eng.ap||0;
    // Notes hierarchy: col L (iConnections Notes) → col CE → col CF
    const _icnRaw=String(getCell(v,'iConnections Notes')||'').trim();
    const _clrA=clrIdxAll[0]!==undefined?String(v[clrIdxAll[0]]||'').trim():'';
    const _clrB=clrIdxAll[1]!==undefined?String(v[clrIdxAll[1]]||'').trim():'';
    const icn=_icnRaw?_icnRaw:_clrA?_clrA:_clrB?_clrB:'';
    const clr=_clrA||_clrB;
    const ae=String(getCell(v,'Sales Rep')||'').trim();
    const csRep=String(getCell(v,'CS Rep')||v[8]||'').trim();
    const em=subEnd?subEnd.substring(0,7):'';
    const row={c:company,s:stage,ro,csRep,or:or_,o:offer,r25,r24,se:subEnd,dy,em,mt,rsk,out,gm,gms,ap,ex:0,snt:0,clr,icn,ae,pod:(eng.pod||''),pid:(_rmPid||eng.platformId||''),sg:[],ct:'Manager',wow:'same'};
    row.sg=computeSignals(row);
    data.push(row);
  }

  if(stageUnmatched.length){
    console.warn('Unmatched stage values:', stageUnmatched.slice(0,10).join(', '));
  }
  if(!data.length){
    const preview=rawHeaders.slice(0,12).join(' | ');
    throw new Error(`No valid rows found after filtering.<br><br>First 12 headers from row ${detectedHeaderRow+1}:<br><small>${preview}</small><br><br>Headers auto-detected at row ${detectedHeaderRow+1}.`);
  }

  dlog(`Loaded ${data.length} accounts. Owners:`, [...new Set(data.map(d=>d.ro))].join(', '));
  // Pod-match diagnostics — confirms how many Renewal Master rows successfully linked to an ET pod
  const _podTally={};let _withPod=0;data.forEach(d=>{if(d.pod){_withPod++;_podTally[d.pod]=(_podTally[d.pod]||0)+1;}});
  dlog(`[pod] ${_withPod}/${data.length} Renewal Master rows matched to a pod.`,_podTally);
  return data;
}

let _loadingInProgress=false;

async function _fetchFresh(token){
  // Always start with a clean workbook cache so a refresh truly re-downloads
  // (the cache is per-session and serves multiple sheet reads from one download)
  if(typeof _clearWbCache==='function')_clearWbCache();
  // Always fetch both — sequential to avoid SP rate limits
  const range=await fetchSheet(token);
  // Store raw rows for Goals dashboard (unfiltered)
  if(range&&range.values){
    GP_RAW_ROWS=range.values;
    GP_RAW_HDR=0;
    for(let r=0;r<Math.min(30,range.values.length);r++){if(range.values[r].some(c=>String(c||'').trim()==='Renewal Owner')){GP_RAW_HDR=r;break;}}
  }
  const engMap=await fetchAllEngagement(token);
  const spRange=await fetchSPSheet(token);
  if(spRange)SP_RAW=processSPData(spRange);
  TOP10_RAW=await fetchTop10s(token);
  try{
    const mlRange=await fetchMasterListSheet(token);
    if(mlRange){const ml=processMasterList(mlRange);MASTER_LIST_RAW=ml.rows;MASTER_LIST_BY_PID=ml.byPid;saveMLCache(MASTER_LIST_RAW,MASTER_LIST_BY_PID);}
  }catch(e){console.warn('Master List fetch failed:',e);}
  await Promise.all([loadSnapshotFromSP(token),loadRCSnapshotFromSP(token)]);
  D=processData(range,engMap);
  _mergeSPsIntoD();
  saveEngCache(ENG_RAW);
  saveTop10Cache(TOP10_RAW);
  const lu='Updated '+new Date().toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});
  lastUpdated=lu;
  saveDataCache(D,lu);
  S.staleWarning=null;
}


async function loadData(forceRefresh=false){
  if(_loadingInProgress&&!forceRefresh){dlog('loadData: already in progress, skipping');return;}
  _loadingInProgress=true;
  loadSnapshot();

  // Stale-while-revalidate: show cached data (any age) instantly, then ALWAYS
  // refetch in the background. Every page load / refresh hits the network for
  // fresh data — the cache is only an instant-paint shortcut and error fallback.
  const cache=loadDataCache(true);
  const haveCache=cache&&cache.D&&cache.D.length&&!forceRefresh;
  if(haveCache){
    D=cache.D;
    const ec=loadEngCache();if(ec)ENG_RAW=ec;
    const tc=loadTop10Cache();if(tc)TOP10_RAW=tc;
    const mc=loadMLCache();if(mc){MASTER_LIST_RAW=mc.rows||[];MASTER_LIST_BY_PID=mc.byPid||{};}
    const ageLabel=cache.stale?' · cached':'';
    lastUpdated=cache.lastUpdated+ageLabel;
    S.refreshing=true;
    // On first paint (init still running, parser hasn't reached the iframe
    // template <textarea>s yet) defer to DOMContentLoaded so opening Goals/
    // Forecast via #hash doesn't blow up reading null.value.
    if(document.readyState==='loading'){
      document.addEventListener('DOMContentLoaded',render,{once:true});
    }else{
      render();
    }
  }else{
    showLoading('Loading pipeline + engagement data…');
  }

  // Always attempt fresh fetch
  try{
    const token=await getToken();
    await _fetchFresh(token);
    S.refreshing=false;
    render();
  }catch(e){
    const msg=e.message||String(e);
    if(/login_required|interaction/i.test(msg)){showLogin();return;}
    S.refreshing=false;
    // If we already painted cache, keep showing it with a stale warning
    if(haveCache){
      S.staleWarning=`SharePoint refresh failed — showing data from ${cache.staleMinutes||0}m ago. <button onclick="refreshData()" style="margin-left:8px;padding:2px 10px;border-radius:4px;border:1px solid #fbbf24;background:transparent;color:#fbbf24;font-size:11px;cursor:pointer;font-family:inherit">Retry</button>`;
      render();
    }else{
      // No cache available — fall back to any stale cache we may have
      const stale=loadDataCache(true);
      if(stale&&stale.D&&stale.D.length){
        D=stale.D;const ec=loadEngCache();if(ec)ENG_RAW=ec;const tc=loadTop10Cache();if(tc)TOP10_RAW=tc;const mc=loadMLCache();if(mc){MASTER_LIST_RAW=mc.rows||[];MASTER_LIST_BY_PID=mc.byPid||{};}
        lastUpdated=stale.lastUpdated+' · cached';
        S.staleWarning=`SharePoint timed out — showing data from ${stale.staleMinutes}m ago. <button onclick="refreshData()" style="margin-left:8px;padding:2px 10px;border-radius:4px;border:1px solid #fbbf24;background:transparent;color:#fbbf24;font-size:11px;cursor:pointer;font-family:inherit">Retry</button>`;
        render();
      }else{showError(msg);}
    }
  }finally{_loadingInProgress=false;}
}
async function refreshData(){
  // Preserve overlay iframe state across the refresh so clicking ↻ Refresh
  // inside Goals/Forecast doesn't bounce the user back to the default tab.
  const _st=_captureIframeState();
  // loadData() only flips S.refreshing on the cache-hit path; on a forced
  // refresh (haveCache becomes false because !forceRefresh is false) it
  // jumps straight to showLoading() — which the overlay covers — so without
  // this the topbar's Refresh button never updates to "⟳ Refreshing…".
  S.refreshing=true;
  render();
  try{
    await loadData(true);
  }finally{
    // loadData itself sets S.refreshing=false in its happy & error paths
    // and re-renders, but make this idempotent in case anything throws
    // before that runs.
    if(S.refreshing){S.refreshing=false;render();}
    _restoreIframeState(_st);
  }
}

// Standalone recurring tasks — calendar-only, NOT tied to any MBO and not
// counted toward weighted progress. Each occurrence is its own checkbox
// keyed `task:<id>@YYYY-MM-DD` in localStorage.
const RAHUL_TASKS=[
  {id:'subend-et',label:'Refresh sub-end dates (ET)',color:'#a78bfa',recur:{weekday:2,from:'2026-04-28',to:'2026-06-30'}}
];

function _mboProgress(){try{return JSON.parse(localStorage.getItem('rahul_mbo_progress')||'{}');}catch(e){return{};}}
function _mboSave(p){try{localStorage.setItem('rahul_mbo_progress',JSON.stringify(p));}catch(e){}}
// Notes / proof links — parallel store keyed the same way as progress
// ('1.1', '2.1@2026-05-01', 'ms@2026-04-30'). Kept separate so clearing
// progress doesn't nuke the attached evidence.
function _mboNotes(){try{return JSON.parse(localStorage.getItem('rahul_mbo_notes')||'{}');}catch(e){return{};}}
function _mboNotesSave(n){try{localStorage.setItem('rahul_mbo_notes',JSON.stringify(n));}catch(e){}}
function _mboNoteIsUrl(s){return /^https?:\/\//i.test(String(s||'').trim());}
function _mboNoteHTML(s){
  const v=String(s||'').trim();if(!v)return'';
  if(_mboNoteIsUrl(v)){
    const short=v.length>60?v.slice(0,60)+'…':v;
    return `<a href="${v.replace(/"/g,'&quot;')}" target="_blank" rel="noopener" style="color:#60a5fa;text-decoration:underline;word-break:break-all">${short}</a>`;
  }
  return `<span style="color:#cbd5e1">${v.replace(/[&<>]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;'})[ch])}</span>`;
}
function _editMBONote(key){
  event&&event.stopPropagation&&event.stopPropagation();
  const notes=_mboNotes();
  const cur=notes[key]||'';
  const v=prompt('Edit note / link (leave blank to remove):',cur);
  if(v===null)return;
  const t=v.trim();
  if(t)notes[key]=t;else delete notes[key];
  _mboNotesSave(notes);
  _rebuildMBOOverlay();
}

// Recurring KR helpers — each Friday (or other recurrence) is its own
// completable occurrence tracked in localStorage with key `${k.id}@${iso}`.
function _krOccurrences(k){
  if(!k.recur)return[k.due];
  const out=[];
  const f=new Date(k.recur.from+'T00:00:00'),t=new Date(k.recur.to+'T00:00:00');
  for(let d=new Date(f);d<=t;d.setDate(d.getDate()+1)){
    if(d.getDay()===k.recur.weekday){
      out.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));
    }
  }
  return out;
}
function _krDone(k,p){
  if(!k.recur)return p[k.id]?1:0;
  return _krOccurrences(k).filter(iso=>p[k.id+'@'+iso]).length;
}
function _krTotal(k){return k.recur?_krOccurrences(k).length:1;}
function _krFrac(k,p){const t=_krTotal(k);return t?_krDone(k,p)/t:0;}

// Unified toggle for any completable item on the calendar: a single KR
// (`k.id`), a recurring KR occurrence (`k.id@YYYY-MM-DD`), or a milestone
// (`ms@YYYY-MM-DD`). On mark-complete, prompts for an optional note/link
// (proof of completion). On uncheck, silently clears both state + note.
// Rebuilds the overlay so progress bars + calendar state update
// consistently, preserving scroll position.
function _toggleMBOKey(key){
  const p=_mboProgress();
  const notes=_mboNotes();
  if(!p[key]){
    // Marking complete — ask for optional note/link
    const cur=notes[key]||'';
    const v=prompt('Mark complete. Add a link or note (proof of completion — optional):',cur);
    if(v===null)return; // user cancelled — don't mark complete
    p[key]=true;
    const t=v.trim();
    if(t)notes[key]=t;else delete notes[key];
    _mboNotesSave(notes);
  } else {
    // Unchecking — drop progress + note silently
    p[key]=false;
    if(notes[key]){delete notes[key];_mboNotesSave(notes);}
  }
  _mboSave(p);
  _rebuildMBOOverlay();
}
function _toggleKR(krid){_toggleMBOKey(krid);} // legacy alias

function _rebuildMBOOverlay(){
  const overlay=document.getElementById('rahul-mbo-overlay');
  if(!overlay)return;
  const scrollTop=overlay.scrollTop;
  overlay.remove();
  document.body.style.overflow='';
  _openRahulMBOs();
  requestAnimationFrame(()=>{
    const n=document.getElementById('rahul-mbo-overlay');
    if(n)n.scrollTop=scrollTop;
  });
}

function _closeRahulMBOs(){const el=document.getElementById('rahul-mbo-overlay');if(el)el.remove();document.body.style.overflow='';}

function _buildQ2Calendar(){
  // Weekly grid Mar 30 (Mon) → Jul 5 (Sun) — 14 weeks covering all of Q2 2026
  const p=_mboProgress();
  const notes=_mboNotes();
  const today=new Date();today.setHours(0,0,0,0);
  const start=new Date(2026,2,30); // Mar 30 Mon
  const weeks=[];
  const milestonesByDate={};
  RAHUL_MILESTONES.forEach(m=>{milestonesByDate[m.date]=m;});
  // Per-KR due dates (expand recurring KRs into every matching day)
  const krDue={};
  const pushKr=(iso,k,mboId,recur)=>{if(!krDue[iso])krDue[iso]=[];krDue[iso].push({id:k.id,mboId,recur:!!recur});};
  RAHUL_MBOS.forEach(mbo=>mbo.krs.forEach(k=>{
    if(k.recur){
      _krOccurrences(k).forEach(iso=>pushKr(iso,k,mbo.id,true));
    } else {
      pushKr(k.due,k,mbo.id,false);
    }
  }));
  // Standalone tasks (calendar-only, no MBO). Pushed into the same krDue map
  // with isTask flag so the day-cell renderer can pick a different label/color.
  (RAHUL_TASKS||[]).forEach(t=>{
    if(!t.recur)return;
    _krOccurrences(t).forEach(iso=>{
      if(!krDue[iso])krDue[iso]=[];
      krDue[iso].push({id:t.id,isTask:true,label:t.label,color:t.color||'#a78bfa'});
    });
  });
  for(let w=0;w<14;w++){
    const wkStart=new Date(start);wkStart.setDate(start.getDate()+w*7);
    const wkEnd=new Date(wkStart);wkEnd.setDate(wkStart.getDate()+6);
    const days=[];
    for(let d=0;d<7;d++){
      const dt=new Date(wkStart);dt.setDate(wkStart.getDate()+d);
      const iso=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
      days.push({dt,iso,isToday:dt.getTime()===today.getTime(),isPast:dt<today,ms:milestonesByDate[iso]||null,krs:krDue[iso]||[]});
    }
    const isCurWeek=today>=wkStart&&today<=wkEnd;
    weeks.push({wkStart,wkEnd,days,isCurWeek});
  }
  const fmtD=dt=>dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  // Per-event row inside a day cell — mini checkbox + label. Clicking anywhere
  // on the row toggles the localStorage key and triggers a full overlay
  // rebuild. Colors match the event type: milestones get their own accent,
  // KRs stay neutral gray.
  const renderEvent=(key,label,color,isMilestone)=>{
    const checked=!!p[key];
    const note=notes[key]||'';
    const hasNote=!!note;
    const noteIcon=hasNote?(_mboNoteIsUrl(note)?'🔗':'📝'):'';
    const noteTitle=hasNote?('Note: '+note):('');
    const tooltip=hasNote?noteTitle:`Click to mark ${checked?'incomplete':'complete'}`;
    return `<div onclick="_toggleMBOKey('${key}')" style="display:flex;gap:4px;align-items:flex-start;cursor:pointer;margin-top:3px;opacity:${checked?'.55':'1'};user-select:none" title="${tooltip.replace(/"/g,'&quot;')}">`+
      `<div style="width:12px;height:12px;border-radius:3px;border:1.5px solid ${checked?color:'#475569'};background:${checked?color:'transparent'};color:#0B1120;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .12s">${checked?'✓':''}</div>`+
      `<div style="font-size:${isMilestone?'10px':'9px'};color:${isMilestone?color:'#cbd5e1'};font-weight:${isMilestone?'600':'500'};line-height:1.3;text-decoration:${checked?'line-through':'none'}">${label}${hasNote?` <span style="opacity:.9">${noteIcon}</span>`:''}</div>`+
      `</div>`;
  };
  let h='<div style="display:flex;flex-direction:column;gap:6px">';
  weeks.forEach((wk,wi)=>{
    const wkLabel='Week '+(wi+1)+' · '+fmtD(wk.wkStart)+' – '+fmtD(wk.wkEnd);
    const hasEvents=wk.days.some(d=>d.ms||d.krs.length);
    h+=`<div style="border:1px solid ${wk.isCurWeek?'#3b82f6':'#334155'};background:${wk.isCurWeek?'rgba(59,130,246,.08)':'#0f172a'};border-radius:8px;padding:10px 12px">`;
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${hasEvents?'8px':'0'}">`;
    h+=`<div style="font-size:11px;font-weight:600;color:${wk.isCurWeek?'#60a5fa':'#94a3b8'};text-transform:uppercase;letter-spacing:.8px">${wkLabel}${wk.isCurWeek?' · <span style="color:#60a5fa">CURRENT</span>':''}</div>`;
    h+='</div>';
    if(hasEvents){
      h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">';
      wk.days.forEach(d=>{
        const dayName=d.dt.toLocaleDateString('en-US',{weekday:'short'});
        const dayNum=d.dt.getDate();
        const hasMs=!!d.ms;
        const hasKr=d.krs.length>0;
        const bg=hasMs?`${d.ms.c}22`:hasKr?'#1e293b':'#0b1120';
        const bc=hasMs?d.ms.c:hasKr?'#334155':'#1e293b';
        h+=`<div style="border:1px solid ${bc};background:${bg};border-radius:6px;padding:6px 4px;min-height:${hasMs||hasKr?'72px':'36px'};${d.isToday?'box-shadow:0 0 0 2px #3b82f6':''};${d.isPast&&!hasMs&&!hasKr?'opacity:.4':''}">`;
        h+=`<div style="font-size:9px;color:#64748b;font-weight:600">${dayName} ${dayNum}</div>`;
        if(hasMs)h+=renderEvent('ms@'+d.iso,d.ms.label,d.ms.c,true);
        d.krs.forEach(k=>{
          if(k.isTask){
            h+=renderEvent('task:'+k.id+'@'+d.iso,k.label,k.color||'#a78bfa',true);
          } else {
            const key=k.recur?(k.id+'@'+d.iso):k.id;
            h+=renderEvent(key,'KR '+k.id,'#94a3b8',false);
          }
        });
        h+='</div>';
      });
      h+='</div>';
    }
    h+='</div>';
  });
  h+='</div>';
  return h;
}

function _openRahulMBOs(){
  const p=_mboProgress();
  const notes=_mboNotes();
  document.body.style.overflow='hidden';

  h+='</div>';

  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">';
  h+='<div style="font-size:13px;font-weight:600;color:#a78bfa;text-transform:uppercase;letter-spacing:1px">Q2 2026 — Weekly Deadline Calendar</div>';

  h+=_buildQ2Calendar();

  h+='<div style="background:#111827;border:1px solid #1e293b;border-radius:12px;padding:18px 20px;margin-bottom:16px">';
  h+='<div style="font-size:13px;font-weight:600;color:#a78bfa;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px">Key Milestones</div>';
  h+='<div style="display:flex;gap:8px;flex-wrap:wrap">';
  RAHUL_MILESTONES.forEach(m=>{
    const dt=new Date(m.date+'T00:00:00');const md=dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const today=new Date();today.setHours(0,0,0,0);
    const isPast=dt<today;
    h+=`<div style="flex:1;min-width:140px;background:#0B1120;border:1px solid ${m.c};border-radius:8px;padding:10px 14px;text-align:center;opacity:${isPast?'.55':'1'}">`;

  });
  h+='</div></div>';

  // MBO cards
  RAHUL_MBOS.forEach(mbo=>{
    let doneFrac=0;mbo.krs.forEach(k=>{doneFrac+=_krFrac(k,p);});
    const mpct=Math.round(doneFrac/mbo.krs.length*100);

    h+='</div>';
    h+='<div style="height:4px;background:#0B1120;border-radius:3px;overflow:hidden;margin-bottom:12px">';
    h+=`<div id="mbo-bar-${mbo.id}" style="height:100%;background:#10b981;width:${mpct}%;transition:width .3s"></div>`;

    // KRs

        ?`Every ${WD[k.recur.weekday]} · ${krDone} of ${krTot} delivered · check off on calendar ↑`
        :`Due ${dueLbl}${overdue?' · OVERDUE':''}`;
      const rowOpacity=isRecur?(fullyDone?'.55':'1'):(checked?'.55':'1');

      h+=`<div id="kr-${k.id.replace('.','_')}" style="display:flex;gap:10px;padding:12px 0;align-items:flex-start;opacity:${rowOpacity};${isLast?'':'border-bottom:1px solid #1e293b'};transition:opacity .2s">`;

      if(isRecur){
        const bgC=fullyDone?'#10b981':'transparent';

// Search-focus preservation: any <input data-sf="<key>"> will keep focus and
// cursor position across innerHTML rewrites. Call _sfSnapshot() immediately
// before an innerHTML= assignment and invoke the returned function right
// after. The helper is a no-op when no search input is currently focused.
function _sfSnapshot(){
  const a=document.activeElement;
  const key=a&&a.dataset&&a.dataset.sf;
  const pos=key?a.selectionStart:null;
  return function _sfRestore(){
    if(!key)return;
    requestAnimationFrame(()=>{
      const inp=document.querySelector('input[data-sf="'+key+'"]');
      if(inp){inp.focus();try{inp.setSelectionRange(pos,pos);}catch(e){}}
    });
  };
}

}

    h+=`<table><thead><tr><th>Month</th><th style="text-align:center">Active Accts</th><th style="text-align:right;color:#fbbf24">2025 Rev</th><th style="text-align:right;color:#22d3ee">2026 Offer</th><th style="text-align:center;color:#ef4444">No Offer</th><th style="text-align:right;color:#ef4444">Uncovered</th><th style="text-align:center">Coverage</th><th></th></tr></thead><tbody>`;

        <td style="text-align:right;font-size:11px;font-weight:600;color:${dl===-999?'#334155':dl>=0?'#34d399':'#ef4444'}">${dl===-999?'–':(dl>=0?'+':'')+Math.round(dl)+'%'}</td>

        <td style="overflow:visible;white-space:normal;vertical-align:top;padding:5px 6px"><div style="display:flex;flex-wrap:wrap;gap:3px;align-items:flex-start">${a.sg.map(s=>`<span class="badge ${SIG_C[s]}">${SIG_L[s]}</span>`).join('')}</div></td>
