<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const CLIENT_ID  = 'dc704d15-4dc6-47d7-bc4b-143455acfd4d';
const TENANT     = 'iconnections675.onmicrosoft.com';
const FILE_OWNER  = 'cgoggil_iconnections_io';
const FILE_ID     = 'cb56a10b-e016-4453-9df6-159035bd5c8c';
const SHEET       = 'master tracker';
const HEADER_ROW = 0; // when fetching A14:CB1035, headers are at index 0
const ENG_FILE_ID = 'f3908b5a-e17e-420f-b2e6-500c5dbad32c';
const ENG_OWNER   = 'tfischer_iconnections_io';
const ENG_SHEETS  = {
  'Christina C':'Christina Chumak',
  'Alex C':'Alex Cherecwich',
  'Courtney K':'Courtney Krieg',
  'Lucy G':'Lucy Garber',
  'Juwan P':'Juwan Pryce',

  'Joe R':'Joe Romanoff',
  'Scale':'Support iConnections'
};
const SCOPES     = 'Files.Read Files.Read.All offline_access';
const REDIRECT   = 'https://rahulsetya.github.io/cs-renewal-dashboard/';

const VALID_OWNERS=new Set(['Support iConnections','Lucy Garber','Joe Romanoff','Christina Chumak','Courtney Krieg','Helen Ramsay','Alex Cherecwich','Andreas Santikos','Juwan Pryce','Kristan Hester']);
let D=[], PREV={}, lastUpdated='', COL={};
let S={owner:'ALL',tab:'pipeline',sort:'total',drill:null,rsort:'rev'};

// ── OAUTH2 PKCE ───────────────────────────────────────────────────────────────
function b64url(buf){return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
async function genVerifier(){const a=new Uint8Array(32);crypto.getRandomValues(a);return b64url(a);}
async function genChallenge(v){return b64url(await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v)));}

async function startLogin(){
  sessionStorage.clear();
  const v=await genVerifier(), c=await genChallenge(v);
  sessionStorage.setItem('pkce_v',v);
  const p=new URLSearchParams({client_id:CLIENT_ID,response_type:'code',redirect_uri:REDIRECT,scope:SCOPES,code_challenge:c,code_challenge_method:'S256',response_mode:'fragment',prompt:'select_account'});
  location.href=`https://login.microsoftonline.com/${TENANT}/oauth2/v2.0/authorize?${p}`;
}

async function exchangeCode(code){
  const body=new URLSearchParams({client_id:CLIENT_ID,grant_type:'authorization_code',code,redirect_uri:REDIRECT,code_verifier:sessionStorage.getItem('pkce_v'),scope:SCOPES});
  const r=await fetch(`https://login.microsoftonline.com/${TENANT}/oauth2/v2.0/token`,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
  const j=await r.json();
  if(j.error)throw new Error(j.error_description||j.error);
  return j;
}

function saveTokens(t){
  sessionStorage.setItem('at',t.access_token);
  if(t.refresh_token)sessionStorage.setItem('rt',t.refresh_token);
  sessionStorage.setItem('exp',Date.now()+((t.expires_in||3600)*1000));
}

async function getToken(){
  const exp=parseInt(sessionStorage.getItem('exp')||'0'), at=sessionStorage.getItem('at');
  if(at&&Date.now()<exp-60000)return at;
  const rt=sessionStorage.getItem('rt');
  if(rt){
    try{
      const body=new URLSearchParams({client_id:CLIENT_ID,grant_type:'refresh_token',refresh_token:rt,scope:SCOPES});
      const r=await fetch(`https://login.microsoftonline.com/${TENANT}/oauth2/v2.0/token`,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
      const j=await r.json();
      if(!j.error){saveTokens(j);return j.access_token;}
    }catch(e){}
  }
  throw new Error('login_required');
}

// ── GRAPH API ─────────────────────────────────────────────────────────────────
async function findFileId(token){
  // Try sharedWithMe — search by name
  try{
    const r=await fetch('https://graph.microsoft.com/v1.0/me/drive/sharedWithMe',{headers:{Authorization:`Bearer ${token}`}});
    const j=await r.json();
    if(j.value&&j.value.length){
      const f=j.value.find(f=>(f.name&&f.name.toLowerCase().includes('2026 renewal master'))||(f.remoteItem&&f.remoteItem.name&&f.remoteItem.name.toLowerCase().includes('2026 renewal master')));
      if(f){const ri=f.remoteItem||f;return{driveId:ri.parentReference?.driveId,itemId:ri.id};}
      // Also try matching by ID
      const f2=j.value.find(f=>f.id===FILE_ID||(f.remoteItem&&f.remoteItem.id===FILE_ID));
      if(f2){const ri=f2.remoteItem||f2;return{driveId:ri.parentReference?.driveId,itemId:ri.id};}
    }
  }catch(e){}
  // Try drive search
  try{
    const r2=await fetch(`https://graph.microsoft.com/v1.0/me/drive/search(q='2026 renewal master')`,{headers:{Authorization:`Bearer ${token}`}});
    const j2=await r2.json();
    if(j2.value&&j2.value.length){
      const f=j2.value.find(f=>f.name&&f.name.toLowerCase().includes('2026 renewal master'));
      if(f)return{driveId:f.parentReference?.driveId,itemId:f.id};
    }
  }catch(e){}
  // Try accessing via the owner's drive path directly
  try{
    const r3=await fetch(`https://graph.microsoft.com/v1.0/users/${FILE_OWNER}/drive/items/${FILE_ID}`,{headers:{Authorization:`Bearer ${token}`}});
    if(r3.ok){
      const j3=await r3.json();
      return{driveId:j3.parentReference?.driveId,itemId:j3.id};
    }
  }catch(e){}
  throw new Error('Could not find "2026 Renewal Master" file. Please ask cgoggil to re-share it with rsetya@iconnections.io');
}

async function fetchSheet(token){
  const enc=encodeURIComponent(SHEET), errors=[];

  // Helper — tries to fetch the sheet from a given drive+item combo
  async function tryWorkbook(driveId, itemId){
    // Fetch rows 14 to 600 only (header + data, avoids full usedRange timeout)
    const base=`https://graph.microsoft.com/v1.0/drives/${driveId}/items/${itemId}`;
    // First try a named range / specific rows to avoid timeout
    const rangeAddr=encodeURIComponent(`A14:CB1035`);
    const r=await fetch(`${base}/workbook/worksheets/${enc}/range(address='${rangeAddr}')`,{headers:{Authorization:`Bearer ${token}`}});
    if(r.ok)return r.json();
    // Fall back to usedRange with valuesOnly
    const r2=await fetch(`${base}/workbook/worksheets/${enc}/usedRange(valuesOnly=true)`,{headers:{Authorization:`Bearer ${token}`}});
    if(r2.ok)return r2.json();
    const j=await r2.json().catch(()=>({}));
    throw new Error(`${r2.status} — ${j.error?.message||'unknown'}`);
  }

  // Attempt 1: me/drive
  try{
    const r=await fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${FILE_ID}`,{headers:{Authorization:`Bearer ${token}`}});
    if(r.ok){
      const item=await r.json();
      return await tryWorkbook(item.parentReference.driveId, FILE_ID);
    }
    const j=await r.json().catch(()=>({}));
    errors.push(`me/drive: ${r.status} — ${j.error?.message||'unknown'}`);
  }catch(e){errors.push(`me/drive: ${e.message}`);}

  // Attempt 2: via SharePoint personal site
  try{
    const siteRes=await fetch(`https://graph.microsoft.com/v1.0/sites/iconnections675-my.sharepoint.com:/personal/${FILE_OWNER}`,{headers:{Authorization:`Bearer ${token}`}});
    if(siteRes.ok){
      const site=await siteRes.json();
      const drivesRes=await fetch(`https://graph.microsoft.com/v1.0/sites/${site.id}/drives`,{headers:{Authorization:`Bearer ${token}`}});
      if(drivesRes.ok){
        const drives=await drivesRes.json();
        const drive=drives.value&&drives.value[0];
        if(drive){
          return await tryWorkbook(drive.id, FILE_ID);
        }
      }
    } else {
      const j=await siteRes.json().catch(()=>({}));
      errors.push(`site lookup: ${siteRes.status} — ${j.error?.message||'unknown'}`);
    }
  }catch(e){errors.push(`site drive: ${e.message}`);}

  // Attempt 3: sharedWithMe
  try{
    const {driveId,itemId}=await findFileId(token);
    return await tryWorkbook(driveId, itemId);
  }catch(e){errors.push(`shared: ${e.message}`);}

  throw new Error(errors.join('<br>'));
}

// ── ENGAGEMENT FETCH ──────────────────────────────────────────────────────────
async function fetchEngSheet(token, sheetName){
  const enc=encodeURIComponent(sheetName);
  const urls=[`https://graph.microsoft.com/v1.0/me/drive/items/${ENG_FILE_ID}/workbook/worksheets/${enc}/usedRange(valuesOnly=true)`];
  try{
    const r=await fetch('https://graph.microsoft.com/v1.0/me/drive/sharedWithMe',{headers:{Authorization:`Bearer ${token}`}});
    const j=await r.json();
    if(j.value){
      const f=j.value.find(f=>(f.remoteItem?.id===ENG_FILE_ID||f.id===ENG_FILE_ID));
      if(f){const ri=f.remoteItem||f;urls.unshift(`https://graph.microsoft.com/v1.0/drives/${ri.parentReference?.driveId}/items/${ri.id}/workbook/worksheets/${enc}/usedRange(valuesOnly=true)`);}
    }
  }catch(e){}
  for(const url of urls){
    try{const r=await fetch(url,{headers:{Authorization:`Bearer ${token}`}});if(r.ok)return r.json();}catch(e){}
  }
  return null;
}

async function fetchAllEngagement(token){
  const engMap={};
  for(const [sheet,owner] of Object.entries(ENG_SHEETS)){
    try{
      const data=await fetchEngSheet(token,sheet);
      if(!data||!data.values||data.values.length<3)continue;
      const headers=data.values[1].map(h=>String(h||'').trim());
      const colIdx={};headers.forEach((h,i)=>colIdx[h]=i);
      function gc(row,name){const i=colIdx[name];return i!==undefined?row[i]:'';}
      for(let i=2;i<data.values.length;i++){
        const row=data.values[i];
        const acct=String(gc(row,'Account Name')||'').trim();
        if(!acct)continue;
        const yesNo=v=>String(v||'').toLowerCase().startsWith('y')?1:0;
        engMap[acct]={ro:owner,out:yesNo(gc(row,'Outreach Sent?')),gms:yesNo(gc(row,'GM Scheduled?')),gm:yesNo(gc(row,'GM Completed?')),ap:yesNo(gc(row,'AP Delivered?')),rsk:yesNo(gc(row,'Risk?')),mt:parseNum(gc(row,'Miami Mtgs')),sentiment:String(gc(row,'Sentiment')||'')};
      }
    }catch(e){console.warn(`Failed to fetch sheet ${sheet}:`,e);}
  }
  return engMap;
}

// ── DATA HELPERS ──────────────────────────────────────────────────────────────
function fm(n){return n>=1e6?'$'+(n/1e6).toFixed(2)+'M':n>=1000?'$'+(n/1000).toFixed(0)+'K':'$'+Math.round(n);}
function gf(){return S.owner==='ALL'?D:D.filter(d=>d.ro===S.owner);}
function pct(a,b){return b>0?Math.round(a/b*100):0;}
function parseNum(v){return parseFloat(String(v||0).replace(/[$,]/g,''))||0;}
function excelDateToJS(v){
  if(!v)return'';
  const n=parseFloat(v);
  if(isNaN(n)||n<1000)return String(v);
  return new Date((n-25569)*86400*1000).toISOString().split('T')[0];
}
function daysDiff(v){if(!v)return 0;const d=new Date(v);return isNaN(d)?0:Math.round((d-new Date())/864e5);}

const ST=['1. Uncontacted','2. Proposal Made','3. Contacted Attempting Again','4. Contacted Follow-up Needed','5. Contacted No Interest','6. Signature Requested','7. Paid','8. Closed Lost (Not Renewing)','9. Invoice Sent','10. Signed'];
const SH={'1. Uncontacted':'1. Uncontacted','2. Proposal Made':'2. Proposal Made','3. Contacted Attempting Again':'3. Attempting Again','4. Contacted Follow-up Needed':'4. Follow-up Needed','5. Contacted No Interest':'5. No Interest','6. Signature Requested':'6. Sig Requested','7. Paid':'7. Paid','8. Closed Lost (Not Renewing)':'8. Closed Lost','9. Invoice Sent':'9. Invoice Sent','10. Signed':'10. Signed'};
const CL={'1. Uncontacted':'#94a3b8','2. Proposal Made':'#a78bfa','3. Contacted Attempting Again':'#fb923c','4. Contacted Follow-up Needed':'#fbbf24','5. Contacted No Interest':'#f87171','6. Signature Requested':'#60a5fa','7. Paid':'#10b981','8. Closed Lost (Not Renewing)':'#ef4444','9. Invoice Sent':'#22d3ee','10. Signed':'#34d399'};
const SIG_L={ue:'Uncontacted Expiring',en:'Expiring No Offer',co:'No Outreach Tracked',pp:'Proposal No Price',se:'Sig Req Expiring',nm:'No Meetings',rf:'Risk Flagged',hr:'High Rev No Engagement',wb:'Win-Back'};
const SIG_C={ue:'b-red',en:'b-red',co:'b-orange',pp:'b-purple',se:'b-yellow',nm:'b-orange',rf:'b-red',hr:'b-red',wb:'b-blue'};
const MO=['2026-01','2026-02','2026-03','2026-04','2026-05','2026-06','2026-07','2026-08','2026-09','2026-10','2026-11','2026-12'];
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const WOW_ICONS={up:'▲',down:'▼',won:'★',lost:'✖',new:'●',same:''};
const WOW_COLORS={up:'#34d399',down:'#ef4444',won:'#34d399',lost:'#ef4444',new:'#60a5fa',same:'#334155'};
const WOW_LABELS={up:'Moved Up',down:'Moved Down',won:'New Won',lost:'New Lost',new:'New',same:'No Change'};

function computeSignals(row){
  const sg=[],{dy,r25,o,s,mt,rsk}=row;
  if(s==='1. Uncontacted'&&dy>0&&dy<=90)sg.push('ue');
  if((s==='4. Contacted Follow-up Needed'||s==='3. Contacted Attempting Again')&&o===0)sg.push('en');
  if(mt===0&&s!=='1. Uncontacted')sg.push('co');
  if(s==='2. Proposal Made'&&o===0)sg.push('pp');
  if(s==='6. Signature Requested'&&dy>=0&&dy<=60)sg.push('se');
  if(mt===0)sg.push('nm');
  if(rsk)sg.push('rf');
  if(r25>=50000&&mt===0)sg.push('hr');
  if(s==='8. Closed Lost (Not Renewing)')sg.push('wb');
  return[...new Set(sg)];
}

function getWow(d){
  const ps=PREV[d.c];
  if(!ps)return'new';
  const pi=ST.indexOf(ps),ci=ST.indexOf(d.s);
  if(pi<0||ci<0)return'same';
  if(d.s==='8. Closed Lost (Not Renewing)'&&ps!=='8. Closed Lost (Not Renewing)')return'lost';
  if((d.s==='7. Signed'||d.s==='9. Invoice Sent')&&ps!=='7. Signed'&&ps!=='9. Invoice Sent')return'won';
  if(ci>pi)return'up';if(ci<pi)return'down';return'same';
}

function processData(range, engMap={}){
  const rows=range.values;
  if(!rows||rows.length<=HEADER_ROW)throw new Error('Sheet appears empty or headers not at row '+(HEADER_ROW+1));
  const headers=rows[HEADER_ROW].map(h=>String(h||'').trim());
  COL={};headers.forEach((h,i)=>COL[h]=i);
  function g(v,name){const i=COL[name];return i!==undefined?v[i]:undefined;}
  const data=[],prevMap={};
  for(let i=HEADER_ROW+1;i<rows.length;i++){
    const v=rows[i];
    const company=String(g(v,'Platform Company Name')||g(v,'Contact')||g(v,'Company Name')||'').trim();
    if(!company)continue;
    const rawStage=String(g(v,'Stage')||'').trim();
    const stage=ST.includes(rawStage)?rawStage:'1. Uncontacted';
    if(!ST.includes(rawStage)&&rawStage)console.warn(`Unknown stage: "${rawStage}" for: "${company}"`);
    const r25=parseNum(g(v,'2025 Total Revenue'));
    const r24=parseNum(g(v,'2024 Total Revenue'));
    const offer=parseNum(g(v,'Offer Price - Total Contract Value'));
    const subEnd=excelDateToJS(g(v,'Final Sub End Date')||g(v,'Subcription End')||g(v,'Subscription End')||'');
    const dy=daysDiff(subEnd);
    const ro=String(g(v,'Renewal Owner ')||g(v,'Renewal Owner')||g(v,'Renewal Owner CS Rep')||'Support iConnections');
    if(!VALID_OWNERS.has(ro))continue;
    const or_=String(g(v,'ONSITE REP (iConn + Benchies)')||g(v,'Onsite Rep')||'N/A');
    const eng=engMap[company]||{};
    const mt=eng.mt||parseNum(g(v,'Count of Miami Schedules')||g(v,'Confirmed Miami Meetings'));
    const rsk=eng.rsk||(parseNum(g(v,'Emerging Manager Risk (AUM <250M & 1 GA Event in 2025)'))>0?1:0);
    const out=eng.out||0;
    const gm=eng.gm||0;
    const gms=eng.gms||0;
    const ap=eng.ap||0;
    const sentiment=eng.sentiment||'';
    const clr=String(g(v,'Notes / Closed Lost Reason')||'');
    const em=subEnd?subEnd.substring(0,7):'';
    const row={c:company,s:stage,ro,or:or_,o:offer,r25,r24,se:subEnd,dy,em,mt,rsk,out,gm,gms,ap,sentiment,ex:0,snt:0,clr,sg:[],ct:'Manager',wow:'same'};
    row.sg=computeSignals(row);
    data.push(row);
    prevMap[company]=stage;
  }
  if(!data.length){
    const preview=headers.slice(0,10).join(' | ');
    throw new Error(`No valid rows found.<br><br>First 10 headers:<br><small>${preview}</small>`);
  }
  PREV=prevMap;
  return data;
}

// ── MAIN FLOW ─────────────────────────────────────────────────────────────────
async function loadData(){
  showLoading('Loading pipeline data…');
  try{
    const token=await getToken();
    showLoading('Loading pipeline + engagement data…');
    const [range,engMap]=await Promise.all([fetchSheet(token),fetchAllEngagement(token)]);
    D=processData(range,engMap);
    lastUpdated='Updated '+new Date().toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});
    render();
  }catch(e){
    const msg=e.message||String(e);
    if(/login_required|interaction/i.test(msg))showLogin();
    else showError(msg+'<br><br><small>Make sure your account has access to both SharePoint files.</small>');
  }
}

async function refreshData(){await loadData();}
function ss(k,v){if(k==='owner'){S.owner=v;S.drill=null;}else if(k==='drill')S.drill=v||null;else S[k]=v;render();}

async function init(){
  const hash=new URLSearchParams(location.hash.replace('#',''));
  const code=hash.get('code');
  if(code){
    showLoading('Completing sign-in…');
    history.replaceState(null,'',location.pathname+location.search);
    try{const t=await exchangeCode(code);saveTokens(t);await loadData();}
    catch(e){showError(e.message||String(e));}
    return;
  }
  const at=sessionStorage.getItem('at'),exp=parseInt(sessionStorage.getItem('exp')||'0');
  if(at&&Date.now()<exp)await loadData();
  else showLogin();
}

  const tabs=[['pipeline','Pipeline'],['movement','Movement'],['timeline','Expiry Timeline'],['owners','Scoreboard'],['workload','Workload'],['crossref','Pipeline × Eng'],['concentration','Revenue Risk'],['risk','At Risk'],['winback','Win-Back'],['lostanalysis','Lost Analysis'],['accounts','Accounts']];

  tabs.forEach(([tid,lbl])=>{

    if(S.drill){

        da.forEach(a=>{
          const dl=a.o>0&&a.r25>0?(a.o-a.r25)/a.r25*100:-999;
          h+=`<tr class="dr"><td style="color:#e2e8f0;font-weight:500">${a.c}</td><td style="color:#94a3b8">${a.ro}</td>
            <td style="text-align:right;color:#fbbf24">${a.r25?fm(a.r25):'–'}</td>
            <td style="text-align:right;color:${a.o>0?'#22d3ee':'#334155'}">${a.o>0?fm(a.o):'–'}</td>
            <td style="text-align:right;font-size:11px;font-weight:600;color:${dl===-999?'#334155':dl>=0?'#34d399':'#ef4444'}">${dl===-999?'–':(dl>=0?'+':'')+Math.round(dl)+'%'}</td>

      }

    h+=`</div>`;
  }

  // ── MOVEMENT ──
  if(S.tab==='movement'){

    f.forEach(d=>{
      const w=getWow(d);
      if(w==='up')movedUp.push(d);
      if(w==='down')movedDown.push(d);
      if(w==='won')newWon.push(d);
      if(w==='lost')newLost.push(d);
      if(w==='same'&&['4. Contacted Follow-up Needed','3. Contacted Attempting Again','2. Proposal Made','6. Signature Requested'].includes(d.s))stuckDeals.push(d);
    });
    h+=`<div class="g g4" style="margin-bottom:16px">
      <div class="kpi" style="border-left:3px solid #34d399"><div class="kl">Progressed</div><div class="kv" style="color:#34d399">${movedUp.length+newWon.length}</div><div class="ks">${movedUp.length} moved up, ${newWon.length} won</div></div>

    const maxR=Math.max(...MO.map(m=>mo_data[m].r25),1);
    h+=`<div class="cd" style="padding:20px"><h3 style="margin:0 0 16px;font-size:15px;font-weight:600;color:#f8fafc">Active Accounts by Contract Expiry Month</h3>`;

    });
    h+=`</tbody></table></div>`;
  }

  // ── SCOREBOARD ──
  if(S.tab==='owners'){
    const om={};
    D.forEach(d=>{
      if(!om[d.ro])om[d.ro]={o:d.ro,tot:0,st:{},r25:0,off:0,won:0,lost:0,pipe:0,flags:0};
      om[d.ro].tot++;om[d.ro].st[d.s]=(om[d.ro].st[d.s]||0)+1;
      om[d.ro].r25+=d.r25;om[d.ro].off+=d.o;
      if(d.s==='7. Signed'||d.s==='9. Invoice Sent')om[d.ro].won++;

      if(d.s==='5. Proposal Made'||d.s==='6. Signature Requested')om[d.ro].pipe++;
      if(d.sg.length)om[d.ro].flags++;
    });
    const ot=Object.values(om);
    const sf={total:(a,b)=>b.tot-a.tot,won:(a,b)=>b.won-a.won,lost:(a,b)=>b.lost-a.lost,pipeline:(a,b)=>b.pipe-a.pipe,rev:(a,b)=>b.r25-a.r25,offer:(a,b)=>b.off-a.off,flags:(a,b)=>b.flags-a.flags};

    sorted.forEach(a=>{
      const dl=a.o>0&&a.r25>0?(a.o-a.r25)/a.r25*100:-999;
      h+=`<tr class="dr"><td style="color:#e2e8f0;font-weight:500">${a.c}</td><td><span style="color:${CL[a.s]};font-weight:600;font-size:11px">${SH[a.s]}</span></td><td style="color:#94a3b8">${a.or}</td><td style="color:#94a3b8">${a.ro}</td><td style="text-align:right;color:#fbbf24">${a.r25?fm(a.r25):'–'}</td><td style="text-align:right;color:${a.o>0?'#22d3ee':'#334155'}">${a.o>0?fm(a.o):'–'}</td><td style="text-align:right;font-size:11px;font-weight:600;color:${dl===-999?'#334155':dl>=0?'#34d399':'#ef4444'}">${dl===-999?'–':(dl>=0?'+':'')+Math.round(dl)+'%'}</td><td style="color:${a.dy>0&&a.dy<=90?'#ef4444':a.dy>0&&a.dy<=180?'#fbbf24':'#94a3b8'};font-size:11px">${a.se||'–'}</td><td>${a.sg.map(s=>`<span class="badge ${SIG_C[s]}">${SIG_L[s]}</span>`).join('')}</td></tr>`;
    });
    h+=`</tbody></table></div></div>`;
  }

  document.getElementById('app').innerHTML=h;
}

init();
</script>
</body>
</html>
