// ── PAYOUT ──────────────────────────────────────────
let selPayQ="Q2";
function rPayout(){
  const el=document.getElementById('tab-payout');const spRet=SP.logos>0?(SP.won/SP.logos)*100:0;
  const selPQ=selPayQ||"Q2";

  function pr(c,gp){
    const pool=gp?(c.seg==="Scale"?"Scale":c.seg==="Strategic"?"Strategic":"Enterprise"):"SP";
    const isSP=!gp;
    const t=isSP?SP_T:GP_T;
    let retR=0;
    if(gp){const d=GRR[selPQ][pool];retR=d&&d.logos>0?(d.won/d.logos)*100:0}else{retR=spRet}
    const rp=retPayout(retR,selPQ,isSP);
    // Activity: read from CADENCE_DATA for this CSM + quarter
    const _cd=CADENCE_DATA;
    const _cData=(_cd&&_cd.csm&&_cd.csm[c.n])||{total:0,months:{}};
    const _qmLc={Q1:['jan','feb','mar'],Q2:['apr','may','jun'],Q3:['jul','aug','sep'],Q4:['oct','nov','dec']};
    const _vCols=(_cd&&_cd.cols||[]).filter(function(col){return(_qmLc[selPQ]||[]).some(function(m){return col.toLowerCase().includes(m);});});
    const _tot=Math.max(_cData.total||0,1);
    const _qTot=_vCols.reduce(function(s,m){return s+((_cData.months&&_cData.months[m]&&_cData.months[m].yes)||0);},0);
    const cadPct=_vCols.length>0?Math.min(_qTot/_tot*100,100):null;
    const cadAvail=cadPct!==null;
    const ap=actPayout(cadAvail?cadPct:null,selPQ);
    const tp=cadAvail?totalPayout(cadPct,retR,selPQ,isSP):{totalPct:null};
    const retC=rp.pct>=100?'var(--green)':rp.pct>0?'var(--amber)':'var(--red)';
    const actC=!cadAvail?'var(--dim)':ap.gate?'var(--red)':ap.pct>=100?'var(--green)':ap.pct>0?'var(--amber)':'var(--red)';
    const totC=tp.totalPct==null?'var(--dim)':tp.gated?'var(--red)':tp.totalPct>=100?'var(--green)':tp.totalPct>0?'var(--amber)':'var(--red)';
    return`<tr>
      <td style="font-weight:500">${c.n}<div style="font-size:10px;color:var(--dim)">${pool}${c.pod?' · '+c.pod:''}</div></td>
      <td style="text-align:center">${selPQ==="Q1"?'<span style="color:var(--green);font-weight:600;font-size:11px">CLOSED</span>':cadAvail?`<span class="mono" style="color:${actC};font-weight:600">${pct(cadPct)}</span>`:'<span class="pill" style="color:var(--dim)">— awaiting data</span>'}</td>
      <td style="text-align:center">${selPQ==="Q1"?'<span style="color:var(--green);font-weight:600;font-size:11px">CLOSED</span>':`<span class="mono" style="color:${retC};font-weight:600">${pct(retR)}</span>`}</td>
      <td style="text-align:center">${selPQ==="Q1"?'<span style="color:var(--green);font-weight:600;font-size:11px">100%</span>':`<span class="mono" style="color:${retC};font-weight:600">${rp.pct.toFixed(0)}%</span>`}</td>
      <td style="text-align:center"><span class="pill" style="color:${rp.pct>=100?'var(--green)':rp.pct>0?'var(--amber)':'var(--red)'};font-size:10px">${rp.tier}</span></td>
      <td style="text-align:center">${selPQ==="Q1"?'<span style="color:var(--green);font-weight:600;font-size:11px">100%</span>':tp.totalPct!=null?`<span class="mono" style="color:${totC};font-weight:600">${tp.totalPct.toFixed(0)}%${tp.gated?'<span style="font-size:9px;display:block;color:var(--red)">GATED</span>':''}</span>`:'<span class="pill" style="color:var(--dim);font-size:10px">Pending</span>'}</td>
    </tr>`}

  const thd=`<thead><tr><th style="text-align:left">CSM</th><th style="text-align:center">Activity<br><span style="font-weight:400;text-transform:none;letter-spacing:0">cadence %</span></th><th style="text-align:center">Retention<br><span style="font-weight:400;text-transform:none;letter-spacing:0">pool %</span></th><th style="text-align:center">Ret. Payout<br><span style="font-weight:400;text-transform:none;letter-spacing:0">% of component</span></th><th style="text-align:center">Ret. Tier</th><th style="text-align:center">Combined<br><span style="font-weight:400;text-transform:none;letter-spacing:0">% of variable</span></th></tr></thead>`;

  // Payout curve data for chart
  const curveT=GP_T[selPQ]||GP_T.Q2;

  el.innerHTML=`
    <div style="margin-bottom:18px">${["Q1","Q2","Q3","Q4"].map(qq=>`<button class="qbtn ${qq===selPQ?'active':''}" onclick="selPayQ='${qq}';rT('payout')">${qq}${qq==="Q1"?" (Closed)":""}</button>`).join('')}</div>

    <div class="card"><h3>Comp Model — ${selPQ} 2026</h3><div class="sh">87% base / 13% variable · 50% activity + 50% retention · Both components weighted equally</div>
      <div class="grid3" style="margin-top:14px">
        <div class="info-box"><div class="title" style="color:var(--accent)">Activity Gate · 50%</div><div class="desc">
          Cadence floor: <strong style="color:var(--text)">${ACT_FLOOR[selPQ]?ACT_FLOOR[selPQ]+'%':'CLOSED'}</strong>${ACT_FLOOR[selPQ]?` (ramping: Q2 50% → Q3 65% → Q4 75%)`:''}<br>
          Below floor → <span style="color:var(--red)">both components zero</span><br>
          Above floor → linear 0→100% of activity component
        </div></div>
        <div class="info-box"><div class="title" style="color:var(--green)">Retention Payout · 50%</div><div class="desc">
          Floor: <strong style="color:var(--text)">${curveT.floor||'—'}%</strong> → 0% payout (gate)<br>
          Full: <strong style="color:var(--text)">${curveT.full||'—'}%</strong> → 100% payout<br>
          Accel: <strong style="color:var(--text)">${curveT.accel||'—'}%</strong> → 125% cap<br>
          <span style="color:var(--muted)">Linear interpolation between tiers</span>
        </div></div>
        <div class="info-box"><div class="title" style="color:var(--rose)">Hybrid Gate</div><div class="desc">
          Activity floor is a <strong style="color:var(--text)">hard gate</strong><br>
          Miss activity floor → $0 on <em>both</em> components<br>
          Hit activity floor → each component pays independently<br>
          <span style="color:var(--amber)">This protects against "no meetings, lucky retention"</span>
        </div></div>
      </div>
    </div>

    ${selPQ!=="Q1"&&curveT.floor?`<div class="card"><h3>Retention Payout Curve — ${selPQ}</h3><div class="sh">Shows payout % of retention component by logo retention achieved</div><div class="chart-wrap" style="height:220px"><canvas id="cPayout"></canvas></div></div>`:''}

    <div class="card" style="overflow-x:auto"><h3>GP Variable Comp Projection — ${selPQ}</h3><div class="sh">${selPQ==="Q1"?'Q1 is CLOSED — all components pay 100%':'Activity data pending · Retention based on current pool performance'}</div><table>${thd}<tbody>${CSM.filter(c=>c.t==="GP").map(c=>pr(c,true)).join('')}</tbody></table></div>
    <div class="card" style="overflow-x:auto"><h3>SP Variable Comp Projection — ${selPQ}</h3><div class="sh">SP pool goaled separately · ${selPQ}: ${SP_T[selPQ]?.floor||'—'}% floor / ${SP_T[selPQ]?.full||'—'}% full / ${SP_T[selPQ]?.accel||'—'}%+ accel</div><table>${thd}<tbody>${CSM.filter(c=>c.t==="SP").map(c=>pr(c,false)).join('')}</tbody></table></div>
    <div class="callout"><strong>Note on 4-state model:</strong> Retention % for comp uses <strong>confirmed churn only</strong> (${gLo} GP accounts) — not the ${gDe} declined-early accounts. Pool-level retention rates are significantly higher than the prior 3-state model showed.</div>`;

  // Draw payout curve chart
  if(selPQ!=="Q1"&&curveT.floor){
    const pts=[];
    for(let r=Math.max(0,curveT.floor-5);r<=Math.min(100,curveT.accel+5);r+=0.5){
      const rp=retPayout(r,selPQ,false);
      pts.push({x:r,y:rp.pct});
    }
    mc('cPayout',{type:'line',data:{datasets:[{
      data:pts,borderColor:'#10b981',borderWidth:2.5,pointRadius:0,fill:{target:'origin',above:'rgba(16,185,129,.1)'},tension:0
    }]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},datalabels:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.x.toFixed(1)}% retention → ${ctx.parsed.y.toFixed(0)}% payout`}}},scales:{
      x:{type:'linear',title:{display:true,text:'Logo Retention %',color:cD.t,font:{size:11}},grid:{color:cD.g},ticks:{color:cD.t,callback:v=>v+'%'},min:pts[0].x,max:pts[pts.length-1].x},
      y:{title:{display:true,text:'Payout % of Retention Component',color:cD.t,font:{size:11}},grid:{color:cD.g},ticks:{color:cD.t,callback:v=>v+'%'},min:0,max:140,
        afterDataLimits:function(scale){
          // Add reference lines as annotations via plugin
        }
      }
    },annotation:{annotations:{
      floorLine:{type:'line',xMin:curveT.floor,xMax:curveT.floor,borderColor:'var(--amber)',borderWidth:1,borderDash:[4,4],label:{display:true,content:'Floor '+curveT.floor+'%',position:'start',color:cD.t,font:{size:10}}},
      fullLine:{type:'line',xMin:curveT.full,xMax:curveT.full,borderColor:'var(--green)',borderWidth:1,borderDash:[4,4],label:{display:true,content:'Full '+curveT.full+'%',position:'start',color:cD.t,font:{size:10}}},
      accelLine:{type:'line',xMin:curveT.accel,xMax:curveT.accel,borderColor:'var(--cyan)',borderWidth:1,borderDash:[4,4],label:{display:true,content:'Accel '+curveT.accel+'%',position:'start',color:cD.t,font:{size:10}}},
      capLine:{type:'line',yMin:125,yMax:125,borderColor:'var(--red)',borderWidth:1,borderDash:[6,3],label:{display:true,content:'125% cap',position:'end',color:cD.t,font:{size:10}}}
    }}}});
  }
}

// ── TARGETS ─────────────────────────────────────────
function rTargets(){
  const el=document.getElementById('tab-targets');
  const periods=[{k:"Q2",l:"Q2 2026 (Apr–Jun)"},{k:"Q3",l:"Q3 2026 (Jul–Sep)"},{k:"Q4",l:"Q4 2026 (Oct–Dec)"}];
  function ed(title,tgts,pfx){
    return`<div class="card"><h3>${title}</h3><div class="sh">Q1 is CLOSED. Adjust Q2+ below. Q2 = logo retention. Q3+ evolving to GRR.</div>${periods.map(p=>`<div class="target-row"><label>${p.l}</label>${["floor","full","accel"].map(f=>`<div class="fg"><span>${f==="floor"?"Floor":f==="full"?"Full":"Accel"}</span><input type="number" id="${pfx}_${p.k}_${f}" value="${tgts[p.k]?.[f]||''}" onchange="updateTargets('${pfx}')"><span class="pct">%</span></div>`).join('')}</div>`).join('')}</div>`}
  const qs=["Q1","Q2","Q3","Q4"];
  const _WS=['9. Invoice Sent','10. Paid'],_CS=['11. Churned'],_DS=['4a. Attempting again Q2'];
  let rows=qs.map(q=>{
    let tl=0,tw=0,tlo=0,tde=0;
    if(ACCTS&&ACCTS.length){
      ACCTS.filter(function(a){return a.qRM===q&&a.inRen;}).forEach(function(a){tl++;if(_WS.includes(a.stage))tw++;else if(_CS.includes(a.stage))tlo++;else if(_DS.includes(a.stage))tde++;});
    }else{
      ["Enterprise","Strategic","Scale"].forEach(p=>{tl+=GRR[q][p].logos;tw+=GRR[q][p].won;tlo+=GRR[q][p].lost;tde+=GRR[q][p].declined});
    }
    const ret=tl>0?(tw/tl)*100:0;const tgt=GP_T[q]?.full||63;
    const needed=Math.ceil(tl*tgt/100);const gap=needed-tw;
    return`<tr><td style="font-weight:500">${q} 2026${q==="Q1"?'<span style="font-size:10px;color:var(--green);margin-left:5px">CLOSED</span>':''}</td><td class="mono" style="text-align:right">${tl}</td><td class="mono" style="text-align:right;color:var(--green)">${tw}</td><td class="mono" style="text-align:right;color:var(--red)">${tlo}</td><td class="mono" style="text-align:right;color:var(--orange)">${tde}</td><td class="mono" style="text-align:right;color:${ret>=tgt?'var(--green)':'var(--amber)'}">${pct(ret)}</td><td class="mono" style="text-align:right;color:var(--muted)">${q==="Q1"?"CLOSED":tgt+"%"}</td><td class="mono" style="text-align:right;color:var(--muted)">${q==="Q1"?"—":needed}</td><td class="mono" style="text-align:right;color:${gap>0?'var(--red)':'var(--green)'}">${q==="Q1"?"—":gap>0?"−"+gap:"+"+Math.abs(gap)}</td></tr>`}).join('');
  const spRet=SP.logos>0?(SP.won/SP.logos)*100:0;const spTgt=SP_T.Q2?.full||55;const spNeed=Math.ceil(SP.logos*spTgt/100);const spGap=spNeed-SP.won;
  el.innerHTML=`
    <div class="grid2"><div>${ed("GP Retention Targets",GP_T,"gp")}</div><div>${ed("SP Retention Targets",SP_T,"sp")}</div></div>
    <div class="card" style="overflow-x:auto"><h3>GP Quarterly Logo Retention Modeling</h3><div class="sh">Logos up for renewal — 4-state breakdown with gap analysis</div>
      <table><thead><tr><th style="text-align:left">Period</th><th style="text-align:right">Logos Up</th><th style="text-align:right">Won</th><th style="text-align:right">Churned</th><th style="text-align:right">Declined Early</th><th style="text-align:right">Current</th><th style="text-align:right">Target</th><th style="text-align:right">Logos Needed</th><th style="text-align:right">Gap</th></tr></thead><tbody>${rows}</tbody></table></div>
    <div class="card"><h3>SP Retention Modeling</h3><div class="sh">SP annual renewal pool — logo-based</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:14px">${[{l:"Total Logos",v:SP.logos,c:"var(--text)"},{l:"Current Ret.",v:pct(spRet),c:spRet>=spTgt?"var(--green)":"var(--amber)"},{l:"Target",v:spTgt+"%",c:"var(--muted)"},{l:"Logos Needed",v:spNeed,c:"var(--muted)"},{l:"Gap",v:spGap>0?"−"+spGap:"+"+Math.abs(spGap),c:spGap>0?"var(--red)":"var(--green)"}].map(x=>`<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 16px;text-align:center;min-width:90px;flex:1"><div style="font-size:10px;color:var(--dim);text-transform:uppercase;margin-bottom:3px">${x.l}</div><div style="font-size:18px;font-weight:700;color:${x.c};font-family:var(--mono)">${x.v}</div></div>`).join('')}</div></div>`}

// Wire editable targets to recalculate
function updateTargets(pfx){
  const tgts=pfx==='gp'?GP_T:SP_T;
  ["Q2","Q3","Q4"].forEach(q=>{
    ["floor","full","accel"].forEach(f=>{
      const inp=document.getElementById(pfx+'_'+q+'_'+f);
      if(inp&&inp.value)tgts[q][f]=parseFloat(inp.value);
    });
  });
  // Re-render targets tab and any other open tab
  rTargets();
}

// ── RISK REGISTER ──────────────────────────────────
function rRisk(){
  const el=document.getElementById('tab-risk');
  // Build consolidated risk list from GP (churned accounts) + SP at-risk
  const gpAtRisk=[];
  ["Q2","Q3","Q4"].forEach(q=>{
    ["Enterprise","Strategic","Scale"].forEach(pool=>{
      const d=GRR[q][pool];
      if(d.declined>0){
        gpAtRisk.push({type:'GP',pool,q,status:'Declined Early',count:d.declined,rev:d.rd||0});
      }
    });
  });
  
  const tDe=gpAtRisk.reduce((s,a)=>s+a.count,0);
  const gRD=gpAtRisk.reduce((s,a)=>s+(a.rev||0),0);

  el.innerHTML=`

    h+='</div>';
    // KPIs with deltas
    h+='<div style="display:flex;gap:12px;flex-wrap:wrap;flex:1;align-items:center;cursor:pointer" onclick="window._rchSt.open['+i+']=!window._rchSt.open['+i+'];rRCHistory()">';
    h+='<div style="font-size:11px;text-align:center"><div style="color:var(--dim);font-size:10px">Logos</div><strong style="color:var(--text)">'+gs.logos+dB(gs.logos,cmpGs?cmpGs.logos:null,false)+'</strong></div>';
    h+='<div style="font-size:11px;text-align:center"><div style="color:var(--dim);font-size:10px">Won</div><strong style="color:var(--green)">'+gs.won+dB(gs.won,cmpGs?cmpGs.won:null,false)+'</strong></div>';
    h+='<div style="font-size:11px;text-align:center"><div style="color:var(--dim);font-size:10px">Churned</div><strong style="color:var(--red)">'+gs.lost+dB(gs.lost,cmpGs?cmpGs.lost:null,true)+'</strong></div>';
    h+='<div style="font-size:11px;text-align:center"><div style="color:var(--dim);font-size:10px">Declined Early</div><strong style="color:var(--orange)">'+gs.declined+dB(gs.declined,cmpGs?cmpGs.declined:null,true)+'</strong></div>';
    h+='<div style="font-size:11px;text-align:center"><div style="color:var(--dim);font-size:10px">Logo Ret.</div><strong style="color:var(--amber)">'+(gs.lr!=null?gs.lr+'%':'—')+(gs.lr!=null&&cmpGs?dB(gs.lr,cmpGs.lr!=null?cmpGs.lr:null,false):'')+'</strong></div>';
    h+='<div style="font-size:11px;text-align:center"><div style="color:var(--dim);font-size:10px">Cad. Calls</div><strong style="color:var(--accent)">'+ct+dB(ct,cmpCt!=null?cmpCt:null,false)+'</strong></div>';
    h+='</div>';
    // Compare vs dropdown
    if(history.length>1){
      h+='<div style="display:flex;align-items:center;gap:5px;flex-shrink:0">';
      h+='<span style="font-size:10px;color:var(--dim)">vs</span>';
      h+='<select onclick="event.stopPropagation()" onchange="window._rchSt.compare['+i+']=parseInt(this.value);rRCHistory()" style="background:var(--bg);border:1px solid var(--borderL);color:var(--dim);font-size:10px;padding:2px 6px;border-radius:4px;font-family:inherit;cursor:pointer">';
      h+='<option value="-1" '+(cmpIdx===-1?'selected':'')+'>None</option>';
      history.forEach(function(s2,j){if(j!==i)h+='<option value="'+j+'" '+(cmpIdx===j?'selected':'')+'>'+(s2.label||new Date(s2.ts).toLocaleString())+'</option>';});
      h+='</select></div>';
    }
    h+='<span style="color:var(--dim);font-size:13px;cursor:pointer;flex-shrink:0" onclick="window._rchSt.open['+i+']=!window._rchSt.open['+i+'];rRCHistory()">'+(isOpen?'▾':'▸')+'</span>';
    h+='</div>';
    // Expanded detail
    if(isOpen){
      h+='<div style="padding:14px;background:rgba(0,0,0,.15);border-top:1px solid var(--border)">';
      // GP Retention table with delta columns
      h+='<div style="font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">GP Retention — all quarters'+(cmpLabel?' <span style="font-weight:400;text-transform:none;letter-spacing:0">('+cmpLabel+')</span>':'')+'</div>';
      h+='<div style="overflow-x:auto"><table style="border-collapse:collapse;width:100%;font-size:11px;min-width:500px">';
      h+='<thead><tr style="border-bottom:1px solid var(--border)"><th style="text-align:left;padding:4px 10px;color:var(--dim)">Pool</th>';
      qs.forEach(function(q){h+='<th colspan="4" style="text-align:center;padding:4px 8px;color:var(--dim);border-left:1px solid var(--border)">'+q+'</th>';});
      h+='</tr><tr style="border-bottom:1px solid var(--border)"><th></th>';
      qs.forEach(function(){h+='<th style="text-align:right;padding:3px 6px;font-size:10px;color:var(--dim);border-left:1px solid var(--border)">Logos</th><th style="text-align:right;padding:3px 6px;font-size:10px;color:var(--green)">Won</th><th style="text-align:right;padding:3px 6px;font-size:10px;color:var(--red)">Churn</th><th style="text-align:right;padding:3px 6px;font-size:10px;color:var(--orange)">Decl</th>';});
      h+='</tr></thead><tbody>';
      pools.forEach(function(p){
        h+='<tr style="border-top:1px solid rgba(255,255,255,.05)"><td style="padding:5px 10px;font-weight:500">'+p+'</td>';
        qs.forEach(function(q){
          const d=(snap.gpRetention&&snap.gpRetention[q]&&snap.gpRetention[q][p])||{};
          const od=cmpSnap?(cmpSnap.gpRetention&&cmpSnap.gpRetention[q]&&cmpSnap.gpRetention[q][p])||{}:null;
          h+='<td class="mono" style="text-align:right;padding:5px 6px;border-left:1px solid var(--border)">'+(d.logos||0)+(od?dB(d.logos||0,od.logos||0,false):'')+'</td>';
          h+='<td class="mono" style="text-align:right;padding:5px 6px;color:var(--green)">'+(d.won||0)+(od?dB(d.won||0,od.won||0,false):'')+'</td>';
          h+='<td class="mono" style="text-align:right;padding:5px 6px;color:var(--red)">'+(d.lost||0)+(od?dB(d.lost||0,od.lost||0,true):'')+'</td>';
          h+='<td class="mono" style="text-align:right;padding:5px 6px;color:var(--orange)">'+(d.declined||0)+(od?dB(d.declined||0,od.declined||0,true):'')+'</td>';
        });

      });
      h+='</tbody></table></div>';
      // Pool movement pills (when comparing) — clickable to show account sub-table
      if(cmpSnap){
        const mvs=[];

          const od=(cmpSnap.gpRetention&&cmpSnap.gpRetention[q]&&cmpSnap.gpRetention[q][p])||{};
          ['logos','won','lost','declined'].forEach(function(k){const diff=(d[k]||0)-(od[k]||0);if(diff!==0)mvs.push({q:q,p:p,k:k,diff:diff,cur:d[k]||0,prev:od[k]||0});});
        });});
        h+='<div style="margin-top:14px"><div style="font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Pool Changes — '+cmpLabel+' <span style="font-weight:400;text-transform:none;letter-spacing:0">· click to see moved accounts</span></div>';
        if(!mvs.length){
          h+='<div style="font-size:11px;color:var(--dim);padding:4px 0">No GP changes between these snapshots.</div>';
        }else{
          const kL={logos:'Logos',won:'Won',lost:'Churned',declined:'Declined Early'};
          // Each pill + its own inline diff panel (unique rid per metric)
          mvs.forEach(function(mv){
            const isInv=mv.k==='lost'||mv.k==='declined';
            const good=isInv?mv.diff<0:mv.diff>0;
            const rid='rchp_'+i+'_'+mv.q+'_'+mv.p.replace(/\s+/g,'')+'_'+mv.k;
            h+='<div style="margin-bottom:4px">';
            // Pill
            h+='<div style="display:inline-flex;align-items:center;padding:5px 10px;border-radius:6px;background:'+(good?'rgba(52,211,153,.08)':'rgba(239,68,68,.08)')+';border:1px solid '+(good?'rgba(52,211,153,.2)':'rgba(239,68,68,.2)')+';font-size:11px;cursor:pointer;user-select:none" onclick="(function(){var e=document.getElementById(\''+rid+'\');if(e)e.style.display=e.style.display===\'none\'?\'\':\'none\';})()">';
            h+='<span style="color:var(--dim)">'+mv.q+' '+mv.p+' '+kL[mv.k]+'</span>';
            h+='<span style="font-weight:700;color:'+(good?'var(--green)':'var(--red)')+';margin-left:6px">'+(mv.diff>0?'+':'')+mv.diff+'</span>';
            h+='<span style="font-size:10px;color:var(--dim);margin-left:4px">'+mv.prev+'→'+mv.cur+'</span>';
            h+='<span style="font-size:10px;color:var(--dim);margin-left:5px">▸</span>';
            h+='</div>';
            // Inline diff panel (hidden by default)
            h+='<div id="'+rid+'" style="display:none;margin-top:4px;padding:10px 12px;background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:6px">';
            const s1Accts=(snap.gpRetention&&snap.gpRetention[mv.q]&&snap.gpRetention[mv.q][mv.p]&&snap.gpRetention[mv.q][mv.p].accounts)||null;
            const s2Accts=(cmpSnap&&cmpSnap.gpRetention&&cmpSnap.gpRetention[mv.q]&&cmpSnap.gpRetention[mv.q][mv.p]&&cmpSnap.gpRetention[mv.q][mv.p].accounts)||null;
            if(s1Accts===null||s2Accts===null){
              h+='<div style="font-size:11px;color:var(--dim);font-style:italic">No account-level data in one or both snapshots. Save a new snapshot to enable account comparison.</div>';
            }else{
              // Build sets for diff
              const statusKey=mv.k==='lost'?'churned':mv.k==='declined'?'declined':mv.k==='won'?'won':null;
              var gained=[],lostAccts=[];
              if(statusKey){
                const s1Set=new Set(s1Accts.filter(function(a){return a.status===statusKey;}).map(function(a){return a.n;}));
                const s2Set=new Set(s2Accts.filter(function(a){return a.status===statusKey;}).map(function(a){return a.n;}));
                gained=s1Accts.filter(function(a){return a.status===statusKey&&!s2Set.has(a.n);});
                lostAccts=s2Accts.filter(function(a){return a.status===statusKey&&!s1Set.has(a.n);});
              }else{
                // logos: net new or removed accounts
                const s1Names=new Set(s1Accts.map(function(a){return a.n;}));
                const s2Names=new Set(s2Accts.map(function(a){return a.n;}));
                gained=s1Accts.filter(function(a){return!s2Names.has(a.n);});
                lostAccts=s2Accts.filter(function(a){return!s1Names.has(a.n);});
              }
              h+='<div style="font-size:11px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px dashed rgba(255,255,255,.08)"><span style="color:var(--green);font-weight:700">▲ '+gained.length+' gained</span> <span style="color:var(--dim);margin:0 4px">·</span> <span style="color:var(--red);font-weight:700">▼ '+lostAccts.length+' lost</span></div>';
              if(!gained.length&&!lostAccts.length){
                h+='<div style="font-size:11px;color:var(--dim);font-style:italic">Account names are unchanged — the count shift may reflect re-categorization without name changes.</div>';
              }else{
                const acctRow=function(a,color){
                  const fmt=function(n){return n>=1e6?'$'+(n/1e6).toFixed(1)+'M':n>=1e3?'$'+(n/1e3).toFixed(0)+'K':'$'+Math.round(n);};
                  return'<tr style="border-top:1px solid rgba(255,255,255,.05)"><td style="padding:3px 10px 3px 0;color:'+color+';font-weight:500">'+a.n+'</td><td style="padding:3px 10px;color:var(--dim)">'+( a.csRep||'—')+'</td><td style="padding:3px 10px;text-align:right;color:var(--dim)">'+( a.rev?fmt(a.rev):'—')+'</td></tr>';
                };
                h+='<table style="border-collapse:collapse;font-size:11px;width:100%"><thead><tr><th style="text-align:left;padding:3px 10px 3px 0;color:var(--dim)">Account</th><th style="text-align:left;padding:3px 10px;color:var(--dim)">CSM</th><th style="text-align:right;padding:3px 10px;color:var(--dim)">Rev</th></tr></thead><tbody>';
                if(gained.length){
                  h+='<tr><td colspan="3" style="padding:5px 0 2px;font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.5px">▲ Gained ('+gained.length+')</td></tr>';
                  gained.sort(function(a,b){return(b.rev||0)-(a.rev||0);}).forEach(function(a){h+=acctRow(a,'var(--green)');});
                }
                if(lostAccts.length){
                  h+='<tr><td colspan="3" style="padding:5px 0 2px;font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.5px">▼ Lost ('+lostAccts.length+')</td></tr>';
                  lostAccts.sort(function(a,b){return(b.rev||0)-(a.rev||0);}).forEach(function(a){h+=acctRow(a,'var(--red)');});
                }
                h+='</tbody></table>';
              }
            }
            h+='</div></div>';
          });
        }
        h+='</div>';
      }
      // Cadence table with deltas
      h+='<div style="font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px">Cadence — call counts per CSM'+(cmpSnap?' (Δ shown)':'')+'</div>';
      h+='<div style="overflow-x:auto"><table style="border-collapse:collapse;width:100%;font-size:11px">';
      h+='<thead><tr style="border-bottom:1px solid var(--border)"><th style="text-align:left;padding:4px 10px;color:var(--dim)">CSM</th><th style="text-align:right;padding:4px 8px;color:var(--dim)">Total</th>';
      cadMonths.forEach(function(m){h+='<th style="text-align:center;padding:4px 6px;color:var(--dim);white-space:nowrap;font-size:10px">'+m+'</th>';});
      h+='</tr></thead><tbody>';
      const cadEntries=Object.entries(snap.cadence||{}).sort(function(a,b){return a[0].localeCompare(b[0]);});
      if(cadEntries.length){
        cadEntries.forEach(function(entry){
          const csm=entry[0],d=entry[1];
          const od=cmpSnap&&cmpSnap.cadence&&cmpSnap.cadence[csm]?cmpSnap.cadence[csm]:null;
          h+='<tr style="border-top:1px solid rgba(255,255,255,.05)"><td style="padding:4px 10px;font-weight:500">'+csm+'</td>';
          h+='<td class="mono" style="text-align:right;padding:4px 8px;color:var(--dim)">'+(d.total||0)+(od?dB(d.total||0,od.total||0,false):'')+'</td>';
          cadMonths.forEach(function(m){
            const cnt=(d.months||{})[m]||0;
            const ocnt=od?(od.months||{})[m]||0:null;
            h+='<td class="mono" style="text-align:center;padding:4px 6px"><span style="color:'+(cnt>0?'var(--green)':'var(--dim)')+'">'+( cnt||'—')+'</span>';

            h+='</td>';
          });
          h+='</tr>';
        });
        // CSM cadence movement summary
        if(cmpSnap){
          const csmMvs=[];
          const allCsms=new Set(Object.keys(snap.cadence||{}).concat(Object.keys((cmpSnap&&cmpSnap.cadence)||{})));
          allCsms.forEach(function(csm){
            const ct1=Object.values(((snap.cadence&&snap.cadence[csm]&&snap.cadence[csm].months)||{})).reduce(function(s,v){return s+v;},0);
            const ct2=Object.values(((cmpSnap&&cmpSnap.cadence&&cmpSnap.cadence[csm]&&cmpSnap.cadence[csm].months)||{})).reduce(function(s,v){return s+v;},0);
            const diff=ct1-ct2;if(diff!==0)csmMvs.push({csm:csm,diff:diff,cur:ct1,prev:ct2});
          });
          if(csmMvs.length){
            csmMvs.sort(function(a,b){return Math.abs(b.diff)-Math.abs(a.diff);});
            h+='<tr><td colspan="'+(cadMonths.length+2)+'" style="padding:10px 10px 8px;border-top:1px solid var(--border)">';
            h+='<div style="font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">CSM Cadence Changes <span style="font-weight:400;text-transform:none;letter-spacing:0">· click to see month breakdown</span></div>';
            h+='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px">';
            csmMvs.forEach(function(mv){
              const csmRid='rcch_'+i+'_'+mv.csm.replace(/\W/g,'_');
              h+='<div style="padding:4px 8px;border-radius:5px;background:'+(mv.diff>0?'rgba(52,211,153,.08)':'rgba(239,68,68,.08)')+';border:1px solid '+(mv.diff>0?'rgba(52,211,153,.2)':'rgba(239,68,68,.2)')+';font-size:11px;cursor:pointer;user-select:none" onclick="(function(){var e=document.getElementById(\''+csmRid+'\');if(e)e.style.display=e.style.display===\'none\'?\'\':\'none\';})()">';
              h+='<span style="color:var(--dim)">'+mv.csm+'</span>';
              h+='<span style="font-weight:700;color:'+(mv.diff>0?'var(--green)':'var(--red)')+';margin-left:5px">'+(mv.diff>0?'+':'')+mv.diff+'</span>';
              h+='<span style="font-size:10px;color:var(--dim);margin-left:4px">('+mv.prev+'→'+mv.cur+')</span>';
              h+='<span style="font-size:10px;color:var(--dim);margin-left:5px">▸</span>';
              h+='</div>';
            });
            h+='</div>';
            // Hidden month breakdown panels
            csmMvs.forEach(function(mv){
              const csmRid='rcch_'+i+'_'+mv.csm.replace(/\W/g,'_');
              const d1=snap.cadence&&snap.cadence[mv.csm]?snap.cadence[mv.csm]:null;
              const d2=cmpSnap&&cmpSnap.cadence&&cmpSnap.cadence[mv.csm]?cmpSnap.cadence[mv.csm]:null;
              const allMs=Array.from(new Set(Object.keys((d1&&d1.months)||{}).concat(Object.keys((d2&&d2.months)||{})))).sort();
              h+='<div id="'+csmRid+'" style="display:none;margin-bottom:6px;padding:10px 12px;background:rgba(0,0,0,.25);border-radius:6px;border:1px solid var(--border)">';
              h+='<div style="font-size:11px;font-weight:600;color:var(--text);margin-bottom:8px">'+mv.csm+' — Month Breakdown</div>';
              h+='<table style="border-collapse:collapse;font-size:11px"><thead><tr>';
              h+='<th style="padding:3px 10px 3px 0;color:var(--dim);text-align:left">Month</th>';
              h+='<th style="padding:3px 10px;color:var(--dim);text-align:center">This Snap</th>';
              h+='<th style="padding:3px 10px;color:var(--dim);text-align:center">Prev Snap</th>';
              h+='<th style="padding:3px 10px;color:var(--dim);text-align:center">Δ</th>';
              h+='</tr></thead><tbody>';
              allMs.forEach(function(m){
                const c1=(d1&&d1.months&&d1.months[m])||0;
                const c2=(d2&&d2.months&&d2.months[m])||0;
                const diff=c1-c2;
                h+='<tr style="border-top:1px solid rgba(255,255,255,.05)">';
                h+='<td style="padding:3px 10px 3px 0;color:var(--dim)">'+m+'</td>';
                h+='<td style="padding:3px 10px;text-align:center;color:'+(c1>0?'var(--green)':'var(--dim)')+'">'+( c1||'—')+'</td>';
                h+='<td style="padding:3px 10px;text-align:center;color:'+(c2>0?'var(--green)':'var(--dim)')+'">'+( c2||'—')+'</td>';
                h+='<td style="padding:3px 10px;text-align:center;font-weight:700;color:'+(diff>0?'var(--green)':diff<0?'var(--red)':'var(--dim)')+'">'+( diff!==0?(diff>0?'+':'')+diff:'—')+'</td>';
                h+='</tr>';
              });
              h+='</tbody></table></div>';
            });
            h+='</td></tr>';
          }
        }
      }else{
        h+='<tr><td colspan="'+(cadMonths.length+2)+'" style="padding:8px 10px;color:var(--dim)">No cadence data in this snapshot.</td></tr>';
      }
      h+='</tbody></table></div></div>';
    }
    h+='</div>';
  });
  h+='</div></div>';
  el.innerHTML=h;
  _sfR();
}

// ── TOP 10s ─────────────────────────────────────────────
// Renders the "Top 10s" tab from the engagement tracker. Sortable by any
// column, filterable by CSM and by sub-end-date range, KPIs at top, notes

  for(const qk of['Q1','Q2','Q3','Q4']){
    const q=GPQ[qk];const _locked=_qSt(qk)==='closed';
    const pO=_locked?0:Math.round(q.o*ocR),pD=_locked?0:Math.round(q.d*dcR),qW=q.w+pO+pD;
    gcT+=q.t;gcW+=qW;const th=GP_TH[qk]||[0,0,0];const cR=gcT>0?gcW/gcT*100:0;
    const qR=q.t>0?qW/q.t*100:0;
    let pay=0;if(th[0]>0){if(cR<th[0])pay=0;else if(cR<=th[1])pay=(cR-th[0])/(th[1]-th[0])*100;else if(cR<=th[2])pay=100+(cR-th[1])/(th[2]-th[1])*25;else pay=125}
    let qPay=0;if(th[0]>0){if(qR<th[0])qPay=0;else if(qR<=th[1])qPay=(qR-th[0])/(th[1]-th[0])*100;else if(qR<=th[2])qPay=100+(qR-th[1])/(th[2]-th[1])*25;else qPay=125}
    gpL[qk]={...q,pO,pD,qW,qR,cT:gcT,cW:gcW,cR,th,pay,qPay,st:_qSt(qk)};
  }

  // SP Logos
  const spPO=Math.round(SPQ.o*scR),spTW=SPQ.w+spPO,spRet=SPQ.t>0?spTW/SPQ.t*100:0;
  const spPay={};
  for(const qk of['Q2','Q3','Q4']){const th=SP_TH[qk];let p=0;if(spRet<th[0])p=0;else if(spRet<=th[1])p=(spRet-th[0])/(th[1]-th[0])*100;else if(spRet<=th[2])p=100+(spRet-th[1])/(th[2]-th[1])*25;else p=125;spPay[qk]=p}

  // SP Logos per quarter (same cumulative-retention staircase shape as GP)
  const spL={};let scT=0,scW=0;
  for(const qk of['Q1','Q2','Q3','Q4']){
    const q=SPQ_Q[qk];const _locked=_qSt(qk)==='closed';
    const pO=_locked?0:Math.round(q.o*scR);const qW=q.w+pO;
    scT+=q.t;scW+=qW;const th=SP_TH[qk]||[0,0,0];const cR=scT>0?scW/scT*100:0;
    const qR=q.t>0?qW/q.t*100:0;
    let pay=0;if(th[0]>0){if(cR<th[0])pay=0;else if(cR<=th[1])pay=(cR-th[0])/(th[1]-th[0])*100;else if(cR<=th[2])pay=100+(cR-th[1])/(th[2]-th[1])*25;else pay=125}
    let qPay=0;if(th[0]>0){if(qR<th[0])qPay=0;else if(qR<=th[1])qPay=(qR-th[0])/(th[1]-th[0])*100;else if(qR<=th[2])qPay=100+(qR-th[1])/(th[2]-th[1])*25;else qPay=125}
    spL[qk]={...q,pO,qW,qR,cT:scT,cW:scW,cR,th,pay,qPay,st:_qSt(qk)};
  }

  // Total Logos
  const totL={};
  for(const qk of['Q1','Q2','Q3','Q4']){
    const g=gpL[qk];
    // SP doesn't have quarterly breakdown — distribute proportionally
    // For cumulative: through Q4, total = GP + SP
    totL[qk]={...g}; // quarterly cards show GP detail
  }

  // GP Revenue
  const gpR={};let gcB=0,gcE=0,gcRt=0;
  for(const qk of['Q1','Q2','Q3','Q4']){
    const qr=GPQR[qk];
    const wonRev=qr.wonOff;
    const openOffRev=qr.openWOff*ocR; // pipeline with offers
    const openNoOffBase=qr.openBase-(qr.openWOff>0?qr.openWOff/(RNRR.gp/100):0); // base of accounts without offers
    const openNoOffRev=openNoOffBase*ocR*ef;
    const declRev=qr.declBase*dcR*ef;
    const qExp=wonRev+openOffRev+openNoOffRev+declRev;
    const qRet=(wonRev/(RNRR.gp/100))+(qr.openBase*ocR)+(qr.declBase*dcR); // GRR: at 2025 price
    gcB+=qr.base;gcE+=qExp;gcRt+=qRet;
    gpR[qk]={base:qr.base,wonRev,openOffRev,openNoOffRev,declRev,qExp,qRet,
      qGrr:qr.base>0?qRet/qr.base*100:0,qNrr:qr.base>0?qExp/qr.base*100:0,
      cB:gcB,cE:gcE,cRt:gcRt,cGrr:gcB>0?gcRt/gcB*100:0,cNrr:gcB>0?gcE/gcB*100:0};
  }

  // SP Revenue
  const spWonRev=SP_REV.wonOffer;
  const spOpenRev=SP_REV.openMiami*scR; // use Miami rev as proxy, apply conv rate
  const spOpenEstRev=(SP_REV.openBase-SP_REV.openMiami)*scR*ef*0.8; // remainder
  const spTotExp=spWonRev+spOpenRev+spOpenEstRev;
  const spTotRet=SP_REV.wonBase*(RNRR.sp/100)+(SP_REV.openBase*scR); // SP GRR (RNRR.sp on won)
  const spGrr=SP_REV.base>0?spTotRet/SP_REV.base*100:0;
  const spNrr=SP_REV.base>0?spTotExp/SP_REV.base*100:0;
  const spRev={base:SP_REV.base,wonRev:spWonRev,openRev:spOpenRev+spOpenEstRev,totExp:spTotExp,totRet:spTotRet,grr:spGrr,nrr:spNrr};

  // Combined
  const allBase=GP.base+SP_REV.base;
  const allExp=gcE+spTotExp;
  const allRet=gcRt+spTotRet;
  const allGrr=allBase>0?allRet/allBase*100:0;
  const allNrr=allBase>0?allExp/allBase*100:0;
  const allLogos={won:GP.W+SP.W,total:GP.T+SP.T,ret:(GP.W+SP.W)/(GP.T+SP.T)*100,
    projWon:gcW+spTW,projRet:(gcW+spTW)/(GP.T+SP.T)*100};

  // GP Renewal NRR — computed live from won rows when wonBase is available
  // (live data path adds wonBase per-quarter to gpqr). Static GPQR fallback
  // omits wonBase, in which case we surface the hardcoded RNRR.gp benchmark.
  let gpRnrrLive=null;
  {
    let sumOff=0,sumBase=0,haveWB=true;
    for(const qk of['Q1','Q2','Q3','Q4']){const qr=GPQR[qk]||{};if(qr.wonBase==null)haveWB=false;sumOff+=qr.wonOff||0;sumBase+=qr.wonBase||0;}
    if(haveWB&&sumBase>0)gpRnrrLive=sumOff/sumBase*100;
  }

  return{gpL,gpR,spL,spRet,spPO:spPO,spTW,spPay,spRev,
    allBase,allExp,allRet,allGrr,allNrr,allLogos,gpRnrrLive,
    gpBase:GP.base,gpExp:gcE,gpRet:gcRt,gpGrr:gpR.Q4.cGrr,gpNrr:gpR.Q4.cNrr};
}

        h+=`<div class="qc" style="flex:1;font-size:11px;color:var(--dm);line-height:1.8">

        h+=`</div>`;
      }

    h+=`</div><div>${sidebar(m,seg)}</div></div>`;

  // ════ COMP PLAN ════
  if(S.tab==='comp'){
    h+=`<div class="ly"><div>`;
    h+=`<div class="cd"><div class="ct" style="color:var(--or);border-bottom-color:rgba(255,165,2,.12)">CS Variable Comp — Retention</div>

    // GP Table
    if(seg!=='sp'){
      h+=`<div style="font-size:13px;font-weight:700;color:var(--pu);margin-bottom:5px">GP (${GP.T} logos · ${$(GP.base)})</div>
        <table style="table-layout:fixed"><colgroup><col style="width:8%"><col style="width:10%"><col style="width:10%"><col style="width:10%"><col style="width:13%"><col style="width:12%"><col style="width:19%"><col style="width:18%"></colgroup><thead><tr><th style="text-align:left">Q</th><th style="text-align:right">Floor</th><th style="text-align:right">Full</th><th style="text-align:right">Accel</th><th style="text-align:right">Logo Ret</th><th style="text-align:right">Payout</th><th style="text-align:right">Cuml Rev</th><th style="text-align:right">Cuml NRR</th></tr></thead><tbody>
        <tr style="background:rgba(124,108,255,.03)"><td style="font-weight:600;color:var(--pu);text-align:left">Q1</td><td colspan="3" style="color:var(--mt);text-align:left">closed</td><td style="font-family:var(--M);text-align:right">${P(m.gpL.Q1.cR)}</td><td style="font-family:var(--M);font-weight:700;color:var(--pu);text-align:right">100%</td><td style="font-family:var(--M);color:var(--pk);text-align:right">${$(m.gpR.Q1.cE)}</td><td style="font-family:var(--M);color:${cl(m.gpR.Q1.cNrr,90)};text-align:right">${P(m.gpR.Q1.cNrr)}</td></tr>`;
      for(const qk of['Q2','Q3','Q4']){const q=m.gpL[qk],th=GP_TH[qk],r=m.gpR[qk];
        h+=`<tr><td style="font-weight:600;text-align:left">${qk}</td><td style="color:var(--rd);font-family:var(--M);text-align:right">${th[0]}%</td><td style="color:var(--gn);font-family:var(--M);text-align:right">${th[1]}%</td><td style="color:var(--pk);font-family:var(--M);text-align:right">${th[2]}%</td><td style="font-family:var(--M);font-weight:700;color:${cl(q.cR,th[1])};text-align:right">${P(q.cR)}</td><td style="font-family:var(--M);font-weight:700;color:${q.pay>=100?'var(--gn)':q.pay>0?'var(--or)':'var(--rd)'};text-align:right">${Math.round(q.pay)}%</td><td style="font-family:var(--M);color:var(--pk);text-align:right">${$(r.cE)}</td><td style="font-family:var(--M);color:${cl(r.cNrr,90)};text-align:right">${P(r.cNrr)}</td></tr>`}
      h+=`</tbody></table>`;
    }

    // SP Table
    if(seg!=='gp'){
      h+=`<div style="font-size:13px;font-weight:700;color:var(--pk);margin:12px 0 5px">SP (${SP.T} logos · ${$(SP_REV.base)})</div>
        <table style="table-layout:fixed"><colgroup><col style="width:10%"><col style="width:15%"><col style="width:15%"><col style="width:15%"><col style="width:22%"><col style="width:23%"></colgroup><thead><tr><th style="text-align:left">Q</th><th style="text-align:right">Floor</th><th style="text-align:right">Full</th><th style="text-align:right">Accel</th><th style="text-align:right">Logo Ret</th><th style="text-align:right">Payout</th></tr></thead><tbody>`;
      for(const qk of['Q2','Q3','Q4']){const th=SP_TH[qk],p=m.spPay[qk];
        h+=`<tr><td style="font-weight:600;text-align:left">${qk}</td><td style="color:var(--rd);font-family:var(--M);text-align:right">${th[0]}%</td><td style="color:var(--gn);font-family:var(--M);text-align:right">${th[1]}%</td><td style="color:var(--pk);font-family:var(--M);text-align:right">${th[2]}%</td><td style="font-family:var(--M);font-weight:700;color:${cl(m.spRet,th[1])};text-align:right">${P(m.spRet)}</td><td style="font-family:var(--M);font-weight:700;color:${p>=100?'var(--gn)':p>0?'var(--or)':'var(--rd)'};text-align:right">${Math.round(p)}%</td></tr>`}
      h+=`</tbody></table>
      <div style="font-size:10px;color:var(--mt);margin-top:4px;font-style:italic">SP book-level: ${$(m.spRev.totExp)} expected · ${P(m.spRev.grr)} GRR · ${P(m.spRev.nrr)} NRR · per-quarter rev not broken out in source data</div>`;
    }
    h+=`</div>`;

    // Revenue shift argument
    h+=`<div class="cd"><div class="ct" style="color:var(--gn);border-bottom-color:rgba(46,213,115,.12)">Revenue Case for Future Comp Shift</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px">
        ${[
          {l:"GP Renewal NRR",v:P(RNRR.gp),c:'var(--gn)',s:'+37% expansion'},
          {l:"SP Renewal NRR",v:P(RNRR.sp),c:'var(--rd)',s:'-17% contraction'},
          {l:seg==='gp'?'GP Proj NRR':seg==='sp'?'SP Proj NRR':'Combined NRR',v:P(sNrr),c:cl(sNrr,90),s:'full book projected'},
        ].map(x=>`<div class="qc"><div style="font-size:10px;color:var(--mt)">${x.l}</div><div style="font-size:20px;font-weight:800;color:${x.c};font-family:var(--M)">${x.v}</div><div style="font-size:10px;color:var(--mt)">${x.s}</div></div>`).join('')}
      </div>
      <div style="font-size:12px;color:var(--dm);padding:7px 9px;background:var(--bg);border-radius:5px;line-height:1.5">
        <b style="color:#8888aa">Logo vs Revenue:</b> GP accounts renew at <b style="color:var(--gn)">${P(RNRR.gp)}</b> NRR — each saved logo is +37% revenue. SP accounts contract to <b style="color:var(--rd)">${P(RNRR.sp)}</b>. Combined book projects <b style="color:var(--pk)">${$2(m.allExp)}</b> (${P(m.allNrr)} NRR) on a ${$(m.allBase)} base. Revenue-based comp would better reward the expansion value CS creates.
      </div></div>`;

    h+=`</div><div>${sidebar(m)}</div></div>`;
  }

  // ════ SCENARIOS ════
  if(S.tab==='scenarios'){
    h+=`<div class="cd"><div class="ct" style="color:var(--or);border-bottom-color:rgba(255,165,2,.12)">Scenario Analysis — ${seg==='gp'?'GP':seg==='sp'?'SP':'Total'}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px">`;
    for(const[k,sc]of Object.entries(SCEN)){
      const sm=calc(sc.oc,sc.dc,sc.sc,sc.exp);
      const sE=seg==='gp'?sm.gpExp:seg==='sp'?sm.spRev.totExp:sm.allExp;
      const sN=seg==='gp'?sm.gpNrr:seg==='sp'?sm.spRev.nrr:sm.allNrr;
      const sG=seg==='gp'?sm.gpGrr:seg==='sp'?sm.spRev.grr:sm.allGrr;
      const _act=S.oc===sc.oc&&S.dc===sc.dc&&S.sc===sc.sc&&S.exp===sc.exp;
      h+=`<div class="qc" style="border:${_act?'2px':'1px'} solid ${sc.c}${_act?'80':'18'}">
        <div style="font-size:13px;font-weight:800;color:${sc.c};margin-bottom:2px">${_act?'● ':''}${sc.l} Case${_act?' <span style="font-size:9px;font-weight:600;color:var(--gn);background:rgba(46,213,115,.12);padding:1px 5px;border-radius:3px;margin-left:4px;text-transform:uppercase;letter-spacing:.5px">active</span>':''}</div>
        <div style="font-size:10px;color:var(--mt);margin-bottom:7px">Open ${sc.oc}% · Decl ${sc.dc}% · SP ${sc.sc}% · Exp ${sc.exp}%</div>`;
      if(seg!=='sp'){
        h+=`<div style="font-size:11px;font-weight:600;color:var(--dm);margin-bottom:3px">GP Logo Ret</div>`;
        for(const qk of['Q2','Q3','Q4']){const q=sm.gpL[qk],th=GP_TH[qk];
          h+=`<div style="display:flex;align-items:center;gap:4px;margin-bottom:3px">
            <span style="width:16px;font-size:12px;font-weight:700;color:var(--dm)">${qk}</span>
            <div style="flex:1">${bar(q.cR,100,q.cR>=th[1]?'var(--gn)':q.cR>=th[0]?'var(--or)':'var(--rd)',7)}</div>
            <span style="width:34px;font-size:12px;font-weight:700;text-align:right;font-family:var(--M);color:${q.cR>=th[1]?'var(--gn)':q.cR>=th[0]?'var(--or)':'var(--rd)'}">${P(q.cR)}</span></div>`}
      }
      h+=`<div style="border-top:1px solid var(--bd);padding-top:5px;margin-top:5px;font-size:12px">
        <div>Rev: <b style="color:var(--pk);font-family:var(--M)">${$2(sE)}</b></div>
        <div>GRR: <b style="color:${cl(sG,70)};font-family:var(--M)">${P(sG)}</b> · NRR: <b style="color:${cl(sN,90)};font-family:var(--M)">${P(sN)}</b></div>
        ${seg!=='sp'?`<div>GP Comp Q4: <b style="color:${sm.gpL.Q4.pay>=100?'var(--gn)':sm.gpL.Q4.pay>0?'var(--or)':'var(--rd)'}">
          ${Math.round(sm.gpL.Q4.pay)}%</b></div>`:''}</div>
        <button onclick="applySc('${k}')" ${_act?'disabled':''} style="margin-top:5px;width:100%;padding:3px;border-radius:3px;border:1px solid ${sc.c}${_act?'80':'44'};background:${sc.c}${_act?'25':'0c'};color:${sc.c};font-size:12px;font-weight:700;${_act?'cursor:default;opacity:.85':''}">${_act?'● Active':'Apply'}</button></div>`;
    }
    h+=`</div>`;
    // Sensitivity
    h+=`<div style="display:grid;grid-template-columns:${seg==='sp'?'1fr':seg==='gp'?'1fr 1fr':'1fr 1fr 1fr'}; gap:7px">`;
    if(seg!=='sp'){
      h+=`<div class="qc" style="border:1px solid rgba(124,108,255,.1)"><div style="font-size:13px;font-weight:700;color:var(--pu)">GP Open (${GP.O})</div>
        <div style="font-size:11px;color:var(--dm);line-height:1.7;margin-top:2px">+10% = ${Math.round(GP.O*.1)} logos (+${P(GP.O*.1/GP.T*100)} ret)<br>Rev: +${fS(GP.O*.1*34069*S.exp/100)}</div></div>
      <div class="qc" style="border:1px solid rgba(255,165,2,.1)"><div style="font-size:13px;font-weight:700;color:var(--or)">GP Declined (${GP.D})</div>
        <div style="font-size:11px;color:var(--dm);line-height:1.7;margin-top:2px">+10% = ${Math.round(GP.D*.1)} logos (+${P(GP.D*.1/GP.T*100)} ret)<br>Rev: +${fS(GP.D*.1*31600*S.exp/100)}</div></div>`;
    }
    if(seg!=='gp'){
      h+=`<div class="qc" style="border:1px solid rgba(224,64,251,.1)"><div style="font-size:13px;font-weight:700;color:var(--pk)">SP Open (${SP.O})</div>
        <div style="font-size:11px;color:var(--dm);line-height:1.7;margin-top:2px">+10% = ${Math.round(SP.O*.1)} logos (+${P(SP.O*.1/SP.T*100)} ret)<br>Rev: +${fS(SP.O*.1*(SP_REV.base/SP.T)*S.exp/100)}</div></div>`;
    }
    h+=`</div></div>`;
  }

  const _ftTot=(GP.base||0)+(SP_REV.base||0);
  h+=`<div class="ft">${GP.T.toLocaleString()} GP (${fS(GP.base||0)}) + ${SP.T} SP (${fS(SP_REV.base||0)}) · ${fS(_ftTot)} total · Baseline: <span title="2025 actual GP logo retention rate — the starting point against which 2026 quarterly thresholds (floor / full / accel) are set" style="border-bottom:1px dotted currentColor;cursor:help">50.05%</span> · Churn: ${GP.C} GP (${fS(GP.churnRev||0)}) + ${SP.C} SP (${fS(SP_REV.churnRev||0)}) · Comp = logo-based · GRR/NRR = revenue-based</div>`;
  document.getElementById('app').innerHTML=h;
}

function sidebar(m,seg){
  let h=`<div class="cd"><div class="ct" style="color:var(--or);border-bottom-color:rgba(255,165,2,.12)">Assumptions</div>`;
  for(const[k,l,c]of[['oc','GP Open Conv','var(--pu)'],['dc','GP Dec. Re-eng','var(--or)'],['sc','SP Open Conv','var(--pk)'],['exp','Expansion Factor','var(--gn)']]){
    const v=S[k],mx=k==='exp'?180:100,mn=k==='exp'?80:0;
    h+=`<div class="sr"><div class="sl">${l}</div><button class="sib" onclick="bumpS('${k}',-5)">−</button><input type="range" min="${mn}" max="${mx}" step="5" value="${v}" oninput="setS('${k}',+this.value)"><button class="sib" onclick="bumpS('${k}',5)">+</button><div class="sv" style="color:${c}"><input type="number" min="${mn}" max="${mx}" step="1" value="${v}" onchange="setS('${k}',Math.max(${mn},Math.min(${mx},Math.round(+this.value)||0)))" onkeydown="if(event.key==='Enter')this.blur()" onfocus="this.select()">%</div></div>`}
  h+=`<div style="display:flex;gap:3px;margin-top:5px">${Object.entries(SCEN).map(([k,s])=>{const _act=S.oc===s.oc&&S.dc===s.dc&&S.sc===s.sc&&S.exp===s.exp;return `<button style="flex:1 1 0;min-width:0;padding:3px;border-radius:3px;font-size:11px;font-weight:700;border:1px solid ${s.c}${_act?'':'30'};background:${s.c}${_act?'25':'08'};color:${s.c}" onclick="applySc('${k}')">${_act?'● ':''}${s.l}</button>`;}).join('')}</div></div>`;

  // Quarter pipeline details (GP) — stacked above Scenarios
  if(seg!=='sp'){
    for(const qk of['Q1','Q2','Q3','Q4']){
      const q=m.gpL[qk],c=qCl[q.st],r=m.gpR[qk];
      h+=`<div class="cd" style="padding:10px 12px"><div class="ct" style="color:${c};border-bottom-color:${c}20;margin-bottom:6px;padding-bottom:4px">${qk} — ${q.mo}</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:3px">
          ${[{l:"Logos",v:q.t},{l:"Won",v:q.w,c:'var(--gn)'},{l:"Open",v:q.o,c:'var(--pu)'},{l:"Proj+",v:`+${q.pO+q.pD}`,c:'var(--li)'},{l:"Decl",v:q.d,c:'var(--or)'},{l:"Churn",v:q.c,c:'var(--rd)'},{l:"Q Ret",v:P(q.qR),c:cl(q.qR,55)},{l:"Rev",v:fS(r.qExp),c:'var(--pk)'}].map(x=>`<div style="background:var(--bg);padding:3px 4px;border-radius:3px"><div style="font-size:9px;color:var(--mt);text-transform:uppercase">${x.l}</div><div style="font-size:12px;font-weight:700;font-family:var(--M);color:${x.c||'var(--tx)'}">${x.v}</div></div>`).join('')}
        </div></div>`;
    }
  }

  // Scenario comparison
  h+=`<div class="cd"><div class="ct" style="color:var(--li);border-bottom-color:rgba(199,125,255,.12)">Scenarios</div>
    <table style="font-size:11px;color:var(--dm)"><thead><tr><th style="text-align:left;padding:2px"></th>${Object.entries(SCEN).map(([k,s])=>`<th style="text-align:right;padding:2px;color:${s.c};font-size:10px">${s.l}</th>`).join('')}</tr></thead><tbody>`;
  // GP Logo
  for(const qk of['Q2','Q3','Q4']){const th=GP_TH[qk];
    h+=`<tr><td style="padding:2px;font-weight:600;color:var(--dm)">${qk} Logo</td>`;
    for(const[k,s]of Object.entries(SCEN)){const sm=calc(s.oc,s.dc,s.sc,s.exp);const v=sm.gpL[qk].cR;
      h+=`<td style="text-align:right;padding:2px;font-family:var(--M);font-weight:700;color:${v>=th[1]?'var(--gn)':v>=th[0]?'var(--or)':'var(--rd)'}">${P(v)}</td>`}h+=`</tr>`}
  // Revenue
  h+=`<tr style="border-top:1px solid var(--bd)"><td style="padding:2px;font-weight:600;color:var(--dm)">NRR</td>`;
  for(const[k,s]of Object.entries(SCEN)){const sm=calc(s.oc,s.dc,s.sc,s.exp);
    h+=`<td style="text-align:right;padding:2px;font-family:var(--M);font-weight:700;color:${cl(sm.allNrr,90)}">${P(sm.allNrr)}</td>`}
  h+=`</tr><tr><td style="padding:2px;font-weight:600;color:var(--dm)">Rev</td>`;
  for(const[k,s]of Object.entries(SCEN)){const sm=calc(s.oc,s.dc,s.sc,s.exp);
    h+=`<td style="text-align:right;padding:2px;font-family:var(--M);font-weight:700;color:var(--pk)">${$(sm.allExp)}</td>`}
  h+=`</tr></tbody></table></div>`;

  // Universe
  h+=`<div class="cd"><div class="ct" style="color:var(--mt);border-bottom-color:var(--bd)">Universe</div>
    <div style="font-size:11px;color:var(--dm);line-height:1.8">
      GP: <b>${GP.T}</b> · ${GP.W}W ${GP.O}O ${GP.D}D ${GP.C}C · ${$(GP.base)}<br>
      SP: <b>${SP.T}</b> · ${SP.W}W ${SP.O}O ${SP.C}C · ~${$(SP_REV.base)}<br>
      Total: <b>${GP.T+SP.T}</b> · ${$(GP.base+SP_REV.base)} · NRR: GP ${P(RNRR.gp)}, SP ${P(RNRR.sp)}</div></div>`;
  return h;
}

function setTab(t){S.tab=t;_saveS();render()}

function bumpS(k,d){const mx=k==='exp'?180:100,mn=k==='exp'?80:0;S[k]=Math.max(mn,Math.min(mx,(S[k]||0)+d));_saveS();render()}
function applySc(k){const s=SCEN[k];S.oc=s.oc;S.dc=s.dc;S.sc=s.sc;S.exp=s.exp;_saveS();render()}
render();
