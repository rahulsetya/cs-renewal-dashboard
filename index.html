// ── OAUTH2 PKCE ───────────────────────────────────────────────────────────────
function b64url(buf){return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
async function genVerifier(){const a=new Uint8Array(32);crypto.getRandomValues(a);return b64url(a);}
async function genChallenge(v){return b64url(await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v)));}
async function startLogin(){
  sessionStorage.clear();
  const v=await genVerifier(), c=await genChallenge(v);
  sessionStorage.setItem('pkce_v',v);
  const p=new URLSearchParams({client_id:CLIENT_ID,response_type:'code',redirect_uri:REDIRECT,scope:SCOPES,code_challenge:c,code_challenge_method:'S256',response_mode:'fragment',prompt:'select_account'});
  location.href=`https://login.microsoftonline.com/${TENANT}/oauth2/v2.0/authorize?${p}`;
}
async function exchangeCode(code){
  const body=new URLSearchParams({client_id:CLIENT_ID,grant_type:'authorization_code',code,redirect_uri:REDIRECT,code_verifier:sessionStorage.getItem('pkce_v'),scope:SCOPES});
  const r=await fetch(`https://login.microsoftonline.com/${TENANT}/oauth2/v2.0/token`,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
  const j=await r.json();
  if(j.error)throw new Error(j.error_description||j.error);
  return j;
}
function saveTokens(t){
  sessionStorage.setItem('at',t.access_token);
  if(t.refresh_token)sessionStorage.setItem('rt',t.refresh_token);
  sessionStorage.setItem('exp',Date.now()+((t.expires_in||3600)*1000));
}
async function getToken(){
  const exp=parseInt(sessionStorage.getItem('exp')||'0'), at=sessionStorage.getItem('at');
  if(at&&Date.now()<exp-60000)return at;
  const rt=sessionStorage.getItem('rt');
  if(rt){
    try{
      const body=new URLSearchParams({client_id:CLIENT_ID,grant_type:'refresh_token',refresh_token:rt,scope:SCOPES});
      const r=await fetch(`https://login.microsoftonline.com/${TENANT}/oauth2/v2.0/token`,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
      const j=await r.json();
      if(!j.error){saveTokens(j);return j.access_token;}
    }catch(e){}
  }
  throw new Error('login_required');
}

// ── ROBUST COLUMN LOOKUP ──────────────────────────────────────────────────────
// Normalise a header string: trim, collapse internal spaces, lower-case
function normKey(s){return String(s||'').trim().replace(/\s+/g,' ').toLowerCase();}

// Build column maps from a headers array (call after reading header row)
function buildColMaps(headers){
  COL={};COL_LC={};
  headers.forEach((h,i)=>{
    COL[h]=i;            // exact (already trimmed upstream)
    COL_LC[normKey(h)]=i; // normalised
  });
}

// Lookup column index by name — tries exact, then normalised
function colIdx(name){
  let i=COL[name];
  if(i!==undefined)return i;
  i=COL[name.trim()];
  if(i!==undefined)return i;
  return COL_LC[normKey(name)];
}

// Get a cell value from a row by column name
function getCell(row,name){const i=colIdx(name);return i!==undefined?row[i]:undefined;}

async function fetchWithTimeout(url,opts,ms=60000){
  const ctrl=new AbortController();const tid=setTimeout(()=>ctrl.abort(),ms);
  try{return await fetch(url,{...opts,signal:ctrl.signal});}
  finally{clearTimeout(tid);}
}
async function getSharePointDriveId(token, ownerUpn){
  if(_driveIdCache[ownerUpn])return _driveIdCache[ownerUpn];
  if(_driveIdPending[ownerUpn])return _driveIdPending[ownerUpn];
  _driveIdPending[ownerUpn]=(async()=>{
    const siteRes=await fetchWithTimeout(`https://graph.microsoft.com/v1.0/sites/iconnections675-my.sharepoint.com:/personal/${ownerUpn}`,{headers:{Authorization:`Bearer ${token}`}});
    if(!siteRes.ok){const j=await siteRes.json().catch(()=>({}));throw new Error(`Site lookup for ${ownerUpn}: ${siteRes.status} — ${j.error?.message||'unknown'}`);}
    const site=await siteRes.json();
    const drivesRes=await fetchWithTimeout(`https://graph.microsoft.com/v1.0/sites/${site.id}/drives`,{headers:{Authorization:`Bearer ${token}`}});
    if(!drivesRes.ok){const j=await drivesRes.json().catch(()=>({}));throw new Error(`Drives for ${ownerUpn}: ${drivesRes.status} — ${j.error?.message||'unknown'}`);}
    const drives=await drivesRes.json();
    if(!drives.value||!drives.value.length)throw new Error(`No drives found for ${ownerUpn}`);
    const id=drives.value[0].id;
    _driveIdCache[ownerUpn]=id;
    _saveDriveIds();
    delete _driveIdPending[ownerUpn];
    return id;
  })();
  return _driveIdPending[ownerUpn];
}

async function fetchWithRetry(url,opts,retries=3,delay=3000){
  for(let i=0;i<=retries;i++){
    try{
      const r=await fetch(url,opts);
      if(r.status===504||r.status===503){
        if(i<retries){await new Promise(res=>setTimeout(res,delay*(i+1)));continue;}
      }
      return r;
    }catch(e){if(i===retries)throw e;await new Promise(res=>setTimeout(res,delay*(i+1)));}
  }
}

async function fetchSheet(token){
  const enc=encodeURIComponent(SHEET), errors=[], hdrs={Authorization:`Bearer ${token}`};
  // Try usedRange first (complete data); if payload too large (400) fall back to fixed range
  async function tryRange(baseUrl){
    const r=await fetchWithRetry(baseUrl+`/workbook/worksheets/${enc}/usedRange(valuesOnly=true)`,{headers:hdrs});
    if(r.ok)return r.json();
    if(r.status===400){
      // Payload exceeded — fetch a fixed column window that covers all needed columns
      const r2=await fetchWithRetry(baseUrl+`/workbook/worksheets/${enc}/range(address='A1:EZ1500')?$select=values`,{headers:hdrs});
      if(r2.ok)return r2.json();
      const j2=await r2.json().catch(()=>({}));
      throw new Error(`${r.status} (fallback also failed: ${j2.error?.message||r2.status})`);
    }
    const j=await r.json().catch(()=>({}));
    throw new Error(`${r.status} — ${j.error?.message||'unknown'}`);
  }

  // Attempt 1: owner's SharePoint personal site drive (primary method)
  try{
    const driveId=await getSharePointDriveId(token, FILE_OWNER);
    const base=`https://graph.microsoft.com/v1.0/drives/${driveId}/items/${FILE_ID}`;
    return await tryRange(base);
  }catch(e){errors.push(`site drive workbook: ${e.message}`);}

  // Attempt 2: sharedWithMe search
  try{
    const r=await fetch('https://graph.microsoft.com/v1.0/me/drive/sharedWithMe',{headers:{Authorization:`Bearer ${token}`}});
    const j=await r.json();
    if(j.value&&j.value.length){
      const f=j.value.find(f=>f.id===FILE_ID||(f.remoteItem&&f.remoteItem.id===FILE_ID))||
               j.value.find(f=>(f.name||'').toLowerCase().includes('2026 renewal master'));
      if(f){
        const ri=f.remoteItem||f;
        const driveId=ri.parentReference?.driveId;
        const itemId=ri.id;
        if(driveId&&itemId){
          const base=`https://graph.microsoft.com/v1.0/drives/${driveId}/items/${itemId}`;
          return await tryRange(base);
        }
      }
    }
  }catch(e){errors.push(`sharedWithMe: ${e.message}`);}

  throw new Error(errors.join('<br>'));
}

function parseEngEndMonth(v){
  if(!v)return'';
  // Excel serial date
  const n=parseFloat(v);
  if(!isNaN(n)&&n>1000){const d=new Date((n-25569)*86400*1000);return d.toISOString().substring(0,7);}
  // Already YYYY-MM or YYYY-MM-DD
  if(/^\d{4}-\d{2}/.test(v))return v.substring(0,7);
  // "Mar 2026", "March 2026", "Mar-26" etc.
  const mo={'jan':'01','feb':'02','mar':'03','apr':'04','may':'05','jun':'06','jul':'07','aug':'08','sep':'09','oct':'10','nov':'11','dec':'12'};
  const m=v.toLowerCase().match(/([a-z]{3})[a-z]*[\s\-\/]+(\d{2,4})/);
  if(m){const yr=m[2].length===2?'20'+m[2]:m[2];return`${yr}-${mo[m[1]]||''}`.replace(/-$/,'');}
  return v;
}

  if(!v)return'';

  const m=s.match(/^(\d+)\./);
  if(m)STAGE_NORM_MAP.set(m[1],s);
});
// Legacy stage aliases (old spreadsheet values → new dashboard names)
STAGE_NORM_MAP.set(normKey('8. Closed Lost (Not Renewing)'),'4a. Attempting again Q2');
STAGE_NORM_MAP.set(normKey('Closed Lost (Not Renewing)'),'4a. Attempting again Q2');
STAGE_NORM_MAP.set(normKey('Closed Lost'),'4a. Attempting again Q2');

function resolveStage(rawStage){
  if(!rawStage)return null;
  const raw=String(rawStage).trim();
  // Exact match first
  if(ST.includes(raw))return raw;
  // Normalised match
  const norm=normKey(raw);
  if(STAGE_NORM_MAP.has(norm))return STAGE_NORM_MAP.get(norm);
  // Partial: does the raw value contain a stage label?
  for(const [k,v] of STAGE_NORM_MAP){
    if(norm.includes(k)||k.includes(norm))return v;
  }
  return null;
}

// The Excel column uses an en dash (U+2013) or em dash (U+2014) — try both
const OFFER_COLS=[
  'Offer Price \u2013 Total Contract Value',  // en dash
  'Offer Price \u2014 Total Contract Value',  // em dash
  'Offer Price - Total Contract Value',        // plain hyphen fallback
  'Offer Price\u2013Total Contract Value',     // no spaces around dash
  'Offer Price\u2014Total Contract Value',
  'Offer Price',                               // bare name
];

function computeSignals(row){
  const sg=[],{dy,r25,o,s,mt,rsk}=row;
  if(s==='1. Uncontacted'&&dy>0&&dy<=90)sg.push('ue');
  if((s==='3. Contacted Follow-up Needed'||s==='4. Contacted Attempting Again')&&o===0)sg.push('en');
  if(mt===0&&s!=='1. Uncontacted')sg.push('co');
  if(s==='5. Proposal Made'&&o===0)sg.push('pp');
  if(s==='6. Signature Requested'&&dy>=0&&dy<=60)sg.push('se');
  if(mt===0)sg.push('nm');
  if(rsk)sg.push('rf');
  if(r25>=50000&&mt===0)sg.push('hr');
  if(s==='4a. Attempting again Q2')sg.push('wb');
  return[...new Set(sg)];
}
function getWow(d){
  const ps=PREV[d.c];
  if(!ps)return'new';
  const pi=ST.indexOf(ps),ci=ST.indexOf(d.s);
  if(pi<0||ci<0)return'same';
  if(d.s==='11. Churned'&&ps!=='11. Churned')return'lost';
  if(d.s==='11. Churned'&&ps!=='11. Churned')return'lost';
  if((d.s==='7. Signed'||d.s==='9. Invoice Sent')&&ps!=='7. Signed'&&ps!=='9. Invoice Sent')return'won';
  if(ci>pi)return'up';if(ci<pi)return'down';return'same';
}

function processData(range, engMap){
  if(!engMap)engMap={};
  if(!range)return D; // eng-only update — return existing D unchanged
  const rows=range.values;
  if(!rows||!rows.length)throw new Error('Sheet appears empty');

  // Auto-detect header row: scan first 30 rows for one containing 'Renewal Owner'
  let detectedHeaderRow=HEADER_ROW;
  for(let r=0;r<Math.min(30,rows.length);r++){
    if(rows[r].some(c=>String(c||'').trim()==='Renewal Owner')){detectedHeaderRow=r;break;}
  }
  if(rows.length<=detectedHeaderRow)throw new Error('Sheet appears empty or headers not found');

  const rawHeaders=rows[detectedHeaderRow].map(h=>String(h||'').trim());
  buildColMaps(rawHeaders);
  // Find both Notes/Closed Lost Reason columns (CE and CF) — colIdx only returns first match
  const clrIdxAll=rawHeaders.reduce((a,h,i)=>h==='Notes / Closed Lost Reason'?[...a,i]:a,[]);

  // Debug output to help diagnose column issues
  console.log('=== PIPELINE FILE HEADERS ===');
  console.log(rawHeaders.join(' | '));
  console.log('Stage col idx:', colIdx('Stage'));
  console.log('Renewal Owner col idx:', colIdx('Renewal Owner'));
  console.log('Contact col idx:', colIdx('Contact'));
  const offerHit=OFFER_COLS.find(c=>colIdx(c)!==undefined);
  console.log('Offer price col matched:', offerHit, '@ idx', offerHit?colIdx(offerHit):'–');

  const data=[];
  let stageUnmatched=[];

  for(let i=detectedHeaderRow+1;i<rows.length;i++){
    const v=rows[i];
    let company=String(getCell(v,'Contact')||'').trim();
    if(!company){
      // Fallback: try 'Company Name' column
      company=String(getCell(v,'Company Name')||getCell(v,'Account Name')||'').trim();
    }
    if(!company){
      // Log rows that have a valid owner but blank company — helps diagnose missing accounts
      const ownerPeek=String(getCell(v,'Renewal Owner')||getCell(v,'Renewal Owner ')||'').trim();
      if(ownerPeek)console.warn(`Row ${i+1} skipped — blank Contact. Owner: "${ownerPeek}" | Row sample:`, v.slice(0,8));
      continue;
    }

    // Stage — normalised match
    const rawStage=String(getCell(v,'Stage')||'').trim();
    const stage=resolveStage(rawStage)||'1. Uncontacted';
    if(rawStage&&!resolveStage(rawStage)){
      stageUnmatched.push(`"${rawStage}" (row ${i+1})`);
    }

    // Renewal Owner — column headers are trimmed, so plain 'Renewal Owner' works
    const rawOwner=String(
      getCell(v,'Renewal Owner') ||
      getCell(v,'Renewal Owner ') ||  // trailing-space variant just in case
      ''
    ).trim();
    const ro=rawOwner||'Support iConnections';
    // Keep all accounts — non-CS owners are surfaced via the "All Owners" filter option

    const r25=parseNum(getCell(v,'2025 Total Revenue'));
    const r24=parseNum(getCell(v,'2024 Total Revenue'));

    // Offer Price — try all candidate column names
    let offerRaw=undefined;
    for(const col of OFFER_COLS){offerRaw=getCell(v,col);if(offerRaw!==undefined&&offerRaw!=='')break;}
    const offer=parseNum(offerRaw);

    const subEnd=excelDateToJS(getCell(v,'Final Sub End Date')||'');
    const dy=daysDiff(subEnd);

    const or_=String(getCell(v,'ONSITE REP (iConn + Benchies)')||getCell(v,'Onsite Rep')||'N/A');
    const eng=engMap[company]||{};
    const mt=eng.mt!==undefined?eng.mt:parseNum(getCell(v,'Confirmed Miami Meetings'));
    const rsk=eng.rsk!==undefined?eng.rsk:(parseNum(getCell(v,'Emerging Manager Risk (AUM <250M & 1 GA Event in 2025)'))>0?1:0);
    const out=eng.out||0;
    const gm=eng.gm||0;
    const gms=eng.gms||0;
    const ap=eng.ap||0;
    const sentiment=eng.sentiment||'';
    // Notes hierarchy: col L (iConnections Notes) → col CE → col CF
    const _icnRaw=String(getCell(v,'iConnections Notes')||'').trim();
    const _clrA=clrIdxAll[0]!==undefined?String(v[clrIdxAll[0]]||'').trim():'';
    const _clrB=clrIdxAll[1]!==undefined?String(v[clrIdxAll[1]]||'').trim():'';
    const icn=_icnRaw?_icnRaw:_clrA?_clrA:_clrB?_clrB:'';
    const clr=_clrA||_clrB;
    const ae=String(getCell(v,'Sales Rep')||'').trim();
    const csRep=String(getCell(v,'CS Rep')||v[8]||'').trim();
    const em=subEnd?subEnd.substring(0,7):'';
    const row={c:company,s:stage,ro,csRep,or:or_,o:offer,r25,r24,se:subEnd,dy,em,mt,rsk,out,gm,gms,ap,sentiment,ex:0,snt:0,clr,icn,ae,sg:[],ct:'Manager',wow:'same'};
    row.sg=computeSignals(row);
    data.push(row);
  }

  if(stageUnmatched.length){
    console.warn('Unmatched stage values:', stageUnmatched.slice(0,10).join(', '));
  }
  if(!data.length){
    const preview=rawHeaders.slice(0,12).join(' | ');
    throw new Error(`No valid rows found after filtering.<br><br>First 12 headers from row ${detectedHeaderRow+1}:<br><small>${preview}</small><br><br>Headers auto-detected at row ${detectedHeaderRow+1}.`);
  }

  console.log(`Loaded ${data.length} accounts. Owners:`, [...new Set(data.map(d=>d.ro))].join(', '));
  return data;
}

let _loadingInProgress=false;

async function _fetchFresh(token){
  // Always fetch both — sequential to avoid SP rate limits
  const range=await fetchSheet(token);
  // Store raw rows for Goals dashboard (unfiltered)
  if(range&&range.values){
    GP_RAW_ROWS=range.values;
    GP_RAW_HDR=0;
    for(let r=0;r<Math.min(30,range.values.length);r++){if(range.values[r].some(c=>String(c||'').trim()==='Renewal Owner')){GP_RAW_HDR=r;break;}}
  }
  const engMap=await fetchAllEngagement(token);
  const spRange=await fetchSPSheet(token);
  if(spRange)SP_RAW=processSPData(spRange);
  await Promise.all([loadSnapshotFromSP(token),loadRCSnapshotFromSP(token)]);
  D=processData(range,engMap);
  saveEngCache(ENG_RAW);
  const lu='Updated '+new Date().toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});
  lastUpdated=lu;
  saveDataCache(D,lu);
  S.staleWarning=null;
}


async function loadData(forceRefresh=false){
  if(_loadingInProgress&&!forceRefresh){console.log('loadData: already in progress, skipping');return;}
  _loadingInProgress=true;
  loadSnapshot();

  const cache=loadDataCache(true);
  const cacheUsable=cache&&cache.D&&cache.D.length&&!forceRefresh;
  if(cacheUsable){
    D=cache.D;
    const ec=loadEngCache();if(ec)ENG_RAW=ec;
    lastUpdated=cache.lastUpdated+(cache.stale?' · cached':'');
    render();
    if(!cache.stale){_loadingInProgress=false;return;}
    try{
      const token=await getToken();
      await _fetchFresh(token);
      render();
    }catch(e){
      const msg=e.message||String(e);
      if(/login_required/i.test(msg)){showLogin();return;}
      S.staleWarning=`SharePoint timed out — showing data from ${cache.staleMinutes||0}m ago. <button onclick="refreshData()" style="margin-left:8px;padding:2px 10px;border-radius:4px;border:1px solid #fbbf24;background:transparent;color:#fbbf24;font-size:11px;cursor:pointer;font-family:inherit">Retry</button>`;
      render();
    }finally{_loadingInProgress=false;}
    return;
  }

  showLoading('Loading pipeline + engagement data…');
  try{
    const token=await getToken();
    await _fetchFresh(token);
    render();
  }catch(e){
    const msg=e.message||String(e);
    if(/login_required|interaction/i.test(msg)){showLogin();return;}
    const stale=loadDataCache(true);
    if(stale&&stale.D&&stale.D.length){
      D=stale.D;const ec=loadEngCache();if(ec)ENG_RAW=ec;
      lastUpdated=stale.lastUpdated+' · cached';
      S.staleWarning=`SharePoint timed out — showing data from ${stale.staleMinutes}m ago. <button onclick="refreshData()" style="margin-left:8px;padding:2px 10px;border-radius:4px;border:1px solid #fbbf24;background:transparent;color:#fbbf24;font-size:11px;cursor:pointer;font-family:inherit">Retry</button>`;
      render();
    }else{showError(msg);}
  }finally{_loadingInProgress=false;}
}

    h+=`<div class="sg" style="margin-top:10px;padding-top:10px;border-top:1px solid #334155;cursor:default">

      <div style="font-size:12px;color:#fbbf24;text-align:right;font-weight:700">${fm(r25T)}</div>

    if(S.drill){
      const ds=S.drillSort||{col:'r25',dir:'desc'};

      const dSel=(col,opts)=>{const cur=df[col]||'';return`<select onclick="event.stopPropagation()" onchange="ssDrillFilter('${col}',this.value)" style="${dCtrlS};padding:1px 3px"><option value="">All</option>${opts.map(o=>`<option value="${o.replace(/"/g,'&quot;')}"${cur===o?' selected':''}>${o}</option>`).join('')}</select>`;};

      const seToQtr2=se=>{if(!se)return'';const m=se.match(/^(\d{4})-(\d{2})/);return m?`${m[1]} Q${Math.ceil(parseInt(m[2])/3)}`:'';}

      const stageAccts=f.filter(d=>d.s===S.drill);
      const uDOwners=[...new Set(stageAccts.map(a=>a.ro))].sort();
      const uDAE=[...new Set(stageAccts.map(a=>a.ae||'').filter(Boolean))].sort();
      const uDFlags=[...new Set(stageAccts.flatMap(a=>a.sg.map(s=>SIG_L[s])).filter(Boolean))].sort();
      const uDSub=[...new Set(stageAccts.map(a=>seToQtr2(a.se)).filter(Boolean))].sort();

      // Apply drill filters
      let da=[...stageAccts];

      const dfFlags=Array.isArray(df.flags)?df.flags:[];

      // Apply drill sort
      const dSortFns={
        account:(a,b)=>a.c.localeCompare(b.c),
        owner:(a,b)=>a.ro.localeCompare(b.ro),ae:(a,b)=>(a.ae||'').localeCompare(b.ae||''),
        r25:(a,b)=>a.r25-b.r25,offer:(a,b)=>a.o-b.o,
        delta:(a,b)=>{const da2=a.o>0&&a.r25>0?(a.o-a.r25)/a.r25:-999,db=b.o>0&&b.r25>0?(b.o-b.r25)/b.r25:-999;return da2-db;},
        subend:(a,b)=>String(a.se||'').localeCompare(String(b.se||'')),
        flags:(a,b)=>a.sg.length-b.sg.length,
      };
      if(dSortFns[ds.col])da=da.sort((a,b)=>dSortFns[ds.col](a,b)*(ds.dir==='asc'?1:-1));

      const dFChk=(opts,selArr)=>{if(!opts.length)return'';const lbl=selArr.length?`${selArr.length} selected`:'All flags';return`<button onclick="_openFlagDD('drill',this)" style="width:100%;margin-top:3px;padding:3px 6px;background:#0a1628;border:1px solid #1e3a5f;border-radius:3px;color:#64748b;font-size:9px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:space-between;gap:4px;outline:none"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${lbl}</span><span style="font-size:7px;flex-shrink:0">▾</span></button>`;};

            <th onclick="ssDrillSort('r25')" style="${dThS};width:72px;text-align:right"><div style="display:flex;align-items:center;justify-content:flex-end;gap:3px;color:#fbbf24">2025 ${dsd('r25')}</div>${dRngPair('r25min','r25max')}</th>

          </tr></thead><tbody>`;
        da.forEach(a=>{
          const dl=a.o>0&&a.r25>0?(a.o-a.r25)/a.r25*100:-999;

          const stgMoved=prevStg&&prevStg!==a.s;

            <td style="text-align:right;color:${a.o>0?'#22d3ee':'#334155'}">${a.o>0?fm(a.o):'–'}</td>

        h+=`</tbody></table></div>`;
        if(S.drillFlagOpen&&S.drillFlagRect){const _dm=S.drillFlagMode;const _btnS=(active)=>`font-size:9px;padding:2px 10px;border-radius:3px;cursor:pointer;font-family:inherit;border:1px solid ${active?'#3b82f6':'#1e3a5f'};background:${active?'#1e3a5f':'transparent'};color:${active?'#60a5fa':'#475569'}`;h+=`<div onclick="event.stopPropagation()" style="position:fixed;top:${S.drillFlagRect.top}px;left:${S.drillFlagRect.left}px;z-index:9999;background:#0a1628;border:1px solid #334155;border-radius:4px;min-width:200px;max-height:300px;overflow-y:auto;box-shadow:0 6px 24px rgba(0,0,0,.8)"><div onclick="event.stopPropagation();ssDrillFlagToggle('__any__',${!dfFlags.includes('__any__')})" style="padding:7px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;background:${dfFlags.includes('__any__')?'#1e3a5f':'transparent'};color:${dfFlags.includes('__any__')?'#60a5fa':'#94a3b8'};border-bottom:1px solid #0f1f33"><span style="font-size:11px;width:13px;flex-shrink:0;text-align:center">${dfFlags.includes('__any__')?'✓':''}</span><span style="font-size:11px;font-style:italic">Has Any Flag</span></div>${uDFlags.map(o=>{const on=dfFlags.includes(o);return`<div onclick="event.stopPropagation();ssDrillFlagToggle('${o.replace(/'/g,"\\'").replace(/"/g,'&quot;')}',${!on})" style="padding:7px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;background:${on?'#1e3a5f':'transparent'};color:${on?'#60a5fa':'#94a3b8'}"><span style="font-size:11px;width:13px;flex-shrink:0;text-align:center">${on?'✓':''}</span><span style="font-size:11px">${o}</span></div>`;}).join('')}<div onclick="event.stopPropagation()" style="padding:6px 10px;border-top:1px solid #0f1f33;display:flex;align-items:center;gap:6px"><span style="font-size:9px;color:#475569;flex:1">Match:</span><button onclick="event.stopPropagation();S.drillFlagMode='any';render()" style="${_btnS(_dm==='any')}">Any</button><button onclick="event.stopPropagation();S.drillFlagMode='all';render()" style="${_btnS(_dm==='all')}">All</button></div></div>`;}
      }
    }
    h+=`</div>`;
  }

  // ── MOVEMENT ──
  if(S.tab==='movement'){
    const snapInfo=PREV_TS
      ?`Comparing against snapshot from <strong>${snapAge()}</strong> · <button class="sb" onclick="clearSnapshot()" style="color:#ef4444;border-color:#ef444433">Clear</button>`
      :`<span style="color:#fb923c">No snapshot saved.</span> Use the <strong>📸 Save Snapshot</strong> button (top right) to record current state, then refresh later to see movement.`;
    const movedUp=[],movedDown=[],newWon=[],newLost=[],newChurned=[],stuckDeals=[];
    f.forEach(d=>{
      const w=getWow(d);
      if(w==='up')movedUp.push(d);
      if(w==='down')movedDown.push(d);
      if(w==='won')newWon.push(d);
      if(w==='lost'){newLost.push(d);if(d.s==='11. Churned')newChurned.push(d);}
      if(w==='same'&&['3. Contacted Follow-up Needed','4. Contacted Attempting Again','5. Proposal Made','6. Signature Requested'].includes(d.s))stuckDeals.push(d);
    });
    h+=`<div style="background:#172033;border:1px solid #334155;border-radius:8px;padding:10px 16px;font-size:12px;margin-bottom:16px;color:#94a3b8">${snapInfo}</div>`;
    h+=`<div class="g g4" style="margin-bottom:16px">
      <div class="kpi ck" style="border-left:3px solid #34d399;cursor:pointer" onclick="S.mvSort={col:'type',dir:'asc'};render()"><div class="kl">Progressed</div><div class="kv" style="color:#34d399">${movedUp.length+newWon.length}</div><div class="ks">${movedUp.length} moved up, ${newWon.length} won</div></div>
      <div class="kpi ck" style="border-left:3px solid #ef4444;cursor:pointer" onclick="S.mvSort={col:'type',dir:'desc'};render()"><div class="kl">Regressed / Lost</div><div class="kv" style="color:#ef4444">${movedDown.length+newLost.length}</div><div class="ks">${movedDown.length} moved down, ${newLost.length-newChurned.length} new losses${newChurned.length?`, ${newChurned.length} churned`:''}</div></div>
      <div class="kpi ck" style="border-left:3px solid #fb923c;cursor:pointer" onclick="requestAnimationFrame(()=>{const el=document.querySelector('.mv-stuck');if(el)window.scrollTo({top:el.offsetTop-16,behavior:'smooth'});})"><div class="kl">Stuck (Stages 3-6)</div><div class="kv" style="color:#fb923c">${stuckDeals.length}</div><div class="ks">${fm(stuckDeals.reduce((a,d)=>a+d.r25,0))} 2025 rev</div></div>
      <div class="kpi" style="border-left:3px solid #64748b"><div class="kl">No Change</div><div class="kv" style="color:#64748b">${f.filter(d=>getWow(d)==='same').length}</div><div class="ks">of ${f.length} total</div></div>
    </div>`;
    if(movedUp.length+newWon.length+movedDown.length+newLost.length>0){
      const mvs=S.mvSort||{col:'rev',dir:'desc'};
      const mvSortFns={
        acct:(a,b)=>a.c.localeCompare(b.c),
        owner:(a,b)=>(a.ro||'').localeCompare(b.ro||''),
        from:(a,b)=>ST.indexOf(PREV[a.c]||'') - ST.indexOf(PREV[b.c]||''),
        to:(a,b)=>ST.indexOf(a.s) - ST.indexOf(b.s),
        rev:(a,b)=>b.r25-a.r25,
        type:(a,b)=>{const o=['won','up','down','lost'];return o.indexOf(getWow(a))-o.indexOf(getWow(b));}
      };
      const mvSorted=[...movedUp,...newWon,...movedDown,...newLost].sort((a,b)=>{

      };
      h+=`<div class="cd mv-deals" style="padding:20px;margin-bottom:16px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <h3 style="margin:0;font-size:15px;font-weight:600;color:#f8fafc">Deals That Moved</h3>
          <span style="font-size:11px;color:#475569">${mvSorted.length} deals · click column to sort</span>
        </div>
      <table><thead><tr>
        ${mvHd('acct','Account','')}
        ${mvHd('owner','Owner','')}
        ${mvHd('from','From','')}
        <th></th>
        ${mvHd('to','To','')}
        ${mvHd('rev','2025 Rev','right')}
        <th style="text-align:right;color:#22d3ee">2026 Offer</th>
        <th style="color:#94a3b8">Sub End</th>
        ${mvHd('type','Type','center')}
      </tr></thead><tbody>`;
      mvSorted.forEach(d=>{
        const w=getWow(d),ps=PREV[d.c]||'Unknown';
        const mvKey='mv_'+d.c;
        const nOpen=S.noteOpen===mvKey;
        const mvNoteIdx=window._noteKeys.length; window._noteKeys.push(mvKey);
        const dyC=d.dy<=0?'#ef4444':d.dy<=30?'#ef4444':d.dy<=90?'#fb923c':d.dy<=180?'#fbbf24':'#94a3b8';
        const seDisp=d.se?`<span style="color:#94a3b8;font-size:11px">${d.se}</span> <span style="color:${dyC};font-size:10px;font-weight:600">(${d.dy<=0?'PAST':d.dy+'d'})</span>`:'–';
        h+=`<tr class="dr" style="${(w==='won'||w==='up')?'background:rgba(52,211,153,0.07)':(w==='down'||w==='lost')?'background:rgba(239,68,68,0.07)':''}">
          <td style="color:#e2e8f0;font-weight:500">${d.c}${d.icn?`<span onclick="event.stopPropagation();event.preventDefault();toggleNoteIdx(${mvNoteIdx})" style="margin-left:6px;font-size:10px;color:#94a3b8;cursor:pointer;border:1px solid #334155;border-radius:3px;padding:1px 5px">${nOpen?'▲':'▼'} notes</span>`:''}</td>
          <td style="color:#94a3b8">${roDisp(d.ro,d.ae)}</td>

          <td style="font-size:11px;color:${CL[d.s]};font-weight:600">${SH[d.s]}</td>
          <td style="text-align:right;color:#fbbf24;font-weight:600">${fm(d.r25)}</td>
          <td style="text-align:right;color:${d.o>0?'#22d3ee':'#334155'}">${d.o>0?fm(d.o):'–'}</td>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<script>
Chart.register(ChartDataLabels);
Chart.defaults.plugins.datalabels = {display:false};
const stackLabels = {display:function(ctx){return ctx.dataset.data[ctx.dataIndex]>8},color:'#fff',font:{size:11,weight:600,family:"'JetBrains Mono',monospace"},anchor:'center',align:'center'};

// ── DATA (4-STATE MODEL) ────────────────────────────
// States: won = renewed, lost = CONFIRMED CHURN (9 accounts only),
//         declined = declined early outreach but renewal date is future (re-engageable),
//         open = not yet contacted or in progress
// Revenue: rev=total, rw=won rev, rl=confirmed lost rev, rd=declined rev

const GP_T = {Q1:{floor:null,full:100,accel:null},Q2:{floor:55,full:62,accel:68},Q3:{floor:58,full:67,accel:73},Q4:{floor:62,full:72,accel:78}};
const SP_T = {Q1:{floor:null,full:100,accel:null},Q2:{floor:45,full:55,accel:65},Q3:{floor:50,full:62,accel:70},Q4:{floor:55,full:68,accel:75}};

// Activity floor thresholds — ramping (new program, no tracking history)
const ACT_FLOOR = {Q1:null,Q2:50,Q3:65,Q4:75};

// ── PAYOUT ENGINE ──────────────────────────────────
// Retention: below floor=0%, floor→full linear 0→100%, full→accel linear 100→125%, cap 125%
function retPayout(retPct,q,isSP){
  const t=isSP?SP_T[q]:GP_T[q];
  if(!t||!t.floor)return{pct:100,tier:"GIFTED"};
  if(retPct<t.floor)return{pct:0,tier:"Below floor"};
  if(retPct>=t.accel)return{pct:125,tier:"Capped 125%"};
  if(retPct>=t.full){const extra=((retPct-t.full)/(t.accel-t.full))*25;return{pct:Math.min(100+extra,125),tier:"Accelerator"};}
  const p=((retPct-t.floor)/(t.full-t.floor))*100;
  return{pct:Math.max(0,Math.min(p,100)),tier:p>=50?"Progressing":"Below full"};
}
// Activity: below floor = GATE (zeroes both components), above floor = linear 0→100%
function actPayout(cadPct,q){
  const floor=ACT_FLOOR[q];
  if(!floor)return{pct:100,tier:"GIFTED",gate:false};
  if(cadPct<floor)return{pct:0,tier:"Below gate",gate:true};
  const p=((cadPct-floor)/(100-floor))*100;
  return{pct:Math.min(p,100),tier:p>=100?"Full":"Scaling",gate:false};
}
// Combined: activity gates everything
function totalPayout(cadPct,retPct,q,isSP){
  const act=actPayout(cadPct,q);const ret=retPayout(retPct,q,isSP);
  if(act.gate)return{actPct:0,retPct:0,totalPct:0,gated:true,actTier:"GATED",retTier:"GATED"};
  return{actPct:act.pct,retPct:ret.pct,totalPct:(act.pct*.5+ret.pct*.5),gated:false,actTier:act.tier,retTier:ret.tier};

  const trD=["Q1","Q2","Q3","Q4"].map((q,i)=>{const r={};["Enterprise","Strategic","Scale"].forEach(p=>{const d=GRR[q][p];r[p]=d.logos>0?+(d.won/d.logos*100).toFixed(1):0});r.tgt=tgts[i];return r});
  mc('c2',{type:'line',data:{labels:["Q1","Q2","Q3","Q4"],datasets:[{label:'Target',data:trD.map(d=>d.tgt),borderColor:'#fff',borderWidth:2,borderDash:[8,4],pointRadius:0,fill:false},{label:'Enterprise',data:trD.map(d=>d.Enterprise),borderColor:PC.Enterprise,borderWidth:2.5,pointRadius:4,fill:false},{label:'Strategic',data:trD.map(d=>d.Strategic),borderColor:PC.Strategic,borderWidth:2.5,pointRadius:4,fill:false},{label:'Scale',data:trD.map(d=>d.Scale),borderColor:PC.Scale,borderWidth:2.5,pointRadius:4,fill:false},{label:'2025 Baseline',data:[52.7,52.7,52.7,52.7],borderColor:'var(--dim)',borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:cD.t,boxWidth:10,font:{size:10}}}},scales:{x:{grid:{display:false},ticks:{color:cD.t}},y:{min:0,max:100,grid:{color:cD.g},ticks:{color:cD.t,callback:v=>v+'%'}}}}});
}

// ── ACCOUNT SUB-TABLE (sortable + filterable) ────────
let _acctSort={},_acctFilt={};
function _acctTableHTML(rid,q,pool){
  const WS=['9. Invoice Sent','10. Paid'],CS=['11. Churned'],DS=[];
  const sc=a=>{if(WS.includes(a.stage))return'var(--green)';if(CS.includes(a.stage))return'var(--red)';if(DS.includes(a.stage))return'var(--orange)';return'var(--muted)';};
  let rows=(ACCTS||[]).filter(a=>a.q===q&&a.pool===pool&&(!selGPCSM||a.csRep===selGPCSM)&&(!selGPMonth||(a.se||'').substring(5,7)===selGPMonth));
  const allStages=[...new Set(rows.map(a=>a.stage).filter(Boolean))].sort();
  const filt=_acctFilt[rid]||'';
  if(filt==='_won')rows=rows.filter(a=>WS.includes(a.stage));
  else if(filt==='_ch')rows=rows.filter(a=>CS.includes(a.stage));
  else if(filt==='_dc')rows=rows.filter(a=>DS.includes(a.stage));
  else if(filt)rows=rows.filter(a=>a.stage===filt);
  const {col,dir}=_acctSort[rid]||{col:'rev',dir:-1};
  rows=[...rows].sort((a,b)=>{
    if(col==='rev')return dir*(b.rev-a.rev);
    if(col==='se')return dir*((a.se||'').localeCompare(b.se||''));
    if(col==='stage')return dir*((a.stage||'').localeCompare(b.stage||''));
    return 0;
  });
  const sa=c=>{const s=_acctSort[rid];return(s&&s.col===c)?(s.dir===1?'↑':'↓'):'<span style="opacity:.3">↕</span>';};
  const grpOpts=[{v:'_won',l:'Won'},{v:'_ch',l:'Churned'},{v:'_dc',l:'Declined Early'}].map(g=>`<option value="${g.v}"${filt===g.v?' selected':''}>${g.l}</option>`).join('');
  const stOpts=allStages.map(s=>`<option value="${s}"${filt===s?' selected':''}>${s.replace(/^\d+\.\s*/,'')}</option>`).join('');
  const filtActive=filt?`color:var(--accent);border-color:var(--accent)`:`color:var(--dim)`;
  return `<table style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr style="background:rgba(255,255,255,.04)"><th style="text-align:left;padding:5px 8px 5px 32px;color:var(--dim);font-weight:500">Account</th><th style="text-align:left;padding:5px 8px;color:var(--dim);font-weight:500">CSM</th><th style="text-align:left;padding:5px 8px;color:var(--dim);font-weight:500"><span style="cursor:pointer;user-select:none" onclick="_sortAcct('${rid}','${q}','${pool}','stage')">Stage ${sa('stage')}</span> <select onclick="event.stopPropagation()" onchange="_filtAcct('${rid}','${q}','${pool}',this.value)" style="font-size:10px;background:var(--cd);border:1px solid var(--border);${filtActive};border-radius:4px;padding:1px 4px;cursor:pointer;vertical-align:middle;font-family:inherit"><option value="">all</option>${grpOpts}${stOpts?'<option disabled>──────</option>'+stOpts:''}</select>${filt?` <button onclick="event.stopPropagation();_filtAcct('${rid}','${q}','${pool}','')" style="font-size:10px;background:transparent;border:none;color:var(--dim);cursor:pointer;padding:0 2px;vertical-align:middle" title="Clear filter">✕</button>`:''}${rows.length!==((ACCTS||[]).filter(a=>a.q===q&&a.pool===pool&&(!selGPCSM||a.csRep===selGPCSM)&&(!selGPMonth||(a.se||'').substring(5,7)===selGPMonth)).length)?` <span style="font-size:10px;color:var(--dim)">${rows.length} shown</span>`:''}</th><th style="text-align:right;padding:5px 8px;color:var(--dim);font-weight:500;cursor:pointer;user-select:none" onclick="_sortAcct('${rid}','${q}','${pool}','rev')">Revenue ${sa('rev')}</th><th style="text-align:left;padding:5px 8px;color:var(--dim);font-weight:500;cursor:pointer;user-select:none" onclick="_sortAcct('${rid}','${q}','${pool}','se')">Sub End ${sa('se')}</th><th style="text-align:center;padding:5px 8px;color:var(--dim);font-weight:500">Risk</th><th style="text-align:left;padding:5px 8px;color:var(--dim);font-weight:500">Notes</th></tr></thead><tbody>${rows.map((a,idx)=>{const noteId='gpn_'+rid+'_'+idx;const hasNote=a.notes&&a.notes.trim();return`<tr style="border-top:1px solid rgba(255,255,255,.05)"><td style="padding:3px 8px 3px 32px;color:var(--text)">${a.n}</td><td style="padding:3px 8px;color:var(--dim)">${a.csRep||'—'}</td><td style="padding:3px 8px;color:${sc(a)}">${(a.stage||'').replace(/^\d+\.\s*/,'')}</td><td style="padding:3px 8px;text-align:right">${a.rev?fmt(a.rev):'—'}</td><td style="padding:3px 8px;color:var(--dim);font-size:11px">${fmtSE(a.se)}</td><td style="text-align:center;padding:3px 8px">${a.rsk?'<span style="color:var(--red);font-weight:600">⚠</span>':'<span style="color:var(--dim)">—</span>'}</td><td style="padding:3px 8px">${hasNote?`<span style="cursor:pointer;color:var(--accent);font-size:11px" onclick="(function(){var n=document.getElementById('${noteId}');n.style.display=n.style.display===''?'none':''})()">▸ note</span>`:'<span style="color:var(--dim)">—</span>'}</td></tr>${hasNote?`<tr id="${noteId}" style="display:none"><td colspan="7" style="padding:3px 8px 8px 32px;font-size:11px;color:var(--muted);background:rgba(0,0,0,.2);line-height:1.6">${a.notes}</td></tr>`:''}`}).join('')}</tbody></table>`;
}
function _rAcctTable(rid,q,pool){const c=document.getElementById(rid+'_acct');if(c)c.innerHTML=_acctTableHTML(rid,q,pool);}
function _sortAcct(rid,q,pool,col){const cur=_acctSort[rid]||{col:'rev',dir:-1};_acctSort[rid]={col,dir:cur.col===col?-cur.dir:1};_rAcctTable(rid,q,pool);}
function _filtAcct(rid,q,pool,stage){_acctFilt[rid]=stage;_rAcctTable(rid,q,pool);}
function _openPool(rid,q,pool,filt){
  var e=document.getElementById(rid);if(!e)return;
  const wasOpen=e.style.display==='';
  const sameFilt=(_acctFilt[rid]||'')===filt;
  if(wasOpen&&sameFilt){e.style.display='none';}
  else{e.style.display='';_acctFilt[rid]=filt;_rAcctTable(rid,q,pool);}
}

// ── GP RETENTION ────────────────────────────────────
function rGP(){
  const el=document.getElementById('tab-gp_grr');const q=selQ;
  const tKey=q;const tgt=GP_T[tKey]?.full||63;
  const pools=["Enterprise","Strategic","Scale"];

  // Quarter → month mapping
  const QML={Q1:[['01','Jan'],['02','Feb'],['03','Mar']],Q2:[['04','Apr'],['05','May'],['06','Jun']],Q3:[['07','Jul'],['08','Aug'],['09','Sep']],Q4:[['10','Oct'],['11','Nov'],['12','Dec']]};

  // Filter setup: all accounts in quarter
  const qAccts=(ACCTS||[]).filter(a=>a.q===q);
  const csmList=[...new Set(qAccts.map(a=>a.csRep).filter(Boolean))].sort();
  if(selGPCSM&&!csmList.includes(selGPCSM))selGPCSM=null;
  // CSM-filtered only (used for month button counts)
  const csmFiltered=selGPCSM?qAccts.filter(a=>a.csRep===selGPCSM):qAccts;
  // Full filtered (CSM + month) used everywhere else
  const filtAccts=selGPMonth?csmFiltered.filter(a=>(a.se||'').substring(5,7)===selGPMonth):csmFiltered;

  // Re-aggregate per-pool data from filtered accounts (or use global GRR when no active filters)
  const WS=['9. Invoice Sent','10. Paid'],CS=['11. Churned'],DS=[];
  const needsReagg=selGPCSM||selGPMonth;
  const grrQ=needsReagg?(()=>{
    const r={};pools.forEach(p=>{r[p]={logos:0,won:0,lost:0,declined:0,open:0,rev:0,rw:0,rl:0,rd:0};});
    filtAccts.forEach(a=>{const p=a.pool;if(!r[p])return;r[p].logos++;r[p].rev+=a.rev||0;
      if(WS.includes(a.stage)){r[p].won++;r[p].rw+=a.rev||0;}
      else if(CS.includes(a.stage)){r[p].lost++;r[p].rl+=a.rev||0;}
      else if(DS.includes(a.stage)){r[p].declined++;r[p].rd+=a.rev||0;}
      else{r[p].open++;}
    });return r;
  })():GRR[q];

  // Scenario modeling
  let totalOpen=0,totalWon=0,totalLogos=0,totalDeclined=0;
  pools.forEach(p=>{const d=grrQ[p];totalOpen+=d.open;totalWon+=d.won;totalLogos+=d.logos;totalDeclined+=d.declined});
  const totalWinback=(filtAccts||[]).filter(a=>a.stage==='4a. Attempting again Q2').length;
  const totalTrulyOpen=Math.max(0,totalOpen-totalWinback);
  const floorN=Math.ceil(totalLogos*GP_T[tKey]?.floor/100)||0;
  const fullN=Math.ceil(totalLogos*GP_T[tKey]?.full/100)||0;
  const accelN=Math.ceil(totalLogos*GP_T[tKey]?.accel/100)||0;
  const gapFloor=Math.max(0,floorN-totalWon);
  const gapFull=Math.max(0,fullN-totalWon);
  const gapAccel=Math.max(0,accelN-totalWon);

  // Snapshot state (covers GP Retention + Cadence)
  const _rcSnap=_rcLoadSnap();
  const _rcTs=_rcSnap?new Date(_rcSnap.ts).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):null;
  const _rcPools=(_rcSnap?.gpRetention||{})[q]||null;
  const _rcD=(p,k,inv)=>{if(!_rcPools||!_rcPools[p])return'';const d=(grrQ[p]||{})[k]||0,old=_rcPools[p][k]||0,diff=d-old;if(!diff)return'';const good=inv?diff<0:diff>0;return`<span style="font-size:9px;font-weight:700;color:${good?'var(--green)':'var(--red)'};margin-left:3px">${diff>0?'▲':'▼'}${Math.abs(diff)}</span>`;};
  const _rcDPct=(p,num,den)=>{if(!_rcPools||!_rcPools[p])return'';const cd=(grrQ[p]||{})[den]||0,cn=(grrQ[p]||{})[num]||0,od=_rcPools[p][den]||0,on_=_rcPools[p][num]||0;if(!cd||!od)return'';const diff=(cd>0?cn/cd*100:0)-(od>0?on_/od*100:0);if(Math.abs(diff)<0.05)return'';return`<span style="font-size:9px;font-weight:700;color:${diff>0?'var(--green)':'var(--red)'};margin-left:3px">${diff>0?'▲':'▼'}${Math.abs(diff).toFixed(1)}pp</span>`;};

  el.innerHTML=`
    <div style="margin-bottom:10px;display:flex;align-items:center;gap:16px;flex-wrap:wrap">
      <div>${["Q1","Q2","Q3","Q4"].map(qq=>`<button class="qbtn ${qq===q?'active':''}" onclick="selQ='${qq}';selGPMonth=null;rT('gp_grr')">${qq}${qq==="Q1"?" (Gifted)":""}</button>`).join('')}</div>
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:11px;color:var(--dim);white-space:nowrap">Month:</span>
        ${QML[q].map(([mn,ml])=>{const cnt=csmFiltered.filter(a=>(a.se||'').substring(5,7)===mn).length;return`<button class="qbtn ${selGPMonth===mn?'active':''}" style="padding:4px 10px;font-size:11px" onclick="selGPMonth=selGPMonth==='${mn}'?null:'${mn}';rT('gp_grr')">${ml}<span style="font-size:10px;opacity:.7;margin-left:3px">${cnt}</span></button>`;}).join('')}
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <label style="font-size:12px;color:var(--dim);white-space:nowrap">CSM:</label>
        <select onchange="selGPCSM=this.value||null;rT('gp_grr')" style="background:var(--cd);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;font-family:inherit">
          <option value=""${!selGPCSM?' selected':''}>All CSMs (${csmFiltered.length})</option>
          ${csmList.map(c=>`<option value="${c}"${selGPCSM===c?' selected':''}>${c} (${csmFiltered.filter(a=>a.csRep===c).length})</option>`).join('')}
        </select>
        ${selGPCSM?`<button onclick="selGPCSM=null;rT('gp_grr')" style="background:transparent;border:1px solid var(--border);color:var(--dim);border-radius:6px;padding:5px 9px;font-size:11px;cursor:pointer">✕ Clear</button>`:''}
      </div>
    </div>
    <div class="cards">${(()=>{const tot={logos:0,won:0,lost:0,declined:0,open:0,rev:0,rw:0,rl:0,rd:0};pools.forEach(p=>{const d=grrQ[p]||{};for(const k in tot)tot[k]+=(d[k]||0);});return poolCard('Total',tot,tgt,q==="Q1");})()}${pools.map(p=>poolCard(p,grrQ[p],tgt,q==="Q1")).join('')}</div>
    ${q!=="Q1"?`<div class="card"><h3>What Needs to Happen — ${q}${selGPCSM?' · '+selGPCSM:''}</h3><div class="sh">Wins needed from ${totalTrulyOpen} open + ${totalWinback} Win-back accounts to hit targets</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:10px">
        ${[{l:"Floor ("+GP_T[tKey]?.floor+"%)",n:floorN,g:gapFloor,c:gapFloor<=0?"var(--green)":"var(--amber)",t:GP_T[tKey]?.floor/100},{l:"Full ("+GP_T[tKey]?.full+"%)",n:fullN,g:gapFull,c:gapFull<=0?"var(--green)":"var(--amber)",t:GP_T[tKey]?.full/100},{l:"Accel ("+GP_T[tKey]?.accel+"%+)",n:accelN,g:gapAccel,c:gapAccel<=0?"var(--green)":"var(--red)",t:GP_T[tKey]?.accel/100}].map(x=>{const convNeeded=totalOpen>0?Math.max(0,x.g/totalOpen*100):0;return`<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 16px;flex:1;min-width:140px;text-align:center">
          <div style="font-size:10px;color:var(--dim);text-transform:uppercase;margin-bottom:4px">${x.l}</div>
          <div style="font-size:22px;font-weight:700;color:${x.c};font-family:var(--mono)">${x.g<=0?'✓ Hit':'Need '+x.g}</div>
          <div style="font-size:11px;color:var(--dim)">${x.n} logos required of ${totalLogos}</div>
          ${x.g>0?`<div style="font-size:10px;color:var(--muted);margin-top:4px">${pct(convNeeded)} of open accounts</div>`:''}
        </div>`;}).join('')}
      </div>
      <div style="margin-top:14px">
        <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px">
          <label style="font-size:12px;color:var(--muted)">Scenario: How many open accounts (${totalOpen}) do we need to close to hit X%?</label>
          <span style="font-size:11px;color:var(--dim)">Today (0 closed): <strong style="color:var(--amber)">${pct(totalWon/totalLogos*100)}</strong> · Max (${totalOpen} closed): <strong style="color:var(--green)">${pct((totalWon+totalOpen)/totalLogos*100)}</strong></span>
        </div>
        <div style="padding:8px 0;cursor:pointer">
        <input type="range" class="scenario-slider" id="scenario-${q}" min="0" max="${totalOpen}" value="${Math.min(gapFloor,totalOpen)}" oninput="updateScenario('${q}',this.value,${totalOpen},${totalWon},${totalLogos})" onmousedown="this.focus()" style="touch-action:none;background:linear-gradient(to right,var(--accent) ${totalOpen>0?Math.round(Math.min(gapFloor,totalOpen)/totalOpen*100):0}%,#1e293b ${totalOpen>0?Math.round(Math.min(gapFloor,totalOpen)/totalOpen*100):0}%)">
        </div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--dim)"><span>0 closed</span><span id="scenario-label-${q}">${Math.min(gapFloor,totalOpen)} accounts closed → <strong style="color:var(--accent)">${pct((totalWon+Math.min(gapFloor,totalOpen))/totalLogos*100)}</strong></span><span>${totalOpen} closed</span></div>
      </div>
    </div>`:''}
    <div class="card">
      <h3>${q} Revenue Context${selGPCSM?' · '+selGPCSM:''}</h3>
      <div class="sh">Revenue associated with each pool (for future GRR tracking)${_rcTs?` · <span style="color:var(--dim);font-size:10px">📸 compared to ${_rcTs}</span>`:''}</div>
      <table><thead><tr><th style="text-align:left">Pool</th><th style="text-align:right">Logos</th><th style="text-align:right">Won</th><th style="text-align:right">Churned</th><th style="text-align:right">Declined</th><th style="text-align:right">Logo Ret.</th><th style="text-align:right">Floor</th><th style="text-align:right">Accts Needed</th><th style="text-align:right">Revenue Up</th><th style="text-align:right">Rev Won</th><th style="text-align:right">Rev GRR</th></tr></thead>

dding:0 0 8px 0;background:rgba(0,0,0,.2)"><div id="${rid}_acct">${_acctTableHTML(rid,q,p)}</div></td></tr>`;}).join('')}

function updateScenario(q,val,tOpen,tWon,tLogos){

function rTargets(){

  let rows=qs.map(q=>{
    let tl=0,tw=0,tlo=0,tde=0;

      ACCTS.filter(function(a){return a.q===q;}).forEach(function(a){tl++;if(_WS.includes(a.stage))tw++;else if(_CS.includes(a.stage))tlo++;else if(_DS.includes(a.stage))tde++;});

  const spRet=SP.logos>0?(SP.won/SP.logos)*100:0;const spTgt=SP_T.Q2?.full||55;const spNeed=Math.ceil(SP.logos*spTgt/100);const spGap=spNeed-SP.won;
  el.innerHTML=`
    <div class="grid2"><div>${ed("GP Retention Targets",GP_T,"gp")}</div><div>${ed("SP Retention Targets",SP_T,"sp")}</div></div>
    <div class="card" style="overflow-x:auto"><h3>GP Quarterly Logo Retention Modeling</h3><div class="sh">Logos up for renewal — 4-state breakdown with gap analysis</div>
      <table><thead><tr><th style="text-align:left">Period</th><th style="text-align:right">Logos Up</th><th style="text-align:right">Won</th><th style="text-align:right">Churned</th><th style="text-align:right">Declined</th><th style="text-align:right">Current</th><th style="text-align:right">Target</th><th style="text-align:right">Logos Needed</th><th style="text-align:right">Gap</th></tr></thead><tbody>${rows}</tbody></table></div>
    <div class="card"><h3>SP Retention Modeling</h3><div class="sh">SP annual renewal pool — logo-based</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:14px">${[{l:"Total Logos",v:SP.logos,c:"var(--text)"},{l:"Current Ret.",v:pct(spRet),c:spRet>=spTgt?"var(--green)":"var(--amber)"},{l:"Target",v:spTgt+"%",c:"var(--muted)"},{l:"Logos Needed",v:spNeed,c:"var(--muted)"},{l:"Gap",v:spGap>0?"−"+spGap:"+"+Math.abs(spGap),c:spGap>0?"var(--red)":"var(--green)"}].map(x=>`<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 16px;text-align:center;min-width:90px;flex:1"><div style="font-size:10px;color:var(--dim);text-transform:uppercase;margin-bottom:3px">${x.l}</div><div style="font-size:18px;font-weight:700;color:${x.c};font-family:var(--mono)">${x.v}</div></div>`).join('')}</div></div>`}

function updateTargets(pfx){

          h+='<td class="mono" style="text-align:right;padding:5px 6px;color:var(--green)">'+(d.won||0)+(od?dB(d.won||0,od.won||0,false):'')+'</td>';
          h+='<td class="mono" style="text-align:right;padding:5px 6px;color:var(--red)">'+(d.lost||0)+(od?dB(d.lost||0,od.lost||0,true):'')+'</td>';
          h+='<td class="mono" style="text-align:right;padding:5px 6px;color:var(--orange)">'+(d.declined||0)+(od?dB(d.declined||0,od.declined||0,true):'')+'</td>';
        });
        h+='</tr>';
      });
      h+='</tbody></table></div>';
      // Pool movement pills (when comparing) — clickable to show account sub-table
      if(cmpSnap){
        const mvs=[];
        qs.forEach(function(q){pools.forEach(function(p){
          const d=(snap.gpRetention&&snap.gpRetention[q]&&snap.gpRetention[q][p])||{};
          const od=(cmpSnap.gpRetention&&cmpSnap.gpRetention[q]&&cmpSnap.gpRetention[q][p])||{};
          ['logos','won','lost','declined'].forEach(function(k){const diff=(d[k]||0)-(od[k]||0);if(diff!==0)mvs.push({q:q,p:p,k:k,diff:diff,cur:d[k]||0,prev:od[k]||0});});
        });});
        h+='<div style="margin-top:14px"><div style="font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Pool Changes — '+cmpLabel+' <span style="font-weight:400;text-transform:none;letter-spacing:0">· click to see moved accounts</span></div>';
        if(!mvs.length){
          h+='<div style="font-size:11px;color:var(--dim);padding:4px 0">No GP changes between these snapshots.</div>';
        }else{
          const kL={logos:'Logos',won:'Won',lost:'Churned',declined:'Declined'};
          // Each pill + its own inline diff panel (unique rid per metric)
          mvs.forEach(function(mv){
            const isInv=mv.k==='lost'||mv.k==='declined';
            const good=isInv?mv.diff<0:mv.diff>0;
            const rid='rchp_'+i+'_'+mv.q+'_'+mv.p.replace(/\s+/g,'')+'_'+mv.k;
            h+='<div style="margin-bottom:4px">';
            // Pill
            h+='<div style="display:inline-flex;align-items:center;padding:5px 10px;border-radius:6px;background:'+(good?'rgba(52,211,153,.08)':'rgba(239,68,68,.08)')+';border:1px solid '+(good?'rgba(52,211,153,.2)':'rgba(239,68,68,.2)')+';font-size:11px;cursor:pointer;user-select:none" onclick="(function(){var e=document.getElementById(\''+rid+'\');if(e)e.style.display=e.style.display===\'none\'?\'\':\'none\';})()">';
            h+='<span style="color:var(--dim)">'+mv.q+' '+mv.p+' '+kL[mv.k]+'</span>';
            h+='<span style="font-weight:700;color:'+(good?'var(--green)':'var(--red)')+';margin-left:6px">'+(mv.diff>0?'+':'')+mv.diff+'</span>';
            h+='<span style="font-size:10px;color:var(--dim);margin-left:4px">'+mv.prev+'→'+mv.cur+'</span>';
            h+='<span style="font-size:10px;color:var(--dim);margin-left:5px">▸</span>';
            h+='</div>';
            // Inline diff panel (hidden by default)
            h+='<div id="'+rid+'" style="display:none;margin-top:4px;padding:10px 12px;background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:6px">';
            const s1Accts=(snap.gpRetention&&snap.gpRetention[mv.q]&&snap.gpRetention[mv.q][mv.p]&&snap.gpRetention[mv.q][mv.p].accounts)||null;
            const s2Accts=(cmpSnap&&cmpSnap.gpRetention&&cmpSnap.gpRetention[mv.q]&&cmpSnap.gpRetention[mv.q][mv.p]&&cmpSnap.gpRetention[mv.q][mv.p].accounts)||null;
            if(s1Accts===null||s2Accts===null){
              h+='<div style="font-size:11px;color:var(--dim);font-style:italic">No account-level data in one or both snapshots. Save a new snapshot to enable account comparison.</div>';
            }else{
              // Build sets for diff
              const statusKey=mv.k==='lost'?'churned':mv.k==='declined'?'declined':mv.k==='won'?'won':null;
              var gained=[],lostAccts=[];
              if(statusKey){
                const s1Set=new Set(s1Accts.filter(function(a){return a.status===statusKey;}).map(function(a){return a.n;}));
                const s2Set=new Set(s2Accts.filter(function(a){return a.status===statusKey;}).map(function(a){return a.n;}));
                gained=s1Accts.filter(function(a){return a.status===statusKey&&!s2Set.has(a.n);});
                lostAccts=s2Accts.filter(function(a){return a.status===statusKey&&!s1Set.has(a.n);});
              }else{
                // logos: net new or removed accounts
                const s1Names=new Set(s1Accts.map(function(a){return a.n;}));
                const s2Names=new Set(s2Accts.map(function(a){return a.n;}));
                gained=s1Accts.filter(function(a){return!s2Names.has(a.n);});
                lostAccts=s2Accts.filter(function(a){return!s1Names.has(a.n);});
              }
              if(!gained.length&&!lostAccts.length){
                h+='<div style="font-size:11px;color:var(--dim);font-style:italic">Account names are unchanged — the count shift may reflect re-categorization without name changes.</div>';
              }else{
                const acctRow=function(a,color){
                  const fmt=function(n){return n>=1e6?'$'+(n/1e6).toFixed(1)+'M':n>=1e3?'$'+(n/1e3).toFixed(0)+'K':'$'+Math.round(n);};
                  return'<tr style="border-top:1px solid rgba(255,255,255,.05)"><td style="padding:3px 10px 3px 0;color:'+color+';font-weight:500">'+a.n+'</td><td style="padding:3px 10px;color:var(--dim)">'+( a.csRep||'—')+'</td><td style="padding:3px 10px;text-align:right;color:var(--dim)">'+( a.rev?fmt(a.rev):'—')+'</td></tr>';
                };
                h+='<table style="border-collapse:collapse;font-size:11px;width:100%"><thead><tr><th style="text-align:left;padding:3px 10px 3px 0;color:var(--dim)">Account</th><th style="text-align:left;padding:3px 10px;color:var(--dim)">CSM</th><th style="text-align:right;padding:3px 10px;color:var(--dim)">Rev</th></tr></thead><tbody>';
                if(gained.length){
                  h+='<tr><td colspan="3" style="padding:5px 0 2px;font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.5px">▲ Gained ('+gained.length+')</td></tr>';
                  gained.sort(function(a,b){return(b.rev||0)-(a.rev||0);}).forEach(function(a){h+=acctRow(a,'var(--green)');});
                }
                if(lostAccts.length){
                  h+='<tr><td colspan="3" style="padding:5px 0 2px;font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.5px">▼ Lost ('+lostAccts.length+')</td></tr>';
                  lostAccts.sort(function(a,b){return(b.rev||0)-(a.rev||0);}).forEach(function(a){h+=acctRow(a,'var(--red)');});
                }
                h+='</tbody></table>';
              }
            }
            h+='</div></div>';
          });
        }
        h+='</div>';
      }
      // Cadence table with deltas
      h+='<div style="font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px">Cadence — call counts per CSM'+(cmpSnap?' (Δ shown)':'')+'</div>';
      h+='<div style="overflow-x:auto"><table style="border-collapse:collapse;width:100%;font-size:11px">';
      h+='<thead><tr style="border-bottom:1px solid var(--border)"><th style="text-align:left;padding:4px 10px;color:var(--dim)">CSM</th><th style="text-align:right;padding:4px 8px;color:var(--dim)">Total</th>';
      cadMonths.forEach(function(m){h+='<th style="text-align:center;padding:4px 6px;color:var(--dim);white-space:nowrap;font-size:10px">'+m+'</th>';});
      h+='</tr></thead><tbody>';
      const cadEntries=Object.entries(snap.cadence||{}).sort(function(a,b){return a[0].localeCompare(b[0]);});
      if(cadEntries.length){
        cadEntries.forEach(function(entry){
          const csm=entry[0],d=entry[1];
          const od=cmpSnap&&cmpSnap.cadence&&cmpSnap.cadence[csm]?cmpSnap.cadence[csm]:null;
          h+='<tr style="border-top:1px solid rgba(255,255,255,.05)"><td style="padding:4px 10px;font-weight:500">'+csm+'</td>';
          h+='<td class="mono" style="text-align:right;padding:4px 8px;color:var(--dim)">'+(d.total||0)+(od?dB(d.total||0,od.total||0,false):'')+'</td>';
          cadMonths.forEach(function(m){
            const cnt=(d.months||{})[m]||0;
            const ocnt=od?(od.months||{})[m]||0:null;
            h+='<td class="mono" style="text-align:center;padding:4px 6px"><span style="color:'+(cnt>0?'var(--green)':'var(--dim)')+'">'+( cnt||'—')+'</span>';
            if(ocnt!=null){const diff=cnt-ocnt;if(diff!==0)h+='<span style="font-size:9px;font-weight:700;color:'+(diff>0?'var(--green)':'var(--red)')+';margin-left:2px">'+(diff>0?'+':'')+diff+'</span>';}
            h+='</td>';
          });
          h+='</tr>';
        });
        // CSM cadence movement summary
        if(cmpSnap){
          const csmMvs=[];
          const allCsms=new Set(Object.keys(snap.cadence||{}).concat(Object.keys((cmpSnap&&cmpSnap.cadence)||{})));
          allCsms.forEach(function(csm){
            const ct1=Object.values(((snap.cadence&&snap.cadence[csm]&&snap.cadence[csm].months)||{})).reduce(function(s,v){return s+v;},0);
            const ct2=Object.values(((cmpSnap&&cmpSnap.cadence&&cmpSnap.cadence[csm]&&cmpSnap.cadence[csm].months)||{})).reduce(function(s,v){return s+v;},0);
            const diff=ct1-ct2;if(diff!==0)csmMvs.push({csm:csm,diff:diff,cur:ct1,prev:ct2});
          });
          if(csmMvs.length){
            csmMvs.sort(function(a,b){return Math.abs(b.diff)-Math.abs(a.diff);});
            h+='<tr><td colspan="'+(cadMonths.length+2)+'" style="padding:10px 10px 8px;border-top:1px solid var(--border)">';
            h+='<div style="font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">CSM Cadence Changes <span style="font-weight:400;text-transform:none;letter-spacing:0">· click to see month breakdown</span></div>';
            h+='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px">';
            csmMvs.forEach(function(mv){
              const csmRid='rcch_'+i+'_'+mv.csm.replace(/\W/g,'_');
              h+='<div style="padding:4px 8px;border-radius:5px;background:'+(mv.diff>0?'rgba(52,211,153,.08)':'rgba(239,68,68,.08)')+';border:1px solid '+(mv.diff>0?'rgba(52,211,153,.2)':'rgba(239,68,68,.2)')+';font-size:11px;cursor:pointer;user-select:none" onclick="(function(){var e=document.getElementById(\''+csmRid+'\');if(e)e.style.display=e.style.display===\'none\'?\'\':\'none\';})()">';
              h+='<span style="color:var(--dim)">'+mv.csm+'</span>';
              h+='<span style="font-weight:700;color:'+(mv.diff>0?'var(--green)':'var(--red)')+';margin-left:5px">'+(mv.diff>0?'+':'')+mv.diff+'</span>';
              h+='<span style="font-size:10px;color:var(--dim);margin-left:4px">('+mv.prev+'→'+mv.cur+')</span>';
              h+='<span style="font-size:10px;color:var(--dim);margin-left:5px">▸</span>';
              h+='</div>';
            });
            h+='</div>';
            // Hidden month breakdown panels
            csmMvs.forEach(function(mv){
              const csmRid='rcch_'+i+'_'+mv.csm.replace(/\W/g,'_');
              const d1=snap.cadence&&snap.cadence[mv.csm]?snap.cadence[mv.csm]:null;
              const d2=cmpSnap&&cmpSnap.cadence&&cmpSnap.cadence[mv.csm]?cmpSnap.cadence[mv.csm]:null;
              const allMs=Array.from(new Set(Object.keys((d1&&d1.months)||{}).concat(Object.keys((d2&&d2.months)||{})))).sort();
              h+='<div id="'+csmRid+'" style="display:none;margin-bottom:6px;padding:10px 12px;background:rgba(0,0,0,.25);border-radius:6px;border:1px solid var(--border)">';
              h+='<div style="font-size:11px;font-weight:600;color:var(--text);margin-bottom:8px">'+mv.csm+' — Month Breakdown</div>';
              h+='<table style="border-collapse:collapse;font-size:11px"><thead><tr>';
              h+='<th style="padding:3px 10px 3px 0;color:var(--dim);text-align:left">Month</th>';
              h+='<th style="padding:3px 10px;color:var(--dim);text-align:center">This Snap</th>';
              h+='<th style="padding:3px 10px;color:var(--dim);text-align:center">Prev Snap</th>';
              h+='<th style="padding:3px 10px;color:var(--dim);text-align:center">Δ</th>';
              h+='</tr></thead><tbody>';
              allMs.forEach(function(m){
                const c1=(d1&&d1.months&&d1.months[m])||0;
                const c2=(d2&&d2.months&&d2.months[m])||0;
                const diff=c1-c2;
                h+='<tr style="border-top:1px solid rgba(255,255,255,.05)">';
                h+='<td style="padding:3px 10px 3px 0;color:var(--dim)">'+m+'</td>';
                h+='<td style="padding:3px 10px;text-align:center;color:'+(c1>0?'var(--green)':'var(--dim)')+'">'+( c1||'—')+'</td>';
                h+='<td style="padding:3px 10px;text-align:center;color:'+(c2>0?'var(--green)':'var(--dim)')+'">'+( c2||'—')+'</td>';
                h+='<td style="padding:3px 10px;text-align:center;font-weight:700;color:'+(diff>0?'var(--green)':diff<0?'var(--red)':'var(--dim)')+'">'+( diff!==0?(diff>0?'+':'')+diff:'—')+'</td>';
                h+='</tr>';
              });
              h+='</tbody></table></div>';
            });
            h+='</td></tr>';
          }
        }
      }else{
        h+='<tr><td colspan="'+(cadMonths.length+2)+'" style="padding:8px 10px;color:var(--dim)">No cadence data in this snapshot.</td></tr>';
      }
      h+='</tbody></table></div></div>';
    }
    h+='</div>';
  });
  h+='</div></div>';
  el.innerHTML=h;
}
function rT(id){switch(id){case'overview':rOverview();break;case'gp_grr':rGP();break;case'sp_grr':rSP();break;case'cadence':rCadence();break;case'payout':rPayout();break;case'targets':rTargets();break;case'risk':rRisk();break;case'rules':rRules();break;case'rc_history':rRCHistory();break}}
rOverview();
</script>
</body>
