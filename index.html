<script>

// ── OAUTH2 PKCE ───────────────────────────────────────────────────────────────
function b64url(buf){return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
async function genVerifier(){const a=new Uint8Array(32);crypto.getRandomValues(a);return b64url(a);}
async function genChallenge(v){return b64url(await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v)));}
async function startLogin(){
  sessionStorage.clear();
  const v=await genVerifier(), c=await genChallenge(v);
  sessionStorage.setItem('pkce_v',v);
  const p=new URLSearchParams({client_id:CLIENT_ID,response_type:'code',redirect_uri:REDIRECT,scope:SCOPES,code_challenge:c,code_challenge_method:'S256',response_mode:'fragment',prompt:'select_account'});
  location.href=`https://login.microsoftonline.com/${TENANT}/oauth2/v2.0/authorize?${p}`;
}
async function exchangeCode(code){
  const body=new URLSearchParams({client_id:CLIENT_ID,grant_type:'authorization_code',code,redirect_uri:REDIRECT,code_verifier:sessionStorage.getItem('pkce_v'),scope:SCOPES});
  const r=await fetch(`https://login.microsoftonline.com/${TENANT}/oauth2/v2.0/token`,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
  const j=await r.json();
  if(j.error)throw new Error(j.error_description||j.error);
  return j;
}
function saveTokens(t){
  sessionStorage.setItem('at',t.access_token);
  if(t.refresh_token)sessionStorage.setItem('rt',t.refresh_token);
  sessionStorage.setItem('exp',Date.now()+((t.expires_in||3600)*1000));
}
async function getToken(){
  const exp=parseInt(sessionStorage.getItem('exp')||'0'), at=sessionStorage.getItem('at');
  if(at&&Date.now()<exp-60000)return at;
  const rt=sessionStorage.getItem('rt');
  if(rt){
    try{
      const body=new URLSearchParams({client_id:CLIENT_ID,grant_type:'refresh_token',refresh_token:rt,scope:SCOPES});
      const r=await fetch(`https://login.microsoftonline.com/${TENANT}/oauth2/v2.0/token`,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
      const j=await r.json();
      if(!j.error){saveTokens(j);return j.access_token;}
    }catch(e){}
  }
  throw new Error('login_required');
}

// ── ROBUST COLUMN LOOKUP ──────────────────────────────────────────────────────
// Normalise a header string: trim, collapse internal spaces, lower-case
function normKey(s){return String(s||'').trim().replace(/\s+/g,' ').toLowerCase();}

// Build column maps from a headers array (call after reading header row)
function buildColMaps(headers){
  COL={};COL_LC={};
  headers.forEach((h,i)=>{
    COL[h]=i;            // exact (already trimmed upstream)
    COL_LC[normKey(h)]=i; // normalised
  });
}

// Lookup column index by name — tries exact, then normalised
function colIdx(name){
  let i=COL[name];
  if(i!==undefined)return i;
  i=COL[name.trim()];
  if(i!==undefined)return i;
  return COL_LC[normKey(name)];
}

// Get a cell value from a row by column name
function getCell(row,name){const i=colIdx(name);return i!==undefined?row[i]:undefined;}

// ── GRAPH API ─────────────────────────────────────────────────────────────────
async function getSharePointDriveId(token, ownerUpn){
  const siteRes=await fetch(`https://graph.microsoft.com/v1.0/sites/iconnections675-my.sharepoint.com:/personal/${ownerUpn}`,{headers:{Authorization:`Bearer ${token}`}});
  if(!siteRes.ok){const j=await siteRes.json().catch(()=>({}));throw new Error(`Site lookup for ${ownerUpn}: ${siteRes.status} — ${j.error?.message||'unknown'}`);}
  const site=await siteRes.json();
  const drivesRes=await fetch(`https://graph.microsoft.com/v1.0/sites/${site.id}/drives`,{headers:{Authorization:`Bearer ${token}`}});
  if(!drivesRes.ok){const j=await drivesRes.json().catch(()=>({}));throw new Error(`Drives for ${ownerUpn}: ${drivesRes.status} — ${j.error?.message||'unknown'}`);}
  const drives=await drivesRes.json();
  if(!drives.value||!drives.value.length)throw new Error(`No drives found for ${ownerUpn}`);
  return drives.value[0].id;
}

async function fetchSheet(token){
  const enc=encodeURIComponent(SHEET), errors=[];

  // Attempt 1: me/drive direct item lookup
  try{
    const r=await fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${FILE_ID}`,{headers:{Authorization:`Bearer ${token}`}});
    if(r.ok){
      const item=await r.json();
      const r2=await fetch(`https://graph.microsoft.com/v1.0/drives/${item.parentReference.driveId}/items/${FILE_ID}/workbook/worksheets/${enc}/usedRange(valuesOnly=true)`,{headers:{Authorization:`Bearer ${token}`}});
      if(r2.ok)return r2.json();
      const j2=await r2.json().catch(()=>({}));
      errors.push(`me/drive workbook: ${r2.status} — ${j2.error?.message||'unknown'}`);
    } else {
      const j=await r.json().catch(()=>({}));errors.push(`me/drive item: ${r.status} — ${j.error?.message||'unknown'}`);
    }
  }catch(e){errors.push(`me/drive: ${e.message}`);}

  // Attempt 2: owner's SharePoint personal site drive (primary method per handoff)
  try{
    const driveId=await getSharePointDriveId(token, FILE_OWNER);
    const r=await fetch(`https://graph.microsoft.com/v1.0/drives/${driveId}/items/${FILE_ID}/workbook/worksheets/${enc}/usedRange(valuesOnly=true)`,{headers:{Authorization:`Bearer ${token}`}});
    if(r.ok)return r.json();
    const j=await r.json().catch(()=>({}));
    errors.push(`site drive workbook: ${r.status} — ${j.error?.message||'unknown'}`);
  }catch(e){errors.push(`site drive: ${e.message}`);}

  // Attempt 3: sharedWithMe search
  try{
    const r=await fetch('https://graph.microsoft.com/v1.0/me/drive/sharedWithMe',{headers:{Authorization:`Bearer ${token}`}});
    const j=await r.json();
    if(j.value&&j.value.length){
      const f=j.value.find(f=>f.id===FILE_ID||(f.remoteItem&&f.remoteItem.id===FILE_ID))||
               j.value.find(f=>(f.name||'').toLowerCase().includes('2026 renewal master'));
      if(f){
        const ri=f.remoteItem||f;
        const driveId=ri.parentReference?.driveId;
        const itemId=ri.id;
        if(driveId&&itemId){
          const r2=await fetch(`https://graph.microsoft.com/v1.0/drives/${driveId}/items/${itemId}/workbook/worksheets/${enc}/usedRange(valuesOnly=true)`,{headers:{Authorization:`Bearer ${token}`}});
          if(r2.ok)return r2.json();
          const j2=await r2.json().catch(()=>({}));
          errors.push(`sharedWithMe workbook: ${r2.status} — ${j2.error?.message||'unknown'}`);
        }
      }
    }
  }catch(e){errors.push(`sharedWithMe: ${e.message}`);}

  throw new Error(errors.join('<br>'));
}

// ── ENGAGEMENT FETCH ──────────────────────────────────────────────────────────
async function fetchEngSheet(token, sheetName){
  const enc=encodeURIComponent(sheetName);

  // Attempt 1: owner's SharePoint personal site drive (mirrors primary method above)
  try{
    const driveId=await getSharePointDriveId(token, ENG_OWNER);
    const r=await fetch(`https://graph.microsoft.com/v1.0/drives/${driveId}/items/${ENG_FILE_ID}/workbook/worksheets/${enc}/usedRange(valuesOnly=true)`,{headers:{Authorization:`Bearer ${token}`}});
    if(r.ok)return r.json();
  }catch(e){}

  // Attempt 2: me/drive
  try{
    const r=await fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${ENG_FILE_ID}/workbook/worksheets/${enc}/usedRange(valuesOnly=true)`,{headers:{Authorization:`Bearer ${token}`}});
    if(r.ok)return r.json();
  }catch(e){}

  // Attempt 3: sharedWithMe
  try{
    const r=await fetch('https://graph.microsoft.com/v1.0/me/drive/sharedWithMe',{headers:{Authorization:`Bearer ${token}`}});
    const j=await r.json();
    if(j.value){
      const f=j.value.find(f=>f.remoteItem?.id===ENG_FILE_ID||f.id===ENG_FILE_ID);
      if(f){
        const ri=f.remoteItem||f;
        const r2=await fetch(`https://graph.microsoft.com/v1.0/drives/${ri.parentReference?.driveId}/items/${ri.id}/workbook/worksheets/${enc}/usedRange(valuesOnly=true)`,{headers:{Authorization:`Bearer ${token}`}});
        if(r2.ok)return r2.json();
      }
    }
  }catch(e){}

  return null;
}

async function fetchAllEngagement(token){
  const engMap={};
  ENG_RAW=[];
  for(const [sheet,owner] of Object.entries(ENG_SHEETS)){
    try{
      const data=await fetchEngSheet(token,sheet);
      if(!data||!data.values||data.values.length<3)continue;
      // Header row is index 1 (row 2 in Excel)
      const engHeaders=data.values[1].map(h=>String(h||'').trim());
      const eColMap={};engHeaders.forEach((h,i)=>eColMap[normKey(h)]=i);
      function ec(row,name){const i=eColMap[normKey(name)];return i!==undefined?row[i]:'';}
      const yesNo=v=>String(v||'').toLowerCase().startsWith('y')?1:0;
      for(let i=2;i<data.values.length;i++){
        const row=data.values[i];
        const acct=String(ec(row,'Account Name')||'').trim();
        if(!acct)continue;
        // Column F = index 5 (contract end month)
        const rawEnd=String(row[5]||'').trim();
        const endMonth=parseEngEndMonth(rawEnd);
        const rec={
          acct,ro:owner,endMonth,rawEnd,
          out:yesNo(ec(row,'Outreach Sent? (Y/N)')||ec(row,'Outreach Sent?')),
          gms:yesNo(ec(row,'GM Scheduled? (Y/N)')||ec(row,'GM Scheduled?')),
          gm:yesNo(ec(row,'GM Completed? (Y/N)')||ec(row,'GM Completed?')),
          ap:yesNo(ec(row,'AP Delivered? (Y/N)')||ec(row,'AP Delivered?')),
          rsk:yesNo(ec(row,'Risk? (Y/N)')||ec(row,'Risk?')),
          mt:parseNum(ec(row,'Miami Mtgs')||ec(row,'Miami Meetings')),
          sentiment:String(ec(row,'Sentiment')||'')
        };
        engMap[acct]=rec;
        ENG_RAW.push(rec);
      }
    }catch(e){console.warn(`Failed to fetch engagement sheet "${sheet}":`,e);}
  }
  const engTotal=Object.keys(engMap).length;
  console.log(`=== ENGAGEMENT LOADED: ${engTotal} accounts ===`);
  if(engTotal===0)console.warn('Engagement data is empty — all sheet fetches may have failed');
  return engMap;
}

// ── SNAPSHOT (Movement tab) ───────────────────────────────────────────────────
function saveSnapshot(){
  try{
    const snap={ts:Date.now(),data:{}};
    D.forEach(d=>snap.data[d.c]=d.s);
    localStorage.setItem(SNAPSHOT_KEY,JSON.stringify(snap));
    PREV=snap.data;PREV_TS=snap.ts;
    render();
    alert('Snapshot saved! The Movement tab will now compare against this state on future refreshes.');
  }catch(e){alert('Could not save snapshot: '+e.message);}
}
function loadSnapshot(){
  try{
    const raw=localStorage.getItem(SNAPSHOT_KEY);
    if(!raw)return;
    const snap=JSON.parse(raw);
    PREV=snap.data||{};
    PREV_TS=snap.ts||null;
  }catch(e){PREV={};PREV_TS=null;}
}
function clearSnapshot(){
  localStorage.removeItem(SNAPSHOT_KEY);
  PREV={};PREV_TS=null;
  render();
}
function snapAge(){
  if(!PREV_TS)return null;
  const ms=Date.now()-PREV_TS, h=Math.floor(ms/3600000), m=Math.floor((ms%3600000)/60000);
  return h>0?`${h}h ${m}m ago`:`${m}m ago`;
}

// ── DATA HELPERS ──────────────────────────────────────────────────────────────
function fm(n){return n>=1e6?'$'+(n/1e6).toFixed(2)+'M':n>=1000?'$'+(n/1000).toFixed(0)+'K':'$'+Math.round(n);}
function gf(){return S.owner==='ALL'?D:D.filter(d=>d.ro===S.owner);}
function pct(a,b){return b>0?Math.round(a/b*100):0;}
function parseNum(v){return parseFloat(String(v||0).replace(/[$,]/g,''))||0;}
function parseEngEndMonth(v){
  if(!v)return'';
  // Excel serial date
  const n=parseFloat(v);
  if(!isNaN(n)&&n>1000){const d=new Date((n-25569)*86400*1000);return d.toISOString().substring(0,7);}
  // Already YYYY-MM or YYYY-MM-DD
  if(/^\d{4}-\d{2}/.test(v))return v.substring(0,7);
  // "Mar 2026", "March 2026", "Mar-26" etc.
  const mo={'jan':'01','feb':'02','mar':'03','apr':'04','may':'05','jun':'06','jul':'07','aug':'08','sep':'09','oct':'10','nov':'11','dec':'12'};
  const m=v.toLowerCase().match(/([a-z]{3})[a-z]*[\s\-\/]+(\d{2,4})/);
  if(m){const yr=m[2].length===2?'20'+m[2]:m[2];return`${yr}-${mo[m[1]]||''}`.replace(/-$/,'');}
  return v;
}
function excelDateToJS(v){
  if(!v)return'';
  const n=parseFloat(v);
  if(isNaN(n)||n<1000)return String(v).trim();
  return new Date((n-25569)*86400*1000).toISOString().split('T')[0];
}
function daysDiff(v){if(!v)return 0;const d=new Date(v);return isNaN(d)?0:Math.round((d-new Date())/864e5);}

const ST=['1. Uncontacted','2. Contacted No Interest','3. Contacted Follow-up Needed','4. Contacted Attempting Again','5. Proposal Made','6. Signature Requested','7. Signed','8. Closed Lost (Not Renewing)','9. Invoice Sent','10. Paid'];
const SH={'1. Uncontacted':'1. Uncontacted','2. Contacted No Interest':'2. No Interest','3. Contacted Follow-up Needed':'3. Follow-up Needed','4. Contacted Attempting Again':'4. Attempting Again','5. Proposal Made':'5. Proposal Made','6. Signature Requested':'6. Sig Requested','7. Signed':'7. Signed','8. Closed Lost (Not Renewing)':'8. Closed Lost','9. Invoice Sent':'9. Invoice Sent','10. Paid':'10. Paid'};
const CL={'1. Uncontacted':'#94a3b8','2. Contacted No Interest':'#f87171','3. Contacted Follow-up Needed':'#fbbf24','4. Contacted Attempting Again':'#fb923c','5. Proposal Made':'#a78bfa','6. Signature Requested':'#60a5fa','7. Signed':'#34d399','8. Closed Lost (Not Renewing)':'#ef4444','9. Invoice Sent':'#22d3ee','10. Paid':'#10b981'};
const SIG_L={ue:'Uncontacted Expiring',en:'Expiring No Offer',co:'No Outreach Tracked',pp:'Proposal No Price',se:'Sig Req Expiring',nm:'No Meetings',rf:'Risk Flagged',hr:'High Rev No Engagement',wb:'Win-Back'};
const SIG_C={ue:'b-red',en:'b-red',co:'b-orange',pp:'b-purple',se:'b-yellow',nm:'b-orange',rf:'b-red',hr:'b-red',wb:'b-blue'};

const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── STAGE NORMALISATION ───────────────────────────────────────────────────────
// Build lookup: normalised text → canonical stage string
const STAGE_NORM_MAP=new Map();
ST.forEach(s=>{
  STAGE_NORM_MAP.set(normKey(s),s);
  // Also map without numeric prefix ("contacted no interest" → "2. Contacted No Interest")
  const noPrefix=s.replace(/^\d+\.\s*/,'');
  STAGE_NORM_MAP.set(normKey(noPrefix),s);
  // Map by prefix number alone ("2" → ...)
  const m=s.match(/^(\d+)\./);
  if(m)STAGE_NORM_MAP.set(m[1],s);
});

function resolveStage(rawStage){
  if(!rawStage)return null;
  const raw=String(rawStage).trim();
  // Exact match first
  if(ST.includes(raw))return raw;
  // Normalised match
  const norm=normKey(raw);
  if(STAGE_NORM_MAP.has(norm))return STAGE_NORM_MAP.get(norm);
  // Partial: does the raw value contain a stage label?
  for(const [k,v] of STAGE_NORM_MAP){
    if(norm.includes(k)||k.includes(norm))return v;
  }
  return null;
}

// ── OFFER PRICE COLUMN CANDIDATES ─────────────────────────────────────────────
// The Excel column uses an en dash (U+2013) or em dash (U+2014) — try both
const OFFER_COLS=[
  'Offer Price \u2013 Total Contract Value',  // en dash
  'Offer Price \u2014 Total Contract Value',  // em dash
  'Offer Price - Total Contract Value',        // plain hyphen fallback
  'Offer Price\u2013Total Contract Value',     // no spaces around dash
  'Offer Price\u2014Total Contract Value',
  'Offer Price',                               // bare name
];

function computeSignals(row){
  const sg=[],{dy,r25,o,s,mt,rsk}=row;
  if(s==='1. Uncontacted'&&dy>0&&dy<=90)sg.push('ue');
  if((s==='3. Contacted Follow-up Needed'||s==='4. Contacted Attempting Again')&&o===0)sg.push('en');
  if(mt===0&&s!=='1. Uncontacted')sg.push('co');
  if(s==='5. Proposal Made'&&o===0)sg.push('pp');
  if(s==='6. Signature Requested'&&dy>=0&&dy<=60)sg.push('se');
  if(mt===0)sg.push('nm');
  if(rsk)sg.push('rf');
  if(r25>=50000&&mt===0)sg.push('hr');
  if(s==='8. Closed Lost (Not Renewing)')sg.push('wb');
  return[...new Set(sg)];
}
function getWow(d){
  const ps=PREV[d.c];
  if(!ps)return'new';
  const pi=ST.indexOf(ps),ci=ST.indexOf(d.s);
  if(pi<0||ci<0)return'same';
  if(d.s==='8. Closed Lost (Not Renewing)'&&ps!=='8. Closed Lost (Not Renewing)')return'lost';
  if((d.s==='7. Signed'||d.s==='9. Invoice Sent')&&ps!=='7. Signed'&&ps!=='9. Invoice Sent')return'won';
  if(ci>pi)return'up';if(ci<pi)return'down';return'same';
}

// ── PROCESS DATA ──────────────────────────────────────────────────────────────
function processData(range, engMap={}){
  const rows=range.values;
  if(!rows||rows.length<=HEADER_ROW)throw new Error('Sheet appears empty or headers not at row '+(HEADER_ROW+1));

  const rawHeaders=rows[HEADER_ROW].map(h=>String(h||'').trim());
  buildColMaps(rawHeaders);

  // Debug output to help diagnose column issues
  console.log('=== PIPELINE FILE HEADERS ===');
  console.log(rawHeaders.join(' | '));
  console.log('Stage col idx:', colIdx('Stage'));
  console.log('Renewal Owner col idx:', colIdx('Renewal Owner'));
  console.log('Contact col idx:', colIdx('Contact'));
  const offerHit=OFFER_COLS.find(c=>colIdx(c)!==undefined);
  console.log('Offer price col matched:', offerHit, '@ idx', offerHit?colIdx(offerHit):'–');

  const data=[];
  let stageUnmatched=[];

  for(let i=HEADER_ROW+1;i<rows.length;i++){
    const v=rows[i];
    let company=String(getCell(v,'Contact')||'').trim();
    if(!company){
      // Fallback: try 'Company Name' column
      company=String(getCell(v,'Company Name')||getCell(v,'Account Name')||'').trim();
    }
    if(!company){
      // Log rows that have a valid owner but blank company — helps diagnose missing accounts
      const ownerPeek=String(getCell(v,'Renewal Owner')||getCell(v,'Renewal Owner ')||'').trim();
      if(ownerPeek)console.warn(`Row ${i+1} skipped — blank Contact. Owner: "${ownerPeek}" | Row sample:`, v.slice(0,8));
      continue;
    }

    // Stage — normalised match
    const rawStage=String(getCell(v,'Stage')||'').trim();
    const stage=resolveStage(rawStage)||'1. Uncontacted';
    if(rawStage&&!resolveStage(rawStage)){
      stageUnmatched.push(`"${rawStage}" (row ${i+1})`);
    }

    // Renewal Owner — column headers are trimmed, so plain 'Renewal Owner' works
    const rawOwner=String(
      getCell(v,'Renewal Owner') ||
      getCell(v,'Renewal Owner ') ||  // trailing-space variant just in case
      ''
    ).trim();
    const ro=rawOwner||'Support iConnections';
    if(!VALID_OWNERS.has(ro))continue;

    const r25=parseNum(getCell(v,'2025 Total Revenue'));
    const r24=parseNum(getCell(v,'2024 Total Revenue'));

    // Offer Price — try all candidate column names
    let offerRaw=undefined;
    for(const col of OFFER_COLS){offerRaw=getCell(v,col);if(offerRaw!==undefined&&offerRaw!=='')break;}
    const offer=parseNum(offerRaw);

    const subEnd=excelDateToJS(getCell(v,'Final Sub End Date')||'');
    const dy=daysDiff(subEnd);

    const or_=String(getCell(v,'ONSITE REP (iConn + Benchies)')||getCell(v,'Onsite Rep')||'N/A');
    const eng=engMap[company]||{};
    const mt=eng.mt!==undefined?eng.mt:parseNum(getCell(v,'Confirmed Miami Meetings'));
    const rsk=eng.rsk!==undefined?eng.rsk:(parseNum(getCell(v,'Emerging Manager Risk (AUM <250M & 1 GA Event in 2025)'))>0?1:0);
    const out=eng.out||0;
    const gm=eng.gm||0;
    const gms=eng.gms||0;
    const ap=eng.ap||0;
    const sentiment=eng.sentiment||'';
    const clr=String(getCell(v,'Notes / Closed Lost Reason')||'');
    const icn=String(getCell(v,'iConnections Notes')||'').trim();
    const em=subEnd?subEnd.substring(0,7):'';
    const row={c:company,s:stage,ro,or:or_,o:offer,r25,r24,se:subEnd,dy,em,mt,rsk,out,gm,gms,ap,sentiment,ex:0,snt:0,clr,icn,sg:[],ct:'Manager',wow:'same'};
    row.sg=computeSignals(row);
    data.push(row);
  }

  if(stageUnmatched.length){
    console.warn('Unmatched stage values:', stageUnmatched.slice(0,10).join(', '));
  }
  if(!data.length){
    const preview=rawHeaders.slice(0,12).join(' | ');
    throw new Error(`No valid rows found after filtering.<br><br>First 12 headers from row ${HEADER_ROW+1}:<br><small>${preview}</small><br><br>Verify HEADER_ROW constant matches the actual header row.`);
  }

  console.log(`Loaded ${data.length} accounts. Owners:`, [...new Set(data.map(d=>d.ro))].join(', '));
  return data;
}

// ── MAIN FLOW ─────────────────────────────────────────────────────────────────
async function loadData(){
  showLoading('Loading pipeline data…');
  loadSnapshot(); // restore previous snapshot for Movement comparison
  try{
    const token=await getToken();
    showLoading('Loading pipeline + engagement data…');
    const [range,engMap]=await Promise.all([fetchSheet(token),fetchAllEngagement(token)]);
    D=processData(range,engMap);
    lastUpdated='Updated '+new Date().toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});
    render();
  }catch(e){
    const msg=e.message||String(e);
    if(/login_required|interaction/i.test(msg))showLogin();
    else showError(msg);
  }
}
async function refreshData(){await loadData();}
function ss(k,v){if(k==='owner'){S.owner=v;S.drill=null;}else if(k==='drill')S.drill=v||null;else S[k]=v;render();}
async function init(){
  const hash=new URLSearchParams(location.hash.replace('#',''));
  const code=hash.get('code');
  if(code){
    showLoading('Completing sign-in…');
    history.replaceState(null,'',location.pathname+location.search);
    try{const t=await exchangeCode(code);saveTokens(t);await loadData();}
    catch(e){showError(e.message||String(e));}
    return;
  }
  const at=sessionStorage.getItem('at'),exp=parseInt(sessionStorage.getItem('exp')||'0');
  if(at&&Date.now()<exp)await loadData();
  else showLogin();
}

      h+=`<div class="cd" style="padding:0;overflow:hidden">
        <div onclick="ss('drill','${isOpen?'':key}')" style="padding:12px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:16px;flex-wrap:wrap;${key==='__none__'?'border-left:3px solid #475569':'border-left:3px solid #60a5fa'}">
          <div style="display:flex;align-items:center;gap:12px">
            <span style="font-size:13px;font-weight:700;color:#f8fafc">${isOpen?'▾':'▸'} ${label}</span>
            <span style="font-size:12px;color:#64748b">${tot} accounts</span>
          </div>
          <div style="display:flex;gap:16px;font-size:11px;flex-wrap:wrap">
            <span style="color:${pct(out,tot)>=60?'#34d399':pct(out,tot)>=30?'#fbbf24':'#ef4444'}">Outreach ${out}/${tot}</span>
            <span style="color:${pct(gms,tot)>=60?'#34d399':pct(gms,tot)>=30?'#fbbf24':'#ef4444'}">GM Sched ${gms}/${tot}</span>
            <span style="color:${pct(gm,tot)>=60?'#34d399':pct(gm,tot)>=30?'#fbbf24':'#ef4444'}">GM Done ${gm}/${tot}</span>
            ${rsk>0?`<span style="color:#ef4444">⚠ ${rsk} at risk</span>`:''}
          </div>
        </div>
        ${isOpen?`<div class="st"><table>${colHdr}<tbody>${grp.map(r=>`<tr class="dr">
          <td style="font-weight:500;color:#e2e8f0">${r.acct}</td>
          <td style="color:#94a3b8;font-size:11px">${r.ro}</td>
          <td style="text-align:center">${yn(r.out,'#34d399','#ef4444')}</td>
          <td style="text-align:center">${yn(r.gms,'#60a5fa','#475569')}</td>
          <td style="text-align:center">${yn(r.gm,'#a78bfa','#475569')}</td>
          <td style="text-align:center">${yn(r.ap,'#34d399','#475569')}</td>
          <td style="text-align:center;color:${r.mt>0?'#fbbf24':'#475569'};font-weight:600">${r.mt||'–'}</td>
          <td style="text-align:center;color:${r.rsk?'#ef4444':'#334155'};font-weight:700">${r.rsk?'⚠':'–'}</td>
          <td style="color:#94a3b8;font-size:11px">${r.sentiment||'–'}</td>
        </tr>`).join('')}</tbody></table></div>`:''}
      </div>`;
    });
    if(!months.length)h+=`<div class="cd" style="padding:40px;text-align:center;color:#475569">No engagement data loaded</div>`;
    h+=`</div>`;
  }

  // ── REVENUE CONCENTRATION ──
  if(S.tab==='concentration'){
    const sorted=f.filter(d=>d.r25>0).sort((a,b)=>b.r25-a.r25);
    let cumRev=0;
    const totalActRev=sorted.reduce((a,d)=>a+d.r25,0);
    const p10=Math.ceil(sorted.length*0.1),p25=Math.ceil(sorted.length*0.25);
    const top10r=sorted.slice(0,p10).reduce((a,d)=>a+d.r25,0);
    const top25r=sorted.slice(0,p25).reduce((a,d)=>a+d.r25,0);
    h+=`<div class="g g3" style="margin-bottom:16px">
      <div class="kpi" style="border-left:3px solid #a78bfa"><div class="kl">Top 10% (${p10} accts)</div><div class="kv" style="color:#a78bfa">${fm(top10r)}</div><div class="ks">${pct(top10r,totalActRev)}% of revenue</div></div>
      <div class="kpi" style="border-left:3px solid #60a5fa"><div class="kl">Top 25% (${p25} accts)</div><div class="kv" style="color:#60a5fa">${fm(top25r)}</div><div class="ks">${pct(top25r,totalActRev)}% of revenue</div></div>
      <div class="kpi" style="border-left:3px solid #fbbf24"><div class="kl">Remaining 75%</div><div class="kv" style="color:#fbbf24">${fm(totalActRev-top25r)}</div><div class="ks">${pct(totalActRev-top25r,totalActRev)}%</div></div>
    </div>
    <div class="cd" style="padding:0;overflow:hidden">
      <div style="padding:14px 18px;border-bottom:1px solid #334155;font-size:14px;font-weight:600;color:#f8fafc">Top 30 Accounts by 2025 Revenue</div>
      <div class="st"><table><thead style="position:sticky;top:0;background:#1e293b;z-index:1"><tr>
        <th style="width:30px">#</th><th>Account</th><th>Stage</th><th>Owner</th>
        <th style="text-align:right;color:#fbbf24">2025 Rev</th><th style="text-align:right;color:#22d3ee">2026 Offer</th>
        <th style="text-align:center">Cumul %</th><th>Flags</th>
      </tr></thead><tbody>`;
    sorted.slice(0,30).forEach((a,i)=>{
      cumRev+=a.r25;const cp=pct(cumRev,totalActRev);
      h+=`<tr class="dr"><td style="color:#475569;font-weight:700">${i+1}</td>
        <td style="color:#e2e8f0;font-weight:500">${a.c}</td>
        <td><span style="color:${CL[a.s]};font-weight:600;font-size:11px">${SH[a.s]}</span></td>
        <td style="color:#94a3b8">${a.ro}</td>
        <td style="text-align:right;color:#fbbf24;font-weight:600">${fm(a.r25)}</td>
        <td style="text-align:right;color:${a.o>0?'#22d3ee':'#334155'};font-weight:600">${a.o>0?fm(a.o):'–'}</td>
        <td style="text-align:center"><div style="display:flex;align-items:center;justify-content:center;gap:4px">
          <div style="width:40px;height:6px;background:#0f172a;border-radius:3px;overflow:hidden"><div style="width:${Math.min(cp,100)}%;height:100%;background:#a78bfa;border-radius:3px"></div></div>
          <span style="font-size:11px;color:#94a3b8">${cp}%</span></div></td>
        <td>${a.sg.map(s=>`<span class="badge ${SIG_C[s]}">${SIG_L[s]}</span>`).join('')}</td>
      </tr>`;
    });
    h+=`</tbody></table></div></div>`;
  }

  // ── AT RISK ──
  if(S.tab==='risk'){
    const fl=[...flagged].sort((a,b)=>S.rsort==='days'?(a.dy<0?9999:a.dy)-(b.dy<0?9999:b.dy):S.rsort==='signals'?b.sg.length-a.sg.length:b.r25-a.r25);
    const sigC={};fl.forEach(d=>d.sg.forEach(s=>sigC[s]=(sigC[s]||0)+1));
    h+=`<div class="g g4" style="margin-bottom:16px">`;
    [['en','Expiring No Offer','#ef4444'],['co','No Outreach','#fb923c'],['nm','No Meetings','#fbbf24'],['hr','High Rev No Eng','#ef4444']].forEach(([k,l,c])=>h+=`<div class="kpi" style="border-left:3px solid ${c}"><div class="kl">${l}</div><div class="kv" style="color:${c}">${sigC[k]||0}</div></div>`);
    h+=`</div>
    <div class="cd" style="padding:0;overflow:hidden">
      <div style="padding:12px 18px;border-bottom:1px solid #334155;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <div style="font-size:14px;font-weight:600;color:#fb923c">${fl.length} flagged · ${fm(flagRev)} at risk</div>
        <div style="display:flex;gap:6px"><span style="font-size:12px;color:#475569">Sort:</span>`;
    [['rev','Revenue'],['days','Urgency'],['signals','Flags']].forEach(([k,l])=>h+=`<button class="sb${S.rsort===k?' a':''}" onclick="ss('rsort','${k}')">${l}</button>`);
    h+=`</div></div>
      <div class="st"><table><thead style="position:sticky;top:0;background:#1e293b;z-index:1"><tr>
        <th>Account</th><th>Stage</th><th>Owner</th><th style="text-align:right;color:#fbbf24">2025 Rev</th><th>Sub End</th><th style="text-align:center">Days</th><th>Signals</th>
      </tr></thead><tbody>`;
    fl.forEach(a=>{
      const dc=a.dy<=0?'#ef4444':a.dy<=30?'#ef4444':a.dy<=90?'#fb923c':a.dy<=180?'#fbbf24':'#94a3b8';
      h+=`<tr class="dr"><td style="color:#e2e8f0;font-weight:500">${a.c}</td><td><span style="color:${CL[a.s]};font-weight:600;font-size:11px">${SH[a.s]}</span></td><td style="color:#94a3b8">${a.ro}</td><td style="text-align:right;color:#fbbf24;font-weight:600">${a.r25?fm(a.r25):'–'}</td><td style="color:#94a3b8;font-size:11px">${a.se||'–'}</td><td style="text-align:center;font-weight:600;color:${dc}">${a.dy<=0?'PAST DUE':a.dy+'d'}</td><td>${a.sg.map(s=>`<span class="badge ${SIG_C[s]}">${SIG_L[s]}</span>`).join('')}</td></tr>`;
    });
    h+=`</tbody></table></div></div>`;
  }

  // ── WIN-BACK ──
  if(S.tab==='winback'){
    const wba=f.filter(d=>d.sg.includes('wb')).sort((a,b)=>b.r25-a.r25);
    const wbRev=wba.reduce((a,d)=>a+d.r25,0),wbOff=wba.reduce((a,d)=>a+d.o,0);
    const wbo={};wba.forEach(d=>{if(!wbo[d.ro])wbo[d.ro]={n:0,rev:0};wbo[d.ro].n++;wbo[d.ro].rev+=d.r25;});
    const wboA=Object.keys(wbo).map(k=>{const ac=wba.filter(d=>d.ro===k);return{o:k,n:wbo[k].n,rev:wbo[k].rev,days:Math.round(ac.reduce((a,d)=>a+d.dy,0)/ac.length)};}).sort((a,b)=>b.rev-a.rev);
    h+=`<div class="rv" style="grid-template-columns:repeat(3,1fr);margin-bottom:16px">
      <div class="rc" style="border-left:3px solid #60a5fa"><h4>Win-Back Candidates</h4><div class="rb" style="color:#60a5fa">${wba.length}</div></div>
      <div class="rc" style="border-left:3px solid #fbbf24"><h4>2025 Rev Recoverable</h4><div class="rb" style="color:#fbbf24">${fm(wbRev)}</div></div>
      <div class="rc" style="border-left:3px solid #22d3ee"><h4>Offers Made</h4><div class="rb" style="color:#22d3ee">${fm(wbOff)}</div></div>
    </div>
    <div class="cd" style="padding:0;overflow:hidden;margin-bottom:16px">
      <div style="padding:12px 18px;border-bottom:1px solid #334155;font-size:14px;font-weight:600;color:#60a5fa">By CSM</div>
      <table><thead><tr><th>CSM</th><th style="text-align:center">Accts</th><th style="text-align:right;color:#fbbf24">2025 Rev</th><th style="text-align:center">Avg Days</th></tr></thead><tbody>`;
    wboA.forEach(r=>h+=`<tr class="dr"><td style="font-weight:600;color:#f8fafc">${r.o}</td><td style="text-align:center;font-weight:600">${r.n}</td><td style="text-align:right;color:#fbbf24;font-weight:600">${fm(r.rev)}</td><td style="text-align:center;color:#94a3b8">${r.days}d</td></tr>`);
    h+=`</tbody></table></div>
    <div class="cd" style="padding:0;overflow:hidden">
      <div style="padding:12px 18px;border-bottom:1px solid #334155;font-size:14px;font-weight:600;color:#f8fafc">${wba.length} accounts · ${fm(wbRev)} recoverable</div>
      <div class="st"><table><thead style="position:sticky;top:0;background:#1e293b;z-index:1"><tr>
        <th>Account</th><th>Owner</th><th style="text-align:right;color:#fbbf24">2025 Rev</th><th style="text-align:right;color:#22d3ee">Offer</th><th>Sub End</th><th style="text-align:center">Days Left</th>
      </tr></thead><tbody>`;
    wba.forEach(a=>{
      const dc=a.dy<=120?'#fb923c':a.dy<=180?'#fbbf24':'#94a3b8';
      h+=`<tr class="dr"><td style="color:#e2e8f0;font-weight:500">${a.c}</td><td style="color:#94a3b8">${a.ro}</td><td style="text-align:right;color:#fbbf24;font-weight:600">${a.r25?fm(a.r25):'–'}</td><td style="text-align:right;color:${a.o>0?'#22d3ee':'#334155'}">${a.o>0?fm(a.o):'–'}</td><td style="color:#94a3b8;font-size:11px">${a.se}</td><td style="text-align:center;font-weight:600;color:${dc}">${a.dy}d</td></tr>`;
    });
    h+=`</tbody></table></div></div>`;
  }

  // ── LOST ANALYSIS ──
  if(S.tab==='lostanalysis'){
    const la=f.filter(d=>d.s==='8. Closed Lost (Not Renewing)').sort((a,b)=>b.r25-a.r25);
    const laRev=la.reduce((a,d)=>a+d.r25,0);
    const withOff=la.filter(d=>d.o>0),hadOut=la.filter(d=>d.out===1),noOut=la.filter(d=>d.out===0);
    const lo={};la.forEach(d=>{if(!lo[d.ro])lo[d.ro]={n:0,rev:0};lo[d.ro].n++;lo[d.ro].rev+=d.r25;});
    const loA=Object.keys(lo).map(k=>({o:k,n:lo[k].n,rev:lo[k].rev})).sort((a,b)=>b.rev-a.rev);
    h+=`<div class="g g4" style="margin-bottom:16px">
      <div class="kpi" style="border-left:3px solid #ef4444"><div class="kl">Total Lost</div><div class="kv" style="color:#ef4444">${la.length}</div><div class="ks">${fm(laRev)} 2025 rev</div></div>
      <div class="kpi" style="border-left:3px solid #fb923c"><div class="kl">Offer Made Before Loss</div><div class="kv" style="color:#fb923c">${withOff.length}</div><div class="ks">${pct(withOff.length,la.length)}% had pricing</div></div>
      <div class="kpi" style="border-left:3px solid #fbbf24"><div class="kl">Had Outreach</div><div class="kv" style="color:#fbbf24">${hadOut.length}</div><div class="ks">${pct(hadOut.length,la.length)}% engaged</div></div>
      <div class="kpi" style="border-left:3px solid #94a3b8"><div class="kl">No Engagement</div><div class="kv" style="color:#94a3b8">${noOut.length}</div><div class="ks">${fm(noOut.reduce((a,d)=>a+d.r25,0))} lost silently</div></div>
    </div>
    <div class="cd" style="padding:0;overflow:hidden;margin-bottom:16px">
      <div style="padding:12px 18px;border-bottom:1px solid #334155;font-size:13px;font-weight:600;color:#ef4444">Losses by CSM</div>
      <table><thead><tr><th>CSM</th><th style="text-align:center">Lost</th><th style="text-align:right;color:#fbbf24">2025 Rev</th><th style="text-align:right">Avg Rev</th></tr></thead><tbody>`;
    loA.forEach(r=>h+=`<tr class="dr"><td style="font-weight:600;color:#f8fafc">${r.o}</td><td style="text-align:center;color:#ef4444;font-weight:600">${r.n}</td><td style="text-align:right;color:#fbbf24;font-weight:600">${fm(r.rev)}</td><td style="text-align:right;color:#94a3b8">${fm(Math.round(r.rev/r.n))}</td></tr>`);
    h+=`</tbody></table></div>
    <div class="cd" style="padding:0;overflow:hidden">
      <div style="padding:12px 18px;border-bottom:1px solid #334155;font-size:13px;font-weight:600;color:#f8fafc">All Lost Accounts</div>
      <div class="st"><table><thead style="position:sticky;top:0;background:#1e293b;z-index:1"><tr>
        <th>Account</th><th>Owner</th><th style="text-align:right;color:#fbbf24">2025 Rev</th><th style="text-align:right;color:#22d3ee">Offer</th><th>Sub End</th><th style="text-align:center">Days</th><th style="text-align:center">Outreach?</th><th>Reason</th>
      </tr></thead><tbody>`;
    la.forEach(a=>{
      h+=`<tr class="dr"><td style="color:#e2e8f0;font-weight:500">${a.c}</td><td style="color:#94a3b8">${a.ro}</td><td style="text-align:right;color:#fbbf24;font-weight:600">${a.r25?fm(a.r25):'–'}</td><td style="text-align:right;color:${a.o>0?'#22d3ee':'#334155'}">${a.o>0?fm(a.o):'–'}</td><td style="color:#94a3b8;font-size:11px">${a.se||'–'}</td><td style="text-align:center;color:${a.dy<=0?'#ef4444':'#94a3b8'};font-weight:600">${a.dy<=0?'Expired':a.dy+'d'}</td><td style="text-align:center">${a.out?'<span class="badge b-green">Yes</span>':'<span class="badge b-red">No</span>'}</td><td style="color:#64748b;font-size:11px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.clr||'–'}</td></tr>`;
    });
    h+=`</tbody></table></div></div>`;
  }

  // ── ACCOUNTS ──
  if(S.tab==='accounts'){
    const sorted=[...f].sort((a,b)=>ST.indexOf(a.s)-ST.indexOf(b.s));
    h+=`<div class="cd" style="padding:0;overflow:hidden"><div class="st"><table><thead style="position:sticky;top:0;background:#1e293b;z-index:1"><tr>
      <th>Account</th><th>Stage</th><th>Onsite Rep</th><th>Owner</th>
      <th style="text-align:right;color:#fbbf24">2025</th><th style="text-align:right;color:#22d3ee">2026</th>
      <th style="text-align:right">Δ</th><th>Sub End</th><th>Flags</th>
    </tr></thead><tbody>`;
    sorted.forEach(a=>{
      const dl=a.o>0&&a.r25>0?(a.o-a.r25)/a.r25*100:-999;
      h+=`<tr class="dr"><td style="color:#e2e8f0;font-weight:500">${a.c}</td><td><span style="color:${CL[a.s]};font-weight:600;font-size:11px">${SH[a.s]}</span></td><td style="color:#94a3b8">${a.or}</td><td style="color:#94a3b8">${a.ro}</td><td style="text-align:right;color:#fbbf24">${a.r25?fm(a.r25):'–'}</td><td style="text-align:right;color:${a.o>0?'#22d3ee':'#334155'}">${a.o>0?fm(a.o):'–'}</td><td style="text-align:right;font-size:11px;font-weight:600;color:${dl===-999?'#334155':dl>=0?'#34d399':'#ef4444'}">${dl===-999?'–':(dl>=0?'+':'')+Math.round(dl)+'%'}</td><td style="color:${a.dy>0&&a.dy<=90?'#ef4444':a.dy>0&&a.dy<=180?'#fbbf24':'#94a3b8'};font-size:11px">${a.se||'–'}</td><td>${a.sg.map(s=>`<span class="badge ${SIG_C[s]}">${SIG_L[s]}</span>`).join('')}</td></tr>`;
    });
    h+=`</tbody></table></div></div>`;
  }

  document.getElementById('app').innerHTML=h;
}
init();
</script>
</body>
</html>
