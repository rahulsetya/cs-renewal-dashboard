function loadDataCache(allowStale=false){
  try{
    const raw=localStorage.getItem(DATA_CACHE_KEY);
    if(!raw)return null;
    const c=JSON.parse(raw);
    const age=Date.now()-c.ts;
    if(age>DATA_CACHE_TTL){
      if(!allowStale)return null;
      c.stale=true;
      c.staleMinutes=Math.round(age/60000);
    }
    return c;
  }catch(e){return null;}
}

let D=[], PREV={}, PREV_TS=null, lastUpdated='', COL={}, COL_LC={}, ENG_RAW=[];

// ── THEME ─────────────────────────────────────────────────────────────────────
let LIGHT=localStorage.getItem('cs_theme')==='light'||(!localStorage.getItem('cs_theme')&&matchMedia('(prefers-color-scheme:light)').matches);
matchMedia('(prefers-color-scheme:light)').addEventListener('change',e=>{if(!localStorage.getItem('cs_theme')){LIGHT=e.matches;applyBodyClass();render();}});
function applyBodyClass(){document.body.classList.toggle('light',LIGHT);}

let S={owner:'ALL',tab:'pipeline',sort:'total',drill:null,rsort:'rev',noteOpen:null,hidePaid:false,aeDrill:null,tlDrill:null,showAE:false,engQtrFilter:'ALL',staleWarning:null,acctSort:{col:'stage',dir:'asc'},acctFilter:{},drillSort:{col:'r25',dir:'desc'},drillFilter:{},acctFlagOpen:false,drillFlagOpen:false,acctFlagRect:null,drillFlagRect:null,acctFlagMode:'any',drillFlagMode:'any'};

// ── OAUTH2 PKCE ───────────────────────────────────────────────────────────────
function b64url(buf){return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
async function genVerifier(){const a=new Uint8Array(32);crypto.getRandomValues(a);return b64url(a);}
async function genChallenge(v){return b64url(await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v)));}
async function startLogin(){
  sessionStorage.clear();
  const v=await genVerifier(), c=await genChallenge(v);
  sessionStorage.setItem('pkce_v',v);
  const p=new URLSearchParams({client_id:CLIENT_ID,response_type:'code',redirect_uri:REDIRECT,scope:SCOPES,code_challenge:c,code_challenge_method:'S256',response_mode:'fragment',prompt:'select_account'});
  location.href=`https://login.microsoftonline.com/${TENANT}/oauth2/v2.0/authorize?${p}`;
}
async function exchangeCode(code){
  const body=new URLSearchParams({client_id:CLIENT_ID,grant_type:'authorization_code',code,redirect_uri:REDIRECT,code_verifier:sessionStorage.getItem('pkce_v'),scope:SCOPES});
  const r=await fetch(`https://login.microsoftonline.com/${TENANT}/oauth2/v2.0/token`,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
  const j=await r.json();
  if(j.error)throw new Error(j.error_description||j.error);
  return j;
}
function saveTokens(t){
  sessionStorage.setItem('at',t.access_token);
  if(t.refresh_token)sessionStorage.setItem('rt',t.refresh_token);
  sessionStorage.setItem('exp',Date.now()+((t.expires_in||3600)*1000));
}
async function getToken(){
  const exp=parseInt(sessionStorage.getItem('exp')||'0'), at=sessionStorage.getItem('at');
  if(at&&Date.now()<exp-60000)return at;
  const rt=sessionStorage.getItem('rt');
  if(rt){
    try{
      const body=new URLSearchParams({client_id:CLIENT_ID,grant_type:'refresh_token',refresh_token:rt,scope:SCOPES});
      const r=await fetch(`https://login.microsoftonline.com/${TENANT}/oauth2/v2.0/token`,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
      const j=await r.json();
      if(!j.error){saveTokens(j);return j.access_token;}
    }catch(e){}
  }
  throw new Error('login_required');
}

// ── ROBUST COLUMN LOOKUP ──────────────────────────────────────────────────────
// Normalise a header string: trim, collapse internal spaces, lower-case
function normKey(s){return String(s||'').trim().replace(/\s+/g,' ').toLowerCase();}

// Build column maps from a headers array (call after reading header row)
function buildColMaps(headers){
  COL={};COL_LC={};
  headers.forEach((h,i)=>{
    COL[h]=i;            // exact (already trimmed upstream)
    COL_LC[normKey(h)]=i; // normalised
  });
}

// Lookup column index by name — tries exact, then normalised
function colIdx(name){
  let i=COL[name];
  if(i!==undefined)return i;
  i=COL[name.trim()];
  if(i!==undefined)return i;
  return COL_LC[normKey(name)];
}

// Get a cell value from a row by column name
function getCell(row,name){const i=colIdx(name);return i!==undefined?row[i]:undefined;}

// ── GRAPH API ─────────────────────────────────────────────────────────────────
const _driveIdCache={};
const _driveIdPending={};
async function getSharePointDriveId(token, ownerUpn){
  // Return cached result immediately — avoids 20+ redundant lookups for engagement sheets
  if(_driveIdCache[ownerUpn])return _driveIdCache[ownerUpn];
  // Deduplicate in-flight requests for the same owner
  if(_driveIdPending[ownerUpn])return _driveIdPending[ownerUpn];
  _driveIdPending[ownerUpn]=(async()=>{
    const siteRes=await fetch(`https://graph.microsoft.com/v1.0/sites/iconnections675-my.sharepoint.com:/personal/${ownerUpn}`,{headers:{Authorization:`Bearer ${token}`}});
    if(!siteRes.ok){const j=await siteRes.json().catch(()=>({}));throw new Error(`Site lookup for ${ownerUpn}: ${siteRes.status} — ${j.error?.message||'unknown'}`);}
    const site=await siteRes.json();
    const drivesRes=await fetch(`https://graph.microsoft.com/v1.0/sites/${site.id}/drives`,{headers:{Authorization:`Bearer ${token}`}});
    if(!drivesRes.ok){const j=await drivesRes.json().catch(()=>({}));throw new Error(`Drives for ${ownerUpn}: ${drivesRes.status} — ${j.error?.message||'unknown'}`);}
    const drives=await drivesRes.json();
    if(!drives.value||!drives.value.length)throw new Error(`No drives found for ${ownerUpn}`);
    const id=drives.value[0].id;
    _driveIdCache[ownerUpn]=id;
    delete _driveIdPending[ownerUpn];
    return id;
  })();
  return _driveIdPending[ownerUpn];
}

async function fetchWithRetry(url,opts,retries=3,delay=3000){
  for(let i=0;i<=retries;i++){
    try{
      const r=await fetch(url,opts);
      if(r.status===504||r.status===503){
        if(i<retries){await new Promise(res=>setTimeout(res,delay*(i+1)));continue;}
      }
      return r;
    }catch(e){if(i===retries)throw e;await new Promise(res=>setTimeout(res,delay*(i+1)));}
  }
}

async function fetchSheet(token){
  const enc=encodeURIComponent(SHEET), errors=[], hdrs={Authorization:`Bearer ${token}`};

  // Attempt 1: owner's SharePoint personal site drive (primary method)
  try{
    const driveId=await getSharePointDriveId(token, FILE_OWNER);
    const r=await fetchWithRetry(`https://graph.microsoft.com/v1.0/drives/${driveId}/items/${FILE_ID}/workbook/worksheets/${enc}/usedRange(valuesOnly=true)`,{headers:hdrs});
    if(r.ok)return r.json();
    const j=await r.json().catch(()=>({}));
    errors.push(`site drive workbook: ${r.status} — ${j.error?.message||'unknown'}`);
  }catch(e){errors.push(`site drive: ${e.message}`);}

  // Attempt 3: sharedWithMe search
  try{
    const r=await fetch('https://graph.microsoft.com/v1.0/me/drive/sharedWithMe',{headers:{Authorization:`Bearer ${token}`}});
    const j=await r.json();
    if(j.value&&j.value.length){
      const f=j.value.find(f=>f.id===FILE_ID||(f.remoteItem&&f.remoteItem.id===FILE_ID))||
               j.value.find(f=>(f.name||'').toLowerCase().includes('2026 renewal master'));
      if(f){
        const ri=f.remoteItem||f;
        const driveId=ri.parentReference?.driveId;
        const itemId=ri.id;
        if(driveId&&itemId){
          const r2=await fetch(`https://graph.microsoft.com/v1.0/drives/${driveId}/items/${itemId}/workbook/worksheets/${enc}/usedRange(valuesOnly=true)`,{headers:{Authorization:`Bearer ${token}`}});
          if(r2.ok)return r2.json();
          const j2=await r2.json().catch(()=>({}));
          errors.push(`sharedWithMe workbook: ${r2.status} — ${j2.error?.message||'unknown'}`);
        }
      }
    }
  }catch(e){errors.push(`sharedWithMe: ${e.message}`);}

  throw new Error(errors.join('<br>'));
}

// ── ENGAGEMENT FETCH ──────────────────────────────────────────────────────────
async function fetchEngSheet(token, sheetName){
  const enc=encodeURIComponent(sheetName);

  // Attempt 1: owner's SharePoint personal site drive (mirrors primary method above)

    const driveId=await getSharePointDriveId(token, ENG_OWNER);
    const r=await fetchWithRetry(`https://graph.microsoft.com/v1.0/drives/${driveId}/items/${ENG_FILE_ID}/workbook/worksheets/${enc}/usedRange(valuesOnly=true)`,{headers:{Authorization:`Bearer ${token}`}});
    if(r.ok)return r.json();
  }catch(e){}

  // Attempt 2: me/drive
  try{
    const r=await fetchWithRetry(`https://graph.microsoft.com/v1.0/me/drive/items/${ENG_FILE_ID}/workbook/worksheets/${enc}/usedRange(valuesOnly=true)`,{headers:{Authorization:`Bearer ${token}`}});
    if(r.ok)return r.json();
  }catch(e){}

  // Attempt 3: sharedWithMe
  try{
    const r=await fetch('https://graph.microsoft.com/v1.0/me/drive/sharedWithMe',{headers:{Authorization:`Bearer ${token}`}});
    const j=await r.json();
    if(j.value){
      const f=j.value.find(f=>f.remoteItem?.id===ENG_FILE_ID||f.id===ENG_FILE_ID);
      if(f){
        const ri=f.remoteItem||f;
        const r2=await fetch(`https://graph.microsoft.com/v1.0/drives/${ri.parentReference?.driveId}/items/${ri.id}/workbook/worksheets/${enc}/usedRange(valuesOnly=true)`,{headers:{Authorization:`Bearer ${token}`}});
        if(r2.ok)return r2.json();
      }
    }
  }catch(e){}

  return null;
}

const CSM_NAME_MAP={

async function fetchAllEngagement(token){
  const engMap={};
  const tmpRaw=[];
  const yesNo=v=>String(v||'').toLowerCase().startsWith('y')?1:0;
  // Column AI = index 34 (A=0 … Z=25, AA=26 … AI=34)
  const CSM_COL=34;

  try{
    const data=await fetchEngSheet(token,'MASTER');
    if(!data||!data.values||data.values.length<2){
      console.warn('MASTER sheet empty or missing');
    } else {
      // Auto-detect header row: find first row that contains 'Account Name'
      let headerRowIdx=0;
      for(let r=0;r<Math.min(5,data.values.length);r++){
        if(data.values[r].some(c=>String(c||'').trim().toLowerCase()==='account name')){headerRowIdx=r;break;}
      }
      const engHeaders=data.values[headerRowIdx].map(h=>String(h||'').trim());
      console.log(`=== MASTER SHEET HEADERS (row ${headerRowIdx}) ===`);
      console.log(engHeaders.map((h,i)=>`${i}:${h}`).join(' | '));
      const eColMap={};engHeaders.forEach((h,i)=>eColMap[normKey(h)]=i);
      const ec=(row,name)=>{const i=eColMap[normKey(name)];return i!==undefined?row[i]:'';};

      for(let i=headerRowIdx+1;i<data.values.length;i++){
        const row=data.values[i];
        const acct=String(ec(row,'Account Name')||'').trim();
        if(!acct)continue;
        const ro=normCsm(row[CSM_COL]);               // column AI → full CSM name
        const ae=String(row[1]||'').trim();          // column B = Sales Rep
        const rawEnd=String(row[5]||'').trim();      // column F = contract end
        const rev=parseNum(row[4]);                  // column E = 2025 revenue
        const rec={
          acct,ro,ae,endMonth:parseEngEndMonth(rawEnd),rawEnd,rev,
          out:yesNo(ec(row,'Outreach Sent? (Y/N)')||ec(row,'Outreach Sent?')),
          gms:yesNo(ec(row,'GM Scheduled? (Y/N)')||ec(row,'GM Scheduled?')),
          gm:yesNo(ec(row,'GM Completed? (Y/N)')||ec(row,'GM Completed?')),
          ap:yesNo(ec(row,'AP Delivered? (Y/N)')||ec(row,'AP Delivered?')),
          rsk:yesNo(ec(row,'Risk? (Y/N)')||ec(row,'Risk?')),
          mt:parseNum(ec(row,'Miami Mtgs')||ec(row,'Miami Meetings')),
          sentiment:String(ec(row,'Sentiment')||'')
        };
        engMap[acct]=rec;
        tmpRaw.push(rec);
      }

      // ── Inconsistency report ──────────────────────────────────────────────
      const missingCSM=tmpRaw.filter(r=>!r.ro);
      const unknownCSM=[...new Set(tmpRaw.map(r=>r.ro).filter(r=>r&&!VALID_OWNERS.has(r)))];
      const missingAcct=data.values.slice(2).filter(r=>!String(r[0]||'').trim()&&r.some(c=>c));
      if(missingCSM.length)
        console.warn(`⚠ MASTER: ${missingCSM.length} rows have no CSM in column AI:`,missingCSM.map(r=>r.acct));
      if(unknownCSM.length)
        console.warn(`⚠ MASTER: CSM values not in VALID_OWNERS (check spelling):`,unknownCSM);
      if(missingAcct.length)
        console.warn(`⚠ MASTER: ${missingAcct.length} non-empty rows missing Account Name`);
      if(!missingCSM.length&&!unknownCSM.length)
        console.log('✓ MASTER: all CSM values matched VALID_OWNERS');
    }
  }catch(e){console.warn('Failed to fetch MASTER engagement sheet:',e);}

  ENG_RAW=tmpRaw;
  const engTotal=Object.keys(engMap).length;
  console.log(`=== ENGAGEMENT LOADED: ${engTotal} accounts ===`);
  if(engTotal===0)console.warn('Engagement data is empty — MASTER sheet fetch may have failed');
  return engMap;
}

function parseEngEndMonth(v){
  if(!v)return'';
  // Excel serial date
  const n=parseFloat(v);
  if(!isNaN(n)&&n>1000){const d=new Date((n-25569)*86400*1000);return d.toISOString().substring(0,7);}
  // Already YYYY-MM or YYYY-MM-DD
  if(/^\d{4}-\d{2}/.test(v))return v.substring(0,7);
  // "Mar 2026", "March 2026", "Mar-26" etc.
  const mo={'jan':'01','feb':'02','mar':'03','apr':'04','may':'05','jun':'06','jul':'07','aug':'08','sep':'09','oct':'10','nov':'11','dec':'12'};
  const m=v.toLowerCase().match(/([a-z]{3})[a-z]*[\s\-\/]+(\d{2,4})/);
  if(m){const yr=m[2].length===2?'20'+m[2]:m[2];return`${yr}-${mo[m[1]]||''}`.replace(/-$/,'');}
  return v;
}
function excelDateToJS(v){
  if(!v)return'';
  const n=parseFloat(v);
  if(isNaN(n)||n<1000)return String(v).trim();
  return new Date((n-25569)*86400*1000).toISOString().split('T')[0];
}

// ── STAGE NORMALISATION ───────────────────────────────────────────────────────
// Build lookup: normalised text → canonical stage string
const STAGE_NORM_MAP=new Map();
ST.forEach(s=>{
  STAGE_NORM_MAP.set(normKey(s),s);
  // Also map without numeric prefix ("contacted no interest" → "2. Contacted No Interest")
  const noPrefix=s.replace(/^\d+\.\s*/,'');
  STAGE_NORM_MAP.set(normKey(noPrefix),s);
  // Map by prefix number alone ("2" → ...)
  const m=s.match(/^(\d+)\./);
  if(m)STAGE_NORM_MAP.set(m[1],s);
});

function resolveStage(rawStage){
  if(!rawStage)return null;
  const raw=String(rawStage).trim();
  // Exact match first
  if(ST.includes(raw))return raw;
  // Normalised match
  const norm=normKey(raw);
  if(STAGE_NORM_MAP.has(norm))return STAGE_NORM_MAP.get(norm);
  // Partial: does the raw value contain a stage label?
  for(const [k,v] of STAGE_NORM_MAP){
    if(norm.includes(k)||k.includes(norm))return v;
  }
  return null;
}

// ── OFFER PRICE COLUMN CANDIDATES ─────────────────────────────────────────────
// The Excel column uses an en dash (U+2013) or em dash (U+2014) — try both
const OFFER_COLS=[
  'Offer Price \u2013 Total Contract Value',  // en dash
  'Offer Price \u2014 Total Contract Value',  // em dash
  'Offer Price - Total Contract Value',        // plain hyphen fallback
  'Offer Price\u2013Total Contract Value',     // no spaces around dash
  'Offer Price\u2014Total Contract Value',
  'Offer Price',                               // bare name
];

function computeSignals(row){
  const sg=[],{dy,r25,o,s,mt,rsk}=row;
  if(s==='1. Uncontacted'&&dy>0&&dy<=90)sg.push('ue');
  if((s==='3. Contacted Follow-up Needed'||s==='4. Contacted Attempting Again')&&o===0)sg.push('en');
  if(mt===0&&s!=='1. Uncontacted')sg.push('co');
  if(s==='5. Proposal Made'&&o===0)sg.push('pp');
  if(s==='6. Signature Requested'&&dy>=0&&dy<=60)sg.push('se');
  if(mt===0)sg.push('nm');
  if(rsk)sg.push('rf');
  if(r25>=50000&&mt===0)sg.push('hr');
  if(s==='8. Closed Lost (Not Renewing)')sg.push('wb');
  return[...new Set(sg)];
}
function getWow(d){
  const ps=PREV[d.c];
  if(!ps)return'new';
  const pi=ST.indexOf(ps),ci=ST.indexOf(d.s);
  if(pi<0||ci<0)return'same';
  if(d.s==='8. Closed Lost (Not Renewing)'&&ps!=='8. Closed Lost (Not Renewing)')return'lost';
  if((d.s==='7. Signed'||d.s==='9. Invoice Sent')&&ps!=='7. Signed'&&ps!=='9. Invoice Sent')return'won';
  if(ci>pi)return'up';if(ci<pi)return'down';return'same';
}

function processData(range, engMap={}){
  const rows=range.values;
  if(!rows||rows.length<=HEADER_ROW)throw new Error('Sheet appears empty or headers not at row '+(HEADER_ROW+1));

  const rawHeaders=rows[HEADER_ROW].map(h=>String(h||'').trim());
  buildColMaps(rawHeaders);
  // Find both Notes/Closed Lost Reason columns (CE and CF) — colIdx only returns first match
  const clrIdxAll=rawHeaders.reduce((a,h,i)=>h==='Notes / Closed Lost Reason'?[...a,i]:a,[]);

  // Debug output to help diagnose column issues
  console.log('=== PIPELINE FILE HEADERS ===');
  console.log(rawHeaders.join(' | '));
  console.log('Stage col idx:', colIdx('Stage'));
  console.log('Renewal Owner col idx:', colIdx('Renewal Owner'));
  console.log('Contact col idx:', colIdx('Contact'));
  const offerHit=OFFER_COLS.find(c=>colIdx(c)!==undefined);
  console.log('Offer price col matched:', offerHit, '@ idx', offerHit?colIdx(offerHit):'–');

  const data=[];
  let stageUnmatched=[];

  for(let i=HEADER_ROW+1;i<rows.length;i++){
    const v=rows[i];
    let company=String(getCell(v,'Contact')||'').trim();
    if(!company){
      // Fallback: try 'Company Name' column
      company=String(getCell(v,'Company Name')||getCell(v,'Account Name')||'').trim();
    }
    if(!company){
      // Log rows that have a valid owner but blank company — helps diagnose missing accounts
      const ownerPeek=String(getCell(v,'Renewal Owner')||getCell(v,'Renewal Owner ')||'').trim();
      if(ownerPeek)console.warn(`Row ${i+1} skipped — blank Contact. Owner: "${ownerPeek}" | Row sample:`, v.slice(0,8));
      continue;
    }

    // Stage — normalised match
    const rawStage=String(getCell(v,'Stage')||'').trim();
    const stage=resolveStage(rawStage)||'1. Uncontacted';
    if(rawStage&&!resolveStage(rawStage)){
      stageUnmatched.push(`"${rawStage}" (row ${i+1})`);
    }

    // Renewal Owner — column headers are trimmed, so plain 'Renewal Owner' works
    const rawOwner=String(
      getCell(v,'Renewal Owner') ||
      getCell(v,'Renewal Owner ') ||  // trailing-space variant just in case
      ''
    ).trim();
    const ro=rawOwner||'Support iConnections';
    if(!VALID_OWNERS.has(ro))continue;

    const r25=parseNum(getCell(v,'2025 Total Revenue'));
    const r24=parseNum(getCell(v,'2024 Total Revenue'));

    // Offer Price — try all candidate column names
    let offerRaw=undefined;
    for(const col of OFFER_COLS){offerRaw=getCell(v,col);if(offerRaw!==undefined&&offerRaw!=='')break;}
    const offer=parseNum(offerRaw);

    const subEnd=excelDateToJS(getCell(v,'Final Sub End Date')||'');
    const dy=daysDiff(subEnd);

    const or_=String(getCell(v,'ONSITE REP (iConn + Benchies)')||getCell(v,'Onsite Rep')||'N/A');
    const eng=engMap[company]||{};
    const mt=eng.mt!==undefined?eng.mt:parseNum(getCell(v,'Confirmed Miami Meetings'));
    const rsk=eng.rsk!==undefined?eng.rsk:(parseNum(getCell(v,'Emerging Manager Risk (AUM <250M & 1 GA Event in 2025)'))>0?1:0);
    const out=eng.out||0;
    const gm=eng.gm||0;
    const gms=eng.gms||0;
    const ap=eng.ap||0;
    const sentiment=eng.sentiment||'';
    // Notes hierarchy: col L (iConnections Notes) → col CE → col CF
    const _icnRaw=String(getCell(v,'iConnections Notes')||'').trim();
    const _clrA=clrIdxAll[0]!==undefined?String(v[clrIdxAll[0]]||'').trim():'';
    const _clrB=clrIdxAll[1]!==undefined?String(v[clrIdxAll[1]]||'').trim():'';
    const icn=_icnRaw?_icnRaw:_clrA?_clrA:_clrB?_clrB:'';
    const clr=_clrA||_clrB;
    const ae=String(getCell(v,'Sales Rep')||'').trim();
    const em=subEnd?subEnd.substring(0,7):'';
    const row={c:company,s:stage,ro,or:or_,o:offer,r25,r24,se:subEnd,dy,em,mt,rsk,out,gm,gms,ap,sentiment,ex:0,snt:0,clr,icn,ae,sg:[],ct:'Manager',wow:'same'};
    row.sg=computeSignals(row);
    data.push(row);
  }

  if(stageUnmatched.length){
    console.warn('Unmatched stage values:', stageUnmatched.slice(0,10).join(', '));
  }
  if(!data.length){
    const preview=rawHeaders.slice(0,12).join(' | ');
    throw new Error(`No valid rows found after filtering.<br><br>First 12 headers from row ${HEADER_ROW+1}:<br><small>${preview}</small><br><br>Verify HEADER_ROW constant matches the actual header row.`);
  }

  console.log(`Loaded ${data.length} accounts. Owners:`, [...new Set(data.map(d=>d.ro))].join(', '));
  return data;
}

// ── MAIN FLOW ─────────────────────────────────────────────────────────────────
let _loadingInProgress=false;
async function loadData(forceRefresh=false){
  if(_loadingInProgress&&!forceRefresh){console.log('loadData: already in progress, skipping duplicate call');return;}
  _loadingInProgress=true;
  loadSnapshot(); // restore previous snapshot for Movement comparison
  // Serve from fresh cache immediately if available and not a manual refresh
  if(!forceRefresh){
    const cache=loadDataCache();
    if(cache){
      D=cache.D; ENG_RAW=cache.ENG_RAW; lastUpdated=cache.lastUpdated+' · cached';
      render();
      return;
    }
  }
  showLoading('Loading pipeline + engagement data…');
  try{
    const token=await getToken();
    const [range,engMap]=await Promise.all([fetchSheet(token),fetchAllEngagement(token)]);
    D=processData(range,engMap);
    lastUpdated='Updated '+new Date().toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});
    saveDataCache(D,ENG_RAW,lastUpdated);
    S.staleWarning=null;
    render();
  }catch(e){
    const msg=e.message||String(e);
    if(/login_required|interaction/i.test(msg)){showLogin();return;}
    // On network/504 failure, try falling back to stale cache rather than showing error screen
    const stale=loadDataCache(true);
    if(stale&&stale.D&&stale.D.length){
      D=stale.D; ENG_RAW=stale.ENG_RAW; lastUpdated=stale.lastUpdated+' · cached';
      S.staleWarning=`SharePoint timed out — showing data from ${stale.staleMinutes}m ago. <button onclick="refreshData()" style="margin-left:8px;padding:2px 10px;border-radius:4px;border:1px solid #fbbf24;background:transparent;color:#fbbf24;font-size:11px;cursor:pointer;font-family:inherit">Retry</button>`;
      render();
    } else {
      showError(msg);
    }
  }finally{
    _loadingInProgress=false;
  }
}

      </td></tr>`:''}`;

  // ── SCOREBOARD ──
  if(S.tab==='owners'){

    const aRngS=aCtrlS.replace('width:75%','width:100%');
    const rInp=(col,ph)=>`<input onclick="event.stopPropagation()" onchange="ssAcctFilter('${col}',this.value)" value="${(af[col]||'').replace(/"/g,'&quot;')}" placeholder="${ph}" style="${aRngS};text-align:right">`;
    const rInpPair=(c1,c2)=>`<div style="margin-top:2px;display:flex;flex-direction:column;gap:1px">${rInp(c1,'min $K')}${rInp(c2,'max $K')}</div>`;

    const fChk=(opts,selArr)=>{if(!opts.length)return'';const lbl=selArr.length?`${selArr.length} selected`:'All flags';return`<button onclick="_openFlagDD('acct',this)" style="width:100%;margin-top:3px;padding:3px 6px;background:#0a1628;border:1px solid #1e3a5f;border-radius:3px;color:#64748b;font-size:9px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:space-between;gap:4px;outline:none"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${lbl}</span><span style="font-size:7px;flex-shrink:0">▾</span></button>`;};

    const afFlags=Array.isArray(af.flags)?af.flags:[];
    const hasFilters=Object.keys(af).some(k=>k==='flags'?afFlags.length>0:af[k]);

    // Sort functions
    const sortFns={
      account:(a,b)=>a.c.localeCompare(b.c),
      stage:(a,b)=>ST.indexOf(a.s)-ST.indexOf(b.s),
      owner:(a,b)=>a.ro.localeCompare(b.ro),
      ae:(a,b)=>(a.ae||'').localeCompare(b.ae||''),
      r25:(a,b)=>a.r25-b.r25,
      offer:(a,b)=>a.o-b.o,
      delta:(a,b)=>{const da=a.o>0&&a.r25>0?(a.o-a.r25)/a.r25:-999,db=b.o>0&&b.r25>0?(b.o-b.r25)/b.r25:-999;return da-db;},
      subend:(a,b)=>String(a.se||'').localeCompare(String(b.se||'')),
      flags:(a,b)=>a.sg.length-b.sg.length,
    };

    // Apply filters
    let rows=[...f];
    if(af.stage==='__active__')rows=rows.filter(a=>!['7. Signed','8. Closed Lost (Not Renewing)','9. Invoice Sent'].includes(a.s));
    else if(af.stage==='__won__')rows=rows.filter(a=>['7. Signed','9. Invoice Sent','10. Paid'].includes(a.s));
    else if(af.stage==='__pipeline__')rows=rows.filter(a=>['5. Proposal Made','6. Signature Requested'].includes(a.s));
    else if(af.stageIn)rows=rows.filter(a=>af.stageIn.includes(a.s));
    else if(af.stage)rows=rows.filter(a=>a.s===af.stage);
    if(af.stageNotIn)rows=rows.filter(a=>!af.stageNotIn.includes(a.s));
    if(af.owner)rows=rows.filter(a=>a.ro===af.owner);
    if(af.ae)rows=rows.filter(a=>(a.ae||'')===af.ae);
    if(af.r25min)rows=rows.filter(a=>a.r25>=(parseFloat(af.r25min)||0)*1000);
    if(af.r25max)rows=rows.filter(a=>a.r25<=(parseFloat(af.r25max)||Infinity)*1000);
    if(af.offermin)rows=rows.filter(a=>a.o>=(parseFloat(af.offermin)||0)*1000);
    if(af.offermax)rows=rows.filter(a=>a.o<=(parseFloat(af.offermax)||Infinity)*1000);
    if(af.subend)rows=rows.filter(a=>seToMonth(a.se)===af.subend);
    if(af.seMonth)rows=rows.filter(a=>a.em===af.seMonth);
    if(af.engStage){const es=af.engStage;if(es==='noout')rows=rows.filter(a=>!a.out);else if(es==='out')rows=rows.filter(a=>a.out===1);else if(es==='gms')rows=rows.filter(a=>a.gms===1);else if(es==='gm')rows=rows.filter(a=>a.gm===1);else if(es==='ap')rows=rows.filter(a=>a.ap===1);}
    if(af.engQtr){const toQtr=em=>{if(!em)return'';const p=em.match(/^(\d{4})-(\d{2})/);return p?`${p[1]}-Q${Math.ceil(parseInt(p[2])/3)}`:''};rows=rows.filter(a=>toQtr(a.em)===af.engQtr);}
    if(afFlags.length){if(afFlags.includes('__any__')){rows=rows.filter(a=>a.sg.length>0);}else{rows=rows.filter(a=>S.acctFlagMode==='all'?afFlags.every(fl=>a.sg.some(s=>SIG_L[s]===fl)):afFlags.some(fl=>a.sg.some(s=>SIG_L[s]===fl)));}}

    // Apply sort
    if(sortFns[as.col])rows=rows.sort((a,b)=>sortFns[as.col](a,b)*(as.dir==='asc'?1:-1));

    const colCount=S.showAE?9:8;
    h+=`<div class="cd" style="padding:0;overflow:hidden">
    <div style="padding:8px 14px;border-bottom:1px solid #1e293b;display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:12px;color:#64748b">${rows.length}${rows.length!==f.length?` of ${f.length}`:''} accounts</span>
      ${hasFilters?`<button onclick="S.acctFilter={};S.acctSort={col:'stage',dir:'asc'};render()" style="font-size:10px;padding:2px 10px;background:#1e293b;border:1px solid #ef4444;color:#ef4444;border-radius:4px;cursor:pointer;font-family:inherit">✕ Reset Filters</button>`:''}
    </div>
    <div class="st"><table style="table-layout:fixed;width:100%"><thead style="position:sticky;top:0;background:#0d1520;z-index:1"><tr>
      <th onclick="ssAcctSort('account')" style="${thStyle};width:170px"><div style="display:flex;align-items:center;gap:3px">Account ${sdArr('account')}</div></th>
      <th onclick="ssAcctSort('stage')" style="${thStyle};width:112px"><div style="display:flex;align-items:center;gap:3px">Stage ${sdArr('stage')}</div>${fStageSelect()}</th>
      <th onclick="ssAcctSort('owner')" style="${thStyle};width:100px"><div style="display:flex;align-items:center;gap:3px">Owner ${sdArr('owner')}</div>${fSelect('owner',uOwners)}</th>
      ${S.showAE?`<th onclick="ssAcctSort('ae')" style="${thStyle};width:90px"><div style="display:flex;align-items:center;gap:3px">AE ${sdArr('ae')}</div>${fSelect('ae',uAE)}</th>`:''}
      <th onclick="ssAcctSort('r25')" style="${thStyle};width:72px;text-align:right"><div style="display:flex;align-items:center;justify-content:flex-end;gap:3px;color:#fbbf24">2025 ${sdArr('r25')}</div>${rInpPair('r25min','r25max')}</th>
      <th onclick="ssAcctSort('offer')" style="${thStyle};width:72px;text-align:right"><div style="display:flex;align-items:center;justify-content:flex-end;gap:3px;color:#22d3ee">2026 ${sdArr('offer')}</div>${rInpPair('offermin','offermax')}</th>
      <th onclick="ssAcctSort('delta')" style="${thStyle};width:68px;text-align:right"><div style="display:flex;align-items:center;justify-content:flex-end;gap:3px">Percent +/- ${sdArr('delta')}</div></th>
      <th onclick="ssAcctSort('subend')" style="${thStyle};width:90px"><div style="display:flex;align-items:center;gap:3px">Sub End ${sdArr('subend')}</div>${fSelect('subend',uSubMonths)}</th>
      <th onclick="ssAcctSort('flags')" style="${thStyle};width:160px;overflow:visible"><div style="display:flex;align-items:center;gap:3px">Flags ${sdArr('flags')}${afFlags.length?`<span style="background:#60a5fa;color:#fff;border-radius:8px;padding:0 5px;font-size:9px;font-weight:700">${afFlags.length}</span>`:''}</div>${fChk(uFlags,afFlags)}</th>
    </tr></thead><tbody>`;
    rows.forEach(a=>{
      const dl=a.o>0&&a.r25>0?(a.o-a.r25)/a.r25*100:-999;
      const nOpen=S.noteOpen===a.c;
      const aPrevStg=PREV_TS?PREV[a.c]:null;
      const aStgMoved=aPrevStg&&aPrevStg!==a.s;
      const aStgUp=aStgMoved?(()=>{const pi=ST.indexOf(aPrevStg),ci=ST.indexOf(a.s);return ci>pi&&!(a.s==='8. Closed Lost (Not Renewing)');})():false;
      h+=`<tr class="dr ck" style="${aStgUp?'background:rgba(52,211,153,0.07)':''}" onclick="ss('noteOpen','${nOpen?'':a.c.replace(/'/g,"\\'")}')">
        <td style="color:#e2e8f0;font-weight:500">${a.c}${a.icn?`<span style="font-size:10px;color:#475569;margin-left:6px;white-space:nowrap">${nOpen?'▾':'▸'} notes</span>`:''}</td>
        <td><span style="color:${CL[a.s]};font-weight:600;font-size:11px">${SH[a.s]}</span></td>
        <td style="color:#94a3b8">${a.ro}</td>
        ${S.showAE?`<td style="color:#60a5fa;font-size:11px">${a.ae||'–'}</td>`:''}
        <td style="text-align:right;color:#fbbf24">${a.r25?fm(a.r25):'–'}</td>
        <td style="text-align:right;color:${a.o>0?'#22d3ee':'#334155'}">${a.o>0?fm(a.o):'–'}</td>
        <td style="text-align:right;font-size:11px;font-weight:600;color:${dl===-999?'#334155':dl>=0?'#34d399':'#ef4444'}">${dl===-999?'–':(dl>=0?'+':'')+Math.round(dl)+'%'}</td>
        <td style="color:${a.dy>0&&a.dy<=90?'#ef4444':a.dy>0&&a.dy<=180?'#fbbf24':'#94a3b8'};font-size:11px">${a.se||'–'}</td>
        <td style="overflow:visible;white-space:normal;vertical-align:top;padding:5px 6px"><div style="display:flex;flex-wrap:wrap;gap:3px;align-items:flex-start">${a.sg.map(s=>`<span class="badge ${SIG_C[s]}">${SIG_L[s]}</span>`).join('')}</div></td>
      </tr>
      ${nOpen&&a.icn?`<tr style="background:#0a1628"><td colspan="${colCount}" style="padding:8px 14px 10px 28px;font-size:12px;color:#94a3b8;line-height:1.6;border-bottom:1px solid #1e293b"><span style="font-size:10px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-right:8px">iCon Notes</span>${a.icn}</td></tr>`:''}`;
    });
    h+=`</tbody></table></div></div>`;
    if(S.acctFlagOpen&&S.acctFlagRect){const _am=S.acctFlagMode;const _aBtnS=(active)=>`font-size:9px;padding:2px 10px;border-radius:3px;cursor:pointer;font-family:inherit;border:1px solid ${active?'#3b82f6':'#1e3a5f'};background:${active?'#1e3a5f':'transparent'};color:${active?'#60a5fa':'#475569'}`;h+=`<div onclick="event.stopPropagation()" style="position:fixed;top:${S.acctFlagRect.top}px;left:${S.acctFlagRect.left}px;z-index:9999;background:#0a1628;border:1px solid #334155;border-radius:4px;min-width:200px;max-height:300px;overflow-y:auto;box-shadow:0 6px 24px rgba(0,0,0,.8)"><div onclick="event.stopPropagation();ssAcctFlagToggle('__any__',${!afFlags.includes('__any__')})" style="padding:7px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;background:${afFlags.includes('__any__')?'#1e3a5f':'transparent'};color:${afFlags.includes('__any__')?'#60a5fa':'#94a3b8'};border-bottom:1px solid #0f1f33"><span style="font-size:11px;width:13px;flex-shrink:0;text-align:center">${afFlags.includes('__any__')?'✓':''}</span><span style="font-size:11px;font-style:italic">Has Any Flag</span></div>${uFlags.map(o=>{const on=afFlags.includes(o);return`<div onclick="event.stopPropagation();ssAcctFlagToggle('${o.replace(/'/g,"\\'").replace(/"/g,'&quot;')}',${!on})" style="padding:7px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;background:${on?'#1e3a5f':'transparent'};color:${on?'#60a5fa':'#94a3b8'}"><span style="font-size:11px;width:13px;flex-shrink:0;text-align:center">${on?'✓':''}</span><span style="font-size:11px">${o}</span></div>`;}).join('')}<div onclick="event.stopPropagation()" style="padding:6px 10px;border-top:1px solid #0f1f33;display:flex;align-items:center;gap:6px"><span style="font-size:9px;color:#475569;flex:1">Match:</span><button onclick="event.stopPropagation();S.acctFlagMode='any';render()" style="${_aBtnS(_am==='any')}">Any</button><button onclick="event.stopPropagation();S.acctFlagMode='all';render()" style="${_aBtnS(_am==='all')}">All</button></div></div>`;}
  }

  if(LIGHT) h=h.replace(/#([0-9a-fA-F]{6})(?![0-9a-fA-F])/g,m=>DARK_TO_LIGHT[m.toLowerCase()]||m);
  document.getElementById('app').innerHTML=h;
  applyBodyClass();
  if(S.drill&&S.tab==='pipeline'&&S.drill!==_prevDrill){requestAnimationFrame(()=>window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'}));}
  _prevDrill=S.drill;
  if(_flagDDCloseListener){document.removeEventListener('click',_flagDDCloseListener);_flagDDCloseListener=null;}
  if(S.acctFlagOpen||S.drillFlagOpen){requestAnimationFrame(()=>{_flagDDCloseListener=function(){S.acctFlagOpen=false;S.drillFlagOpen=false;document.removeEventListener('click',_flagDDCloseListener);_flagDDCloseListener=null;render();};document.addEventListener('click',_flagDDCloseListener);});}
} // end _render
init();
</script>
</body>
</html>
