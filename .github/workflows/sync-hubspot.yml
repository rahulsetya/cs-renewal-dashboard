name: Sync HubSpot deals

# Pulls every open Manager-pipeline deal from HubSpot and writes
# hubspot-deals.json at the repo root. The Offers tab on the live dashboard
# hydrates from that file so the team sees up-to-date deal data without
# anyone uploading a spreadsheet.

on:
  schedule:
    # Every 30 minutes. HubSpot Private App reads are well under any rate limit
    # at this cadence; bump down to */15 if the team needs fresher data.
    - cron: '*/30 * * * *'
  workflow_dispatch:   # Lets us trigger a manual run from the Actions tab

permissions:
  contents: write      # Required so the job can commit hubspot-deals.json back

concurrency:
  group: sync-hubspot
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run HubSpot sync
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: node hubspot-pull/sync.js

      - name: Commit hubspot-deals.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain hubspot-deals.json)" ]; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git add hubspot-deals.json
          git commit -m "chore(sync): update hubspot-deals.json"
          # Retry push on race. The previous rebase strategy hit conflicts
          # when two chore(sync) commits touched the same file — sync data
          # is generated, so a content conflict is never meaningful. New
          # strategy: on failure, soft-reset our commit onto fresh main and
          # re-commit the freshly-synced file. The newest sync always wins.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push attempt $i failed — replaying sync commit on fresh main…"
            if ! git fetch origin main; then echo "Fetch failed."; exit 1; fi
            # Move HEAD to fresh main without touching the working tree.
            # Our just-synced hubspot-deals.json is preserved; git sees it
            # as a staged diff vs origin/main.
            if ! git reset --soft origin/main; then echo "Reset failed."; exit 1; fi
            if git diff --cached --quiet; then
              echo "Synced data already matches fresh main — nothing to push."
              exit 0
            fi
            git commit -m "chore(sync): update hubspot-deals.json"
          done
          echo "All push attempts failed."
          exit 1
