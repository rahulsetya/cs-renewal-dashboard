name: Sync Account Creation Board

# Reads #scale-account-creation, categorizes HubSpot signed-contract posts
# by their reactions (eyes / white_check_mark), and rewrites the pinned
# Slack canvas via canvases.edit. Runs every 15 minutes so an unclaimed
# contract never sits invisible for long.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write      # Needed on first run to commit .slack-canvas-id back

concurrency:
  group: sync-account-board
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Slack sync
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: node hubspot-pull/sync-account-board.js

      - name: Commit canvas ID on first run
        run: |
          if [ -z "$(git status --porcelain hubspot-pull/.slack-canvas-id)" ]; then
            echo "No canvas ID change — skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hubspot-pull/.slack-canvas-id
          git commit -m "chore(sync): bootstrap Slack canvas ID"
          # Same soft-reset retry the HubSpot sync uses — sidesteps races.
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "Push attempt $i failed — replaying on fresh main…"
            git fetch origin main
            git reset --soft origin/main
            if git diff --cached --quiet; then exit 0; fi
            git commit -m "chore(sync): bootstrap Slack canvas ID"
          done
          exit 1
