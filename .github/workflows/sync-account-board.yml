name: Sync Account Creation Board

# Reads #scale-account-creation, categorizes HubSpot signed-contract posts
# by their reactions (eyes / white_check_mark), and rewrites the pinned
# Slack canvas via canvases.edit. Runs every 15 minutes so an unclaimed
# contract never sits invisible for long.

on:
  # Scheduling is handled by an external cron-job.org pinger that hits the
  # workflow_dispatch endpoint every 15 min — GitHub's built-in schedule
  # drifts by hours, so we disable it here to avoid the two firing in
  # parallel. Manual runs from the Actions UI still work.
  workflow_dispatch:

permissions:
  contents: write      # Needed on first run to commit .slack-canvas-id back

concurrency:
  group: sync-account-board
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Slack sync
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: node hubspot-pull/sync-account-board.js

      - name: Commit state files if changed
        run: |
          # Files the sync script may update:
          #   hubspot-pull/.slack-canvas-id         — set once on first run
          #   hubspot-pull/.slack-completed-seen.json — grows as new ✅s appear
          STATE_FILES="hubspot-pull/.slack-canvas-id hubspot-pull/.slack-completed-seen.json"
          if [ -z "$(git status --porcelain $STATE_FILES)" ]; then
            echo "No state file changes — skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $STATE_FILES
          git commit -m "chore(sync): update Slack account-board state"
          # Same soft-reset retry the HubSpot sync uses — sidesteps races
          # with the /15-min cron and any manual pushes hitting main.
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "Push attempt $i failed — replaying on fresh main…"
            git fetch origin main
            git reset --soft origin/main
            if git diff --cached --quiet; then exit 0; fi
            git commit -m "chore(sync): update Slack account-board state"
          done
          exit 1
